body:
  text: 武原居士徐昌治覲周編輯古金粟住持行元百癡校閲千佛篇出時據賢劫一代分為四時一壞二空三成四住就此四中成劫已往壞空未至今在住劫故有千佛出現太約而言三佛已往今是第四釋尊遺法此四時中各分二十小劫總為八十小劫始為一大水火劫名為賢劫也依立世阿毗曇論云十一劫是未來八劫是過去今釋迦佛當第九劫內成佛依藥王藥上經云爾時釋迦牟尼佛告大衆言我會往昔無數劫時於妙光佛末法之中出家學道聞是五十三佛名合掌歡喜復教他人令得聞持展轉相教乃至三千人異口同音一心敬禮即得超越無數億劫生死之罪其千人者華光為首下至毗舍浮佛於莊嚴劫得成為佛過去千佛是也此中千佛者拘留孫佛為首下至樓至如來於賢劫中次第成佛後千佛者日光如來為首下至須彌相佛於星宿劫中當得成佛故知莊嚴劫賢劫星宿劫各有千佛出世即知此劫亦是大阿僧祗劫又藥王經中若善男子善女人及餘一切衆生聞是五十三佛名者是人於百千萬億阿僧祗劫不墮惡道至今賢劫中四佛出世者亦是阿僧祗劫又阿毗曇論二十住劫中過去八劫已有三佛出世釋迦當現在第九劫出世即以前九劫已有四佛出世未來猶有十一劫焉知不有多佛出世耶種族第一維衛佛第二式佛第三隨葉佛此三佛同是剎利王種第四拘樓秦佛第五拘那含牟尼佛第六迦葉佛此三佛同是婆羅門種第七釋迦牟尼佛是剎利王種道樹第一維衛佛得道為佛時於波陀羅樹下第二式佛得道為佛時於分塗利樹下第三隨葉佛得道為佛時於菩薩羅樹下第四拘樓秦佛得道為佛時於斯利樹下第五拘那含牟尼佛得道為佛時於烏暫樹下第六迦葉佛得道為佛時於拘類樹下第七釋迦牟尼佛時於阿沛多羅樹下會數維衛佛前後三會說法初會說經有十萬比丘皆得阿羅漢第二會說經有九萬比丘皆得阿羅漢第三會說經有八萬比丘皆得阿羅漢式佛亦三會說法初會說經有九萬比丘皆得阿羅漢第二會說經有八萬比丘皆得阿羅漢第三會說經有七萬比丘皆得阿羅漢隨葉佛再會說法初會說經有七萬比丘皆得阿羅漢第二會說經有六萬比丘皆得阿羅漢拘樓秦佛一會說經有四萬比丘皆得阿羅漢拘那含牟尼佛一會說經有三萬比丘皆得阿羅漢迦葉佛一會說經有二萬比丘皆得阿羅漢釋迦牟尼佛一會說經有千二百五十比丘皆得阿羅漢奘法師云依如西域釋迦說法總有三時第一時中為諸聲聞說有相法為破外道執令悟得道第二時中為小行菩薩說無相法為破聲聞令悟無相大乘第三時中為大行菩薩雙說有相無相法為破有相無相法令悟中道究竟圓教於此三時一一隨機廣化無量因緣部業因依千佛因緣經云爾時天尊在王舍城耆闍崛山從石室出問菩薩言今諸聲聞諸菩薩等皆講何論菩薩白言天尊諸菩薩衆各各自說宿世因緣時有跋陀婆羅菩薩白佛言我於今日欲少咨問願為解說說是語時八萬四千諸菩薩等各脫瓔珞散佛供養所散瓔珞住佛頂上如須彌山嚴顯可觀有千化佛坐山窟中時諸菩薩白言天尊此賢劫千佛過去世時種何功德常生一處於一劫中次第得菩提化度衆生爾時天尊告諸菩薩言吾為汝分別廣說乃往過去無量百千萬阿僧祗劫此世界名大莊嚴劫名大寶有佛名寶燈焰王如來佛壽半劫正法化世住於一劫像法化世住於二劫於像法中有一大王名曰光德十善化民如轉輪王過去無數阿僧祗劫此娑婆世界有一大國名波羅奈王名梵德常以善法化諸人民以國付子出家學道得辟支佛時千梵王各以衣裓盛諸妙華至優曇林中供養白佛說法時辟支佛踴身虛空化十八變舒手現足中有一梵王名曰慧見告餘梵言我見辟支佛受持五戒以戒齊法當行十善觀諸緣起以此善根回向甚深阿耨菩提時千梵王命終之後於娑婆世界千四天下為千轉輪王壽命八萬四千歲於先經中聞過去佛號栴檀莊嚴如來彼佛為說甚深檀波羅蜜不見施受心行平等時千聖王各以國土付其太子出家學道於雪山中各立草菴求無上道即獲五通飛騰空虛壽命一劫時雪山中有大夜叉身長四千里利牙上出高八十里面十二里眼出迸血光如融銅左手持劍右手持叉住聖王前高聲唱言我今饑渴無所飲食惟王矜愍施少飲食時千聖王告夜叉言我等誓願一切施與各各以水澡夜叉手授以仙果而令食之夜叉得果怒棄置地告聖王言我父夜叉噉人精氣我母羅剎恆噉人心飲人熱血我今饑急唯須人心血何用果為時有婆羅門名牢度跋提白夜叉言唯願為我說法我今不惜心之與血即持利劍刺胸出血是時天地大動日無精光無雲而雷有五夜叉從四方來爭取分裂兢共食之食已大叫躍立空中告千聖王誰能行施如牢度跋提如此行施乃可成佛時千聖王驚怖生變悔心各欲還國於一劫中墮大地獄雖墮地獄菩提願力莊嚴心故火不能燒從是以後復得值遇燈明王菩薩為其說法從地獄出廣為讚歎過去千佛解脫稱莊嚴佛乃至自在王佛時千聖王聞千佛名歡喜敬禮以是因緣超越九億那由他恆河沙劫生死之罪種姓部如十二遊經云阿僧祗時有菩薩為國王其父母早喪讓國與弟捨行求道遙見一婆羅門姓曰瞿曇因從學道婆羅門言當解王衣如吾所服受瞿曇姓是菩薩受瞿曇姓入於深山食果飲水坐禪念道菩薩乞食遂還國界舉國吏民無能識者謂為小瞿曇菩薩於城外甘蔗園中以為精舍於中獨坐時有五百大賊劫取宮物路由菩薩廬邊明日捕賊縱跡在菩薩舍下因收菩薩前後劫盜法以木貫身立為尖標血流於地王使左右弩弓射殺之是大瞿曇以天眼觀見便以神足飛來下棺斂之取土中餘血以泥團之著二品中還其精舍大瞿曇言是道人若其志誠天神當使血化為人卻後十月左即成男右即成女於是便姓瞿曇氏一名舍夷又菩薩本行經云甘蔗王名大茅草以王位付諸大臣大衆圍繞送王出城剃除鬚髮服出家衣王出家已持戒清淨專心勇猛成就四禪具足五通得成王仙壽命極長至年衰老諸弟子欲往東西求覓飲食取好軟草安置籠裏用盛王仙畏諸蟲獸來觸懸樹枝上時諸弟子乞食去後有一獵師遊行山野遙見王仙謂是白鳥遂即射之王仙被射有兩滴血出墮於地即便命終彼諸弟子乞食來還見王仙被射命終復見有血兩滴在地即集柴木焚燒王尸收骨為塔爾時彼地兩血生出二甘蔗芽漸漸高大至時開剖一莖出一童子一莖出一童女端正可喜時諸弟子心念兩童是王仙種養護看視報諸大臣即灌其頂立以為王時彼諸臣取甘蔗種降胎部現衰如因果經云爾時善慧菩薩功行滿足位登十地在一生補處近一切種智生兜率天名聖善為諸天主於十方國土現種種身為諸衆生隨宜說法期運將至當下作佛即觀五事一者觀諸衆生熟與未熟二者觀時至與未至三者觀國土何國處中四者觀諸種族何族貴盛五者觀過去因緣誰最真正應為父母仍於天宮現五種相令諸天子皆悉覺知菩薩期運應下作佛一者菩薩眼見瞬動二者頭上華萎三者衣受塵垢四者腋下汗出五者不樂本坐諸天衆見菩薩有此異相心大驚怖爾時菩薩又現五瑞一者放大光明普照三千大千世界二者大地十八相動須彌海水諸天宮殿皆悉震搖三者諸魔宮宅隱蔽不現四者日月星辰無復光明五者天下八部皆悉震動不能自禁是諸天見菩薩身已有五相又睹外五現希有事皆悉聚集到菩薩所頭面禮足白言尊者我等今日見此諸相舉身震動不能自安願為我釋此因緣便答言善男子當知諸行皆悉無常我今不久捨此天宮生閻浮提於時諸天聞此語已悲號涕泣深歎無常觀機如菩薩降胎以四種觀人間一觀時二觀土地三觀種姓四觀生處初觀時者時有八種佛出後第一人壽八萬四千歲時乃至第八人壽一百餘歲第二觀土地者諸佛常在中國生多豐財寶其土清淨第三觀種姓者佛生二種姓中若剎利若波羅門剎利種勢力大婆羅門種智慧大第四觀生處者何等母人能懷那羅延力菩薩亦能自護淨戒又佛本行經云爾時兜率天衆之中有一天子名曰金團往昔以來數曾下到閻浮地補處護明菩薩告金團言汝數下至閻浮提中應知彼城邑聚落諸王種族當生何家金團天子報言三千大千世界唯有一剎利從本以來至於大衆平量安立世世轉輪聖王之種乃至甘蔗苗裔以來子孫相承在彼迦毗羅婆蘇都釋種所生其王名為師子頰王其子名為輸頭檀王一切世間天人之中有大名稱尊者堪為彼王作子護明菩薩報金團言汝善觀察諸王家種我亦念在於此家生此家有六十種功德彼母有三十二種具足德行堪受菩薩在胎呈祥菩薩正念從兜率下託淨飯王第一大妃摩耶夫人右脅是時大妃於睡眠中夢見有一六牙白象其頭朱色七支柱地以金裝牙乘空而下入於右脅夫人夢已明旦即向淨飯王言時王宣敕喚八婆羅門占夢婆羅門師白大王言夫人所夢其相甚善必生聖子彼於後時必成佛道時淨飯王聞占師說心大歡喜多以財施即於其國迦毗羅城四門之外并衢道頭街弄阡陌有人行處所須飲食財寶宅舍畜生皆悉與之時有一天名曰速往至諸地獄大聲唱言汝諸人輩當知菩薩從兜率天下入於母胎是故汝等速發誓願願生人間地獄衆生聞此語已往昔已來曾種善根各各面相睹見捨地獄身即生人中所有三千大千世界諸衆生等皆來於此迦毗羅城四面託生降胎又念佛三昧經云菩薩欲降母胎時三千大千世界悉皆六種震動又因果經云爾時菩薩欲降母胎即乘六牙白象發兜率宮無量諸天作諸妓樂燒衆名香散天妙華隨菩薩滿虛空中放大光明普照十方以四月八日明星出時降神母胎於時摩耶夫人體安快樂如服甘露顧見自身如日月照心大歡喜爾時兜率天衆念言菩薩已生白淨王宮我等亦當下生人間菩薩成佛我得在先為其眷屬聽法作此念已便即下生其數有九十九億諸天下生人間又從他化自在天乃至四天王及色界天王與其眷屬亦皆下生出胎部迎后如佛本行經云爾時菩薩聖母摩耶懷孕菩薩將滿十月垂欲生時時彼摩耶夫人父善覺長者即遣使人詣淨飯王所奏言摩耶王大夫人懷藏聖胎意欲迎還安止住於嵐毗尼中盡父子情乞垂哀愍遣放女來我家産訖即遣送還時淨飯王聞善覺使作是言已即敕有司平治道路具辦幡華種種音樂僕從人物送妃至家感瑞如普曜經云太子滿十月已臨産之時先現瑞應三十有二疆埸左右歎未曾有誕孕如因果經云菩薩處胎垂滿十月夫人欲入園遊觀王敕後宮端正采女八萬四千用侍摩耶夫人又擇八萬四千端正童女齎侍香華又敕諸群臣百官夫人皆悉隨從於是夫人即升寶輿與諸官屬及采女前後導從往藍毗尼園爾時四月八日日初出時夫人見後園中有一大樹名曰無憂華色香鮮枝葉分布極為茂盛即舉右手欲牽摘之菩薩漸漸從右脅而出是時摩耶夫人立地以手執波羅叉樹枝即生菩薩招福如因果經云太子生時於時樹下亦生七寶七莖蓮華大如車輪菩薩即便墮蓮華上無扶侍者自行七步舉其右手而師子吼云我於一切天人之中最尊最勝無量生死於今盡矣說是語已時四天王即以天繒接太子身置寶機上釋提桓因手執寶蓋大梵天王侍立左右難陀龍王優波難陀龍王於虛空中吐清淨水一溫一涼灌太子身身黃金色三十二相放大光明普照三千大千世界同應如瑞應經云當爾之時諸釋種姓亦同一日生五百男又奴名車匿馬名捷陟時王廄中象生白子馬生白駒牛羊亦生五色羔犢如是等類數各五百王子青衣亦生五百倉頭爾時宮中五百伏藏自然發出有商人從海探寶而還各齎奇珍奉貢王因諸瑞吉祥當名太子為悉達爾時四月八日生佛弟難陀四月九日生阿脽四月十日生調達侍養部依佛本經云爾時太子既誕生適滿七日其太子母摩耶夫人遂便命終往生忉利天上時淨飯王見夫人命終之後喚召釋種而告之言今是童子嬰孩失母乳哺之寄將付囑誰教令養育使得存活誰能憐愍愛如己生時有摩訶波闍波提是童子姨母堪能養育淨飯王即將太子付囑姨母而告之言善來夫人如是童子應當養育善須護持應令增長占相部如瑞應經云爾時白淨王訪五百聰明相師令占太子相師言是王之子乃是世間之眼猶如真金有諸相好極為明淨若當出家成一切種智若在家者為轉輪聖王領四天下第一之最又白王言有一梵仙名阿私陀具足五通在於香山能斷疑惑時王心自思惟香山途路嶮絶非人能到當以何方請來至此王作念時阿私陀仙騰空而來為王相之王見來已抱太子出欲禮仙人時仙人止王曰此是天人三界中尊云何而令禮於我耶時彼仙人即起合掌禮太子足忽然悲泣不能自勝王見彼仙悲泣舉身戰怖生大憂惱即問仙人我子有何不祥而悲泣耶答言相好具足無有不祥但恨我今年壽已百二十不久命終生無相天不睹佛興不聞經法故自悲耳若有衆生具三十二相或生非處久不明顯此人必為轉輪聖王若三十二相皆得其處又復明顯此人必成一切種智今觀大王太子諸相皆得其所又極明顯決定知成正覺校量佛阿毗曇經云以一千阿僧祗世界衆生所有功德成佛一毛孔如是成佛一毛孔功德遍如來身毛孔功德成佛一好如是成就八十種好功德增為百倍乃成如來身上一相所成就三十二相功德增為千倍乃成如來額上一白毫相以一千毫相功德增為百倍乃成如來一頂骨相一切飛天所不能見頂如是不思議清淨功德成就佛身是故如來於天人中最為尊勝遊學部召師如佛本行經云時淨飯王以太子年已八歲會百官群臣宰相而告之言卿等當知誰堪為太子作師諸臣報言今有毗奢婆蜜多羅善知諸論最勝最妙堪教太子王即召言尊者大師教我太子蜜多報言謹依王命即嚴五百釋種童子前後左右隨從太子將升學堂時彼大師遙見太子威德力故從座忽起屈身頂禮於太子足太子問言尊者教我何書或復梵天所說之書以至薩婆韋多書凡有六十四種未審欲教何書是時蜜多聞太子說內心歡喜悅豫熙怡曰字為言諦言為理筌音義合符不可偏失是以文字應用彌綸宇宙雖跡係翰墨而理契乎神昔造書之主凡有三人長名曰梵其書右行次曰佉盧其書左行少者蒼頡其書下行至於傍生八體則有仙龍雲芝二十四書則有楷草針殳然原本定義則體備六文適時為敏則莫先隸法東西之書可得略究時淨飯王復集群臣言何處有師最便武技教我太子諸臣報王此處有釋名為善覺其子名羼提提婆堪教太子兵戎法式其所解知凡有二十九種善巧妙術入於學堂從蜜多及提婆所二大尊邊受讀諸書并一切兵戎雜術經歷四年至十二時種種技能遍皆涉歷既通達已王為太子造一園苑名勤劬太子一日在勤劬園遨遊射戲自餘五百諸釋種童子亦各在其自己園內遊戲時有群鴈行飛虛空是時童子提婆達多彎弓而射即著一鴈其鴈被射帶箭墮悉達園中時太子見彼鴈帶箭墮地兩手捧取左手擎持右手拔箭即以酥蜜封其瘡是時提婆達多遣使來語太子言我射一鴈墮汝園中宜速付來時太子報使人言鴈若命終即當還汝若不死者終不可得提婆達多復更重遣使人語言若死若活快須相還太子報言我發菩提心挕受此鴈一切衆生皆來挕受況復此鴈而不屬我以是因緣競相聚集諸釋宿老智人判決此事是時有一淨居諸天變作老宿長者入會而言誰養育者即是挕受射著之者即是放捨彼諸釋宿老一時印可高聲唱言如是如仁者言捔力如因果經云太子與兄弟捔力與萬眷屬將欲出城於時有大象當城門住諸人皆不敢前提婆達多以手搏頭即便躄地難陀以足指挑擲著路傍太子以手執象擲著城外還以手接不令傷損象又還蘇時諸人民歎未曾有園中有七重金鼓銀鼓鋀石銅鐵等鼓各有七枚提婆達多最先射之徹三金鼓次及難陀亦徹三鼓太子嫌弓弱取庫內祖王一良弓無能張者太子在坐以手拼弓放一箭徹過諸鼓然後入地泉水流出又徹過大鐵圍山又佛本行經云是時太子所射之箭向三十三天天中建立箭節常以諸香華供養此箭又太子執箭一射便穿七鐵豬過七鐵豬已彼箭入地即成一井於今稱為箭井時淨飯王知太子所有技能皆悉勝彼一切諸人踴躍喜歡敕喚白象瓔珞莊飾令太子乘是時提婆城外而入見此白象而問人言此象欲將何處其人報言欲將出城擬悉達乘提婆達多以妒嫉故便以左手執於象鼻右手築額一下倒地塞彼城門衆人往來不通出入難陀相續而來問知事已即以右手執彼象尾牽取離門可七步許太子問誰牽離門衆人言難陀太子言善哉難陀因思惟彼等二人雖能示現其氣力但此象身粗壯於後壞爛臭熏此城門以左手舉象以右手承重於空中擲置城外越七重墻度七重塹即擲過離城可有一拘盧奢而象墮地即成大坑至今相傳為象墮坑納妃部灌帶太子年大父王敕下餘國卻後二月八日灌太子頂皆可來集立為太子求婚如佛本行經云爾時太子漸向長成至年十九時淨飯王為太子造三時殿一者暖殿第二涼殿第三中殿於後園廣造池臺裁蒔華果衆人作樂隨時侍衛淨飯王復憶太子初生之時相師私陀記為成道作何方便令不出家得紹王位釋族報王造此宮室令諸采女娛樂王復語釋種言汝等當觀誰女堪與太子為妃爾時五百釋種各各唱言我女堪為作妃王復籌量以雜寶作無憂器持與太子令施諸女密使觀察太子眼目瞻矚在誰即聘作妃王即於迦毗城振鐸唱言從今七日來我太子欲見諸釋女施與一切雜寶種種玩弄無憂之器爾時一切諸女莊嚴其身來集宮門欲見太子以太子威德大故不敢正看但取寶器各各低頭速疾而過寶器盡已最後一女波私吒族釋種大臣摩訶那摩其女名為耶輸陀羅前後侍從圍繞而來遙見太子峨峨注睛舉其雅步瞻觀直躬目不斜窺漸近前趨來迎太子如舊相識即白太子可與我寶太子報言汝來既遲皆悉施盡女復白言我有何過欺不與寶太子答言我不欺汝但汝不及是時大指邊有一所著印環價值百千從指脫與爾時大臣摩訶那摩見太子一切技藝勝妙智能最為上首而作是言惟願太子受我女為妃爾時太子占良吉日迎納耶輸陀羅以諸瓔珞莊嚴其身又復共五百采女相隨而往迎取入宮太子雖納為妃然恆與妃行住坐臥未曾有世俗之意但修禪觀諸女咸疑太子不男太子以手指妃腹曰卻後六年爾當生男遂以有娠又五夢經云太子有三妃一瞿夷二耶輸三鹿野疑謗如智度論云菩薩出家夜有人言太子出家何得有娠汙辱我門釋種欲以火坑焚燒母子耶輸自恨無事立大誓言我若邪行其腹內兒願母子隨火消化發此願已即投火坑於是火滅母子俱存火變蓮池母處華座後生兒似菩薩身名羅𬑟羅臥息彼石耶輸捉石擲著水中遂立誓言我所生兒實是太子體胤之息是不虛者今此大石在於水上浮遊不沒時彼大石遂即浮泛如芭蕉葉不沉不沒於時大衆見聞生希有心厭苦部觀田如佛本行經云淨飯王共多釋種并將太子出外野遊觀看田種時彼地內所有作人赤體辛勤而事耕墾飛鳥喫蟲共相殘害即復唱言嗚呼嗚呼世間衆生極受諸苦所謂生老病死兼復受於種種苦惱展轉其中不能得離云何不求捨是諸苦是時太子安祥矚盻處處經行欲求寂靜忽見一處有閻浮樹蓊鬱扶疏太子發遣左右漸至樹下即於草上結跏趺坐棄捨一切諸不善法欲界漏盡即得初禪一切諸天帝釋等見太子在樹蔭坐飛來到太子所禮敬說偈讚已還去時淨飯王問言太子今在何處時一大臣遙見太子在彼閻浮樹陰之下復見一切樹影悉移唯閻浮蔭獨覆太子有是希奇難思議事即大歡喜踴躍急疾奔馳走詣王所長跪依事說言時淨飯王聞已即詣閻浮樹所遙見太子在彼樹間結跏趺坐譬如黑夜視山頂頭大聚火光出猛明焰威德顯著炳照巍巍如重雲間忽出明月亦如暗室然大淨燈時王見已生大希有奇特之心歡喜踴躍言太子有大威德出遊如佛本行經云爾時作瓶天子欲令太子出向園林觀看好惡發猒心故漸教捨離太子聞是聲已即喚馭者可速嚴飾好車今欲向園觀看時淨飯王知太子欲出敕宣迦毗羅城一切內外悉遣灑掃清淨安雜香華男女莊嚴或有老病死亡六根不具者悉令驅逐是時馭者裝飾車乘駕善調馬太子從東門引導而出是時作瓶天子於街弄前正當太子變身化作一老弊人太子見已即問馭者此是何人身體皺皵肉少皮寬眼赤涕流極大醜陋獨爾鄙惡不似餘人為生來然為老至馭者言此是老至名為大苦惱爾時太子問馭者言此人為是一家如是為當一切悉如斯馭者報言一切世間皆有是法貴賤雖殊皆未過老太子言若我不離是老便猒捨五欲唯作老苦之觀後於異時辭王從城南門出爾時作瓶天子即於太子前化作一病人連骸困苦命在須臾臥糞穢中宛轉呻喚不能起舉唱言叩頭乞扶我坐太子見已問馭者言此是何人腹肚極大喘息之時身遍戰栗悲切酸楚不忍見聞此人何故受如是苦馭者奉報太子四大不調故爾病生太子後於異時從城西門出時作瓶天子於太子前化作一尸臥在床上衆人舉行無量姻親圍繞哭泣椎胸拍頭涕泣如雨大叫號慟酸哽難聞太子見之心懷慘惻問馭者言此是何人舉行叫哭馭者答言已捨心意等諸根尸骸無識如木石諸親號咷暫圍繞恩愛於此長別離太子復問我亦有此死法否報言一切衆生此盡業天人貴賤平等均雖處善惡諸世間無常至時無有異太子後於異時從城北門出爾時作瓶天子以神通力去車不遠於太子前化作一人剃除鬚髮著僧伽黎褊袒右肩手執錫杖左掌擎鉢在路而行太子見已問馭者言此是何人在於我前威儀整肅行步徐庠直視一尋不觀左右執心持行不似餘人馭者白太子言此名出家之人常行善法遠離非法善調諸根善與無畏於諸衆生慈悲不行殺害太子聞已問馭者言汝今將車向彼出家人邊馭者承命即引太子向出家人所太子咨問汝是何人以偈報言觀見世間是滅法欲求無盡涅槃處怨親已作平等心世間不行欲等事爾時太子為敬法故從車而下徒步向彼出家人所頭面頂禮彼出家人三匝圍繞還上車坐回還宮中於前三所逢生猒惟欣第四出家諸大相師並知太子若不出家過七日後得轉輪聖王位王四天下七寶自至各以所知白淨飯王王加守循四門各千人周匝城外一踰闍那內羅列人衆而防護之出家部離俗如因果經云爾時太子心自念我年已至十九今是二月復是七日思求出家今正是時作此念已身放光明照四天王宮乃至淨居天宮諸天見此光已皆知太子出家時到即便來下到太子所頭面禮足合掌白言無量劫來所修行願今正成熟太子答言如汝等語然父王敕內外官屬嚴見防衛欲去無從諸天白言我等自當設諸方便令太子出使無知者時耶輸陀羅眠臥之中得三大夢一者夢月墮地二者夢牙齒落三者夢失右臂得此夢已眠中驚覺心大怖懼白太子已具述三夢太子言月猶在天齒又不落臂復尚在當知諸夢虛假不實汝今不應橫生怖畏又彼本起經云諸天皆言太子當去恐作稽留急去遠此大火之聚爾時太子思如是已至於後夜淨居天王及欲界諸天充滿虛空即共同聲白太子言內外眷屬皆悉昏臥今者正是出家之時爾時太子即自往至車匿所以天力故車匿自覺而語之言汝可為我牽揵陟來車匿聞語已舉身戰怖心懷猶豫夜中索馬欲何所之太子復語車匿言我今欲為一切衆生降伏煩惱結賊故汝今不應違我此意爾時車匿舉聲號泣欲令耶輸陀羅及諸眷屬皆悉知覺太子當去以天神力昏臥如故車匿即便牽馬而來於是諸天捧馬四足并接車匿釋提桓因執蓋隨從天即便令北門自然而開不使有聲太子於是從門而出虛空諸天歌讚隨從至於天曉行至彼跋伽仙人苦行林中即便下馬撫背而言所難為事汝作已畢又語車匿唯汝一人獨能隨我甚為希有我今既已至間靜處汝便可與揵陟俱還官也車匿聞此語已悲號啼泣迷悶躄地於是揵陟屈膝舐足淚落如雨太子答言世間之法獨生獨死豈復直伴我今為滅諸苦使故來至此諸苦斷時然後當與一切衆生而作伴侶於是脫頭寶冠與車匿報大王而說偈言假使恩愛久共處時至會必有別離見此無常須臾間是故我今求解脫剃髮具服佛本行經云爾時太子從車匿索取寶刀割取髮髻有一華鬚名須曼那化作淨髮人與太子淨髮既剃髮已淨居天復化作獵師之形身著袈裟染色之衣語言我與汝迦尸迦衣價值百千億金復為種種栴檀香等之所薰修菩薩見已生大歡喜爾時菩薩剃髮身得袈裟已形容改變便放大光下至閻浮化成二寶塔具衆莊嚴使還又普曜經云於是菩薩適出城門迦維羅衛一切群衆知太子去共談而喜瞿夷明日從寐起已遙聞衆言覺知已去與耶輸心為破裂淨飯王感絶自投於地舉聲稱怨永絶我望何所依怙國中樹木尋時虧落無諸華實諸清淨地悉生塵垢王與群臣眷屬行至園觀亦懷悲苦嗚呼阿子明曉經典衆奇異術無不博達今至棄國萬民為何所遊誰為開門其諸天人供養云何車匿白王我在常處宴然寐床城門已閉於時菩薩告我被馬城中萬民皆安不聞天帝開門四天王告敕四神捧其馬足諸百千天帝釋梵以侍送之嚴治道路演大光明散光燒香諸天伎樂同時俱作涌在虛空諸圍繞以侍送之去是極遠脫衣寶瓔及白馬遣我還國啓王謝妃必至成佛乃還相見勿令愁憂諫子如佛本行經云淨飯王使二人向山諫太子回念吾年朽家國無嗣何時能還太子答言欲得四願不復出家一不老二無病三不死四不別神仙五通雖住一劫不離於死王聞重悲斯四願者古今無獲誰能除此佛髮又毗尼母經云佛告諸人此髮不可故衣故器盛之當用新物時有王子瞿波離將軍欲往四方有所征伐來索世尊髮問安處佛言聽安金塔中若銀塔中若寶塔中若雜寶塔繒綵衣褁問云何持佛言聽象乘馬車乘頭上肩上擔時王子持世尊髮去所往征伐得勝還國為世尊起髮塔成道部乞食如四分律云爾時菩薩漸漸遊行至婆羅閲城乞食時摩竭王在高樓上見菩薩行步庠序即遣信問比丘欲何所詣可於此住居王位治化我當為臣菩薩答言我捨轉輪王出家學道豈可於此邊國王位而處俗耶時王前白言若成無上道者先詣羅閲城與我相見菩薩報言可爾爾時王即禮菩薩足繞三匝而去又佛本行經云菩薩為摩伽陀國王說云大王我等今實不畏彼毒蛇亦復不畏天雷霹靂亦復不畏猛火焰被大風吹燒野澤者但畏五欲境界所逼何以故五欲無常害功德六塵空幻損衆生世間果報本誑人智者誰能暫停住苦行爾時菩薩於鹿林在五拘鄰比丘所學于苦行經於六年極生辛苦過其本師以自餓故而不得道徒勞疲形日食一胡麻經一七日粳米紅豆麻子粟麋及以白豆亦復如是各一七日如是修苦行時一切皮肉銷瘦皺減其目坎陷肉盡肋出欲坐則伏欲起則偃雖受如是無利益苦然不退菩提之心乳麋又述灌帶部內時有四天王子告律師云世尊初成道第十一年於王舍城中須摩長者園內告諸天大菩薩及大弟子曰我初踰城時至彼洴沙國路逢牧牛女我語云我有少饑渴從汝乞飲食彼女答云汝何所往答云求趣菩提又問名字何等答言悉達彼女又白言我讀韋陀之典云不久有大智人當成正覺我觀仁者相貌音聲是諸佛相我作此山神經十六大劫過去諸佛我皆親覲汝可隨我往至住處當與汝飲食過去迦葉佛涅槃時付我一澡罐其頂上有雙龍繞下有獅子蹲拘留佛所製遞相付我迄至樓至佛此龍瓶內具足有八功德水汝若饑渴當飲此水能消煩惱增長菩提勿輕此小瓶假使四大海水內此瓶中猶不能滿中有龍王此賢劫初三佛出世所有遺法多在瓶內與婆竭龍宮一無有二又迦葉佛付我香爐及一黃金函將付仁者其香爐前有十六頭半是獅子半是白象於二獸頭上別起蓮花臺四緣別起六銀樓樓出天童每燒香時是諸童子各各口出燒香歌曲臺門自開又黃金函內盛大般若合三十億偈黃金為經牒白玉為界道白銀為字此函及爐是拘留佛所製次第付我乃至樓至佛諸佛欲興世皆開此金函披閲經典以般若力天魔不嬈速登正覺今將付囑努力守護勿令損失我受得已於菩提樹下六年苦行常飲此瓶水故除饑渴煩惱亦消也又我初欲成道入河澡浴受二女乳麋至菩提樹下欲升金剛壇山神至我所即告我言汝今成道可依往佛若初成道欲升金剛壇繞樹合三十二匝十方諸佛亦前授香次命人王天王釋梵龍王十地菩薩各前授香佛以威神香聞十方上至有頂受苦衆生聞香解脫諸根具足草坐佛本行經云爾時菩薩於河澡浴食乳麋沐身體光儀平復自在安詳面向菩提樹思作何座左右四顧是時忉利天帝釋天主即化其身為刈草人刈取其草青緑顏色猶如孔雀王項柔軟滑澤如微細迦尸衣色妙而香右旋宛轉菩薩問彼人言汝名字何彼人報言我名吉利菩薩思唯我今欲求自身吉利亦為他人以求吉利我今決當得證阿耨菩提當取草時其地便六種震動又觀佛三昧經云適施草座諸佛化作八萬佛樹師子之座有天衣布其上降魔又雜寶藏經云如來樹下惡魔波旬將八十億衆欲來壞佛便語佛云汝獨一身何能坐此急可起去若不起者我捉汝腳擲著海水佛言我觀世間無能擲我汝於前世時曾於一寺受一日八戒施辟支佛一鉢之飯故生六天為大魔王而我於三阿僧祗劫亦設供養聲聞緣覺不可計數魔言汝道我昔一日持戒施辟支佛食信有其實我亦自知汝亦知我汝自道者誰為證知佛以手指地言此地證我作是語時一切大地六種震動地神即從金剛際出合掌白佛言我為作證有此地來我恆在中世尊所說其實不虛佛語波旬汝今先能動此澡瓶然後可能擲我海水爾時波旬及八十億衆不能得動魔王軍衆顛倒自墜破壞星散說法部赴機依彌沙塞律云佛得道七日受解脫樂有五百乘車載奉蜜四王奉鉢佛受之已為說三歸又更七日文鱗龍王奉非人食後過七日斯那奉食姊妹四人受三歸依復過七日梵王來請轉法輪又普曜經云時梵王與六萬八千梵王眷屬來詣佛所稽首足下請轉法輪佛受請已言我宿命在波羅奈供養六百億佛應在此轉法輪又中本起經云世尊念言吾昔路由梵志阿蘭迦蘭待我有禮應往度之天空中曰此二人已亡七日又念應度鬱頭藍弗天復告云昨日命終又念父王昔遣五人一名拘鄰二名頞陛三名跋提四名十力迦葉五名摩訶男執侍功勤應往度之又轉法輪經云佛在鹿野樹下時空中有自然法輪飛來當佛前而轉佛以手撫之止吾無始來為名色轉今愛意盡不復流轉輪即便住又十二遊經云佛從四月八日至七月十五日坐樹下為一年二年於鹿野園中為五人說法三年為鬱鞞迦葉兄弟三人說法滿千比丘四年在蒙頭山為龍鬼說法五年時度舍利目連舍利七日得上果目連十五日得上果六年須達共祗陀為佛立精舍有十二佛圖寺有七十二講堂有三千六百間屋有五百樓閣七年在拘耶尼園為婆陀和菩薩等八人說般若經明苦行事八年在柳山為屯真陀羅王弟說法九年在穢澤中為阿掘摩說法十年遊摩竭國為弗沙王說法十一年在恐懼樹下為彌勒說本起經即修行本十二年還父王國為釋氏八萬四千人說法又大集經云佛成道十六年於欲色界中間出大寶階大衆俱登中階即上升虛空又分別功德經云二十五年比在諸國此住最久以其中多諸珍異人多有義祗樹精舍有神異驗衆集之時獼猴飛鳥群類數千悉來聽法寂寞無聲事竟即去各還所止犍椎適鳴已復來集此由國多仁慈故異類影附故智度論云舍衛城有九億家三億明見佛三億信而不見三億不見不聞又薩婆多論云佛以二月八日沸星現時初成等正覺亦以二月八日沸星出時生以八月八日沸星出時轉法輪以八月八日沸星出時取般涅槃涅槃部弟子依智度論云長老大迦葉於耆闍崛山集三藏可度衆生竟隨佛入般涅槃清朝持鉢入王舍城乞食已上耆闍崛山語諸弟子我今日入無餘涅槃一切諸人聞是語已皆大愁憂迦葉晡時從禪定起入衆中坐讚說無常苦空無我如是種種說法已從佛所得僧迦梨持衣鉢提杖如金翅鳥現升虛空作十八變結集部此中廣明結集具有四時第一依智度金剛仙二論如來在此鐵圍山外共文殊師利及十方佛結集大乘法藏第二依菩薩處胎經及四分律等如來初入涅槃始經七日大迦葉共五百羅漢令到十方世界召得八億八千衆共為集三藏第三依智度論如來入涅槃後至夏安居初十五日大迦葉共千羅漢在王舍城結集三藏第四依四分律如來入涅槃後一百年內為跋闍子擅行十事大迦葉共七百羅漢在毗舍離城結集三藏大乘結集依大智度論金剛仙論云文殊師利結集中明如來在此世界之外不至他方世界十方諸佛並皆雲集說法亦名話經文殊後結集召諸菩薩及大羅漢無量無邊各言某經我從佛聞須菩提言金剛般若我從佛聞諸經當部各有弟子同時聞者並云我親從佛聞故知阿難則遍聞諸經餘之弟子則偏局當部故維摩經云舍利弗問天女曰汝於三乘當何志求天女曰若以小乘法化我作聲聞若以中乘法化我作緣覺若以大乘法化我作菩薩五百結集依菩薩處胎經云爾時佛取滅度已經七日七夜時大迦葉告五百阿羅漢打犍椎集衆卿五百人盡詣十方諸佛世界諸有得阿羅漢六通者盡集此閻浮提雙樹間釋迦牟尼佛今已捨壽起七寶塔今集欲得演出真性法身汝等速集聽采微妙之言爾時五百羅漢受大迦葉教即到十方恆河沙剎土集諸羅漢得八萬八千衆來集忍界聽受法言又僧祗律云時大迦葉語諸比丘結集法藏應住王舍城令阿那律守佛舍利勿使諸天將去又菩薩處胎經云爾時迦葉見衆集已語優婆離卿為維那唱阿難下即受教唱下阿難心意荒亂內自念言佛滅度未久恥我乃爾即自思唯四諦法已便於衆前成阿羅漢諸塵垢滅朗然大悟聖衆稱善諸天歌嘆爾時大地六反震動時大迦葉即使阿難升七寶高座迦葉告言佛所說法一言一字汝勿使有缺漏菩薩藏者集著一處聲聞藏者集著一處戒律藏者集著一處爾時阿難最初出經胎化藏為第一中陰藏第二摩訶衍方等藏第三戒律藏第四十住菩薩藏第五雜藏第六金剛藏第七佛藏第八是為釋迦文佛經法千人結集大迦葉言若我昔常乞食者常有外道強來難問廢闕法事今王舍城常設飯食供給千人告語闍王給我等食日日送來是中夏安居三月十五日說戒時復語阿難汝今應隨佛心憐愍衆生故集佛法藏是時阿難一心合掌向佛涅槃處作如是言佛初說法時爾時我不見如是轉展聞佛在波羅奈佛為五比丘初開甘露門說真四諦法苦集滅道諦阿若憍陳如最初得見道及八萬諸天聞是得見道是千阿羅漢聞是語已上升虛空高七羅多樹皆眼見佛法七百結集四分律云爾時世尊般涅槃後百歲毗舍離跋闍子比丘行十事言非法非毗尼非佛所教已皆下舍羅在毗舍離七百阿羅漢集論法毗尼依道宣律師感應記云律師問天人曰世尊涅槃後結集法藏儀式云何天人答曰惟大聖隱顯隨機生滅三藏遺跡結集是因衆集多少律論不等如律中五百七百皆遵大迦葉最為衆首如大論中高選千人皆同無學至結集已召外衆集重敘所結有不同者分為二部依遵迦葉名上座部餘外衆多名大衆部依文殊問經初分二部即其事也通約大小三藏皆阿難出其住處同集王舍城然據文殊集衆略結大乘即在大鐵圍山外二界中間阿難升高座披佛布僧迦梨先誦遺教經如佛在世約敕之相時大菩薩阿羅漢一切比丘天龍八部聞皆悲泣不能自勝爾時大迦葉即從座起著布僧迦梨手執尼師壇至高座前敷坐具禮阿難已右繞三匝而立時大梵天王持七寶蓋覆阿難上時天帝釋進七寶案置阿難前羅睺阿修羅王各執七寶香爐在阿難前阿難受已置寶案上他化天王進七寶几在寶案後時魔王波旬持七寶拂授與阿難仍與帝釋夾侍兩邊四天王各侍高座四腳三十二使者在迦葉後各各呈恭胡跪敬聽時大迦葉禮阿難已又繞三匝至前問訊如佛無異然後問緣一一依經始從如是乃至末後歡喜奉行爾時迦葉重問曰我過去諸佛修多羅中一一分部說汝恆至佛邊當有教敕阿難答曰我受世尊教末世衆生煩惱垢重不能解我教法不得部類出之汝當分別說也或十章五章隨意而安置令鈍根者易解我法天問如來在世時教敕優波離及我大迦葉入堂東寶樓觀古佛毗尼及不同相我欲結集為依古佛說為依今世尊教耶答曰我從世尊聞以語大迦葉若結集毗尼當分五部相往古諸佛所說毗尼一相無二今衆生薄福故說多部我滅度後無智愚人分我教網以為五部十八部乃至五百部雖味薄淡仍是我正法世尊涅槃竟將往戒檀南華林外安置九十日待迦葉結集竟最初於稿本寫出三藏教次令阿闍世王又寫出五本用黃金印及白銀印印迦葉初本及闍王寫者用七寶印印迦葉稿本次以七寶印印魔王寫者梵王寫三本用白銀印帝釋寫七本用黃金印娑竭龍王寫八萬經本者俱三色印總以印定之令流布閻浮提及三天下世尊所造塔及白銀觀付文殊師利普賢觀音將此觀塔周遍大千界一國留一觀及一金塔如震旦爾時文殊將塔觀往清涼山金剛窟安置至今流行又問一切修多羅藏既結集已當安何國付囑何王今欲結集當為廣結略結請次第說之答曰我聞世尊說付囑大迦葉當令廣集又付文殊往大鐵圍山諸菩薩等住處九地有八萬人當令略集付囑阿闍世寫我遺教迦葉結集本安置修羅窟中又問世尊在時我從佛聞若結集竟將三藏教付囑娑竭龍王今聞汝說與昔聞異答曰我聞世尊說結集三藏在修羅窟中經二十年中待文殊結竟方付娑竭龍王又問祗桓精舍有諸古佛及以三藏陰陽書及供養具當付何人答曰此事因緣並在祗桓圖經說之各有付處不煩此述又問云何二部教答曰四分十誦律四十年後一百一十年迦葉遺律方行前國如震旦諸國謂之君子國根性輕利得行三部教合四百三國土同此一文字並行前三律教又問云何三部教答曰行前二部教乃以大僧祗如求流離國及餘二天下唯行一部教所謂薩婆多部是也祗桓寺殿四簷下有四銀臺兩臺內有黃金修多羅白玉為牌又有兩臺內有毗尼藏黃金為牌白銀為字毗尼律藏是龍王書修多羅經藏是魔王書此二藏經雖是過去星宿劫前古佛經也於閻浮洲中此之兩部書經最為第一至佛涅槃後娑竭龍王收將入宮供養感應緣後漢明帝時雒陽白馬寺有攝摩騰本中天竺人善風儀解大小乘經常遊化為任至漢永平三年中明皇帝夜夢金人飛空而至乃大集群臣以占所夢通人傅毅奉答臣聞西域有神其名曰佛陛下所夢將必是乎帝以為然即遣中郎蔡愔博士弟子秦景等使往天竺尋訪佛法愔等於彼遇見摩騰乃邀還漢地騰誓志弘通不憚疲苦冒涉流沙至乎雒邑明帝甚加賞接於城西門外別立清舍以處之名馬寺傳云外國國王當毀破諸寺唯招提寺未及毀壞夜有一白馬繞塔悲鳴王即停壞諸寺因改招提以為白馬又白馬寺有竺法蘭是中天竺人自言誦經論數萬章為天竺學者之師時蔡愔既至彼國蘭與摩騰共契遊化遂相隨而來同止少時便善漢言愔於西域獲經即為翻譯所謂十地斷結佛本行四十二章經等五部漢地諸經之始也昔漢武帝穿昆明池底得黑灰以問東方朔朔云不經可問西域胡僧後法蘭既至衆人追以問之蘭云世界終盡劫火洞燒此灰是也案周書異記云周昭王即位二十四年甲寅歲四月八日江河泉池忽然泛漲井水溢出山川震動有五色光入貫太微遍於西方盡作青紅色太史蘇由奏曰有大聖人生於西方一千年外聲教及此昭王即敕鐫石記之埋於南郊天祠前此即佛生之時也相國呂侯乘驊騮八駿而行求佛因以禳之周穆王五十三年壬申歲二月十五日平旦暴風忽起損舍折木地動天陰西方白虹十二道太史扈多曰西方聖人滅矣此即佛入涅槃之相也二卷末醒世卷三目録縷指敬信使人知方便法門敬佛篇念佛觀佛感應緣十一驗彌陀部業因感應緣二驗彌勒部受戒感應緣一驗普賢部感應緣一驗觀音部感應緣五驗敬法篇聽法求法法師謗罪部感應緣十驗敬僧篇引證敬益部感應緣二驗致敬篇功能部感應緣一驗歸信篇小乘大乘感應緣二驗士女篇勸導入道篇引證慚愧篇引證
