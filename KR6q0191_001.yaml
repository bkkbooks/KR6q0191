body:
  text: 武原居士徐昌治覲周編輯古金粟住持行元百癡校閲劫量篇大三災部時量依新婆沙論云劫有三種一中間劫二成壞劫三大劫中間劫復有三種一減劫二增劫三增減劫減者從人壽無量歲減至十歲增者從人壽十歲增至八萬歲增減者從增至減此中一減一增十八增減合二十中劫世間成二十中劫成已住此合名成劫經二十中劫世間壞二十中劫壞已空此合名壞劫總八十中劫合名大劫時節依奘法師西國傳云時極短者謂之剎那毳毛從指開出隨所出量是怛剎那百二十剎那成一怛剎那六十怛剎那成一臘縛七千二百剎那三十臘縛成一牟呼粟多二百一十六千剎那三十牟呼粟多成一晝夜一晝一夜生滅無常如世尊説譬如四善射夫各執弓箭相背攢立欲射四方有一捷夫來語之曰汝等今可一時放箭我能遍接俱令不墮於意云何此捷疾不苾芻白佛甚疾世尊言彼人不及地行藥叉地行捷疾不及空行藥叉空行捷疾不及四大王衆天彼天捷疾不及日月二輪二輪捷疾不及堅行天子此等諸天展轉捷疾壽行生滅剎那流轉無有暫停又依安般經云於一彈指頃心有九百六十轉一念有九十剎那一一剎那中復有九百生滅又菩薩處胎經云一彈指頃有三十二億百千念念念成形形形皆有識佛之威神入微識中皆令得度又毗曇論合有十二重一名剎那二名怛剎那三名羅婆四名摩睺羅五名日夜六名半月七名一月八名時九名行十名年十一名雙十二名劫一剎那者翻為一念百二十剎那為一怛剎翻為一瞬六十怛剎那為一息一息為一羅婆三十羅婆為一摩睺羅翻為一須臾三十摩羅睺為一日夜一日夜計有六百三十八萬剎那僧祗律云二十念為一瞬二十瞬名一彈指二十彈指名一羅預二十羅預名一須臾一日一夜有三十須臾日極長時晝有十八夜有十二極短時晝有十二夜有十八又月盈至滿謂之白分月虧至晦謂之黑分白前黑後合為一月六月合為一行日遊在內北行也日遊在外南行也總此二行合為一歲又分一歲以為六時如漸熱盛熱如雨時茂時如漸寒盛寒總三月為一時兩時為一行兩行為一年二年半為一雙此由閏故以閏月兼本月此謂月雙非閏雙也積此時數劫有四種一別劫二成劫三壞劫四大劫從人壽十歲漸至八萬歲八萬歲又漸減至十歲為一別依雜阿含經云由旬城高下亦爾滿中芥子百年取一芥盡劫猶不盡按此即為別劫也若據大劫即以八十由旬城為量成劫四十壞劫四十所以然者世間成時二十別劫住時二十別劫壞時二十別劫空時二十別劫此中以住合成以空合壞故各四十別劫總此成壞合有八十別劫為一大劫故名阿僧祗按索訶世界一大劫中千佛出世釋迦牟尼如來於住劫中當第四佛尚餘九百九十六佛於後續次而出依奘法師西國傳云數量之稱謂踰繕那者自古聖王一日運行十六里也故毗曇論四肘為一弓五百弓為一拘盧舍八拘盧舍為一由旬一弓長八尺五百弓長四百丈一里有三百六十步一步有六尺合有二百一十六丈為一里計前四百丈為一拘盧舍猶欠三十二丈不滿二里計一拘盧舍減有二里計八拘盧舍減十六里為一由旬壞劫依長阿含經云三災上際云何若火災起時至光音天為際若水災起時至遍淨天為際若風災起時至果實天為際三災欲起時世間人皆行正法正見修十善行行此法時有人得第二禪者上升空中住聖人道天道梵道修無覺無觀身壞命終來生人間復得生光音天爾時地獄盡畜生盡次餓鬼阿須倫乃至他化自在天盡然後人盡無有遺餘此世敗壞乃成為災劫盡壞時火災將起一切人民皆背正向邪競行十惡天久不雨所種不生依水泉源乃至四大駛河皆悉枯竭久久之後風入海底一日出時百草樹木一時凋落二日出時四大海水從百由旬至七百由旬自然枯凋三日出時四大海水千由旬至七千由旬展轉消盡四日出時四大海水深千由旬悉乾五日出時四大海水縱廣七千由旬乃至竭盡六日出時此地厚六萬八千由旬皆悉煙出從須彌山乃至三千大千剎土及八大地獄靡不燒滅煙盡無餘一切無常不得久住七日出時大地須彌山漸漸崩壞百千由旬永無遺餘山皆洞然諸寶爆烈煙焰震動至於梵天一切惡道俱悉蕩盡十五天上十四天以下盡成灰墨人民命終或生地獄或生他土無日月星宿亦無晝夜唯有大冥謂之火劫火災果報致此敗壞劫欲成時火乃自滅更起大雲漸降大雨滴如車軸是時三千大千剎土水遍其中及至梵天此之水界與器世間一時俱沒如是沒已七水災過復七火災從中無間疾風飆起支節復能消盡此之風界與器世間展轉傷壞依順正理論云初火災興次水災興後風災興應知三災起時七火災次一水災及至滿七水災復有七火災後風災起如是總有八七火災一七水災始一風災水風災起皆次火災何緣七火方一水災極光靜天壽勢故謂彼壽量極八大劫故至第八方一水災由此應知要度七水八七火後乃一風災由遍淨天壽勢故謂彼壽量六十四劫故第八八方一風災如諸有情修定漸勝所感異熱身壽漸長由是所居亦漸久住又對法論云如是東方無間無斷無量世界或有將壞或有將成或有正壞或壞已住或有正成或成已住乃至一切十方亦爾如是若有情世間若器世間總名苦諦又雜心論問何故壞劫不至第四禪答淨居天故彼無上地生即彼般涅槃故亦不下生下地彼初禪內有覺觀火擾亂故外為火災第二禪內喜水擾亂故外為水災第三禪內有出入息風擾亂故外為風災成劫依起世經云爾時復經無量久遠不可計數日月時起大重雲乃至遍覆梵天世界注大洪雨滴如車軸經歷百千萬年彼雨水聚漸漸增長乃至天所住世界其水遍滿爾時四方一時有大風起其風名為阿那毗羅吹彼水聚混亂不停水中自然生大沫聚大風吹沫擲置空中從上造作梵天宮殿如是次造他化自在天展轉至夜摩天六天次第具足時彼水聚復造須彌山復吹浮沫為三十三天又吹水沫於須彌山半腹之間為日月天子宮殿又吹水沫於海水上為空居夜叉宮殿又吹水沫於須彌山四面大海之下作四面阿修羅城又復大風吹水聚沫造作餘大寶山如是展轉吹水沫過四大洲八萬小洲須彌山王乃於其中湛然停積便有大海又依順正理論云所言成劫謂從風起乃至地獄始有情生謂此世間災所壞已二十中劫唯有虛空過此長時次應復有等住世成劫便至一切有情生有生梵輔有生梵衆有生他化自在天宮漸漸下生乃至人趣後生餓鬼生地獄若初一有情生無間獄二十中成劫應知已滿此後復有二十中劫名成已住次第而起立世何毗曇論云一切器世界起謂地火兩界風界起吹火界蒸鍊一切物使成堅實既堅實已一切諸寶種類皆得顯現如是多時六十小劫又長阿含經云此三及地為四災四劫除地説三為大劫唯未至第四禪為淨居天故無上地可生即於彼處涅槃亦不下生漸分天地迸出日月繞須彌山照四天下晝夜晦朔春秋歲數終而復始劫初成時諸天來下為人皆悉化生身光自在神足飛行有自然地味猶如醍醐其後衆生漸成團食又樓炭經云地肥不生便生兩枝葡萄其味亦甘久久葡萄不生更生粳米備衆美味衆生食之生男女形有夫妻之名因此世間有處胎生爾時造瞻婆大城乃至一切城郭自然粳米朝刈暮熟刈後隨生時有衆生并取日糧如是相教乃至併取五日粳米漸生粳糩刈已不生爾時衆生懊惱悲泣各封田宅粳米以為疆畔其衆自藏己米盜他田穀無能決者議立一平等主善護人民賞善罰惡便有刀杖等物考楚殺戮此是生老病死之原天下豐樂奉行十善哀念人民如父母愛子人民敬主如子敬父又依順正理論云初受段食故身漸堅重由漸耽味地味便隱從茲復有地皮餅生競耽食之地餅復隱爾時復有林藤出現競耽食故林藤復隱有非種香稻自生衆共取之以充所食久住不壞小三災部疫病依智度論云何名為劫一小劫者名為一劫二十小劫亦名一劫四十小劫亦名一劫六十小劫亦名一劫八十小劫名一大劫第一疾疫災一切國土所有人民等遭大疾疫一切鬼神起瞋惡心損害世人壽命短促唯住十歲身形矬小是時諸人不行正法貪著邪見諸惡鬼神處處損人大國王種悉皆崩亡所有國土次第空廢一日一夜疾病疫死是時土地白骨所覆劫末唯七日在於七日中無量衆生遭疫死盡設有在者各散別處合集閻浮提內男女唯餘一萬留為當來人種唯此萬人能持善行諸善鬼神欲令人種不斷絶故擁護是人以好滋味令入毛孔過七日後是大疫病一時息滅一切惡鬼皆悉捨去飲食衣服應念所須陰陽調和美味出生身形可愛安樂無病譬如親愛久不相見忽得聚集生喜樂心共相攜持不相舍離是前劫人壽命十歲後劫壽命最長二十千歲如此功德自然得成與善法相應捨壽命後生善道中從天捨命還生人道自然賢善戒品具足更生天道久久如是壽命八十千歲時住阿僧祗年刀兵第二小災起由大刀兵人壽十歲時三毒邪見日夜生長父母兒子兄弟眷屬互相鬥諍何況他人或以瓦石刀杖互相怖畏四方諸國互相伐討一日一夜害死無量人行不善得是果報人家一時沒盡縱有餘殘各各分散是時劫末餘七日在於七日中手執草木即成刀仗由此器仗互相殘害怖畏困死是時諸人怖懼刀仗逃竄林藪或渡江水隱蔽孤洲或入坑窟以避災難或時相見仍各驚走恐怖失心或時仆地如是七日刀兵橫死其數無量設有在者各散別處合集閻浮提男女唯餘一萬留為當來人種飢饉第三劫小災起時因大飢餓災欲起時由天亢旱一切鬼神起瞋惡心損害世人壽命短促身形短小或二三搩手所食稊稗人髮為衣貧窮困苦愚癡邪見日夜生長造作惡業天不降雨四五年中由大旱故草菜米穀俱盡飢餓死者其數無量是時思欲見水尚不可得何況飲食是劫中間唯七日在一日一夜餓死無數縱有在者各散別處合數閻浮提內男女大小共一萬人留為當來人種相生依中阿含經云過去有輪王出世名曰頂生奉持法齋修行布施國中貧者出財用給後經多時財不能繼人轉窮困因窮便盜他物其主捕收縛送王所王問彼人汝實盜耶彼曰以貧困故若不盜者便無自濟王即出財而給與之語盜者曰汝等還去後莫復作由斯之故人作是念我等亦應盜取他物於是各競行盜故彼人壽轉減形色轉惡有人復盜送王王聞已便作是念若我國中有盜他物更出財物盡給與者如是竭藏盜遂滋甚我今寧可作極利刀有偷盜者便收捕斬於後彼人效此利刀持行劫物捉彼物主截斷其頭因貧盜甚刀殺轉增時彼盜者便作是念王若知實或縛鞭我或擯罰錢或貫標上我寧妄言欺誑念已白王我不偷盜是為因貧從此嫉妒邪淫兩舌綺語欲惡貪邪一法增三法轉增從人壽八萬歲減至十歲佛復告比丘曰未來久時人壽十歲女生五月即便出嫁人壽十歲時有穀名稗子為第一美食所有酥油鹽蜜甘蔗一切盡沒唯行十惡業道父子兄弟姊妹親屬展轉賊害爾時有人生慚恥羞愧便作是語我等由昔生不善心令親族死盡今寧可共行善法離斷殺業行善法已壽便轉增形色轉好壽十歲人生子壽二十復作是念我等應可更增行善壽更轉增生子壽四十歲復離邪淫生子壽八十歲復離妄言生子壽百六十歲復離兩舌生子壽三百二十歲復離粗言生子壽六百四十歲復離綺語生子壽二千五百歲復離貪嫉生子壽五千歲復離瞋恚生子壽一萬歲復離邪見生子壽二萬歲復離非法欲惡貪行邪法我等寧可離此三惡不善法行是善已壽色轉好生子壽四萬歲壽四萬歲時孝順父母恭敬沙門梵志奉行順事修集福業行是善已生子壽八萬歲人壽八萬歲時此閻浮洲極大豐樂女年五百歲乃當出嫁時有主名螺為轉輪王聰明智慧整御四天下統領大地以法教令令得安樂對除依新婆沙論云有聖言説彼對治謂若有能一日一夜持不殺戒於未來生決定不逢刀兵災若能以一訶梨怛雞果起殷淨心奉施僧衆於當來世決定不逢疫病災若能以一團食施諸有情於未來世決定不逢飢饉災三界篇四洲部會名長阿含起世經等四洲地心即是須彌山山外別有八山山下大海深八萬四千由旬其中有八功德水如是漸小至第七山下水廣一千二百五十由旬其外鹹海廣於無際海外有山即是大鐵圍山四周圍輪并一日月晝夜回轉照四天下名為一國土即以此為量數至滿千鐵圍繞訖名一小千復至一千鐵圍繞訖名為中千世界即數中千復滿一千鐵圍繞訖名為大千世界其中四洲山王日月乃至有頂各有萬億成則同成壞則同壞皆是一化佛所統之處名為三千大千世界號為娑婆世界梵本正音名為索訶世界廣名曰三界一欲界二色界三無色界地量依華嚴經云三千大千世界以無量因緣乃成且如大地依水輪水依風輪風依空輪空無所依衆生業感世界安住故菩薩藏經云世有大風名烏盧博迦乃至衆生諸有覺受皆由此風所搖動故此風輪量高三拘盧舍於此風上虛空之中復有風起名曰風雲輪高五拘盧舍於此風上虛空之中復有風起名瞻薄迦高十踰繕那於此風上虛空之中復有風起名吠索縛迦高三十餘繕那又此風上虛空之中復有風起名曰去來高四十踰繕那如是舍利子次第輪上六萬八千拘胝又樓炭經云此地深二十億萬里下有金粟亦二十億萬里下有金剛亦二十億萬里下有水際八十億萬里下有無極大風深五百二十億萬里此雖六重前四是地輪第五是水輪第六是風輪山量今據三千大千世界之中諸佛世尊皆垂化現現生現滅導聖導凡約一四天下即以一日月所照臨處以蘇迷盧山為中高三百三十六萬里在大海中亦深三百三十六萬里據金輪上如起世經云須彌山下有八重山初山名佉提羅佉提羅山外有山名伊沙陀羅伊沙陀羅山外有山名曰遊乾陀羅遊乾陀羅山外有山名曰善見善見山外有山名曰馬半頭馬半頭山外有山名曰尼民陀羅尼民陀羅山外有山名毗那耶迦毗那耶迦山外有山名斫迦羅諸山中間皆是海水水皆有優鉢羅華鉢頭摩華拘牟陀華奔荼利迦華等諸妙香物遍覆於水大海北有大樹王名曰閻浮樹周圍七十由旬根入地二十一由旬高百由旬乃至枝葉四面垂覆五十由旬去海不遠有山名鬱禪山去此山不遠有山名金壁過此山已有山名雪山雪山中間有寶山其山頂上有阿耨達池其水清冷澄徹無穢其池底金沙充滿華如車輪根如車轂華根出汁色白如乳味甘如蜜池東有恆伽河從牛口出從五百河入於東海池南有新頭河從獅子口出從五百河入於南海池西有博叉河從馬口出從五百河入於西海池北有斯陀河從象口出從五百河入於北海依奘法師西國傳其瞻部洲之中地者阿那婆答多池也在香山之南大雪山之北周八百里金沙彌漫清波皎鏡大地菩薩以願力故化為龍王於中潛宅出清冷水屬瞻部洲或曰潛流下地出積石山即徙多河之流為中國之河源也應運四主南象王之國躁烈篤學特間異術西寶主之鄉無禮義重財賄北馬主之俗天資獷暴情忍殺戮東人主之地風俗機變仁義照明四主之俗東方為上清心釋纍之訓出離生死之數象主之國其理優焉又起世經云阿耨達宮中有五柱堂阿耨達龍王恆於中止佛言何故名為阿耨達此閻浮提所有龍王盡有三患一者所有諸龍皆被熱風熱沙著身燒其皮肉及燒骨髓以為苦惱唯有阿耨達龍無有此患二者所有龍宮惡風暴起吹其宮內失寶飾衣龍身自現以為苦惱唯阿耨達龍王無如此患三者所有龍王各在宮中相娛樂時金翅大鳥入宮搏撮龍懷熱惱唯阿耨達龍無如此患若金翅鳥王生念欲往即便命終故名阿耨達言無惱也佛告比丘雪山右面有城名毗金離其城北有七黑山黑山北有香山其山常有音樂之聲山有二崛柔軟香潔猶如天依妙音乾闥婆王在其中止又順正理論云四洲之中唯瞻部洲有金剛座上窮地際下據金輪諸最後身菩提薩埵將登無上正等菩提皆坐此座起金剛定又長阿含經云佛告比丘有四大天神何等為四一者地神二者水神三者風神四者火神界量依立世阿毗曇論云大鹹海外有山名曰鐵圍入水三百一十二由旬半出水亦然廣亦如是周圍三十六億一萬三百五十由旬從閻浮提南際取鐵圍山三億六萬六百六十三由旬從閻浮提中央取東弗於逮中央三億六萬六百由旬從閻浮提中央取西瞿耶尼中央三億六萬六百由旬從閻浮提北際取北鬱單越北際四億七萬七千五百由旬從鐵圍山水際極西鐵圍山水際徑度十二億二千八百二十五由旬鐵圍山水際周回三十六億八千四百七十五由旬從此須彌山頂至彼須彌山頂十二億三千四百五十由旬從此須彌山中央至彼須彌山中央十二億八萬三千四百五十由旬從此須彌山根至彼須彌山根十二億三千十五由旬方土尋夫方土人別不同總有二種一凡二聖若約方言之即有四種所謂四天下人若以住處言之四天下中合有四千八處則有四千八種之人若直按閻浮提一方言之如樓炭經説總有三十六大國人亦同之若轉別論則有二千五百小國人亦同之又一一國中種類若邊漢羌戎蠻狄楚越各隨方土色類不同又佛告比丘此四天下有八千天下圍繞其外復有大海水周匝圍繞八千天下復有大金剛山繞大海水須彌山北有鬱單越國其土正方人面亦方像彼地形有大樹王名菴婆羅花果豐茂衆鳥和鳴地生軟草槃縈有旋色如孔翠香如婆師軟若天衣其地柔軟以足蹈地地凹四寸舉足還覆地平如掌彼土四面有四阿耨達池其土常有自然粳米不種自生無有粳糩如白花聚其土常有自然金鍑有摩尼珠名曰焰光置於鍑下飯熟光滅不假樵火不勞人功其土有樹名曰曲躬葉葉相次天雨不漏彼諸男女止宿其下復有香樹高七十里花果繁茂其果熟時皮破香出自然出種種衣食河中有衆寶船彼方人民入中洗浴脫衣岸上乘船中流娛樂訖已度水遇衣便著不求自足其土人身顏貌同等髮垂八指齊眉而止彼人懷妊七日八日便産隨生男女置於四衢道頭舍之而去有諸行人經過其邊出指含味指出甘乳充遍兒身過七日已其兒長成與彼人等男向男衆女向女衆彼人命終不相哭泣莊嚴死尸置四衢道捨之而去有鳥名憂慰禪伽接彼死尸置於他方其土人民無所繫戀亦無蓄積壽命常定死盡生天彼人前世修十善行能施沙門婆羅門及施貧窮乞兒疾病困苦者給其衣食乘輿華鬘塗香床榻房舍又造塔廟燈燭供養其人命終生鬱單越壽命千歲是故彼人得稱為勝於三天下其土最上順正論云北俱盧洲形如方座東弗於逮其土正圓東勝身洲東狹西廣如半月形俱耶尼者其土形如滿月西牛賀洲亦如月圓身量依立世經云閻浮提人命促至十歲時身形短小至百歲時身長三肘半或長四肘弗婆提人長八肘瞿耶尼人長十六肘鬱單越人長三十二肘壽量如毗曇説閻浮提人壽命不定上壽一百二十五歲中壽一百歲下壽六十歲若據劫初壽命無量或至八萬四千東弗於逮人壽二百歲西俱耶尼人壽三百歲北鬱單越人壽千歲諸天部辦位如婆沙論中説天有三十二種欲界有十色界有十八無色界有四合有三十二天也欲界十者一名於手大二名持華鬘三名常放逸天四名日月星宿天五名四天王天六名三十三天七名炎摩天八名兜率陀天九名化樂天十名他化自在天色界十八者初禪有三天一梵衆天二梵輔天三大梵天二禪之中有三天一少光天二無量光天三光音天第三禪中亦有三天一少淨天二無量淨天三遍淨天第四禪中獨有九天一名福生天二名福慶天三名廣果天四名無想天五名無煩天六名無熱天七名善現天八名善見天九名色究竟天第三無色界中有四天一名空處天二名識處天三名無所有處天四名非想非非想處天問曰未知此三十二天幾凡幾聖答曰二唯凡住五唯聖住自餘二十五天凡聖共住所言二唯凡住者一是初禪大梵天王二是四禪中無想天中唯是外道所居所言五唯聖人居者謂從廣果已上無煩無熱等五淨居天唯是那含羅漢之所住也縱凡生彼天者要是進向那含身得四禪法於無漏處熏禪業或起一品至九品方乃得生涅槃經云有四種天一世間天二生天三淨天四義天世間天者如諸國王生天者從四天王至非想非無想天淨天者從須陀洹至僻支佛義天者十住菩薩摩訶薩以能善解諸法義見一切法是空義故會名第一四天王者依長阿含經云東方天王名多羅吒此云治國主領乾闥婆及毗舍闍神將護弗婆提人不令侵害南方天王名毗琉璃此云增長領鳩槃荼及薜荔神將護閻浮提人西方天王名毗留博叉此云雜語主領一切諸龍及富單那將護瞿耶尼人北方天王名毗沙門此云多聞主領夜叉羅剎將護鬱單越人業因正法念經云若身不殺盜淫口不妄語不綺語不兩舌不惡口持此七戒得生四天王天得生化生天又長阿含經云先於佛所淨修梵行於此命終生忉利天使彼諸天增益五福一者天壽二者天色三者天名稱四者天樂五者天威德界量依起世經云須彌山下別有三級諸神住處其最下級縱廣正等六十由旬其第二級縱廣正等四十由旬其最上級縱廣正等二十由旬此三級中皆有夜叉住須彌山半高四萬二千由旬有四大天王所居宮殿須彌山上有三十三天宮殿帝釋所居三十三天以上一倍有夜摩天又更一倍有兜率天又更一倍有化樂天又更一倍有他化自在天他化天上又更一倍有梵身天梵身天下有羅摩波旬倍梵身天上有光音天倍光音天上有遍淨天倍遍淨天上有廣果天倍廣果天上有不粗天不粗天下其間別有諸天宮殿所居之處名無想衆生倍不粗天上有不煩天倍不煩天上有善見天倍善見天上有善現天倍善現天上有阿迦尼吒諸天宮殿阿迦尼吒天已上更有天名無邊空處無邊識處無所有處非想非非想處此等皆名諸天住處如是界分衆生居住若來若去若生若滅又立世阿毗曇論云從閻浮提向下二萬由旬是無間地獄從閻浮提向下一萬由旬是夜摩世間地獄處從閻浮提至梵處其遠甚高廣狹問曰天量廣狹云何答曰如婆娑論説須彌山頂面別縱廣八萬四千由旬其中平可居處但有四萬由旬炎摩天倍前四萬其地縱廣八萬由旬如是乃至他化自在天處次第倍前其地縱廣六十四萬由旬四禪之地廣狹不定初禪如小千世界二禪廣如中千世界三禪廣如大千世界第四禪地寬廣無邊問曰既彼一一四天下上乃至各有究竟天者是則處別可不相障礙耶答曰雖各有百億同居一處而不妨礙其猶光明遍到亦無障礙彼亦如是故經中説色界諸天下來聽法六十諸天共坐一鋒之端而不迫窄都不相礙六道篇阿修羅部住處依正法念經云修羅居在五處住一在地上衆相山中其力最劣二在須彌山北入海二萬一千由旬有修羅名曰羅𬑟統領無量阿修羅衆三復過二萬一千由旬有修羅名曰勇健四復過二萬一千由旬有修羅名曰華鬘復過二萬一千由旬有修羅名毗摩質多此中出聲徹於海外故云響高又起世經云須彌山王東面過千由旬大海之下有鞞摩質多羅阿修羅王國土須彌山王南面過千由旬大海之下有踴躍阿修羅王宮殿須彌山王西面亦千由旬大海水下有奢婆羅阿修羅王宮殿須彌山王北面過千由旬大海水下有羅𬑟羅阿修羅王宮殿摩婆帝城王所住處有羅𬑟羅阿修羅王聚會之所業因經中具説十業得阿修羅報一身行微惡二口行微惡三意行微惡四起於憍慢五起於我慢六起於增上慢七起於大慢八起於邪慢九起於慢慢十回諸善根向阿修羅趣戰鬥觀佛三時經云此毗摩質多羅阿修羅王此鬼食法唯噉於泥及渠藕根其兒長大見諸天采女圍繞即白母言人皆伉儷我何獨無其母告曰香山有神名乾闥婆其神有女容姿美妙甚適我意今為汝聘時阿修羅納彼女已未久之間即便懷孕經八千歲乃生一女其女顏容端正天下無比憍尸迦聞求女為妻修羅聞喜以女妻之帝釋立字號曰悅意後帝釋至歡喜園共諸采女入池遊戲爾時悅意即生嫉妒遣五夜叉往白父王今此帝釋不復見寵與諸采女自共遊戲父聞此語心生瞋恚即興四兵往攻帝釋立大海水踞須彌山頂九百九十九手同時俱作撼善見城搖須彌山四大海水一時波動帝釋怖驚靡知所趣時宮有神白天王言過去佛説般若波羅蜜王當誦持鬼兵自碎是時帝釋坐善法堂燒衆名香發大誓願般若波羅蜜是大明咒是無上咒是無等等咒真實不虛作是語時於虛空中有刀輪自然而下修羅耳鼻手足一時盡落令大海水赤如蚌珠修羅驚怖遁入藕絲孔中感應緣一驗西國志云中印度在瞻波國西南山石澗中有修羅窟有人因遊山修道偶逢此窟遂入中見有修羅宮殿阿修羅衆既見斯人希來到此語云汝能久住不答云欲還本處修羅既見不住遂施一桃與食修羅語言汝宜急出恐汝身大窟不得容言訖走出身遂增長人頭才出身大孔塞遂不出盡自爾已來年向數百唯有大頭如三碩甕因此號為大頭仙人鬼神部苦樂如婆沙論説鬼中苦者即彼無威德鬼恆常飢渴纍年不聞漿水之名豈得逢斯甘膳設值大河欲飲即變為炬火縱得入口即腹爛焦第二鬼中樂者即彼有威德中富足豐美身服天衣口餐天供任情遊戲然人鬼殊趣受報分顯不及於人雖有威德以報卑劣常畏於人感應緣二驗唐眭仁蒨者趙郡邯鄲人也少事經學不信鬼神後徙家向縣於路見一人衣冠甚暐曄乘好馬從五千餘騎視仁蒨而不言後數見之經十年凡數十相見後忽駐馬呼仁蒨曰比頻見君情相眷慕願與君交遊蒨即拜之問公何人耶答曰吾是鬼耳姓成名景本弘農西晉時為別駕今任胡國長史仁蒨問其國何在王何姓名答曰黃河已北沙磧是也其王即是故趙武靈王今統此國總受太山控挕每月各使上相朝於太山是以數來過此與君相遇也吾乃能有相益令君豫知禍難而先避之可免橫害唯死生之命與大禍福之報不能移動耳仁蒨從之景因命其從騎常掌事贈遣隨蒨有事無不先知時岑之象為邯鄲令子文本年未弱冠之象請仁蒨於家教文本書蒨以此事告文本仍謂曰成長史語我神道亦有食然不能得飽嘗苦飢渴若得人食便得一年飽文本即為具饌備設珍羞蒨曰鬼不欲入人屋可於外水邊張幕設席陳酒食於上至時仁蒨見景兩客來坐從百餘騎仁蒨請金帛以贈之文本以黃色塗大錫作金以紙為絹帛及景食畢令其從騎更代坐食贈之景深喜謝曰郎君頗欲知壽命乎文本辭云不願知也景笑而去數年後仁蒨遇病長史來報云是君鄉人趙某為太山主簿主簿一員闕薦君為此官故為文案經紀召君耳案成者當死蒨問請將案出景云君壽應年六十餘今始四十但以趙主簿橫徵召耳蒨憂懼病逾篤景請蒨曰趙主簿必欲致君文書欲成懼不可免急作一佛像彼文書自消蒨告文本以三千錢為畫一座像於寺西壁訖而景來告曰免矣蒨情不信佛意尚疑之因問景云佛法説有三世因果此為虛實答曰皆實蒨問曰道家章醮為有益不景曰道者被天帝總統六道是謂天曹閻羅王者如人間天子太山府君如尚書令録五道神如諸尚書若我輩國如大州郡每斷人間事道上章請福天曹受之下閻羅王奉行無理不可求免有枉必當得申何為益也蒨又問佛法家修福何如景曰佛是大聖無文書行下其修福者天神敬奉多得寬宥若福厚者雖有惡道文字不得追挕言畢即去蒨一二日能起南陽宋定伯年少時夜行逢鬼問曰誰鬼尋問卿復誰定伯誑之言我亦鬼鬼問欲至何所答曰欲至宛市鬼言我亦欲至宛市遂行數里鬼言步行太遲可共遞相擔也定伯曰大善鬼便先擔定伯數里鬼言卿太重將非鬼也定伯言我新死故身重耳伯因復擔鬼鬼略無重如是再三定伯復言我新死不知鬼何所畏忌鬼答言唯不喜人唾於是共行道遇水定伯令鬼先度聽之了無聲音定伯自度漕灌作聲鬼復言何以聲定伯曰新死不習度水故爾勿怪吾也行欲至宛市定伯便擔鬼著頭上急持之鬼大呼聲咋咋然索下不復聽之徑至宛市中下著地化為一羊便賣之恐其變化為並唾之得錢千五百乃去於時石崇言定伯賣鬼畜生部壽命如毗曇説云畜生道中壽極長者不過一劫如持地龍王及依羅鉢龍等壽極短者不過蜉蝣之蟲朝生夕死不盈一日如智度論説佛令舍利弗觀鴿過未前後各八萬劫猶不捨鴿身故知畜生壽報長遠非凡所測也業因經中説具造十業得畜生報一身行惡二口行惡三意行惡四從貪煩惱起諸惡業五從瞋煩惱起諸惡業六從癡煩惱起諸惡業七毀罵衆生八惱害衆生九施不淨物十行於邪淫若依正法念經説畜生種類各各差別業因得報亦各不同若依地持具造十惡一一能令衆生墮於地獄畜生餓鬼後得人身猶有習報受報依賢愚經云爾時有諸估客欲詣他國其諸商人共將一狗至於中路衆賈頓息伺人不看狗便盜肉衆人瞋打而折其腳棄野而去時舍利弗天眼見狗癵躄飢餓困篤垂死著衣持鉢入城乞食得已持至狗所慈心憐愍以食施與狗食活命即為狗説微妙之法狗便得終生舍衛國婆羅門家後舍利弗獨行乞食婆羅門見而問言尊者獨行無沙彌耶舍利弗言我無沙彌聞卿有子當用見與婆羅門言我有一子字曰均提聽為沙彌漸為説法心開意解得阿羅漢果功德悉備均提沙彌始得道已自以智力觀過去世本造何行遭聖獲果觀見前身作一餓狗蒙佛恩今得人身并獲道果欣心內發善巧讚唄人所樂聽又智度論云愚癡多故受蚯蚓蜣蜋螻蟻鵂鶩角鴟之屬習欲生者是水鳥鳧鴨之流習癡生者是陸鳥鴟梟之類或晝見夜亦見或夜見晝不見又長阿含及增一經云金翅鳥有四種一卵生二胎生三濕生四化生皆先大布施由心高凌虛苦惱衆生心多瞋慢生此鳥中飛下海中以翅搏水水即兩披深二百由旬取卵生龍隨意而食之胎濕化等亦復如是有化龍子於六齋日受齋八禁時金翅鳥欲取食之銜上須彌山北大鐵樹上高十六萬里求覓其尾了不可得鳥聞亦受五戒又觀佛三昧經云金翅鳥王名曰正音於衆羽族快樂自在於閻浮提日食一龍王及五百小龍周而復始經八千歲死相既現諸龍吐毒不能得食飢逼慞惶求不得安至金剛山從金剛直下從大水際至風輪際為風所吹還上金剛如是七返然後命終以其毒故令十寶山同時火起難陀龍王懼燒此山即降大雨滴如車軸鳥肉消盡唯餘心存心又直下七返如前住金剛山難陀龍王取為明珠轉輪聖王得為如意珠若人念佛心亦如是又樓炭長阿含經等云有十六王一婆竭二難陀三跋難陀四伊那婆羅五提頭賴吒六善見七阿虛八伽句羅九伽毗羅十阿波羅十一伽䨲十二瞿伽䨲十三阿耨達十四善住十五憂睒伽波頭十六得叉迦又海龍王經云佛告龍王拘樓秦佛時九十八億居家出家違其禁戒皆生龍中拘那含牟尼佛時八十億居家出家毀戒恣心壽終之後皆生龍中迦葉佛時六十四億居家出家犯戒皆生龍中於我世中九百九十億居家鬥諍誹謗經戒死生龍中又僧護經云爾時世尊告僧護比丘汝於海中所見龍王受此龍身牙甲鱗角其狀可畏臭穢難近以畜生道障出家法不能得免金翅鳥王之所食噉地獄部述意地獄幽酸特為痛切刀林聳日劍嶺參天沸鑊騰波炎爐起焰鐵城晝掩銅柱夜然如此之中罪人遍滿周慞困苦悲號叫喚牛頭惡眼獄卒凶牙長叉柱肋肝心碓搗猛火逼身肌膚淨盡或復春頭搗腳煮魄烹魂裂膽抽腸屠身膾肉受報第一想地獄十六者衆生瞋忿以爪相攫應手肉墮想以為死復次其中衆生懷害想執刀劍遞相斫刺㓟剝臠割身碎在地想謂為死冷風來吹尋復活起出想地獄不覺忽到黑沙地獄熱風暴起吹熱黑沙來著其身燒皮徹骨身中焰起回旋周還身燒焦爛其罪未畢出黑沙地獄到沸屎地獄有沸屎鐵丸自然滿前驅迫罪人使把鐵丸燒其身手復使撮著口中從咽至腹通徹下過無不焦爛有鐵嘴蟲唼肉達髓苦毒無量久受苦已出沸屎獄到鐵釘地獄獄卒撲之偃熱鐵上舒展其身以鐵釘釘手足周遍身體盡五百釘苦毒號吟久受苦已出鐵釘地獄到飢鐵地獄即撲熱鐵上銷銅灌口從咽至腹通徹下過無不焦爛久受苦已出飢地獄到渴地獄即撲熱鐵上以熱鐵丸著其口中燒其唇舌苦毒啼號久受苦已出渴地獄到一銅鑊地獄獄卒怒目捉罪人足倒置鑊中隨湯涌沸上下回旋身壞爛熱萬苦並至久受苦已出一銅獄至多銅鑊地獄以鐵鉤取置餘鑊中悲叫苦毒久受苦已出多銅地獄至石磨地獄以大熱石壓身回轉揩磨骨肉糜碎久受苦已出石磨獄至膿血地獄膿血沸涌罪人於中東西馳走頭面爛壞又取膿血食之苦毒難忍久受苦已出膿血獄至量火地獄有大火聚其火焰熾馳迫罪人手把熱鐵斗以量火聚遍燒身體吟呻號哭久受苦已出量火獄到灰河地獄灰湯涌沸惡氣烽㶿回波相博聲響可畏其河岸上有劍樹林枝葉華實皆是刀劍罪人入河隨波上下回覆沉沒苦痛萬端乃出灰河至彼岸上到劍樹林被劍割刺身體傷壞手攀手絶足蹈足斷皮肉墮落唯有白骨筋脈相連宿對所牽不覺忽至鐵丸地獄有熱鐵丸獄鬼驅使捉之手足爛壞舉身火然萬毒並至久受苦已乃出鐵丸獄至斤斧地獄捉此罪人撲熱鐵上以熱鐵斤斧斫其手足耳鼻舌身體苦毒號叫久受罪已出斤斧獄至豺狼獄有群豺狼竟來䶩囓肉墮骨傷膿血流出苦痛萬端久受苦已乃出豺狼獄至劍樹地獄入彼劍林頭面身體無不傷壞有鐵嘴烏啄其兩目久受苦已乃出劍樹獄至寒冰獄有大寒風吹其身上舉體凍傷皮肉墮落苦毒叫喚然後命終身為不善口意亦然斯墮想地獄第二黑繩大地獄有十六小地獄周匝圍繞各縱廣五百由旬由惡意向父母佛及聲聞即墮黑繩地獄第三埠壓大地獄亦有十六小地獄但造三惡業不修三善行第四叫喚大地獄亦有十六小地獄由瞋恚懷毒造諸惡行故第五大叫喚地獄亦有十六小地獄由習衆邪見為愛網所牽造異陋行故第六燒炙地獄亦有十六小地獄為燒炙衆生故第七大燒炙地獄亦有十六小地獄由捨善果業為衆惡行故第八無間地獄亦有十六小地獄何名無間獄卒捉彼罪人剝取其皮從足至頂即以其皮纏罪人身著火車上輪碾熱地周回往返身體碎爛皮肉墮落萬毒並至又有鐵城四面火起東焰至西西焰至東南北上下亦復如是焰熾回遑間無空處東西馳走燒炙其身皮肉焦爛苦痛辛酸彈指之頃無不苦時故名無間總名八大地獄各歷十六又觀佛三昧海經云阿鼻地獄者縱廣正等八千由旬七重鐵城七層鐵網有十八隔子周匝七重皆是刀林復有七重劍林四角有四大銅狗眼如掣電牙如劍樹齒如刀山舌如鐵刺一切身毛皆然猛火牙端火流燒前鐵車輪輞出火鋒刃劍戟燒阿鼻城赤如融銅城內有七鐵幢火涌如沸鐵融流迸涌出四門有八萬四千鐵蟒大蛇哮吼如天震雷五百夜叉五百億蟲八萬四千嘴頭上火流如雨遍體火焰滿阿鼻獄閻羅王大聲告敕曰汝在世時不孝父母邪慢無道汝今入阿鼻獄如是轉展經歷大苦地獄一日一夜如閻浮提六十小劫如是一大劫具五逆者受罪五劫復有衆生犯四重禁虛食信施誹謗邪見不識因果斷學般若毀十方佛偷僧祗物淫佚無道逼掠淨戒尼造衆惡事此等罪人經八萬四千大劫身滿阿鼻獄如起世經云佛告諸比丘有三天使在於世間何等為三一老二病三死有人放逸三業惡行身壞命終生地獄中諸守獄者驅彼衆生至閻羅王前王問罪人汝昔人間第一天使善教示汝善訶責汝豈得不見答言不見王重告言汝豈不見為人身時或作婦女或作丈夫衰老相現齒落髮白皮膚緩皺黑黶遍體行步跛蹇左右傾側恃杖而行血肉消竭嬴瘦尪弱一切支節瘦懈難挕汝見之不答言見之時王告言汝既見如是相貌云何不作如是思惟我今具有如是老法可作善業使我長夜利益安樂彼人復答言我實不作如是思惟以縱蕩心行放逸故王言汝愚癡人不修善業此之苦報非他人作是汝自業自受報也爾時閻羅王第二訶之告言諸人豈不見第二天使世間出耶答言不見王復告言汝豈不見昔在世間作人身時若婦女身若丈夫身四大和合忽爾乖違病苦所侵纏綿困篤不得自在眠臥坐起仰人扶侍洗拭抱持與飲與食一切須人汝見之不彼人答言我實見之王復告言汝見如是云何不思我今亦有如是之法可作善業令我當來長夜得大利益大安樂事彼人答言不也我實不作如是思惟以懈怠心行放逸故王告癡人汝既懶惰不作善業受此惡報非他人作還自受報爾時閻羅王第三訶之汝昔作人時豈不見第三天使世間出耶答言不見王復告言汝人間時豈不復見若婦人身若丈夫身隨時命終置於床上以雜色衣而蒙覆之將出聚落斗帳軒帳種種莊嚴眷屬圍繞舉手散髮灰土坌頭極大悲惱號咷哭泣舉聲大叫椎胸哀慟酸哽楚切汝悉見不答言見之時王告言癡人汝昔既見如此何不思惟我亦有死未得免離今宜作善為我長夜得大利益彼人答言我實不作如是思惟以昏昧心行放逸故時王告言汝既放逸不作善業自造此惡非他人造將得果報汝還自受感應緣三驗晉趙泰字文和清河貝丘人也祖父京兆太守泰郡舉孝廉公府辟不就精思典籍有譽鄉里仕中散大夫泰年三十五時心痛須臾而死下尸於地心暖不已留尸十日平旦喉中有聲如雨俄而蘇活説初死之時夢有人來近心下復有二人乘黃馬從者二人夾扶泰掖徑將東行至一大城崔巍高峻將泰向城門入經兩重門有瓦屋數千間男女大小亦數千人行列而立吏著皂衣有五六人條疏姓氏云當以科呈府君泰名在三十須臾將泰與數千人男女一時俱進府君西向坐簡視名簿訖復遣泰南入黑門有人著絳衣坐大屋下以次呼名問生時作何罪孽行何福善泰答父兄仕宦皆二千石我少在家修學而不犯惡乃遣泰為水官監作使將二千餘人運沙裨岸晝夜勤苦後轉泰水官都督知獄事給泰馬兵令案行地獄所至諸獄楚毒各殊泰見祖父母及二弟在此獄中相見涕泣泰出獄門見有二人齎文書來語獄吏言有三人其家為彼於塔寺中懸幡燒香救解其罪可出福舍俄見三人自獄而出已有自然衣服完整在身南詣一門名開光大舍見此三人即入舍中泰亦隨入前有大殿珍寶周飾精光耀目金玉為床見一神人恣容偉異殊好非常坐此座上邊有沙門立侍甚衆見府君來恭敬作禮泰問此是何人府君致敬吏曰號名世尊度人之師有願令惡道中人皆出聽經時云有百萬九千人皆出地獄入百里城在此到者奉法衆生也行雖虧殆尚當得度故開經法七日之中隨本所作善惡多少差次免脫泰出此舍復見一城方二百餘里名為受變形城地獄考治已畢者當於此城更受變報泰入其城見數百局吏對校文書云殺生者當作蜉蝣朝生暮死劫盜者當作豬羊受人屠割淫佚者作鶴鶩獐麋兩舌者作鴟梟鵂鶹捍債者為騾驢牛馬泰案行畢還水官處主者語泰曰卿無罪過故相使為水官都督不爾與地獄中人無以異也泰問主者曰人有何行死有樂報主者曰惟奉法弟子精進持戒得樂報無有謫罰也泰復問曰人未事法時所行罪過事法之後得除不答曰皆除也語畢主者開縢篋檢泰年紀尚有餘算三十年在乃遣泰還臨別主者曰已見地獄罪報如是當告世人皆令作善善惡隨人其猶影響可不慎乎時晉太始五年七月十三日乃為祖父母二弟延請僧衆大設福會命子孫改意奉法趙石長和者趙國高人也年十九時病一月餘日亡家貧未能及時殯斂經四日而蘇説初死時東南行見二人治道在和前五十步和行有遲疾二人治道亦隨緩速而道之兩邊棘刺森然皆如鷹爪見人甚衆群走棘中身體傷裂地皆流血見和獨行平道俱嘆怠曰佛子獨行大道中前至見瓦屋采樓可數千間有屋甚高上有一人形面壯大著皂袍臨窗而坐和拜之閣上人曰石君來耶一別二千餘年長和爾時意中便君憶此別時也和相識有馬牧孟丞夫妻先死已積年歲閣上人曰君識孟丞不長和曰識閣上人曰孟丞生時不能精進今司掃除之役孟丞妻精進居處甚樂舉手指西南一房曰孟妻在此也孟妻開窗見和厚相慰問遍訪其家中大小安否消息俄見孟丞執帚提箕自閣西來亦問家消息閣上人曰爾何所修行長和曰不食魚肉酒不經口恆轉尊經救諸疾病閣上人曰所傳不妄也語久之間閣上人問都録主者審案石君名録主者案録云餘三十年命在閣上人曰君欲歸不和對曰願歸乃敕主者以車騎兩吏送之長和拜辭上車而歸前所行道更有傳館吏民飲食儲跱之具倏忽至家因得蘇漢武帝東遊未出函谷關有物當道其身數十丈青眼曜睛四足入土動而不徙百官驚懼東方朔乃請以酒灌之灌之數十斛而怪物始消係泰舊獄地憂氣所結故酒能消醒世卷二目録歷敘佛果使人知欣而趨千佛篇出時種別道樹會數因緣部業因種姓部種姓降胎部現衰觀機呈祥降胎出胎部迎后感瑞誕孕招福同應侍養部占相部校量遊學部召師捔力納妃部灌帶末婚疑謗猒苦部觀田出遊出家部離俗剃髮具服使還諫子佛髮成道部乞食苦行乳麋草座降魔成道説法部赴機涅槃部弟子結集部大乘結集千人結集五百結集七百結集感應緣二驗
