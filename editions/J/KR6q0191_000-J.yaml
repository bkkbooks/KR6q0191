body:
  text: 題醒世錄予備閱玄惲法師所撰法苑珠林丙深有慨于陰陽之理不得分言之矣休咎之徵不得幻視之矣古往今來萬物皆從劫轉禍淫福善一切惟心所造成劫壞劫與時終始水火風劫隨勢遷流至于刀兵饑饉疫病劫劫指陳觀覽到儆惕亦到舉夫敬佛敬法敬僧種種功德精進處即承當處列目前之富貴貧賤以明現在之受用非受用究將來之六道三塗以彰日後之果報真果報蓋以大心提天下之鐸而使之惺復以小心堤天下之防而使之肅可見人生舉足皆畏途失今不勉悔遂莫及世上唯修行大利益以此脫死即以此了生所謂現成美景抬頭覷免待亡羊歎路岐故值一事配一應驗豈村歌社舞鬥施呈亦直截示人人始薦爾予刪繁就簡去肉存髓庶幾一通座右銘語云三界無安猶如火宅惟此一門可以自適信哉有念盡為煩惱鎖無心端是水晶宮是為序時壬辰冬季望日徐昌治覲周父題於大業堂中醒世卷一目錄備陳苦海使人知懼而避劫量篇大三災部時量時節壞劫成劫小三災部疫病刀兵饑饉相生對除三界篇四洲部會名地量界量方土身量壽量諸天部辦位會名業因界量廣狹六道篇阿修羅部住處業因戰鬥感應緣一驗鬼神部苦樂感應緣二驗畜生部壽命受報業因地獄部受報感應緣三驗
