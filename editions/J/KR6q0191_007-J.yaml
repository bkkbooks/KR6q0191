body:
  text: 武原居士徐昌冶覲周編輯金粟寺住持行元百癡校閱眷屬篇哀戀部如須摩提長者經云佛在世時舍衛城有大長者子名須摩提是人命終父母宗親及諸知識一時號哭哀悼躄踊稱怨大喚悶絕於地爾時世尊知而故問阿難彼諸大眾何故哀號悲泣如是阿難具以白佛唯願世尊為度一切可往至彼是時彼諸人等遙見世尊各各以手拭面前來迎佛既至佛所頭面禮足悲哀鯁塞不能發言佛告長者父母等汝等何故悲泣懊惱著此幻法是諸人等同時發言而白佛言世尊是城中唯有此人聰明智慧端正殊玅年既盛壯於諸人中為無有上又復多財寶倉庫盈溢車馬衣服奴婢如是悉備無所乏短一旦命終是故我等悲泣戀慕不能自勝善哉世尊願為我等方便說法得離諸惱從今已後更不復受如是諸苦爾時世尊告長者父母宗親知識及諸大眾汝等曾見有生者不老病死不諸人白佛言未曾見也佛復告諸大眾汝等欲離生老病死憂悲苦惱者莫復念是恩愛之縛摽心正見歸命三寶所以者何於諸世間無過佛者能導盲瞑愚癡之眾佛所說法即是良藥爾時世尊即說偈言十方世界中生者無不死生死往來道唯法能除滅無有十方剎命終能濟者爾時長者諸眷屬等聞佛所說悲苦皆息並獲道果又法句喻經云昔有婆羅門少年出家學至六十不能得道婆羅門法六十不得道然後歸家娶婦為此居家生得一男端正可愛至年七歲書學聰了才辯出口有逾於人卒得重病一宿命終梵志憐惜不能自勝伏其屍上氣絕復蘇親族諫喻奪屍殯斂埋著城外梵志自念我今啼哭計無所益不如往至閻羅王所乞索兒命於是梵志沐浴齋戒齎持華香發舍而去所在問人閻羅所治處為在何許展轉前行行數千里至深山中見諸得道梵志復問如前諸梵志問曰卿問閻羅王所治處欲求何等答曰我有一子辯慧過人近日卒亡悲寤懊惱不能自解欲至王所求乞兒命還將歸家養以備老諸梵志等愍其愚癡即告之曰閻羅王所治之處非是生人所可得到也當示卿方宜從此西行四百餘里有一大川其中有城此是諸天神案行世間停宿之城卿持齋戒往必見之梵志歡喜奉教而去到其川中見好城郭宮殿屋舍如忉利天梵志詣門燒香翹腳咒願求見閻羅王王敕守門人引見之梵志啟言晚生一男欲以備老養育七歲近日命終唯願大王垂恩布施還我兒命閻羅王言所求大善卿兒今在東園中戲自往將去梵志即往見兒與諸小兒共戲即前抱之向之啼泣曰我晝夜念汝食寐不甘汝寧不念父母小兒驚喚逆呵之曰癡騃老翁不達道理寄住須臾名為人子勿妄多言不如早去今我此間自有父母邂逅之間彼手相抱梵志悵然即自念言我聞瞿曇沙門知人神魂變化之道當往問之即還佛所時佛在舍衛祗洹為大眾說法梵志見佛稽首作禮具以本末向佛陳之佛告梵志汝實愚癡人死神去便更受形父母妻子因緣譬如寄客起則離散愚迷縛著計為己有憂悲苦惱不識本根唯有慧者不貪恩愛覺苦捨習勤修經戒滅除識想生死得盡梵志聞已豁然意解即於座上得阿羅漢道改易部如法句喻經云昔佛在舍衛國為天人說法時城中有婆羅門長者財富無數為人慳貪不好布施食常閉門不喜人客爾時長者欻思美食便敕其妻令作飯食教殺肥雞薑椒和調煮之令熟敕外閉門夫妻二人坐一小兒著聚中央便共飲食父母取雞肉著兒口中如是數數佛知此長者宿福應度化作沙門伺其坐食現出坐前便咒願云多少布施可得大福長者舉頭見沙門即罵之言汝為道人而無羞恥室家坐食何為唐突沙門答曰卿自愚癡不知羞恥今我乞士何故慚羞長者問曰吾及室家自共娛樂何故慚羞沙門答曰卿殺父妻母供養怨家不知慚恥反謂乞士何不慚羞於是世尊即說偈曰所生枝不絕但用食貪欲養怨益丘塚愚見妻子飾深著愛其牢深固難得出長者聞偈驚而問之道人何故說此答曰案上雞者是卿先世時父以慳貪故嘗生雞中為卿所食此小兒者往作羅剎卿作賈客大人乘船入海舟輒失流墮羅剎國中為羅剎所食如是五百世壽盡來生為卿作子以卿餘罪未畢故來欲相害耳今是妻者是卿先世時母以恩愛深固今還與卿作婦今卿愚癡不識宿命殺父養怨以母為妻五道生死輪轉無際誰能知者唯有道人見此睹彼於是長者忽然毛豎如怖畏狀佛現威神令識宿命長者見佛即識宿命尋則懺悔謝過便受五戒佛為說法得須陀洹道離著部如十住毗婆沙論云於此家中父母兄弟妻子眷屬車馬等物唯增貪求無有厭足家是難滿如海吞流家是無足如火焚薪家是無息覺觀相續家是苦性如怨詐親家是障礙能妨聖道家是鬥亂共相違諍家是多瞋呵責好醜家是無常雖久失壞家是眾苦馳求守護家是疑處猶如怨賊家是顛倒貪著假名家是伎人種種妄飾家是變異貪必散離家是假借無有實事家是眠夢富貴則失家如朝露須臾變滅家如蜜滴其味甚少家如棘藂欲刺傷人家如鐵觜蟲覺觀常唼如是等患在家菩薩當如是觀感應緣三驗宋袁廓字思度陳郡人也元徽中為吳郡丞病經少日奄然如死但餘息未盡棺唅之具並備三日而能轉動視瞬自說云有使者喚廓隨去至大城池樓堞高整階闥崇麗即命廓進主人南面階陛森然威飾冠首執刀者點廓坐定溫涼畢設酒炙果粽俎肴等廓皆嘗進形味不異世中酒數行主人謂廓曰主簿有闕以君才穎故欲相屈廓知是幽途固辭主人曰君以幽顯異方故有辭耳此間榮祿資待身口服御乃當勝君可降意副期廓復固請曰男女藐然並在齠齕僕一旦恭任養視無託父子之戀理有可矜廓因流涕稽顙主人曰君辭讓可爾何容相逼既而廓謝恩辭歸主人曰君不欲定省先亡乎乃遣人將廓行經歷寺署甚眾至囹圄將廓入中斜趣一偶有諸屋宇駢填銜接而甚陋弊次有一屋見其所生母羊氏在此屋中容服不佳甚異平生見廓驚喜戶邊有一人身面傷痍形類甚異呼廓語廓驚問誰羊氏謂廓曰此汝嫡母王夫人汝不識耶王夫人曰吾在世時不信報應雖無甚餘罪正坐鞭撻婢僕過苦故受此罰亡來楚毒殆無暫休前喚汝姊來望以自代竟無所益徒為憂聚言畢涕泗廓姊時亦在其側有頃使人復將廓去經涉巷陌閭里整頓似是民居有一宅竹籬茅屋見父披被著巾憑案而坐廓入門父揚手遣廓曰汝既蒙罷可速歸去不須來也廓跪辭而歸唐京城真寂寺沙門慧如少精勤苦行師事信行信行亡後奉遵其法隋大業中因坐禪修定遂七日不動眾皆嘆異之以為入三昧也既而慧如開目涕泣交流僧眾怪問之答曰火燒腳痛待視瘡畢乃說眾皆怪問慧如曰被閻羅王請行道七日滿王問須見先亡知識不如答欲見二人王即遣喚一人唯見龜來舐慧如足目中淚出而去更一人者云罪重不可喚令就見之使者引慧如至獄門門閉甚固使呼守者有人應聲使者語慧如師急避道莫當門立如始避而門開大火從門流出如腳被燒舉目視門門已閉訖竟不得相見王施絹三十疋固辭不許云已遣送後房眾僧爭往房視之則絹在床矣唐居士李信者并州文水縣之太平里人也身為隆政府衛士至顯慶年冬隨例往朔州赴蕃乘赤艸馬一疋併將艸駒是時歲晚凝陰風雪嚴厚行十數里馬遂不進信以蕃期期逼促撾之數十下馬遂作人語謂信曰我是汝母為生平避汝父將碩餘米乞女故獲此報此駒即是女妹也以力償債汝復何苦敦逼如是信聞之驚愕流涕不能自勝乃拜謝之躬駝鞍轡謂曰若是信孃當自行歸家馬遂前行信負鞍轡隨之至家信兄弟等見之悲哀相對別為廠擽養飼有同事母屈僧營齋合門莫不精進機辦篇感應緣一驗晉康僧淵本西域人至於長安貌雖番人語實中國容止詳正志業弘深晉成之世與康法暢支敏度等俱過江暢亦有才思善為往復著人物始議論等暢常執麈尾行每值名賓輒清談盡日庾元規謂暢曰此麈尾何以常在暢曰廉者不求貪者不與故得常在淵亦機辦過暢時琅耶王茂弘見淵鼻高眼深每戲弄之淵曰鼻者面之山眼者面之淵山不高則不靈淵不深則不清時人以為名答造樓百喻經云往昔愚人癡無所知到餘富家見三重樓高廣嚴麗即作是念我有財錢不減於彼云何不造即喚木匠而問言曰解作彼舍不木匠答言是我所作即便語言今為我造木匠即便經地壘塹你樓愚人見壘語木匠言我不欲下二重先為作最上屋木匠答無有是事何有不作最下造彼第二不造第二云何得造第三屋愚人固言我不用下二必為我作上時人聞已便生怪笑譬如世尊四輩弟子不勤修敬三寶懶惰懈怠欲求道果不欲下三果唯欲得第四阿羅漢果亦為時人之所嗤笑賣香百喻經云昔有長者入海取沉水香積有年載方得一車詣市賣之以其貴故卒無買者多日不售心生疲猒見人賣炭時得速售便燒作炭世間愚人亦復如是無量方便勤求佛果以其難得便生退心畏婦百喻經云昔有一人娉取二婦若近其一為一所瞋便在二婦中間正身仰臥值天大雨屋舍霖漏水土俱下入其眼中以先有要不敢起避遂令二目俱失其明世間凡夫亦復如是親近邪友習行非法造作結業墮三惡道長處生死喪智慧眼惰慢篇感應緣一驗鹽鐵論曰內無其質而外學其文雖有賢師良友若畫脂鏤冰費日損功故良師不能飾西施澤香不能加嫫母說苑曰晉平公問師曠曰吾年七十欲學恐已暮矣對曰暮何不炳燭乎臣聞少而學者如日出之陽壯而學者如日中之光老而學者如炳燭之明炳燭之明孰與昧行平公曰善破邪篇捨邪歸正梁高祖武皇帝年三十八登位在政四十九年雖億兆務殷而卷不釋手內經外典罔不厝懷皆為訓解數千餘卷而儉約自節羅綺不服覆處虛閑晝夜無怠布被莞蓆草履葛巾日惟一食永絕辛羶自有帝王罕能及此舊事老子宗尚符圖忽躬運神筆下詔作捨道文曰維天鑒三年四月八日梁國皇帝蘭陵蕭衍稽首和南十方諸佛十方尊法十方聖僧伏見經云發菩提心者即是佛心能使眾生出三界之苦門入無為之勝路故如來漏盡智凝成覺發惠炬以照迷鏡法流以澄垢登嘗樂之高山出愛河之深際步三界而為尊普大千而流照弟子經遲迷荒耽事老子今捨舊翳歸憑正覺至四月十一日又敕門下大經中說道有九十六種惟佛一道是正道其餘九十五種名為邪道朕捨邪事正諸佛如來若有公卿能入此誓者各可發菩提心故經教成實論云若事外道心重佛法心輕即是邪見若心一等是無記性不當善惡若事佛心強老子心弱者乃是清信至四月十七日侍中安前將軍丹陽尹郡陵王上啟云臣綸聞如來嚴相巍巍架於有頂微妙色身蕩蕩顯乎無際假金輪而啟物託銀粟以應凡砥般若之利刀收涅槃之玅果汎生死之苦海濟常樂於彼岸故七處八會教化之義不窮四帝五時利益之方無盡道樹始於迦維德音盛於京洛茲我皇帝應天御物負展臨民含光宇宙照清海表垂無礙辦以接黎庶以本願力攝受眾生故能崇一乘之旨廣十地之基臣昔未達理源今方麤知歸向伏願天慈曲垂矜許至四月十八日中書舍人臣任孝恭宣敕云能改迷入正可謂是宿植勝因宜加勇猛也魏書云正光元年明帝加朝服大赦天下召佛道二字門人殿前齋訖侍中劉勝宣敕諸法師等與道士論議時清風通觀道士姜斌與融覺寺僧曇謨最對論帝曰佛與老子同時不斌曰老子西入化胡佛時以充侍者明是同時最曰何以知之斌曰案老子開天經是以得知最曰老子當問何王幾年而生周何王幾年西入斌曰當周定王即位三年乙卯之歲於楚國陳苦縣屬鄉曲仁里九月十四夜子時生至周簡王四年丁丑歲事同為守藏吏簡王十三年遷為太史至敬王元年庚辰歲年八十五見周德凌遲與散關令尹喜西入化胡斯足明矣最曰佛以周昭王二十四年四月八日生穆王五十三年二月十五日滅度計入涅槃後經三百四十五年始到定王三年老子方生至敬王元年凡經四百二十五年始與尹喜西遁據此年載懸殊無乃謬乎斌曰若佛生周昭之時有何文記最曰周書異記漢法本內傳並有明文斌曰孔子既是制法聖人當時於佛迥無文記何耶最曰仁者識同管窺覽不弘遠案孔子有三備卜經謂天地人也佛之文言出在中備仁者早自披究不有此迷斌曰孔子聖人不言而知何暇卜乎最曰惟佛是眾聖之王四生之道首達一切含靈前後二際吉凶終始不暇卜觀自餘小聖雖曉未然之理必藉蓍龜以通靈卦也侍中尚書令元文宣敕語道士姜斌等論無宗旨宜退下席又問開天經何處得來是誰所說即遣中書侍郎魏收尚書郎祖瑩等就觀取經帝令議之太尉丹陽王蕭太傅李實衛尉許伯姚吏部尚書邢欒散騎常侍溫子昇等一百七十人讀訖奏云老子止著五千文更無言說臣等所議姜斌罪當惑眾帝加斌極刑時有三藏法師菩提流支行佛慈化諫帝乃止配徒馬邑晉程道惠字文和武昌人也世奉五升米道不信有佛常云古來正道莫踰李老何乃信惑釋言以為勝教太元十五年病死心下尚暖家不殯殮數日得蘇說初死時見十許人縛錄將去逢一比丘云此人宿福未可縛也乃解其縛散驅而去道路修平而兩邊棘刺森然略不容足驅諸罪人馳走其中肉隨著刺號呻聒耳見惠行在平路皆歎羨曰佛弟子行路復勝人也惠曰吾不奉法其人笑曰君忘之耳惠因自憶先身奉佛已經五生五死忘失本志今生在世幼遇惡人未達邪正乃惑邪道既至大城逕進聽事見一人年可四五十南面而生見惠驚曰君不應來有一人著單衣幘持簿書對曰此人伐社殺人罪應來此向所逢比丘亦隨惠入申理甚至云伐社非罪也此人宿福甚多殺人雖重報未至也南面坐者曰可罰所錄人命惠就坐謝曰小鬼謬濫枉相錄來亦由君忘失宿命不知奉大正法故也將遣惠還乃使暫兼覆校將軍歷觀地獄惠欣然辭出導從而行行至諸城城城皆是地獄人眾巨億悉受罪報見有掣狗嚙人百節肌肉散落流血蔽地又有群鳥其啄如鋒飛來甚速鴆然血至入人口中表裏貫洞其人宛轉呼叫筋骨碎落觀歷既遍乃遣惠還復見向所逢比丘與惠一銅物形如小鈴曰君還至家可棄此門外勿以入室某年月日君當有厄誡慎過此壽延九十時道惠家於京師大街南自見來還達皂莢橋見親表三人住車共語憚惠之亡至門見婢行哭而市惠將入門置向銅物門外樹上光明舒散流飛屬天良久還小奄爾而滅至戶聞屍臭惆悵惡之時賓親奔弔突惠者多不得徘徊因進入屍忽然而蘇惠後為廷尉預西堂聽訟未及就列欻然頓悶不識人半日乃愈計其時日即道人所戒之期頃之遷為廣州刺史唐益州福壽寺釋寶瓊俗姓馬氏綿竹縣人小年出家清卓儉素讀誦大品兩日一遍以為常業勸歷邑義日誦一卷者向有千計四遠聞者皆來欽敬本邑連比什邡諸縣並是道民執邪日久投寄無容瓊雖桑梓習俗而不事道李氏諸族值作道會邀瓊赴之來既後至不禮而坐皆謂不禮天尊輕我宗法耶瓊曰邪正道殊所事各異天尚不禮何況老君眾議紛紜頗相凌侮瓊見爭訟不止報曰吾禮非所禮恐貽辱先宗遂作一拜道像并座一時動搖又禮一拜連座反倒墜落在地身座摧毀道民羞恥合眾驚懼一心禮瓊遠近聞知皆捨道歸佛富貴篇感應緣一驗唐中書令岑文本江陵人少信佛常念誦法華經普門品曾乘船於吳江中船壞人盡死文本投在水中聞有人言但念佛必不死也如是三言之既而隨波涌出著北岸免死後於江陵設齋僧徒集其家有一客僧獨後去謂文本曰天下方亂君幸不預其災終逢太平致富貴也言畢趨出送出外不見既而文本食齋於自食碗中得舍利二枚後果如其言須達部雜寶藏經云昔佛在世時須達長者最後貧苦財物都無客作傭力得米四升炊作飯食值阿那律來從乞食婦即取缽盛滿飯與後須菩提迦葉目連舍利弗等次第來乞悉施滿缽末後佛來亦與滿缽須達在外行還到家從婦索食婦即語言其若尊者阿那律來汝當自食為施尊者不須達答言寧自不食當施尊者婦又語言若復迦葉大目連及須菩提舍利弗等乃至佛來汝當云何亦答婦言寧自不食盡當施與婦即語夫言朝來諸聖盡來索食所有飲食盡施與之夫聞歡喜而婦語言我等罪盡福德應生即開庫藏縠綿飲食悉皆充滿債負篇無量壽經云憍梵波提過去世曾作比丘於他粟田邊摘一莖粟觀其生熟數粒墮地五百世作牛馬償之唐龍朔三年長安城內通軌坊三衛劉公信妻陳氏母先亡陳因患暴死見人將入地獄備見諸苦末後見一地獄石門牢固有兩大鬼形容偉壯守門左右怒目瞋陳汝何人到此見石門忽開亡母在中受苦受苦稍歇近門母子相見遙得共語母語女言汝還努力為吾寫經女諮孃欲寫何經為吾寫法華言訖石門便閉陳還得蘇具向夫說夫即憑妹夫趙師子欲寫法華其師子舊解寫經有一經生將一部新寫法華未裝潢其人先與他受雇寫經主姓范此生將他法華轉向趙師子處質二百錢師子語婦兄贖取此經陳將四百錢贖得裝潢周訖在家為母供養其女陳氏後夢見母從女索經何因迄今不得女報母言已為娘贖得一部法華現裝潢了在家供養母語女言止為此經吾轉受苦獄官語云汝何因取他范家經將為己經女見母說如此更為母別寫法華其經未了女夢中復見母來催經即見一僧手捉一卷法華語母云汝女已為汝寫經第一卷了功德已成後寫經成母來報女因汝為吾寫經今得出冥道好處受生得汝恩力故來報汝後時勘問前贖法華主知果姓范范家雖不得經其經已成施福已滿後人轉質自得罪咎謀謗篇宿障部孫陀利謗佛緣興起行經云如來將五百羅漢常以月十五日於中說戒因舍利弗問十事舍利弗自從華座起立整服偏露右臂右膝跪座向佛叉手問言世尊無事不見無事不聞無事不知眾惡滅盡諸善普備一切眾生皆欲度之今故現有殘緣願佛自說使天神解以何因緣彼孫陀利謗以何因緣彼奢彌跋提謗及五百羅漢以何因緣世尊自患頭痛以何因緣世尊自患骨節疼痛以何因緣世尊自患背痛以何因緣被木槍刺腳以何因緣被調達破指出血以何因緣被多舌女人舞杆大眾來相誹謗以何因緣於毗蘭邑與五百比丘食其馬麥以何因緣在鬱祕地苦行六年佛語舍利弗還復華座吾當為汝說先因緣阿耨大龍王聞佛當說踴躍歡喜即為佛作七寶交露蓋蓋中雨栴檀末香周遍無數諸天八部皆來詣佛作禮而立佛告舍利弗往昔過去波羅柰城有博戲人名曰淨眼時有婬女名曰鹿相端正姝好時淨眼語鹿相曰當詣園中共相娛樂鹿相便莊嚴衣服即共嚴駕至園娛樂經於日夜淨眼貪心當殺此女取其衣服復念殺已當何藏之時此園中有辟支佛名樂無為去其不遠伺乞食後埋其廬中持衣而去爾時國人不見鹿相遂徹梵達國王王召群臣遍城求之不得往到園廬搜索得屍諸臣語無為曰己行不淨胡為復殺辟支默然不答如此至三不答眾臣便反縛辟支持詣王所王聞瞋恚敕諸臣等急縛至樹下計牟針之貫著竿頭拯弓射之若不死者便斫其頭諸臣受教眾人悲傷於時淨眼在破墻中藏聞眾人言道人枉死念已走趣大眾並喚上官此人是我殺耳願放道人縛我治罪諸官皆驚曰何能代他受罪即共解辟支便縛淨眼反縛如前諸上官等皆向辟支佛作禮懺悔辟支佛念不宜更復重入波羅柰城乞食我宜眾前取滅度耳便於眾前踊昇虛空於中往返坐臥住立作十八變腰以下出煙腰以上出火或舉身出煙舉身出火即於空中燒身滅度於是大眾皆悲啼泣取其舍利於四衢道起偷婆諸官即將淨眼詣王王忿依前殺之佛語舍利爾時淨眼者則我身是其鹿相女者今孫陀利是爾時梵達王者今執杖釋種是我於爾時由殺鹿相枉困辟支以是罪緣無數千歲墮在泥犁無數千歲墮在畜生無數千歲墮在餓鬼中爾時餘殃今雖作佛故獲此謗佛被木槍刺腳緣興起行經云佛在羅閱祗竹園精舍與大比丘僧五百人俱晨旦著衣持缽與五百比丘僧及阿難共入羅閱祗城乞食家家遍至見此里中有破剛木一片木長尺二於佛前立佛便心念此是宿緣今當現償宿緣之報使眾人見信不敢造惡佛便踊在虛空去地一仞木槍逐佛亦高一仞於佛前立佛復上二仞四仞乃至七仞槍亦隨上七仞世尊復上高一多羅槍亦高一多羅佛復上乃至七多羅槍亦隨上立於佛前佛復上高七里乃至上由延槍亦隨之佛於空中化作青石厚六由延廣縱十二由延佛於上立槍便穿石出在佛前立佛復於空中化作水廣十由延縱二由延深六由延於水上立槍復過水於佛前立佛復空中化作大火縱廣十二由延高六由延於其燄上立槍亦過燄至佛前上佛復空中化作旋風縱廣十二由延於風上立槍從傍邊斜來趣佛前立佛復上至四天王宮如是展轉乃至梵天木槍從三十三天以次來上乃至梵天於佛前立爾時世尊與梵天說自宿緣法從梵天還展轉還至羅閱城所過諸天皆為說宿緣法佛與比丘僧出羅閱城槍亦尋佛後國人盡逐物出城佛語眾人各自還歸如來自知時節即還竹園僧伽藍自處己房敕諸比丘各自還房阿難問佛我當云何佛語阿難汝亦還房佛便心念是緣我宿自造必當償之即取大衣四𧜼襞之還坐本座佛便展右足木槍便從足趺上下入徹過入地深六萬八千由延過地至水水深亦六萬八千由延過水至火火高六萬八千由延至火乃焦當爾之時地為六反震動阿難諸比丘各自心念今此地動其槍必刺佛腳佛被槍已苦痛酸疼阿難即至佛所見佛腳刺槍瘡便死倒地佛以水灑阿難乃起起已禮佛足摩拭佛足嗚佛腳足啼泣墮淚佛以是腳行至樹下降魔上至三十三天為母說法世尊金剛之身作何因緣為木所害佛語阿難且止勿啼世間因緣輪轉生死有是苦患阿難問佛今者瘡痛增損何如佛語阿難漸有降損舍利弗及諸比丘來禮佛佛語比丘我乃先世自造此緣無可逃避時耆婆阿闍世王等聞佛為木槍刺腳從床悶死墮地良久乃蘇舉宮驚怖王疾嚴駕上車出城城內四姓宗族士女百千圍遶共至佛所佛右脅側臥王禮佛已手捉佛足摩抆口嗚世尊瘡痛寧有損不佛慰王已命王使坐王言我從如來所聞佛身金剛不壞今者何為木槍所刺耶佛告王曰一切諸法皆為緣對我身雖是金剛非木槍能壞此宿對所壞是故大王當捨惡從善王語耆婆汝合好藥洗瘡咒治耆婆即便禮佛洗足安藥後續止痛佛於是為王一切眾會說四諦法千比丘得漏盡意解萬一千人得法眼淨復有百千諸天展轉相告皆來慰佛佛語舍利弗往昔無數阿僧祗劫前有兩部賈客各有五百人在波羅柰國各合資財嚴船度海乘風徑往即至寶渚渚上豐饒衣被飲食及玅婇女種種龍寶無物不有一部賈客語眾人曰我等所求已獲今當住此以五欲自娛第二薩薄告其部眾不應於此久住是時空中有天女慈愍此輩便於空中語眾賈曰此間雖有財寶婇女衣食不足久住卻後七日此地皆當沒水語訖化去復有魔女欲來沒盡諫止不去第一薩薄不信天告樂住不去第二薩薄懼水不住先嚴辦船未至之日所將部眾即得上船第一薩薄先不嚴船水至之日與嚴治者著鉾持杖共相格戰第二薩薄以銃牟刺第一薩薄腳徹過即便命終佛語舍利弗第一薩薄者今提婆達是第二薩薄者則我身是爾時第一賈客眾五百人者則今提婆達五百弟子是爾時第二賈客五百眾者則今五百羅漢是爾時第一天女者則今舍利弗是爾時第二天女者則今名滿月比丘婆羅弟子是以是因緣無數千歲經地獄苦墮畜生中為人所射無數千歲在餓鬼中蹈鐵針上今雖得金剛之身以是餘殃故今為木槍所刺佛被舞杆謗緣興起行經云佛告舍利弗往昔阿僧祗劫前有佛名盡勝如來有兩種比丘一名無勝一名常歡無勝得六神通常歡結使未除爾時波羅柰城有長者名大愛資財無極婦名善多兩種比丘往來其家善多婦供養無勝四事無乏常歡微薄因此妒嫉橫生誹謗言無勝比丘與善多交通不以道法供養以恩愛供養爾時常歡者我身是善多婦者婆羅門女是以是罪緣無數千歲墮在地獄受其苦痛今雖得佛以餘殃故為多舌童女舞杆起腹來至我前曰汝先共我交通使我有身今當臨月事須酥油養於小兒盡當給我爾時眾會皆低頭默然時釋提桓因侍後執扇以神力化作一鼠入其衣裏嚙於舞杆忽然墮地爾時四部弟子及六師從眾見杆墮地皆大歡喜揚聲稱慶咒術篇感應緣四驗昔鄴中有竺佛圖澄者四域人也姓帛氏少出家清貞務學誦經數百萬言善解文義雖未讀此土儒史而與諸學士論辯疑滯皆暗若符契無能屈者以晉懷帝永嘉四年來適洛陽志弘大法善誦神咒能役使鬼物以麻油雜臙脂塗掌千里外事皆徹見如對面又聽鈴音以言事無不效驗時石勒屯兵葛陂專以殺戮為威沙門遇害甚眾澄憫念蒼生欲以道化勒於是杖策到軍門勒大將郭黑略素奉法澄即投止略家因而勒召澄問曰佛道有何靈驗澄知勒不達深理與言曰至道雖遠亦可以近事為証即取應器盛水燒香祝之須臾生青蓮華光色曜目勒由此信伏澄因而諫曰夫王者德化洽於宇內則四靈表瑞政弊道消則慧孛著現休咎隨行斯乃古今之常徵天人之明誡勒甚悅之凡應被誅殘蒙其益者十有八九勒後因忿欲害諸道士并欲苦澄澄乃避至黑略舍告弟子曰若將軍信至問吾所在者報云不知所之信人尋至覓澄不得使還報勒勒驚曰吾有惡意向聖人聖人捨我去矣通夜不寢思欲見澄澄知勒意悔明旦造勒勒曰昨夜何行澄曰公有怒心昨故權避公今改意是以敢來勒大笑曰道人謬耳襄國城塹水源在城西北五里團丸祠下其水暴竭勒問澄曰何以致水澄曰今當敕龍勒字世龍謂澄嘲己答曰正以龍不能致水故相問耳澄曰水泉之源必有神龍居之今往敕語水必可得乃與弟子法首等數人至泉源上其源故處久已乾燥坼如車轍從者心疑恐水難得澄坐繩床燒安息香祝願數百言如此三日水忽然微流有一小龍長五六寸許隨水來出諸道士竟往視之澄曰龍有毒氣勿臨其上有頃水大至隍塹皆滿勒登位已後事澄彌篤時石蔥將叛其年澄誡勒曰今年蔥中有蟲食必害人可令百姓無食蔥也勒頒告境內慎無食蔥到八月石蔥果走勒益加尊重有事必諮而後行號大和尚宋京師有釋杯渡者常乘木杯渡水初在冀州神力卓越世莫能測至孟津河浮木杯於水憑之渡河無假風棹輕疾如飛俄而渡岸達於京師年可四十衣不蔽身或嚴冰扣而洗浴或著屐上山或徒行入市唯荷一蘆圖子後欲往瓜洲於江測航人告渡不肯載之復累足杯中顧盻吟詠杯自然流直渡北岸向廣陵遇村舍有李家設八關齋先不相識乃直入齋堂而坐置蘆圖於中庭眾以其形陋無恭敬心李見蘆圖當道欲遺置墻邊數人舉不能動渡食竟提之而去笑曰四天王福於李家於時有一豎子窺其圖中見四小兒並長數寸面目端正衣裳鮮潔於是追覓不知所在後三日乃見在西界蒙籠樹下坐李禮拜請還家一月供養渡不甚持齋與俗不殊沛國劉興伯為兗州刺史遣使邀之負圖而來興伯使人舉視十餘人不勝伯自看唯見一敗衲及一木杯後還李家復二十餘日清旦忽去乃合境聞有異香覓之見在北巖下鋪敗袈裟於地臥之而死頭前腳後皆生蓮華華極鮮香邑共殯葬之後數日有人從北來見渡負蘆圖行向彭城乃共開棺唯見靴履宋蜀齊後山有釋玄暢姓趙河西金城人少時家門為北兵所滅禍將及暢番師見暢而止之曰此兒目光外射非凡童也遂獲免仍往涼州出家其後煽虐剪滅佛法害諸沙門唯暢得走以元嘉二十二年閏五月十七日發自平城路遊代郡上谷東跨太行經歷幽冀南轉將至孟津唯手把一朿楊枝一把蔥葉眾騎追逐將及乃以楊枝擊沙沙起天暗人馬不能得前有頃沙息騎已復至於是投身河中唯以蔥葉內鼻孔中通氣度水以八月一日達於楊州洞曉經律深入禪要占託吉凶靡不誠驗靈鬼志曰太元十二年道人外國來能吞刀吐火吐珠玉金銀行見一人擔擔上有小籠子可受升餘語擔人云吾步行疲極寄君擔擔人甚怪之慮是狂人便許可答云若見許政欲入籠子中擔人逾怪下擔入籠中擔之亦不覺重行數十里樹下住食擔人呼共食云我自有食止住籠中出飲食器物羅列餚膳豐腆亦辦反呼擔人食未半語擔人我欲與婦共食即復口出一女子年二十許衣裳容貌甚美二人便共食食欲竟其夫便臥婦語擔人我有外夫欲求共食夫覺君勿道之婦便口中出一年少丈夫共食有頃其夫動如欲覺其婦以外夫內口中次及食器物此人即至國中有一家大富貨財巨萬而性慳吝語擔人吾試為君破奴慳即至其家有好馬甚珍之繫在柱下忽失去尋索不知處明日見馬在五升甖中終不可破便語言君作百人廚以周窮乏馬得出耳主人即狼狽作之畢馬還在柱下明旦其父母老在堂上忽復不見舉家惶怖不知所在開粧器忽見父母澤壺中往守請之云當更作千人餘食飴百窮者乃當得出既作其父母自在床上祭祠篇獻佛部諸佛神力不可思議眾生業力亦不可思議昔有一貧人作是思惟當詣天祠求於現世饒益財寶作是念已語其弟言汝可勤作田好為生計勿令家中有所乏短便將其弟往至田中此處可種胡麻此處可種大小麥此處可種禾大小豆等示彼種處已向天祠中為祠弟子作天齋會香華供養香泥塗地晝夜禮拜求恩請福希望現世增益財產爾時天神觀彼人先世了無布施因緣今雖精勤求請徒作勤苦將無有益便化為弟來向祠中時兄語言女何所種來復何為化弟白言我亦欲求請天神求索衣食我雖不種以天神力田中穀麥自然足得兄責弟言何有田中不下種子望有收獲無有是事時彼天神還復本形即說偈言汝今自說言不種無果實先身無施因云何今獲果若欲得財寶應當淨身口而作布施業以求將來果感應緣三驗晉張應者歷陽人事淫祀咸和八年妻得病應請禱財產略盡妻法家弟子也謂曰今病日困求鬼無益乞作佛事應許之往精舍中見竺曇鎧曇鎧曰佛如愈病之藥見藥不服雖視無益應許當事佛曇鎧與期明日往齋應歸夜夢見一人長丈餘從南來入門曰汝家不淨見曇鎧隨後曰始欲發意未可責之應眠覺便炳火作高坐及鬼子母座曇鎧明往應具說夢遂受五戒斥除神影大設福供妻病即間尋都除愈咸康二年應至馬溝糴鹽還泊蕪湖浦宿夢見三人以鋼鉤釣之應曰我佛弟子牽終不置釣將北去下一阪岸岸下見有鑊湯刀劍楚毒之具應時悟是地獄欲呼師名忘曇鎧字但喚和尚救我亦時喚佛有頃一人從西面來形長丈餘執金杵欲撞此釣人曰佛弟子也何入此中釣人怖散長人引應去謂曰汝命已盡不復久生可蹔還家頌唄三偈并取和上名字三日命過即生天矣應既蘇即三日持齋頌唄遣人疏取曇鎧名至日中食畢禮佛澡洗著衣如眠便盡宋陳安居者襄陽縣人也伯父少事巫俗鼓舞祭祀神影充滿其宅父獨敬信釋法旦夕齋戒後伯父亡無子父以安居紹焉安居雖即伯舍而理行精求淫饗之事廢不復設於是遂得篤病而發為歌神之曲迷悶惛僻如此者彌歲而執心愈固家人並諫之安居不聽經積二年永初元年病發遂絕但心下微暖至七日夜守視之者覺屍足間如有風來飄衣動衾於是而蘇有聲既而稍能轉動末求飲漿家人嘉之問從何來安居說云初有人若使者將刀數十呼將去從者欲縛之使者曰此人有福未可縛也行可三百里許至一城府樓宇甚整使者將至數處如局司所居末有人授紙筆與安居曰可疏二十四通死名安居即如言疏名成數通有一侍從內出揚聲大呼曰安居可入既入稱有教付刺姦獄吏兩人一云與大械一云此人頗有福可止三尺械疑論不判乃共視文書久之遂與三尺械有頃見有貴人翼從數十形貌都雅謂安居曰汝那得來安居具陳所由貴人曰汝伯有罪但宜錄治以先植小福故蹔得遊散乃敢告訴吾與汝父幼少有舊見汝依然可隨我共遊觀也獄吏不肯釋械曰府君無教不敢專輒貴人曰但付我不使走逸也乃釋之貴人將安居遍至諸地獄備觀眾苦遊歷未竟有傳教來云府君喚安居安居忙懼求救於貴人貴人曰汝自無罪但以實對必無憂也安居至閤見有鉗梏者數百一時俱進安居在第三既至階下一人服冠冕立於囚前讀諸罪簿須臾赤官具讀名牒為伯所訴云云府君曰此人事佛大德人也其伯殺害無辜訾誑百姓罪宜窮治以昔有小福故未加罪伯今復謗訴無辜教催錄取未及至而府君遣安居還安居出至閤局司云君可拔卻死名於是安居以次抽名既畢欲向謝貴人貴人亦至云知汝無他得還甚善努力增修功德梁九江廬山東林寺釋僧融曾於江陵勸一家受戒奉佛適有神廟不復宗事融便徹取送寺至七日後主人母見一鬼持赤索欲縛之母甚惶懼乃更請僧讀經行道鬼怪遂息融晚還廬山獨宿逆旅時大雨雪中夜始眠見有鬼兵甚眾中有鬼將帶甲挾刃勵聲曰君何謂鬼神乃無靈耶速拽下地諸鬼將欲加手融默念觀音稱聲未絕見一天將可長丈餘著廣皮褲褶手捉金剛杵擬之鬼便驚散甲冑之屬碎為塵粉融嘗於江陵勸夫妻二人俱受五戒後為賊引夫遂逃走妻將繫獄遇融於路求哀請救融曰唯至心念觀世音更無餘信婦入獄後稱念不輟因夢沙門立其前足蹴令去忽覺身貫三木自然解脫既聞即起重門洞開便越席而東南數里將值民村天夜暗冥其夫先逃夜行晝伏二忽相遇皆大驚駭占相部感應緣三驗漢周亞夫絳侯勃之次子也初許負相之曰君三年而侯五年而相其貴無上然卒以餓死亞夫曰嘻吾何緣如此若既大貴又何故餓死負曰不然從理入口餓死法也後三年絳侯世子有罪黜而亞夫襲侯及破吳楚有大功為丞相以忠蹇疆直數犯景帝竟下獄餓死梁州招提寺有沙門名琰年幼出家初作沙彌時有一相師語琰師雖大聰明智慧鋒銳然命短壽不經旬日琰師既聞斯語遂詣諸大德共相評論作何福勝得命延長大德答云依佛聖教受持金剛般若經功德最大琰入山志心受持般若經餘五年因出山見相師相師驚怪修何功德得壽命長琰具述前意相師歎之琰後學問優長善弘經論匡究佛法年逾九十梁鍾山開善寺沙門智藏俗姓顧氏吳郡吳人也有墅姥攻相謂藏曰法師聰辨蓋世天下流名但恨年命不長可至三十一時年二十有九聞斯促報於是講解頓息竭誠修道發大誓願不出寺門遂探經藏得金剛般若受持讀誦畢命奉之至所厄年末以香湯洗浴淨室誦經以待死至俄聞空中聲曰善男子汝往年三十一者是報盡期由般若經力得倍壽矣慈悲篇菩薩部如大集經云佛言我昔為一切眾生修菩薩行為此法眼於諸眾生起大慈心捨己身血猶如大海與諸乞者捨頭眼耳如毗福羅山捨鼻舌等如十突盧那捨手腳等如毗福羅山捨皮施等可覆一閻浮提亦捨無量象馬奴婢妻子及以王位國土城邑宮殿村落等與諸乞者於諸佛所受持禁戒而無缺犯一一佛所無量供養一一佛所稟受無量百千法門受持讀誦善修三昧恭敬無量三乘四果聖人父母師長病苦之者無救護者為作救護無歸依者為作歸依無趣向者為作趣向令其安住我已如是於彼三大阿僧祗劫慈愍一切苦惱眾生故發大堅固勇猛之心久修無上菩薩之行今於此盲真世間無大導師儉法之時於如是等諸眾生中發心願成阿耨多羅三藐三菩提欲於三乘菩提令不退轉復願救度三惡眾生安置善道及涅槃樂觀苦部感應緣三驗唐益州福感寺釋道積蜀人日誦涅槃經一部凡欲宣述必先洗滌身穢被服淨衣然後昇座立性慈仁遇癘疾膿血穢氣者悉為補浣衣服治療同食而不惡之時人怪問云境無染淨淨穢由心心既不起愛憎何生唐新羅國大僧統釋慈藏俗姓金氏自小神睿澄簡厭世高榮情欣方外獨靜行禪不避虎兕持戒不群慈救為先深隱山居來往絕糧便感異鳥各啣諸果就手送與鳥於藏手同共食之常懷慼慼慈哀含識作何方便令免生死遂於眠寐見二丈夫從忉利天來曰卿在幽隱欲為何利藏曰惟為利生乃授藏五戒訖曰可將此五戒利益眾生於是出山谷中士女受戒無窮唐范陽盧元禮貞觀末為泗州漣水縣尉曾因重病悶絕經一日而蘇云有人引至府舍入大堂中見灶數十百口其灶上有氣矗然如雲霧直上沸聲喧雜有同數千萬人元禮仰視見似籠盛人懸之是蒸罪人處元禮遂發願大語云願代一切眾生受罪遂解衣赤體自投於釜中因即昏然不覺有痛須臾有一沙門挽元禮出云知汝至心乃送其歸忽如睡覺遂斷酒肉安經放生篇救厄感應緣四驗晉張崇京兆杜陵人也少奉法晉太原中符堅既敗長安百姓千餘家南走歸晉為鎮戍所拘殺其男丁搶其子女崇與同等五人手腳共械掘坑埋築明日將馳馬射之以為娛樂崇慮望窮盡唯潔心專念觀世音夜中械忽自破因走得脫崇腳痛經一寺乃復稱觀世音至心禮拜以一石置前發誓願言今欲過江東訴亂晉帝理此冤魂救其妻息若心願獲果此石當分為二崇禮拜已石即破焉崇遂至京師發白虎撙具列冤氏帝乃悉如宥晉王懿字仲德太原人也守車騎將軍世信奉法父苗苻堅時為中山太守為丁零所害仲德與兄元德攜母南歸登涉峭嶮饑疲絕糧無復餘計唯歸心三寶忽見一童子牽青牛見懿等饑各乞一飯因忽不見時積雨大水懿前望浩然不知何處為淺可得揭躡俄有一白狼旋遶其前過水而反似若引導如此者三於是逐狼而渡水纔至膝俄得陸路南歸晉帝後為徐州刺史常欲設齋宿昔灑掃敷陳香華盛列經像忽聞法堂有經唄聲清婉流暢懿遽往視見有五沙門在佛坐前威容偉異神儀秀出懿甚歡敬沙門迴相瞻眄意若依然音旨未交忽竦身飛空而去宋沙門竺惠慶廣陵人也經行修明元嘉十二年荊楊大水川陵如一惠慶將入廬山船至小而暴風忽起同旅已得依浦惟惠慶船未及得泊飄颺中江風疾浪涌慶正心端念誦觀世音經洲際之人望見其船迎飆截流如有數十人牽挽之者逕到上岸一舫全濟陳攝山栖霞寺沙門惠布俗姓郝廣陵人少懷遠操性度虛梗志行罕儔為君王所重或見諸人樂生西方者告云方土非吾願也如今所祈化度眾生如何在蓮華中十劫受樂未若三塗處苦救濟也年至七十與眾別云布命三五年在但老困不能行道住世何益常願生邊地無三寶處為作佛事去也於是絕穀不食下敕令醫證之縮臂不許沈皇后欲傳香信亦不許臨遺訣曰長生不喜夕死無憂以生無所生滅無所滅故也怨苦篇傷悼部如中阿含經云爾時世尊告諸比丘眾生無始生死長夜輪轉不知苦之本際若此大地一切草木以四指量斬以為籌以數汝等長夜輪轉生死所依父母籌數已盡其諸父母數猶不盡汝等輪轉生死飲其母乳多於恒河及四大海水或生象中飲母乳無量數或生駝馬牛驢諸禽獸類飲其母乳數無量汝等長夜棄於塚間膿血流出亦復如是或墮地獄畜生餓鬼髓血流出亦復如是爾時世尊即說偈言一人一劫中積聚其身骨常積不腐壞如毗富羅山若諸聖弟子正智見真諦又增一阿含經云爾時三十三天有一天子身形有五死相時彼天子愁憂苦惱搥胸嘆息爾時釋提桓因自往其所語天子言汝豈不聞如來說偈曰一切行無常生者必有死不生則不死此滅最為樂汝今何故愁憂乃至於斯一切諸行無常之物雖使有常者此事不然天子報言云何不愁我今天身清淨無染光踰日月靡所不照捨此身已當生羅閱城中豬腹中生恒食屎尿死時為刀所割是時帝釋語言汝今可自歸佛法眾便不墮三惡趣故如來亦說此偈言諸有自歸佛不墮三惡趣盡漏處天人便當至涅槃爾時彼天問帝釋言今如來竟何所在帝釋報曰今如來在摩竭提國羅閱城中迦蘭陀竹園所天子報言我今無力至彼帝釋報言汝當右膝著地長跪叉手向下方界而作是言唯願世尊善觀察之今在垂窮之地願矜愍之彼天子隨帝釋即便長跪向下方界自稱姓名自歸佛法眾盡其形壽為真佛子如是至三說此語已不復處豬胎乃生長者家是時長者婦自知有娠十月滿生一男端正無雙至十歲父母將至佛所時佛為說法即於座上諸塵垢盡得法眼淨無復瑕穢後離俗出家得阿羅漢果八苦部如五王經云佛為五王說法人生在世有無量眾苦切身今為汝等略說八苦一生苦二老苦三病苦四死苦五恩愛別離苦六所求不得苦七怨憎會苦八憂悲苦感應緣一驗吳王夫差殺其臣公孫聖而不以罪後越伐吳吳敗走謂太宰嚭曰吾前殺臣公孫聖投於胥山之下今道當由之吾上畏蒼天下慚於地吾舉足而不進心不忍往子試唱於前嚭乃向餘杭之山呼曰公孫聖三呼而三應吳主大懼嘆曰蒼天蒼天寡人豈可復歸乎遂不返業因篇引證又辨意長者子經云爾時世尊與大眾會說法時舍衛城中有長者子名辨意從五百長者子詣佛所為佛作禮叉手白言有何因緣得生天上復何因緣來生人中復何因緣生地獄中生餓鬼中生畜生中復何因緣常生尊貴中眾人所敬復何因緣生奴婢中為人所使復何因緣生庶民中口氣香潔身心常安為人所譽不被誹謗復何因緣得生為人常被誹謗為人所憎形體醜惡身意不安常懷恐怖復何因緣所生之處常與佛會聞法奉眾初不差違遭遇智識逮得好心若作沙門當得所願唯願世尊分別解說令使眾會得聞正教佛告長者子諦聽吾當為汝解說有五事行得生天上一慈心不殺悉養物命令眾得安二賢良不盜他物布施無貪濟諸窮乏三貞潔不犯外色男女護戒奉齋精進四誠信不欺於人護口四過無得貪欺五不飲酒不經過口行此五事乃得生天復有五事得生人中一布施恩潤貧窮二持戒不犯十惡三忍辱不亂眾患四精進勸化無有懈怠五一心奉孝盡忠是為五事得生人中大富長壽端正威德得為人主一切敬持復有五事死入地獄一不信有佛法眾而行誹謗輕毀聖道二破壞佛寺尊廟三四輩轉相誹謗不計殃罪無敬順意四反逆無有上下君臣父子不相順從五當來有欲為道已得為道便不順師教誨而自貢高輕慢謗師是為五事死入地獄展二地獄無有出期復有五事墮餓鬼中一慳貪不欲布施二盜竊不孝二親三愚闇無有慈心四積聚財物不肯衣食五不給父母兄弟妻子奴婢是為五事墮餓鬼中復有五事墮畜生中一犯戒私竊偷盜二負債抵而不償三殺生以身償之四不喜聽受經法五常以因緣艱難齋戒施會以俗為緣是為五事生畜生中復有五事得為尊貴一施惠普廣二敬禮三寶及眾長者三忍辱無有瞋恚四柔和謙下五博聞經戒是為五事得為尊貴眾人所敬復有五事常生卑賤一憍慢不敬二親二剛強無恪心三放逸不禮三尊四盜竊以為生業五負債逃避不償是為五事常生卑賤奴婢之中復有五事得生人中口氣香潔身心常安一至誠不欺於人二誦經無有彼此三護戒不謗聖道四教人遠惡就善五不求人長短是為五事生於人中口氣香潔身心長安為人所譽不被誹謗復有五事若在人中為人所憎一常無至誠欺詐於人二大會之中有說法者而誹謗之三見諸同學而輕試之四不見他事而為作過五鬥亂兩舌彼此是為五事若在人中常被誹謗身心不安常懷恐怖復有五事所生之處常與佛法眾會一身奉三寶勸人令事二作佛形像當使鮮潔三常奉佛教不犯所受四普慈一切與尊正等如愛赤子五所受經法晝夜諷誦是為五事所生之處常與佛法眾會初不差違見佛聞法便得好心若作沙門即得所願於是長者子辯意聞佛說是五十事要法之義欣然歡喜逮得法忍五百長者子皆得法眼淨因果感應緣一驗楚王遊於苑白猿在焉王命善射者令射之數發猿搏矢而嬉乃命由基由基撫弓則猿抱木而虛及六國時更嬴謂魏王曰臣能為虛發而下鳥魏王曰然則射可至於此乎更嬴曰可聞鴈從東方來更泣發而鳥下焉受報篇現報部佛說行七行現報經云爾時世尊告諸比丘有七種人可事可敬是世間無上福田一者行慈二者行悲三者行喜四者行護五者行空六者行無相七者行無願其有眾生行此七法於現法中獲其果報阿難白佛言何故不說須陀洹斯陀含阿那含阿羅漢辟支佛乃說此七事乎世尊告曰行慈七人其行與須陀洹乃至佛等其事不同雖供養須陀洹等不現得報然供養此人者於現世得報是故阿難當勤勇猛成辦七法住處部問曰未知以何義故於初禪中別取梵王於第四禪中別取無想天并五淨居立為三有別於初四禪者有何義耶答曰有謂彼初禪大梵天者外道人等恒計以為能生萬物之本違之則受生死順之則得解脫又彼梵王亦復自計己身能為造化之主是一是常是真解脫如來為欲破彼情見是故別摽說為有也第二無想天者謂彼天中悉得定壽五百大劫無心之報外道人等於此不達而復計為真實涅槃是故樂修無想之定求生彼處如來欲破情見是故別摽說為有也第三五淨居者於中有彼摩醯首羅天王處外道人等亦復計彼天王能為造化之本歸之則得解脫為破此見是故如來別摽說有別說之意義於斯顯問曰未知於彼六趣之中四種惡趣各立一有人中立四天中乃立十七有者何義答曰有所謂於彼四惡趣中苦惱多故眾生不欲樂住情微是故就趣各立一有人趣次勝眾生樂住心已殷著是故隨方說之為四天趣最勝樂住之情最為殷上是故隨處說處說為十七二十五有罪福篇福行部述曰此明福行者對罪行說明凡夫修欲界善者但使亂心修諸事福定生下界名欲界業五道之中皆悉得起先就地獄說地獄之人亦有三善業即是意地三善根如仙譽國王殺五百婆羅門生地獄中發生信心生甘露國此善不滅生便得之名為生得善依此善根得起善心第二畜生龍等亦有修善如涅槃經佛說時無量鳥獸發菩提心生於天上以其身口七善律儀普於一切眾生處起故薩婆多論畜生以癡鈍故不發律儀若依成論鬼神畜等亦有得戒如天帝釋多受八戒龍等亦受不局在人若論色戒諸天上得成下亦得寄起下界善業如諸梵天見佛禮拜發言讚嘆是其初禪威儀心起據此所依無記非善第二明色界四禪定業依身起處若鬼畜中值聖強緣能悟道者亦得修起若就人天以論修色界業所謂無貪無瞋正見若依定心發得禪戒禪戒則是身口七善故得禪時有色十善若就無色諸天以論依毗曇無色界天不得起色界定業感應緣一驗唐武德中遂州總管府記室參軍孔恪暴病死一日而蘇自說被收至官所問何故殺牛兩頭恪云不殺官曰汝弟證汝殺因呼恪弟弟死已數年矣既至枷械甚艱官問汝所言兄殺牛虛實弟曰兄前奉使招慰獠賊使某殺牛會之實奉兄命恪曰使弟殺牛實國事也官曰汝殺會獠以招慰為功用求官賞何云國事因謂恪弟曰以汝證兄故久留汝兄既遣殺汝便無罪放任受生言訖弟忽不見亦竟不得言敘官又問恪因何復殺兩鴨恪曰前任縣令殺鴨供官客耳官曰官客自有料無鴨汝以鴨供之非罪而何又問何故復殺雞卵六枚曰平生不食雞卵唯憶小年九歲時寒食日母與六卵因煮食之官曰欲推罪母耶恪曰但說其因實自恪殺之也官曰汝殺他命當自受之言訖忽有數十人皆來執恪將出去恪大呼曰官府亦大枉濫官聞之呼還曰何枉濫恪曰生來有罪皆不見遺生來修福皆不見記豈非濫乎官問主司恪有何福何為不錄主司對曰福亦皆錄量罪多少恪福少罪多故未論其福官怒曰雖先受罪何不唱福示之命鞭主司一百倏忽鞭訖血流濺地既而唱恪生來所修之福亦無遺者官謂恪曰汝應先受罪我更令汝歸七日可勤追福因甦欲障夫論欲過者謂五欲弊魔六塵惡賊佛判邪惑迷障佛性故涅槃經云眾生五識雖非一念然是有漏復是邪倒增長諸漏為一切凡夫取著於色乃至著識以著色故則貪心生乃至為識所繫縛以繫縛故則不免於生老病死憂悲大苦一切煩惱訶欲智度論云哀哉眾生常為五欲所惱而求之不已將墜大坑世人愚惑貪著五欲至死不捨受無量苦此之五欲得須臾樂如密塗刀舐者貪甜不知傷舌色聲香味触禪家正障若欲修定皆應棄之四生篇感應緣二驗晉沙門支遁字道林陳留人也神宇雋發為老釋風流之宗常與其師辯論物類謂雞卵生用未足殺之與諸蜎動不得同罰師尋亡忽見形來至遁前手執雞卵投地破之見有雞鶵出殼而行遁即悟悔其本言唐相州滏陽縣人信都元方少有操尚尤好釋典年二十九至顯慶五年春正月死死後月餘其兄法觀寺僧道傑將一巫者至家遣求元方與語具述平生之意并詩二首其書疏大抵勸修功德及念佛寫經以為殺生之業罪之大者無過於此十使篇述意蓋聞三界昏寢皆由十使為窟宅六賊攀緣實因五住為猛將致使妄想虛搆惑倒交興萬苦爭纏百憂總萃會名初釋名者一身見二邊見三邪見四戒取五見取六貪七瞋八癡九慢十疑此之十使生死根本第一身見者色心相依名之為身凡愚迷此執為我人是知我見生煩惱之原故涅槃經云如大賊欲劫人時要因內人六塵賊亦復如是欲劫善法要因內有眾生知見常樂我淨不空等相有智之人內無是相又大寶積經云如咽塞病即能斷命一切見中惟有我見即時能斷於智慧命也第二邊見者如中論說生滅故不常相續故不斷離此斷常名為中道故知因果非定斷常於現報中凡愚不觀念念遷滅則是常見不觀念念新生則是斷見若於來報愛未盡著隨業受生六道不定第三明邪見者謂謗無因果乖正名邪一切諸見皆違理起如觀佛三昧經云不信因果斷學般若等重罪過殺八萬父母罪此由邪見感斯重報故中論云邪見有二一言無罪福無佛賢聖捨善為惡二貪著於我分別有無故不得涅槃道第四明戒取者但諸妄執戒定之人隨其別執自有二種一是獨頭所謂直取持戒為道或取苦行為道或取布施為道乃至或取入禪定事以為真道此等直取所行之事不知非道謬執為道二是足上謂有愚人不解正理妄立是非謂己見是取為真道則名戒取此後戒取依前見生前見與後戒取為本戒取所依名為腳足第五明見取者謂取世有漏善法及有漏果於內身不淨謂淨即獨頭見取或己見是餘者非便生心於己見上後更起心取前身見亦名為足上見取故俱舍論云一切有流法聖人所棄捨此見於境僻執堅牢非聖慧刀無由令捨第六明貪使過者或愛自身他身或愛妻子室宅田園或愛善法如愛佛菩提等若依大乘此皆是使第七明瞋使過者大莊嚴論云身如乾薪瞋恚如火未能燒他先自焦身又正法念經云瞋心如火燒一切戒瞋是大斧能破法轎又華嚴經云一切惡中無過是瞋第八明癡使過者若依成論邪心分別無正慧明故曰無明又毗曇論說無明使有其二種一者不共二者相應言不共者於四諦理及色聲香味觸等緣而不了是獨無明二相應無明者一切諸煩惱中無知之心與諸使合名為相應無明此無明在善無記中要觀無性方得漸除迷事取性則成有漏第九明慢使過者慢有八種一直名慢謂我勝彼有恃我心二者大慢謂於等處自謂為大三者慢慢謂於上境謂己勝彼此過最重四者不如慢謂他行德過己彌深雖不如彼凌他多邊五者傲慢謂於父師長上不肯恭敬六者我慢謂於色心無我法中執我自高七者增上慢未得聖而謂已得於此出世增上法中起心生慢八者邪慢謂無德自高恃惡凌人此八慢心皆悉名為慢使煩惱也第十明疑使過者疑有二種一疑事如夜見樹疑為人等此諸事疑若望大乘是暗妄心二者疑理一切世間出世間事皆不能成但起決定心學不須疑上下皆有十使上界雖無麤現瞋使自餘九使皆常具有修得定者雖伏欲結由有此使故不得出世界也迷理部述曰迷理不同良由眾生無始時來流轉生死不能斷漏得出世果致令十使煩惱是能障業四真諦法是所障理言四諦者一苦二集三滅四道生滅無常理實是苦逼迫行者名為苦諦諦是實義審爾不謬故稱為諦有漏善惡皆能生果理是因集名為集諦煩惱盡處名之為滅理實不生名為滅諦觀理除壅此實不虛名為道諦若依毗曇論云身見邊見唯迷苦諦依身苦報計斷計常是故邊見亦迷苦生是故身見不依集起知集非我不名迷集邊見依身亦不依集若論戒取迷苦及道謂精勤苦行能斷生死不知事中苦身是道身苦非是聖道是故戒取有迷苦者有迷道者不迷於集滅是聖果若論邪見見取及疑邪見者謗無因果該凡及聖是謂通迷見取者於自身報取為第一即為迷苦於是善業計為第一即名迷集若取梵天無想天等以為涅槃名為迷滅於彼戒取所言之道取為第一名為迷道因之與果不知有無生疑不決故苦集非道識觀是道方斷戒取正識滅道以為第一不將有漏以為勝好知世可厭方斷見取以見四諦不生疑謗證信決定方斷絕疑邪是故身邊戒見邪疑迷理而生還見理斷不將塵境色聲等事以為我人計斷常等故雖正識色聲等事不斷我心乃至疑使若論負瞋癡慢四使通障見修皆迷理事謂依見起則名迷理若依事生則名迷事故見理時彼瞋則斷依見起癡不知見過後見理時彼癡則斷依見起慢恃見自高後見理時彼慢則斷是故貪等依見起者亦是迷理見理方斷所言貪等依事起者謂依塵境色聲香等於此起貪纏綿難斷故見理時仍有未斷後更修道數數漸除瞑慢癡等依事皆爾此明十使迷理不同斷障部述曰此十使煩惱斷有難易諸惑難識易斷貪等四使易識難除難識者謂凡常迷理易斷者入理即盡若依諸經教人入道多直說觀生滅無我則斷諸結出離生死又如經說緣覺性人不解四諦法門名字直藉事緣觀生無我便斷諸結過諸聲聞於此直作無我觀中雖不作其四諦別解如此觀時具有四諦謂彼所觀有漏報身念念生滅是理苦集從前名苦生後名集知無我時即是見苦爾時無我即斷事集所斷不生即是證滅此能觀智即是聖道是故直觀無我之時具有四諦斷結得出不要別觀四諦方出故成論引經說言如甄叔迦經中說種種得道因緣非但以四諦得道故知入道不要別觀總無我一行亦得若能明見身心無我則是見道斷諸見惑但諸見惑約諦分別三界合說有八十八若學修善者皆知厭貪瞋癡慢於其我心及執戒等不學是過是故難識如涅槃釋我見戒取及以疑等一切眾生於戒取中不見其過故使為結若學觀身心生滅分見無我煩惱薄時即知觀智是斷法道心中六使自然永無謂知色心生滅非人則無我心邊見自斷以觀見理識聖道故正信無疑謗無自斷智慧是道戒等非勝則無戒取見取自斷是故六使難識易斷以難識故無始來迷以易斷故解理則盡不同貪等易識難斷以易識故人多不執以難斷故那舍亦有是故智人學修業者惟修觀解除迷入道若學觀行雖昧名凡少解理時即無妄取若不學解恒迷道法雖修諸善不除邪執非直妄執自不能出多謗正法及行道者以其迷心未識邪正不知他是不與己同即謂己是說他為非是故迷人心無道法多依世善妄執相非故俱舍論云在家由取五塵故與在家起鬥爭出家由取諸見各不同故與出家起鬥爭又成論云若人持戒取為清淨名戒取結即謂所取以為真實餘皆妄語名見取結又戒取是出家人縛諸欲是在家人縛又戒取者雖復種種行出家法空無所得又因此戒取能謗正道及行正道者又戒取是諸外道起憍處知戒取等是世善招生死果故名隨苦非真道法此名十使斷有難易殺生部感應緣三驗梁時有人常以雞卵白和沐云使髮光每沐輒破二三十枚卵臨終但聞髮中啾啾數千雞卵之聲唐京兆殷安仁家富素事慈門寺僧以義寧元年初有客寄其家停止客盜他驢於家殺之驢皮遺安仁家至貞觀三年安仁遂見一人於路謂安仁曰追汝使明日至汝當死也安仁懼徑至慈門寺坐佛殿中經宿不出明日果有三騎并步卒數十人皆兵杖入寺遙見安仁呼出安仁不應而念誦逾進鬼相謂曰昨日不即取今日修福如此何由可得因相與云留一人守之守者謂安仁曰君往日殺驢驢今訴君使我等來攝君耳安仁遙答曰往者他盜自殺驢但以皮與我耳倩君還為我語驢我不殺汝然今又為汝追福於汝有利當捨我也此人許諾曰驢若不許我明日更來如其許者不來矣言畢而出明日遂不來安仁於是為驢追福而舉家持戒菜食云唐顯慶年中長安城西路側店上有家新婦誕一男月滿日親族慶會買得一羊欲殺羊數向屠人跪拜屠人報家內大小不以為徵遂即殺之將肉釜煮令產婦抱兒看煮抱兒前火釜忽然自破釜湯衝灰火直射母子母子俱亡親族及鄰人見者莫不酸切俱斷酒肉暈辛遺物感應緣二驗隋大業八年宜州城有一家姓皇甫居家兄弟四人並皆勤事生業其第二弟名遷於後一時母在堂內取六十錢欲令市買且置床上母向舍後其遷從外來入堂左右顧視不見人便偷錢將出私用母還覓錢不得不知兒將去遂鞭打合家大小大小皆怨至後遷亡託胎家內母豬腹中經由三五月產一豚子次年八月社至得錢六百文賣社家於夜豬以鼻觸婦睧夢云我是汝夫為取婆六十錢枉及合家浪受楚栲令我作豬償債今將賣與社家縛我欲殺汝是我婦何忍不語婦夢忽寤仍未信之復眠還夢如是婦驚著衣向堂報姑姑已起坐還夢同婦兒女亦同此夢母令遷兄并兒持錢一千二百文馳騎急去去舍三十里贖豬社家不肯憑一有識解信敬人委曲贖得既得豬已驅向野田兄語豬云汝審是我弟汝可急前還家豬遂馳走在前還舍唐長安市里風俗每至歲元日已後遞作飲食相邀號為傳坐東市筆生趙大次當設之有客先到向後見其碓上有童女年可十三四著青裙白衫以汲索繫頸泣淚謂客曰我主人女也往年未死時盜父母百錢欲買脂粉未及而死其錢今在廚舍內西北角壁中然我既以盜之坐此得罪今當償命言畢化為青羊白頭客驚告主人主人問其形貌乃是小女死已二年矣於廚壁取得百錢似久安處於是送羊僧寺合門不復食肉邪淫部第一明貪欲滋多如火益乾薪薪火猶離捨愛火燒世間纏綿不可捨第二明觀女不淨汝身自莊嚴華香以瓔珞凡夫所貪愛智者所不惑第三明女人難親可厭女人最為惡難與為因緣恩愛一縛著牽人入罪門又智度論云菩薩觀種種不淨於諸衰中女衰最重火刀雷電霹靂怨家毒蛇之屬獨可暫近女人慳姤瞋諂妖穢鬥爭貪嫉不可親近感應緣一驗晉桓道愍者譙人也晉隆安四年喪婦道愍內顧甚篤纏痛無已其年夜始寢視屏風上見有人手驚起炳炬乃其婦也形貌莊飾具如生平愍了不畏懼遂引共臥言語往還陳敘存亡愍曰卿亡來初無音影今夕那得忽還答曰欲還何極人神道殊各有司屬無由自任耳新婦生時差無餘罪止因疑君憐愛婢使以此姤忌之心受報地獄始獲免脫今當受生為人故來與君別也愍曰當生何處可相尋不答曰但知當生不測何處一為人世無容復知宿命何由相尋求耶至曉涕泗而別惡口部凡夫毒熾恚火常然逢緣起障觸境生瞋乖菩薩之苦心違如來之慈訓故業報差別又百緣經云爾時世尊初成佛便欲教化諸龍王往至須彌山下現比丘形端坐思惟時有金翅鳥王入大海中捉一小龍還須彌頂方欲食啗時彼小龍命故未斷遙見比丘端坐思惟至心求哀尋即命終生舍衛國婆羅門家名曰負梨端正殊玅世所希有因為立字名須菩提年漸長大智慧聰明無有及者唯甚惡性凡所眼見人及畜生則便瞋罵父母親屬皆共厭患無喜見者遂便捨家入山林中乃見鳥及草木風吹動搖亦生瞋恚終無喜心時有山神語須菩提言汝今何故捨家來此山林之中既不修善則無利益虛自疲苦今有世尊在祗洹中有大福德能教眾生修善斷惡今若至彼必能除汝瞋恚惡毒時須菩提聞山神語至祗洹中見佛世尊三十二相八十種好光明普曜如百千日心懷歡喜前禮佛見卻坐一面佛即為說瞋恚過惡愚癡煩惱燒滅善根增長眾惡後受果報墮在地獄備受苦痛不可稱計設復得脫或作龍蛇羅剎鬼神心常含毒更相殘害時須菩提聞世尊說是語已心驚毛豎尋自悔責即於佛前懺悔罪咎豁然獲須陀洹果佛即聽許善來比丘鬚髮自落法服著身便成沙門精進修習得阿羅漢果諸天世人所見敬仰兩舌部感應緣一驗唐咸陽有婦女姓梁貞觀年中死經七日而蘇自云被人收將至一大院內見有大廳有一官人據案執筆翼侍甚盛令人勘問云此婦女合死不有人更齎一案勘云與合死者同姓名所以追耳官人敕左右即放還梁白官人云不知梁有何罪請即受罪而歸官人即令勘案云梁生平惟有兩舌惡罵之罪更無餘罪即令一人括舌一人執斧斫之日常數四凡經七日始送令歸初似落深崖少時如睡而覺家人視其舌上猶大爛腫慳貪部故攝論云慳惜是多財障嫉姤是尊貴障又眾生起貪無過色財第一愛色多過如有人性愛好華不見華莖毒蛇過患即便前捉捉已蛇螫螫已命終墮三惡道第二於財生貪貪財致禍大苦所惱乖背道俗失於親疏故智度論云財物是種種煩惱罪業因緣若持戒禪定智慧種種善法是涅槃因緣又大莊嚴論云我曾昔聞舍衛國中佛與阿難曠野中行於一田畔見有伏藏佛告阿難是大毒蛇阿難白佛是惡毒蛇爾時田中有一耕人聞佛阿難說有毒蛇作是念言我當視之沙門以何為惡毒蛇即往其所見真金聚而作是言沙門所言是毒蛇者乃是好金即取此金還置家中其人先貧衣食不供以得金故轉得富饒衣食自恣王家怪其卒富而糾舉之繫在獄中先所得金既已用盡猶不得免將加刑戮其人唱言毒蛇阿難惡毒蛇世尊傍人聞之以狀白王王喚彼人而問之曰何故唱言毒蛇阿難惡毒蛇世尊其人白王我於往日在田耕種聞佛阿難說言毒蛇惡毒蛇我於今日方乃悟解王聞此說遂放去之佛告王曰過去久遠有迦葉佛入涅槃後時一長者生舍衛國作田家子有辟支佛來詣其家而從乞食時此長者便持食施辟支得食飛空而去長者見已作是誓願持此善根使我世世所生之處不墮三塗常多財寶布施已後復生悔心後所生處雖處富貴不得食此極富之樂如盧至長者經云昔佛在世時舍衛城中有一長者名盧至其家巨富財產無量由於往昔施勝福田故獲斯報然其施時不能志心故今雖富意長下劣所著衣裳垢弊不淨食則糠菜以充其饑渴唯飲水行乘朽車勤營家業猶如從僕常為世人所笑後於一時城中人民大作節會盧至見已便生念言彼既歡會我亦當爾即疾歸家自開庫藏取得五錢用兩錢買兩錢沽酒一錢買蔥取鹽一把衣衿褁之齎出城外趣一樹下見多象馬恐來搏撮即詣塚間復見豬狗尋更逃避至空靜處酒中鹽薑和飲之時復嚙蔥即時大醉醉已起舞揚聲而歌我今節慶會縱酒大歡樂逾過毗沙門亦勝天帝釋時值帝釋與諸天眾欲至佛所遇見盧至醉舞而歌罵辱於我我當惱之即變己身作盧至形往到其家聚集母妻眾婢眷屬於母前坐而白母言我於前後有大慳鬼隨逐於我使我慳惜不著不啗不與眷屬皆由慳鬼今日出行值一道人與我好咒得除慳鬼然此慳鬼與吾相似彼若來者當好行棒其必詐稱我是盧至一切家人莫信急當閉門慳鬼倘來待我所作然後開門即作好食合家充飽復開庫藏出諸財寶衣服瓔珞賜與母妻居家眷屬及施餘人訖已人聞盧至慳鬼得除皆來觀看盧至酒醒歸家到門聞歌舞聲極大驚愕打門叫喚都無聞者帝釋聞喚語眾人言打門喚者或是慳鬼人聞慳鬼開門走避盧至得入居家眷屬悉皆不認言是慳鬼即便捉腳倒曳打棒驅令出門到巷大哭唱言怪哉我今身形為異於本為不異本何故家人見棄如是言我是鬼都不見認請諸人等更看我面我今實是盧至爾時諸人聞是語已皆悉同心咸言盧至汝今云何欲何所為盧至云願為我證我欲見王王聞愍念語傍人言知其意者當代道之傍人答王不知何人形貌相似至其家中詐稱盧至家人皆信散用財物一切蕩盡家人不識打棒驅出反如路人王聞遣使喚相似者並立王前王見二人相貌言笑一切相似王謂後者是其盧至語前者言我是盧至彼非盧至王問後者盧至慳貪汝好惠施云何稱言是盧至耶即答王言我聞佛法慳貪之者墮餓鬼中百千萬歲受饑渴苦畏怖因緣故捨慳貪王言實爾如似垢衣灰洗即淨煩惱垢心聞法即除王見是已即別二人置於異處各遣條牒親屬頭數種種財物速書將來二人持盡隱密之事及以書跡悉皆相似王不能別王喚母問母語王言此是我兒彼非我子是慳鬼也王復問母頗見身上瘡瘢里子私密之事可識不母答王言兒在脅下有小瘡瘢猶小豆許王遣脫衣高舉臂看見兩瘡瘢大小相似王見大笑怪未曾有深自克責一切眾生愚暗所覆不別其偽如此之事唯佛能了即以二人置於象上共至佛所請決所疑爾時世尊語帝釋言汝作何事帝釋即滅盧至身相還復本形種種光明合掌向佛佛語帝釋一切眾生皆有罪過宜應放捨佛語盧至汝還歸家看汝財物盧至白佛所有財物帝釋用盡歸家何為帝釋語言我不損汝一毫財物盧至語言我不信釋唯信佛語以信佛故即便得須陀洹果又百緣經云佛在王舍城迦蘭陀竹林爾時目連在一樹下見一餓鬼身如燋柱腹如太山咽如細針髮如錐刀纏刺其身諸支節間皆悉火然渴乏欲死唇口乾燋欲趣河泉變為涸竭假令天降甘露墮其身上皆變為火目連即問業緣爾時世尊告目連言此賢劫中波羅柰國有佛出世號曰迦葉有一沙門涉路而行極患熱渴時有女人名曰惡見井傍汲水往從乞水女報之曰使汝渴死我終不與於時沙門既不得水服道而去時彼女人有來乞者終不施與其後命終墮餓鬼中以是業緣受如是苦邪見部又中阿含經云佛告比丘若凡愚人作身惡行口惡行意惡行命終之後生於惡趣泥犁之中受極苦痛而不命終要令惡盡乃得出耳地獄罪畢生於種種畜生之中常處暗冥共相啗食受苦無量畜生罪畢或生人中貧窮下賤為他役使形貌醜陋耳根殘缺或復短命若作惡業身死還生在泥犁中輪轉無窮佛告比丘若智慧人身作善行口善行意善行命終生於善處天上一句受樂如轉輪王與七寶俱人間四妙佛告比丘此為樂不比丘答佛一寶一妙猶為極樂何況七寶四妙居耶醒世卷八目錄細觀禪戒人可不思自過自悔劫孽應時立滌六度篇布施法施財施勸持戒感應錄勸忍精進策修感應緣二驗禪定部述意引證頭陀感應緣二驗智慧感應緣二驗懺悔篇述意會意儀式洗懺感應緣二驗受戒篇神衛八戒會名功能三聚部戒相優劣感應緣二驗破戒篇引證感應緣二驗受齋篇感應緣二驗破齋感應緣一驗賞罰篇引證感應緣一驗利害篇引證感應緣一驗穢濁篇五辛感應緣一驗便利感應緣二驗酒肉感應緣一驗病苦篇斂念部感應緣三驗捨身篇感應緣三驗送終篇受生感應緣四驗法滅篇五濁雜要篇四依翻譯部附音釋
