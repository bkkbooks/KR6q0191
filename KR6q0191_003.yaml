body:
  text: 武原居士徐昌治覲周編輯古金粟住持行元百癡校閲敬佛篇念佛部觀佛三昧經云佛有三十二相八十種好身真金色光明無量時座下有五百釋子以罪障故見佛色身猶如灰色嬴婆羅門見已號哭自拔頭髮舉手投地鼻中血出佛安慰曰汝弗號哭吾為汝說過去有佛名毗婆尸入涅槃後於像法中有一長者名日月德有五百弟子聰明多智無不貫練其父長者信敬三寶嘗為諸子說佛法義諸子邪見都無信心後時諸子同遇重病父到兒前泣淚合掌語諸子言汝等邪見不信佛法今無常刀割切汝身為何所怙有佛毗婆尸汝可稱名諸子聞已敬父言故稱南無佛復教稱法及稱僧稱已命終由稱佛故生四天王天天上壽盡以前邪見還墮地獄獄卒羅剎以熱鐵叉刺壞其眼受是苦時憶父教稱念佛因緣從地獄出來生人中貧窮下賤後式佛出亦得值遇但聞佛名不睹佛形後隨葉佛拘樓秦佛拘那含佛迦葉佛亦皆聞名不見其形以聞如是六佛名故今得同生釋種我身端嚴如閻浮金汝見灰色嬴婆羅門皆由前世邪見故爾汝今懺悔見佛金色如須彌山見已白佛我今見佛三十二相八十種好無量光明觀佛部又觀佛三昧經云昔過去久遠無量世時有佛出世號寶威德上王時有比丘與九弟子往諸佛塔禮拜佛像見一寶像嚴顯可觀諦視讚嘆後時命終悉生東方寶威德上王佛國大蓮華中結跏趺坐忽然化生從此已後恆得值佛於諸佛所淨修梵行得念佛三昧海得三昧已佛為授記於十方面各得成佛又過去久遠有佛出世號曰空王入涅槃後有四比丘同學習佛正法煩惱覆心不能堅持佛法當墮惡道空中有聲語比丘言空王如來雖復涅槃汝所犯無救汝等今可入塔觀像與佛在世時等無有異聞空中聲已入塔觀像念言如來在世光明色身與此何異佛大人相願除我罪作是語已五體投地懺悔諸罪後八十億阿僧祗劫不墮惡道生生嘗見十方諸佛於諸佛所受持甚深念佛三昧得悉成佛又迦葉經云昔過去久遠阿僧祗劫有佛出世號曰光明入涅槃後有一國王子名大精進年始十六婆羅門種端正無比有一比丘於白㲲上畫佛形像持與精進精進出家持像入山在畫像前結跏趺坐一心諦觀此畫像不異如來一切諸法亦復如是經於日夜成就五通具足無量得普光三昧具大光明以淨天眼見於東方阿僧祗佛以淨天耳聞佛所說悉能聽受一切諸天散花供養從山而出來至村落為人說法二萬衆生發菩提心無量阿僧祗人住於聲聞緣覺功德父母親屬住不退無上菩提感應緣十驗西晉愍帝建興元年吳郡吳縣松江滬瀆口漁者遙見海中有二人現浮遊水上漁人疑為海神延巫祝備牲牢以迎之風濤彌盛有奉佛居士朱膺聞之嘆曰將非大覺之垂降乎乃潔齊共東靈寺帛尼及信佛者數人至瀆口稽首迎之風波遂靜浮江二人隨潮入浦漸近漸明乃知石像將欲奉接人力未展聊試擎之飄然而起便輿還通玄寺看像背銘一名維衛二名迦葉東晉成帝咸和年中丹陽尹高悝往還市闕每張候橋浦有異光現乃使尋之獲金像一軀西域古製足趺並闕悝下車載像至長干巷口牛不復行悝止御者任牛所往遂徑赴長干寺因安置之像於中宵放金光歲餘臨海縣漁人張係世於海上見銅蓮華趺丹光遊泛乃馳舟接取送安像足恰然符合久之有西域五僧振錫詣悝云昔遊天竺得阿育王像至鄴遭亂藏於河濱王路既通尋覓失所近感夢云吾出江東為高悝所得在阿育王寺故遠來相投欲一禮拜悝引至寺五僧見像歔欷涕泣像為放光東晉周玘義興陽羡人晉平西將軍處之第二子也位至吳興太守家世奉佛其女尤精進家僮捕漁忽見金光溢川映流而上當即下網得一金像高三尺許形相嚴明浮水而住牽排不動馳往白玘玘告女乃以人船送女往迎手挽即得上船在家供養女夕夢佛左膝痛覺看像膝果有穿處便截金叉以補之玘女後適張澄將像自隨及病卒內外咸見紫雲下迎上升虛空東晉名臣陶侃字士行建旟南海有漁人每夕見海濱光因以白侃遣尋俄見金像凌波而趣船側檢其銘勒乃阿育王所造文殊師利菩薩也昔傳云育王既統此洲學鬼王制獄酷毒尤甚文殊現處鑊中火熾水清生青蓮華王心感悟即日毀獄造八萬四千塔建立形像此其一也初侃未能深信因果既嘉此瑞遂大尊重乃送武昌寒溪寺沙門慧遠敬服威儀迎入廬岫隨末賊發衆僧四散有一老僧依瑞像住於時賊寇擾江州執僧索金僧曰無可得乃以火炙僧曰徒受炙死穢臭伽藍何如寺外賊將出欲煞僧曰行年七十不負佛教待正念已申頸時可下刀賊然之見申頸受刀即便下斫刀反刺賊心刃出於背群賊奔怕東走至遠師墓於時天氣清朗忽有雲如蓋雷電四繞遂震霹賊死六人由是賊徒不敢入山魏天平中定州募士孫敬德防於北陲造觀音金像年滿將還嘗如禮事後為劫賊引禁於京獄不勝拷掠遂妄承罪並斷死刑明旦行決其夜禮拜懺悔淚下如雨少時依稀如夢見一沙門教誦觀世音救生經經有佛名令誦千遍得度苦難敬德欻覺起坐緣之了無參錯比至平明已滿九百有司執縛向市且行且誦臨欲加刑誦滿千遍執刀下斫刀折三段不損皮肉易刀又斫凡經三換刀折如初監當官人莫不驚異具狀聞奏丞相高歡表請其事遂得免死敕寫此經傳之所謂高王觀世音是也敬德放還設齊報願出行訪像乃見項上有三刀痕宋元嘉中江陵支江張妹僧定幼而奉法志欲出家嘗供養小形金像而父母逼嫁見誓志不行遂密許邴氏及羔鴈既至女悲呼不就燒香伏地取死此像遂放金光彌晃一村父兄驚其通感止不嫁之張邴二門因大敬信僧定令之出家宋丞相南郡王鎮陝乃以其居建精舍齊徐州刺史王仲德於彭城宋王寺造丈八金像相好嚴華時流汗則難起郡人常以候之齊建元初像復流汗其冬魏寇淮上時兗州數郡起義南附鳩略甚衆亦驅迫沙門助其戰守魏軍屠其營壘悉欲夷滅表奏魏臺誣以助亂須及斬決時像大汗殿地流濕魏徐州刺史梁王奉法勤勤至寺親使人以巾帛拭隨出不已至數十人交手兢拭猶不能止王乃燒香拜禮執巾咒曰衆僧無罪誓自營護必不羅禍若幽城有感當隨拭即止言已自拭果應手而燥王具事奏聞下詔原宥梁祖武帝以天鑒元年正月八日夢檀像入國因遣決勝將軍郝騫謝文華等八十人往達祈請舍衛王曰此中天正像不可適邊乃令三十二匠更剋紫檀人圖一相卯時運手至午便就相好具足而像頂放光降微細雨并有異香普為衆生利益騫等負像行數萬里備歷艱關又度大海冒涉風波隨浪至山糧食又盡所將人衆及傳送者身多亡歿逢諸猛獸一心念佛乃聞像後有鐘聲岩側有僧端坐樹下騫登負像下置其前僧起禮像騫等禮僧僧授澡灌令食並得飽滿僧曰此像名三藐三佛陀金毗羅王自從至彼大作佛事語頃失之至天鑒十年四月五日騫等達於楊都帝與百僚徒行四十里迎還太極殿建齊度人大赦斷煞但是弓刀槊等並作蓮花塔頭帝由此蔬食絶欲隋開皇中蔣州興皇寺佛殿被焚當陽丈六金銅大像并二菩薩正當棟下於時焰火大盛衆人拱手嗟悼大像融滅忽見欻起移南一步棟梁摧下像得全形四面磚木炭等皆去像身五六尺許雖被火焚而金色不變大衆咸駭今移在白馬寺鳥雀無踐至唐永徽二年盜者欲利像銅乃鋸窗櫺斷將欲拔出遂被壓腕求拔不得脫至曉僧問盜者云有一人著白衣在堂內撮手求脫不得隋時凝觀寺僧法慶開皇三年造夾紵釋迦立像高丈六功未畢慶遂卒其日又有寶昌寺僧大智死經三日而便蘇活遂向寺僧說云於閻羅王前見僧法慶甚有憂色少時之間又見像來王前王遽走下階合掌禮拜此像像謂王曰法慶造我功未畢奈何令死王自顧問一人曰法慶合死未答曰命未合終而食料已盡王曰可給荷葉令終其福業也大智甫說令於凝觀寺看之須臾之間遂見法慶蘇活法慶蘇後嘗食荷葉以為佳味及噉餘食終不得下像成之後數年乃卒唐乾封二年西明寺道宣律師在京師城南淨業寺修道忽有一天來至問答復有天來云弟子迦葉佛時生在初天在韋將軍下諸天貪欲所醉弟子以宿願力不交天欲清淨梵行偏敬毗尼韋將軍童真梵行不受天欲一王之下有八將軍四王三十二將周四天下往還護助諸出家人四天下中北天一洲少有佛法餘三天下佛法大弘然出家之人多犯禁戒少有如法南方一洲雖多犯罪化令從善心易調伏佛臨涅槃親受付囑並令守獲不使魔嬈又問今西京城西高四土臺如何答云高四土臺者其本迦葉佛於此第三會說法度人至穆王時文殊目連來化穆王從之即列子所謂化人者是也秦穆公時扶風獲一石佛穆公不識棄馬坊中穢汙此像公染疾夢遊上帝極被責疏覺問侍臣由余便答云臣聞周穆王時有化人來此土云是佛神穆王信之於終南山造中天臺高千餘尺又於蒼頡臺造神廟公今所患殆非佛為之耶公聞大怖語由余曰吾近獲一石人衣冠非今所製棄之馬坊將非此是佛神耶由余聞往視之對曰此真佛神也公取像澡浴安清淨處像遂放光公大怖問由余答曰臣聞佛神清淨愛重物命所有供養燒香而已公遂於土臺上造重閣高三百尺時人號之高四臺又問目連舍利弗佛在已終如何重見答曰同名六人此目連非大目連也至宇文周時文殊師利化為梵僧來遊此土云欲禮拜迦葉佛說法處并往文殊所住之處名清涼山又問今五臺山中臺之東南三十里見有大孚靈鷲寺兩臺隔澗猶存南有華園可二頃許四時發彩色類不同四周樹圍人移華栽別處種植皆悉不生唯在園內方得久榮或云漢明所立或云魏孝文帝栽植如何為實答云但是二帝所作昔周穆之時已有佛法此山靈異文殊所居周穆於中造寺供養及阿育王亦依置塔漢明之初摩騰法師是阿羅漢天眼亦見有塔請帝立寺其山形像似靈鷲名曰大孚孚者信也由帝深信佛法立寺勸人豈唯五臺獨驗今終南太白太華五嶽名山皆有聖人微應又問今涼州西番和縣山裂像出何代造耶答云迦葉佛時有利賓菩薩見此山人不信業報以煞害為事於時菩薩勸化諸人便欻回心信敬於佛所有煞具變成蓮華又問漢地所見諸瑞像多傳育王第四女所造其實云何答曰育王第四女厥貌匪妍久而未出常恨其醜乃圖佛形相還如自身成已發願佛之相好挺異於人如何同我之形儀也以此苦邀彌經年月後感佛現忽異本形父具問之述其所願今北山玉華荊州長沙楊都高悝及京城崇敬寺像並是育王第四女造又問幽冥所感俗中常有神去形朽如何重來或經七日多日如生不異答曰人稟七識識各有神心識為主主雖前去餘神守護不足怪也如五戒中一戒五神五戒便有二十五神一戒破五神去餘者仍在如大僧受戒戒有二百五十神亦戒戒之中感得二百五十防衛比丘若毀一重戒但二百五十神去餘者恆隨彌陀部業因具引經論十說不同或說一行而生淨土如涅槃經云有德國王覺德比丘為護法因緣生不動國又維摩經云直心是菩薩淨土或說二行而生淨土如梁攝論云出世善法者無分別智及後得智所生善根為出世善法或說三行而生淨土又觀經云令未來一切凡夫生極樂國當修三業一孝養父母事師不煞二受三歸具足衆戒三深信因果讀誦大乘如是三事是名淨業或說四行而生淨土如維摩經云行四無量心是菩薩淨土或四攝法是菩薩淨土謂布施愛語利益同事解脫所攝衆生來生其國或說五行而生淨土如淨土論云一者禮拜二者讚嘆三者作願四者觀察五者回向或說六行而生淨土如維摩經云布施是菩薩淨土乃至智慧是菩薩淨土或說七行而生淨土如維摩經云布以七淨華浴此無垢人一者戒淨二者定淨三者見淨四者度疑五者道非道淨六者行淨七者行斷智淨前二是方便道次三是見道次一是修道後一是無學道或說八行而生淨土如維摩經云成就八法生於淨土一饒益衆生代衆生受諸苦惱二所作功德盡以施之三等心衆生謙下無礙四於諸菩薩觀之如佛五所未聞經聞之不疑六不與聲聞而相違背七不嫉彼供不高己利八常省己過不訟彼短恆以一心求諸功德或說九行而生淨土如無量壽經云略說三輩廣說九品或說十行而生淨土如維摩經云十善是菩薩淨土又彌勒發問經云若欲樂生安養國者當修十念即得往生何等為十一者於一切衆生常生慈心二者於一切衆生不毀其行三者於一切衆生深起悲心除殘害心四者護法不惜身命於一切法不生誹謗五者於忍辱中生決定心六者深心清淨不染利養七者發一切種智心日日常念無有廢忘八者於一切衆生生尊重心除憍慢心九者不生染著心不生憒鬧散亂心十者常念觀佛除去諸相彌勒當知如是十念一一次第相續而起不生彼國無有是處或說三十七品是菩薩淨土如無量壽經云發四十八大願而生淨土感應緣二驗宋魏世子者梁郡人也奉法精進兒子遵修唯婦迷閉不信釋教元嘉初女年十四病死七日而蘇云可安施高座并無量壽經世子即為具設經座女先雖齊戒禮拜而未嘗看經即升座轉讀聲句清利下啓父言兒死便往無量壽國見父兄及己三人池中已有芙蓉大華後當化生其中唯母獨無不勝此苦故歸啓報語竟復絶母於是乃敬法隋時有阿彌陀佛五十菩薩像西域天竺之瑞像也相傳云昔天竺雞頭摩寺五通菩薩往安樂界請阿彌陀佛娑婆衆生願生淨土無佛形像願力莫由請垂降許佛尋影現及菩薩還其像已至一佛五十菩薩各坐蓮華在樹葉上菩薩取葉所在圖寫流布彌勒部受戒若是居家白衣未受戒者先受翻邪三歸日別六時隨時便受顯歸三寶自誓不回必得上生若出家五衆已受得戒但依修行不須別受感應緣一驗梁剡石城山有釋僧護本會稽剡人也少出家便剋意苦節戒行嚴淨後居剡石城隱獄寺寺北有青壁直上數十餘丈當中央有如佛焰光之形上有叢樹曲幹垂蔭護每經行至壁所輒見光明煥炳聞絃管歌讚之聲於是擎爐發誓願博山鐫造十丈石佛以敬擬彌勒千尺之容初就雕剪疏鑿移年僅成面璞頃護遘疾臨終誓第二身中剋果後有沙門僧淑纂襲遺功而資力莫由未獲成遂至梁天監六年有始豐令陸咸夜宿剡溪值風雨晦冥危懼假寐忽夢見三道人來告云若能治剡縣僧護所造石像得成就者必獲平豫咸還都經年稍忘前夢後出門乃見一僧云聽講寄宿自言去歲剡溪所囑猶憶此不咸倒屣咨訪追及百步忽然不見豁爾意解具憶前夢乃剡淡所見第三僧也咸啓建安王王即以上聞敕遣僧佑律師專任像事捨金成造初僧佑未至一日寺僧慧逵夢見黑衣大神翼從甚壯立於龕所商略分數至明旦佑律師至其神應若此普賢部感應緣一驗宋沙門釋道冏扶風好畤人也本姓馬氏學業淳粹弱齡有聲元嘉二年九月在洛陽為人作普賢齊道俗四十許人已經七日正就中食忽有一人褲褶乘馬入至堂前下馬禮佛便見赤光赫然竟天良久而滅冏以七年與同學來遊京師時司空何尚之始搆南澗精舍冏寓居焉夜中忽見四人乘一新車呼冏共載道冏眼閉不覺升車俄見一貴人著帢被箋布單衣坐床燾繖形似華蓋鹵簿從衛可數百人悉服黃衣見冏驚曰行般舟道人精心遠詣祗欲知其處耳何故將來即遣人引送冏還至精舍門外失所送人門閉如故扣喚久之寺內諸僧咸驚相報觀音部感應緣五驗秦徐義者高陸人也少奉法為符堅尚書堅末兵革蜂起賊獲義將加戮害乃埋其兩足編髮於樹夜中專念觀世音有頃得眠夢神謂之曰今事亟矣何暇眠乎義便驚起見守防之士並疲而寢乃試自奮動手髮既解足亦得脫因而遁去百餘步隱小叢草便聞追者交馳火炬星陳牙繞此叢而竟無見者秦畢覽東平人也少奉法隨慕容垂北征陷敵單馬逃竄敵追騎將及覽至心誦念觀世音既得免脫因入深山迷惑失道又專心歸念中夜見一道人法服持錫示以途徑遂得還路安隱至家晉沙門竺法純山陰顯義寺主也晉元興中起寺行牆至蘭上買材路經湖道材主是婦人共至材所議價遂同船俱行既入大湖日暮暴風波浪如山純船小水入命在瞬息乃一心誦觀世音經俄有大舟泛流趣純疑是神力共渡乘之而此小船應時即沒大舟隨波鼓蕩俄得達岸晉沙門釋開逵隆安二年登壟採甘草為羌所執時年大饑羌置達柵中將食之先在柵者十有餘人羌日夕烹俎唯逵尚存逵被執便潛誦觀世音經不懈乎心及明日當見噉其晨始曙忽有大虎遙逼群羌奮怒號吼羌各駭怖迸走虎乃前嚙柵必謂見害既柵穿而不入逵即穿柵逃走遂得免脫魏末魯郡釋法力精苦有志勤營塔寺欲於魯郡立精舍而材不足與沙彌明珍往上谷乞麻一載還行空澤中忽遇野火車在下風恐無得免法力倦眠比寤而火勢已及因舉聲稱觀未遑稱世音應聲風轉火焰尋滅又有法智本為白衣獨行大澤猛火四面一時同至自知必死乃合面於地專稱觀世音怪無火燒舉頭看之一澤之草纖毫並燼唯智所伏僅容身耳因此感悟捨俗出家敬法篇聽法部如付法藏經云佛言一切衆生欲出三界生死大海必假法船方得度脫法為清涼除煩惱熱法是妙藥能愈結病法是衆生真善知識作大利益濟諸苦惱所以然者一切衆生志性無定隨所染督選善則善近惡則惡若近惡友便造惡業流轉生死無有邊際若近善友起諸敬心聽受妙法必能令離三途苦惱由此功德受最勝樂華氏國王有一白象能滅怨敵若人犯罪令象踏殺後時象廄為火所燒移象近寺象聞比丘誦法句經偈便柔和起慈悲心後付罪人但以鼻嗅舌舐而去都不肯殺王見斯已召諸臣共謀此事智臣白王此象近寺必聞妙法今可移近屠肆處繫王用其言象見屠殺惡心猛熾殘害更增是以當知一切衆生志性無定畜生尚爾聞法生慈見殺增害況於人而不染習是故智者宜應覺知見惡須棄睹善宜近勤聽經法又往昔有婆羅門持人髑髏其數甚多詣華氏城中遍行衒賣高聲罵言若不就我買髑髏者我當與作惡名聞也爾時城中諸優婆塞聞畏毀謗便將錢買即以銅箸貫穿其耳若徹過者便與多價其中徹者與價漸少都不通者全不與直婆羅門言髑髏無異何故與價差別不等優婆塞言全徹過者此人生時聽受妙法智慧高勝相與多價其半徹者雖聽經法未善分別故與少直全不通者此人往昔都不聽法故不與價時優婆塞持此髑髏往至城外起塔供養命終之後悉得生天以是因緣當知妙法有大功德是故智者欲得無上安隱快樂應當至心勤聽經法賢愚經云昔佛在世時舍衛國中須達長者信敬佛法為僧檀越衆僧所須一切供給須達家內有二鸚鵡稟姓黠慧解人言語見比丘來先告家內令出迎送阿難後時到長者家見鳥聰黠為說四諦苦集滅道門前有樹二鳥聞法飛向樹上歡喜誦持夜在樹宿野狸所食緣此善根生四王天如是七返生六欲天自恣受樂極天之壽而無中夭後時命終來生人中出家修道得辟支佛一名曇摩二名修曇摩又佛在世時有一比丘林中誦經音聲雅好時有一鳥在樹而聽時為獵師所射命終緣此善根生忉利天自識宿命知因比丘誦經聽法得生此中即持天華到比丘所禮敬問訊以天香華供養比丘比丘具問知其委曲即命令坐為其說法得須陀洹既得果已還歸天上禽鳥聽法尚獲福報無邊況於人信心聽法寧無善報求法部如雜寶藏經云昔有一女人聰明智慧深信三寶嘗請比丘就舍供養後時有一老比丘次到其舍年老根昧素無知曉齊食訖已女人至心求請說法敷坐頭前閉目靜坐比丘自知不解說法趁其泯眼棄走還寺然此女人至心思唯有為之法無常苦空不得自在深心觀察即時獲須陀洹果既得果已向寺求覓欲報其恩然此比丘自審無知倍生慚恥轉復藏避而此女人苦求不已方自出現女人見已具說蒙得道果因緣齎供報恩老比丘聞甚大慚愧深自剋責亦復獲須陀洹果是故行者應當至心求法若至心者所求必獲涅槃經云佛言我念過去作婆羅門在雪山中修菩薩行時世無佛亦無經法時天帝釋觀見菩薩獨在山中修諸苦行即下試之自變其身作羅剎像甚可怖畏住菩薩前口說半偈諸行無常是生滅法菩薩聞偈心生歡喜即從坐起四向顧視不見餘人唯見羅剎即便往問大士何處得此半偈此半偈義乃是三世諸佛正道羅剎答言汝不須問我不食來已經多日處處求索了不能得饑渴苦惱心亂謬語非我本心之所知也菩薩復語若能為我說是偈竟我當終身為汝弟子羅剎答言我今饑逼實不能說菩薩復語汝食何食羅剎言我所食者唯人暖肉其所飲者唯人熱血菩薩聞已即語羅剎但能具足說是偈竟我當以身奉施供養羅剎言誰當信汝為八字故棄所愛身菩薩答言梵釋四王諸佛菩薩能為我證羅剎即說生滅滅已寂滅為樂說是偈已菩薩深思然後處處石壁道樹書寫此偈竟上高樹投身而下未至地頃時虛空中出種種聲爾時羅剎還復釋身接取菩薩安置平地懺悔辭謝頂禮而去緣為半偈捨身因緣超十二劫在彌勒前成無上道又佛言我念過去無量無邊那由他劫此沙婆世界有佛出世號釋迦牟尼為衆生宣說大涅槃經我於爾時心中歡喜即欲供養貧無財物遂行賣身路見一人答言我家作業人無堪者吾有惡病良醫處藥應當日服人肉三兩卿若能以身肉三兩日日見給便當與汝金錢五枚我時聞已歡喜相就取錢往至佛所禮已奉獻然後誠心聽受是經我時暗鈍唯受一偈如來證涅槃永斷於生死若能至心求常得無量樂受是偈已至病人家雖復日日與肉三兩以念偈故不以為痛日日不廢足滿一月其人病瘥瘡亦平復我時見身具足平復即發菩提願以是因緣今得成佛又福德三昧經云昔過去久遠阿僧祗劫有一仙人名曰最勝住山林中具五神通常行慈心欲濟衆生欲滅衆生煩惱邪見能生正見便詣城邑聚落處處推求說法之師時有天魔來語仙言我今有佛所說一偈汝今若能剝皮為紙刺血為墨拆骨為筆書寫此偈當為汝說最勝仙人聞已念言我於無量百千劫中常以無事為他割截受苦無量都無利益我今當捨不堅之身易得妙法歡喜踊躍即以利刀剝皮刺血拆骨為衆生故至誠不虛餘方世界有大慈悲能說法者當現我前說是語時東方普無垢國有佛號淨明王忽住其前放大光明照最勝身苦痛即除平復如故佛即廣為說集一切福德三昧最勝聞法得無礙辨得辨才已為諸衆生廣說妙法令無量衆生住三乘道經千歲後而乃命終生淨名王普無垢國由敬法故今得成佛法師部華嚴經云譬如金翅鳥王飛行虛空安住虛空以清淨眼觀察大海龍王宮殿奮勇猛力以左右翅博開海水悉令兩闢知龍男女有命盡者而撮取之如來應供等正覺亦復如是安住無礙虛空之中以清淨眼觀察法界一切衆生若有善根已成熟者奮勇猛十力止觀兩翅搏開生死大愛海水除滅一切妄想顛倒安立如來無礙之行謗罪部敬福經云善男子經生之法不得顛倒一字重點五百世中墮迷惑道中不聞正法又大集經云若有衆生於過去世作諸惡業或毀於法或謗聖人於說法者為作障礙或抄寫經法洗脫文字或損壞他法或暗藏他經由此業緣今得盲報又大般若經佛言諸善男子女人等書寫般若波羅蜜多甚深經時頻申缺呿無端戲笑互相輕凌身心躁擾文句倒錯迷惑義理不得滋味橫事欻起書寫不終當知是為菩薩魔事又大品經云是人毀呰三世諸佛及一切智起破法業因緣集故無量百千萬億歲墮大地獄中是破法人輩從一大地獄至一大地獄如是遍十方獄受無量苦復至十方他國土生畜生中受破法罪業苦或得人身生盲人家生旃陀羅家生除廁擔死人種種下賤家若無眼若一眼若瞎眼無舌無耳無手所生之處無佛無法無佛弟子何以故種破法業積集厚故又涅槃經云若有不信是經典者現世當為無量病苦之所惱害多為衆生所見罵辱命終之後人所輕賤顏貌醜陋資生艱難常不供足感應緣十驗晉濟陰丁承字德慎建安中為凝陰令時北界居民婦詣外井汲水有番人長鼻深目左過井上從婦人乞飲飲訖忽然不見婦則腹痛有頃率然起坐梵語索紙筆作書得筆便作胡書橫行或如乙或如巳滿五紙投著地教人讀此書邑中無能讀者有一小兒十餘歲婦即指此小兒能讀小兒得書便梵語讀之觀者驚愕以白德慎德慎欲驗其事即遣吏齎書詣許下寺以示舊番番大驚言佛經中間亡失道遠憂不能得雖口誦不具足此乃本書遂留寫之晉周閔汝南人也晉護軍將軍家世奉法蘇峻之亂都邑人士皆東西波遷閔家有大品一部以半幅八丈素反覆書之又有餘經數臺大品亦雜在其中既當避難單行不能盡持去猶惜大品不知在何臺中倉卒應去不展尋搜徘徊嘆吒不覺大品忽自出外閔驚喜晉董吉者於潛人也奉法三世至吉尤精進恆齊戒誦首楞嚴經村中有病輒請吉讀經所救多愈同縣何晃者亦奉法士也咸和中得山毒之病晃兄惶遽馳往請吉董何二舍相去七十里復隔大溪五月中大雨晃兄初渡時水尚未至吉與期投中食比往而山水暴漲不復可涉吉遲回嘆息坐岸良久必欲赴期乃惻然發心自誓曰吾救人苦不計軀命冀如來大士當照乃誠便脫衣以囊經戴置頭上徑入水中量其深淺乃應至頸及吉渡正著膝耳既得上岸失囊經甚惋恨進至晃家三禮懺悔流涕自責俯仰之間便見經囊在高座上吉悲喜取看浥浥如有濕氣開囊視經尚燥如故於是村人一時奉法周祖滅法經籍從灰以後年中忽見五六如茵大者飛上空中飄飄上下朝宰立望不測是何久乃翻下視乃是大品經之十三卷陳嚴恭年弱冠請於父母願得五萬錢往楊州市易父母從之恭船載物去楊州數十里江中逢一船載黿將詣市賣之恭念黿當死因請贖之謂黿主曰我正有五萬錢願以贖之黿主喜取錢付黿而去恭盡以黿放江中其黿主別恭行十餘里船沒而死是日恭父母在家昏時有烏衣客五十人詣門寄宿并送錢五萬付恭父母曰公兒楊州附此錢歸願依數受也父怪愕恭死因審之客曰兒無恙但不須錢故附歸耳恭父受之後月餘恭還家父母大喜既止而問附錢所由恭答無之父母說客形狀及付錢月日乃贖黿之日於是知五十客皆所贖黿也父子驚歎因共往楊州起精舍專寫法華經莊嚴清淨楊州道俗共相崇敬號為嚴法華隋大業中有客僧行至太山廟來寄宿廟令曰此別無舍唯神廡下可宿然而比來寄宿者輒死僧曰無苦也不得已從之為設床於廡下僧至夜端坐誦經可一更聞屋中環珮聲須臾神出為僧禮拜僧曰聞此宿者多死豈檀越害之耶願見護之神曰願師無慮僧因延坐談說問曰聞世人傳說云太山治鬼寧有之耶神曰有之豈欲見先亡乎僧曰有兩同學僧先死願見之神問名曰一人已生人間一人在獄罪重不可喚來若師就見可也僧因起出不遠而至一所多見廟獄火燒光焰甚盛神將僧入一院遙見一人在火中號呼不能言形變不復可識而血肉焦臭令人傷心僧愁愍求出俄而至廟又與神坐因問欲救同學有得理耶神曰可得能為寫法華經者便免既而將曙神辭僧入堂旦而廟令視其僧不死怪異之僧因為說仍即為寫法華經一部經既成莊嚴畢又將經就廟宿其夜神出如初告之曰師為寫經始書題目彼已脫免唐釋遺俗者遊行醴泉山誦法華數千遍至貞觀年因疾將終告友人慧廓禪師曰比雖誦經意望有驗若生善道舌根不朽可為埋之十年發出若舌朽滅知誦無功若舌如初為起一塔生俗信敬言訖而終至十一年依言發之身肉多盡唯舌不朽一縣士女皆共載仰乃函盛舌而起塔於甘谷岸上唐貞觀五年有隆州巴西縣令狐元軌者信敬佛法寫法華金剛般若涅槃等如法潔淨寫了下袟還岐州莊所經留在莊并老子五千文同在一處忽為外火延燒堂宇一時灰蕩軌令家人撥灰其內諸經宛然如故演色不改唯箱袟成灰又覓老子便從火化於時聞見之者莫不嗟異其金剛般若經一卷題焦黑訪聞所由乃初題經時有州官能書其人雜食行急不獲潔淨直爾立題便去由是色焦顯慶中平州有人姓孫名壽於海濱遊獵見野火焰熾草木蕩盡唯有一叢茂草獨不焚燎疑此草中有獸遂以火燒之竟不能著壽甚怪之遂入草間尋覓乃見一函金剛般若經其傍又見一死僧顏色不變唐曹州濟陰縣西二十里村中有精舍至龍朔二年冬十月野火暴起非嘗熾盛及至精舍踰越而過焉比僧房草舍焚燎總盡唯金剛般若經一卷儼然如舊敬僧篇引證普達王經云時有夫延國王號名普達典領諸國四方貢獻王身奉佛法未嘗偏枉嘗有慈心愍傷愚民不知三尊每嘗齊戒輒登高觀燒香還頭著地稽首為禮國中臣民怪王如此共議言王處萬民之尊遠近敬伏發言人從何毀辱威儀頭面著地群臣數數欲諫不敢王敕臣下使嚴駕當行王即與吏民數千人始出宮未遠忽見一道人王便下車卻蓋住其群從頭面著地為道人作禮尋從而還施設飲食遂不成行群臣於是諫言大王至尊何宜於道路為此乞丐道人頭面著地天下尊貴唯有頭面加為國主不與他同王便敕臣下令求死人頭及牛馬豬羊頭於市賣之牛馬豬羊頭等皆售但人頭未售王言賤貴賣之轍使其售如其不售便以丐人如是歷日賣既不售丐又不取頭皆膖脹臭不可近王便大怒語臣下言卿曹前諫言人頭最貴不可毀辱今使賣六畜頭皆售人頭何故丐人無取者王即敕臣下嚴駕當出到城外曠野澤中王有所問群臣人民莫不振悚王即告群臣言卿寧識吾先君時有小兒常執持蓋者否臣下對曰實識有之王言今此小兒何所在對曰亡已久遠乃歷十七年王言此兒為人善惡何如對言臣等常睹其承事先王齊戒恭肅誠信自守非法不言王告諸臣今若見此兒在時所著衣服寧識之否諸臣對曰雖自久遠臣故識之顧使從急還內藏取前亡兒衣來須臾衣至王曰此是不對曰實是其衣王曰今倘見其身為識之不臣下皆默然良久曰臣自弊闍卒睹不別王始欲說本因見道人來到王所王大歡喜道人就坐王叉手具白前緣今故嚴出欲示本末願為國臣民開導愚癡令知真法道人即為臣下說欲知王者本是先王持蓋小兒常隨先王齊戒一日不犯還生為王作子令致尊貴皆由宿行臣下大小莫不僉然曰吾等幸遇道人願遂哀愍乞為弟子道人告曰我師號曰佛具足相好獨步三界教授不虛佛今去此乃六千里須臾語頃道人飛到舍衛國具以啓佛彼國人民甚可愍傷今皆誠心願欲見佛唯垂大慈開示真道佛便許可明日到夫延國佛為王及臣民等說法王聞佛說即意解得須陀洹國中人民聞經皆受五戒十善雜寶藏經云月氏國王名旃檀罽尼吒聞罽賓國尊者阿羅漢字祗夜多有大名稱思欲相見即與諸臣往造彼國於其中路心切生念言吾今為王王於天下一切人民靡不敬伏自非有德何能任我供養作是念已遂便前進彼國有人告尊者言月氏王與諸群臣從遠來相見唯願尊者整衣服共相待接時尊者答言我聞佛語出家之人道尊俗表唯德是務豈以服飾出迎接乎遂便靜默端坐不出於是月氏王至其住處見尊者威德倍生敬信即前稽首卻住一面時尊者欲唾月氏國王不覺前進授唾器時尊者即語王言貧道今者未堪為王作福田也胡為躬自枉屈神駕時月氏王深生慚愧我向者已知非神德何能爾也即便為王略說教法言王來時道好去如來時王聞教已即便還國至其中路群臣怨言我等遠從大王往至彼國竟無所聞王言向尊者為說法來時道好去如來時卿等不解此耶以我往昔持戒布施修造功德以植王種今享斯位復修積善當來之世必重受福故誡我言如是群臣聞已稽首謝教敬益部寶性論云三寶有六義故須敬也一者希有義如世寶物貧窮之人所不能得三寶如是薄福衆生百年萬世不能值遇故名為寶二者離垢義如世真寶體無瑕穢三寶如是絶離諸漏故名為寶三者勢力義如世珍寶除貧去毒有大勢力三寶如是具不思議六神通力故說為寶四者莊嚴義如世珍寶能嚴身首令身姝好三寶如是能嚴行人清淨身故故說為寶五者最勝義如世珍寶譬諸物中勝三寶如是一切世中最為殊勝故名為寶六者不改義如世真金燒打磨鍊不能變改三寶如是不為世間八法所改故名為寶又具六意故須敬也一佛能誨示法是良藥僧能傳通皆利益於我報恩故敬二末代惡時傳法不易請威加護故須致敬三為物生信稟承故敬四示僧尼敬事儀式五令樂供養法得久住故敬六為表勝相故敬感應緣二驗晉沙門釋法安者廬山僧遠法師弟子也義熙末陽新縣虎暴甚盛縣有大社樹下有築神廟左右民居以百數遭虎死者夕必一兩法安嘗遊其縣暮投此村民以懼虎早閉門閭且不識法安不肯受之法安遙之樹下坐禪通夜向曉有虎負人而至投樹之北見安如喜如跳伏安前安為說法授戒虎踞地不動有頃而去至旦村人追死者至樹下見安大驚謂其神人故虎不害自茲以後而虎患遂息晉太原初有燉煌沙門竺曇猷乞食坐禪強志勤業遊會稽剡縣赤城山有群虎來前猷為說法一虎獨眠乃以如意杖打頭有十圍蛇繞之都無怖色又山神捨宅作寺又往赤城山宴坐此山與天台瀑布四明連屬父老云天台有聖寺猷往尋之石橋跨谷青滑難度橫石斷路無由得達因宿橋首聞彼行道唱薩聲便潔齊自勵忽見橫石澗開猷便前度具睹精舍神僧燒香致敬篇功能部藥王藥上經云釋迦牟尼告大衆言我昔無數劫時於妙光佛末法之中出家學道聞五十三佛名聞已合掌心生歡喜復教他人令得聞持他人聞已展轉相教乃至三千人此三千人異口同音稱諸佛名一心敬禮以是因緣功德力故即得超越無數億劫生死之罪其初千人者始從華光佛為首下至毗舍浮佛於莊嚴劫得成佛道即過去千佛是也此中千佛者始從拘樓孫佛為首下至樓至佛於賢劫中次第成佛後千佛者始從日光佛為首下至須彌相佛於星宿劫中當得成佛現在十方諸佛善德如來等亦得聞是五十三佛名故於十方世界各得成佛感應緣一驗唐左監門校尉李山龍以武德中暴亡而心上不冷如掌許家人未忍殯斂至七日而蘇說云當死時被冥收録至一官曹廳事甚宏壯廣大庭內有囚數千人或枷鎖或杻械皆北面立滿庭中吏將山龍至廳下天官坐高床侍衛如王者山龍問吏此何官吏曰是王也山龍前至階下王問汝生平作何福業山龍對曰鄉人每設齊講恆施物同之王曰汝身作何善業山龍曰誦法華經兩卷王曰大善可升階既升廳上東北間有一高座如講座者王指座謂山龍曰可升此座講經山龍奉命至側王即起立曰請法師升座山龍升座訖王乃向之而坐山龍開經曰妙法蓮華經序第一品王曰請法師止山龍即止下座復立階下顧庭內向囚已盡無一人在者王謂山龍曰君誦經之福非唯自利乃令庭內衆囚皆以聞經獲免豈不善哉今放君還去山龍拜辭行數十步王復呼還謂吏曰可將此人歷觀諸獄吏即將山龍東行百餘步見一鐵城甚廣大上屋覆其城城傍多有小窗或大如小盆或如盂碗見諸男女從地飛入窗中即不復出山龍怪問吏曰此諸人者各隨本業赴獄受罪耳山龍聞之悲懼稱南無佛請吏求出至院門見一大鑊火猛湯沸傍有二人坐睡山龍問之二人曰我罪報入此鑊湯蒙賢者稱南無佛故獄中諸罪人皆得一日休息疲睡耳山龍又稱南無佛吏謂山龍曰王放君去可白王請抄王命紙書一行字付吏曰為取五道等署吏受命將山龍更歷兩曹皆取其官署各書一行付山龍龍持出至門有三人謂山龍曰王放君去可遺我等山龍未言吏謂山龍曰王放君不由彼然三人者是前收録君使一人是繩主當以赤繩縛君者一是棒主當以棒擊君頭者一是袋主當以袋吸君氣者見君得還故乞物耳山龍惶懼謝三人曰請至家備物但不知何處送之三人曰於水邊若樹下燒之山龍許諾吏送歸家見親眷正哭經營殯具山龍入至尸傍即蘇後日剪紙作錢帛并酒食自送於水邊燒之忽見三人來謝歸信篇小乘部如涅槃經佛言衆生有二一者有信二者無信有信之人則名可治定得涅槃瘡疣無故無信之人名一闡提名不可治又雜阿含經世尊為婆羅門說耕田偈云信心為種子苦行為時雨智慧為特軛慚愧心為轅正念自守護是則善御者爾時婆羅門聞已發心出家得阿羅漢道大乘部出生菩提心經云爾時迦葉婆羅門白佛言世尊發菩提心者應攝幾許福聚爾時世尊以偈說言若此佛剎諸衆生令住信心及持戒如彼最上大福聚不及道心十六分又涅槃經云佛讚迦葉若有衆生於熙連河沙等諸佛所發菩提心乃能於惡世受持如是經典不生誹謗善男子若有能於一恆河沙等諸佛世尊所發菩提心然後乃能於惡世中不謗是經愛樂是典不能為人分別廣說若有衆生於二恆河沙等佛所發菩提心然後乃能於惡世中不謗是法正解信樂受持讀誦亦不能為他人廣說若有衆生於三恆河沙等佛所發菩提心然後乃能於惡世中不謗是法受持讀誦書寫經卷雖為他說未解深義若有衆生於四恆河沙等佛所發菩提心然後乃能於惡世中不謗是法受持讀誦書寫經卷為他廣說十六分中一分之義雖復演說亦不具足若有衆生於五恆河沙等佛所發菩提心然後乃能於惡世中不謗是經受持讀誦廣為人說十六分中八分之義若有於六恆河沙等佛所發菩提心然後乃能於惡世中不謗是經受持讀誦為他廣說十六分中十二分義若有衆生於七恆河沙等佛所發菩提心然後乃能於惡世中不謗是法受持讀誦為他廣說十六分中十四分義若有衆生於八恆河沙等佛所發菩提心然後乃能於惡世中不謗是法受持讀誦亦勸他人令得書寫自能聽受復勸他人令得聽受感應緣二驗宋袁炳字叔煥陳郡人也秦始末為臨湘令亡後積年友人司馬遜於時曉間如夢見炳來陳敘闊別訊問安否既而謂遜曰如今所見善惡大科略不異也然殺生故最為重禁慎不可犯隋蜀部灌口山竹林寺釋道仙本唐居國人以遊賈為業往來吳蜀集積珠寶向直十萬貫後達梓州牛頭山值僧說法深悟財纍乃沉江頓捨便投灌口山竹林寺出家結志不群端坐靜室寂若虛空時遭酷旱百姓惶憂苗稼失色皆來請祈仙即往龍穴以杖叩門喚曰衆生何為嗜眠如語即寤當時玄雲四合大雨普霑隋蜀王秀作鎮岷洛尋遣追不承命王勃然動色親領兵仗往彼擒之必若固違可即加刃仙聞兵至傍若無人被僧伽梨已端坐禪誦王達山足忽降雨雜注雹雪雷奔水涌須臾滿川軍藏無計並憂沒命事既窘迫乃懺悔歸依遙禮仙德垂雲忽散山路清夷得達仙所王躬盡敬一心歸懺仙為說法重發信心乃殷勤奉請邀還成都至靜寺舉郭恭敬號為仙闍梨士女篇勸導出家造惡極難如陸地行船在家起過即易如海中泛舟又出家修道易為在家修福甚難是知生死易染善法難成又賢愚經云出家功德其福甚多若放男女奴婢若聽人民若自己身出家入道功德無量高於須彌深於巨海廣於虛空佛在世時王舍城中有一長者名曰福增年過百歲家中大小莫不厭賤聞說出家功德無量即來佛所求欲出家值佛不在即便往至舍利弗所舍利弗見老不度如是五百大阿羅漢皆悉不度即出寺門住門閭上發聲大哭世尊後至種種慰喻即告目連令其出家目連即與出家授戒復常為諸年少比丘之所激切便欲投河沒水而死目連觀見以神通力接置岸上問知因緣目連念言此人不以死怖之無由得道即令至心捉師衣角飛騰空虛到大海邊見一新死端正女人見有一蟲從其口出還從鼻入復從眼出從耳而入目連觀已捨之而去弟子問言是何女人答言此是舍衛城中大薩薄婦容貌端正世間少雙其婦常以三奇木頭擎鏡照面自睹端正便起憍慢深自愛著夫甚敬愛將共入海海惡船破沒水而死漂出岸上此薩薄婦由自愛身死後還生在故身中作此蟲也捨蟲身已墮大地獄受苦無量小復前行見一女人自身負銅鑊枝鑊著水以火然沸脫衣入鑊肉熟離骨沸吹骨出在外風吹尋還成人自取肉食福增問師是何女人其師答言舍衛國中有優婆夷敬信三寶請一比丘一夏供養在於陌頭作房安置自辦種種香美飲食遣婢送之婢至屏處選好先食餘與比丘大家覺問汝不偷食不婢答言不比丘食訖有殘與我我乃食之若我先食使我世世自食身肉以是因緣先受華報後墮地獄次小前行見一肉樹多有諸蟲圍唼其身無有空處叫喚啼哭如地獄聲弟子問師是何樹耶目連答言是瀨利吒營事比丘以自在故費用僧物華果飲食送與白衣以是因緣受此華報後墮地獄唼樹諸蟲即爾時得物之人次復前行見一男子獸頭人身諸惡鬼神手執弓弩三隻毒箭鏃皆火然競共射之洞身焦然福增問師此何人耶目連答言此人前身作大獵師多害禽獸故受斯苦於後命終墮大地獄次復前行見一骨山其山高大七百由旬能障蔽日使海陰黑爾時目連於此骨山一大肋上往來經行弟子問師是何骨山師答福增言汝欲知者此即是汝故身骨也福增聞已心驚毛豎惶怖汗出白言願說本來因緣目連告曰生死輪轉無有邊際造善惡業終無朽敗必受其報昔過去時此閻浮提有一國王名曰法增好喜布施持戒聞法慈悲衆生不傷物命正法治國滿二十年其間間暇共人博戲時有一人犯法殺人臣以白王值王戲言隨國法治即依律斷殺人應死尋即殺之王戲罷已問諸臣言罪人何所臣答殺竟王聞是語悶絶躄地水灑乃蘇垂淚而言官臣妓女象馬七珍悉皆住此唯我一人獨入地獄我今殺人當知便是旃陀羅王即捨王位入山自守其後命終生大海中作摩竭魚其身長大七百由旬諸王大臣自恃勢力枉剋百姓殺戮無邊命終多墮摩竭大魚多有諸蟲唼食其身身癢揩山殺蟲汙海血流百里魚一眠時經於百歲饑渴吸水爾時適有五百賈客入海採寶值魚張口一時同聲稱南無佛魚聞佛聲閉口水停賈人得活魚饑命終生王舍城作汝身也魚死之後夜叉羅剎出置海岸肉消骨在作此骨山法增王者汝身是也緣殺人故墮海作魚福增聞已深畏生死觀見故身解法無常得阿羅漢果入道篇引證如雜寶藏經云昔盧留城有優陀羡王聰明解達饒大智慧有一夫人名曰有相端正少雙兼有德行王甚愛敬時彼國法諸為王者不自彈琴爾時夫人在於曲室共王歡戲自恃王寵遣王彈琴自起為舞初舉乎時王素善相睹見夫人死相已現計其餘命不過七日王即捨琴慘然長嘆夫人白王受王恩寵敢於曲室求王彈琴自起為舞用為歡樂有何不適捨琴長歎願王告語王不肯答殷勤不已王以實答夫人聞之甚懷憂懼即白王言我聞石室比丘尼若能信心出家一日必得生天我欲出家願王聽許王愛情重語夫人言至第六日當聽汝去汝有善心求欲出家若得生天必來見我我乃聽去作是誓已夫人許可至六日便得出家受八戒齊即於其日飲石蜜漿腹中絞結至七日旦即便命終乘是善緣得生天上憶本誓故來詣王所光明熾盛遍照王宮時王問言是誰答言我是王婦有相夫人王喜白言願來就座答言我今觀王臭穢叵近但以先誓故來見王王聞是已心開意解而自嘆言今彼天者本是我婦出家一日便得生天神志高遠而見鄙賤我今何故而不出家我曾聞說天一爪甲直一閻浮提地我此一國有何可貪作是語已捨位與子出家修道得阿羅漢又雜譬喻經云昔者兄弟二人居世富貴資財無量志念各異兄好道義弟愛家業其弟見兄不親家業追逐沙門聽受佛經家轉貧困財物日耗恆嫌恨之兄報曰五戒十善供養三寶以道化親不亦孝乎其弟含恚掉頭不信兄見如是更謂弟曰卿貪家事以財為貴吾好經道以慧為珍今欲捨家歸命福田計人寄世忽若飛塵無常卒至為罪所纏是故捨世避危就安弟見兄決志道義寂然無報兄則去家而作沙門夙夜精進坐禪思惟行合經法成道果證弟貪家業未曾為法其後壽終墮於牛中肥盛甚大賈客買取載鹽販之往還數回牛遂羸頓不能復前轉增困頓躄臥不起賈人撾打搖頭才動時兄遊行遙見其弟便謂之曰弟居田宅今身墮牛畜即以威神照示本命即自識知淚出自責由行不善慳貪嫉妒不信佛法輕慢聖衆不依兄語抵突自用故墮牛中疲頓困劣悔當何逮兄知心念愴然哀傷即為牛主說其本末賈人聞之便以施與即將牛去還至寺中使念三寶飯食隨時其命終盡得生忉利天時衆賈客各自念言我等治生不能施與不識道義死亦恐然便共出舍捐其妻子棄所珍玩行作沙門精進不懈皆亦得道又付法藏經云昔尊者羅漢闍夜多將諸弟子詣德叉尸羅城見一烏欣然微笑弟子白師願說因緣尊者答言彼烏者乃往過去九十一劫有佛出世號毗婆尸我於爾時為長者子欲得出家父母不聽強為聘妻既得妻已復求出家父母語我若生一子乃當相放後生一男至年六歲我復欲去父母教兒求抱我腳啼哭而言父若捨我誰見養活先當殺兒然後可去我時於子起愛染心即語子言吾為汝故不復出家從是以來九十一劫流轉五道今以道眼觀見彼烏乃是前子愍其愚癡久處生死是以微笑以是因緣若復有人障他出家此人罪報常在惡道受極苦痛無得解脫惡道罪畢若生人中雙盲無目是故智者若見有人欲出家者應勤方便勸令成就又出家功德經云昔佛在世時佛與阿難入毗舍離城時到乞食有一王子字鞞羅羡那與諸婇女在高樓上共相娛樂佛聞樂音語阿難言我知此人卻後七日必當命終若不出家或墮地獄阿難聞已即往教化勸其出家王子聞勸於六日中極意受樂至第七日求佛出家一日一夜修持淨戒即便命終生四天王滿五百歲後生忉利為帝釋子壽天千歲次生炎摩復為王子壽二千歲後生兜率亦為王子壽四千歲次生化樂為天王子壽八千歲化樂壽盡復生第六他化自在為天王子萬六千歲於六欲天往來七返而無中夭一日出家滿二十劫不墮惡道常生天上受福自然又雜寶藏經云佛在迦毗羅衛國入城乞食到難陀舍會值難陀與婦作粧香塗眉間聞佛門中欲出外看婦共要言出看如來使我額上粧未乾頃便還入來難陀即出見佛佛即敕剃髮師與難陀剃髮難陀語剃髮人言迦毗羅一切人民汝今盡可剃其髮耶佛問剃髮者何以不剃答言畏故不敢為剃佛共阿難自至其邊難陀畏故不敢不剃雖得剃髮恆欲還家佛常將行不能得去後於一日次當守房而自歡喜今真得便可還家去待佛衆僧等多去之後我當還家佛入城後作是念言當為汲水令滿澡瓶然後還歸尋時汲水一瓶適滿一瓶復翻如是經時不能滿瓶便作是言俱不可滿使諸比丘來還自汲我今但著瓶屋中而去適即閉門適一扇閉一扇復開更作是念俱不可閉但置而去縱使失諸比丘衣物我饒財寶足可償之即出僧房而自思惟佛必從此來我則從彼異道而去佛知其意亦從異道來遙見佛來至大樹從藏樹神舉樹在虛空中露地而立佛見難陀問言汝婦端正不答言端正適山中有一老瞎獼猴又復問言汝婦孫陀利面首端正何如此獼猴耶難陀懊惱便作念言我婦端正人中少雙佛今何故以我之婦比瞎獼猴佛復將至忉利天上遍諸天宮而共觀看見諸天子與諸天女共相娛樂見一宮中有五百天女無有天子尋來問佛佛言汝自往問難陀往問諸宮殿中盡有天子此中何以獨無天子耶諸女答言閻浮提內佛弟難陀佛逼使出家以出家因緣命終當生於此天宮為我天子難陀答言即我身是便欲即住天女語言我等是天汝今是人天人路殊且還捨人壽更生此間便可得住便還佛所以如上事具白世尊佛語難陀汝婦端正何如天女難陀答言比彼天女如瞎獼猴比於我婦佛將難陀復至地獄見諸鑊湯悉皆煮人唯見一鑊次沸空停怪其所以而來問佛佛言汝自往問難陀即往問獄卒答言閻浮提內有如來弟子名為難陀以出家功德當得生天以欲罷道因緣天壽命終墮此地獄是故我今吹鑊而待難陀聞已恐怖畏獄卒留即作是言南無佛陀南無佛陀唯願將我擁護還至閻浮提內佛語難陀汝能勤持戒修天福自在難陀答言不用生天今唯願我不墮此獄佛為說法一七日中成阿羅漢當知淫欲之事樂少苦多猶如逆風而熱熾炬愚者不放必見燒害慚愧篇引證三千威儀云出家人所作業務者一者坐禪二者誦經法三者勸化衆事若具足作三業者是真出家不然徒生徒死唯有受罪之因又百喻經云昔有一人事須火用及以冷水即便宿火以澡罐盛水置於火上後欲取火而火都滅欲取冷水而水復熱火及冷水二事俱失世間之人入佛法中出家求道既得出家還念妻子五欲之樂由是之故失其功德之火兼失持戒之水醒世卷四目録拈示神通使人知修行利益獎導篇述意引證說聽篇述意利益部感應緣三驗見解篇感應緣二驗宿命篇引證宿習部感應緣二驗至誠篇求寶部求忍部感應緣三驗神異篇斤通部降邪部胎孕部雜異部感應緣三驗感通篇述意聖跡部住持篇說聽部
