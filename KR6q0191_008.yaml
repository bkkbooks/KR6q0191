body:
  text: 武原居士徐昌治覲周編輯金粟寺住持行元百癡校閲六度篇布施部如涅槃經云菩薩凡行施時不見受者持戒破戒是田非田此是知識此非知識施時不見是器非器不擇日時是處非處亦復不計饑饉豐樂不見因果此是衆生此非衆生是福非福雖復不見施者受者及以財物乃至不見斷及果報而常行施無有斷絶菩薩若見持戒破戒乃至果報終不能施若不布施則不具足檀波羅蜜若不具足檀波羅蜜則不能成阿耨菩提又淨業障經云若菩薩觀慳及施不作二相持戒毀戒不作二相瞋恚忍辱懈怠精進亂心禪定愚癡智慧不作二相是則名為淨諸業障又佛說太子須大拿經云佛告阿難過去不可計劫時有大國名為葉波其王號曰溫波王有二萬夫人了無有子王自禱祠諸神夫人便覺有身至滿十月太子便生字為須大拿至年十六書藝悉備少小以來常好布施太子年大王為納妃名曼坻國王女也端正無比太子有一男一女太子自惟欲作檀波羅蜜出城遊觀帝釋化作貧窮聾盲瘖啞人悉在道邊太子見已愁憂不樂太子白王欲從大王乞求一願不審聽不王答欲願何等不違汝意太子言我願欲得大王中藏所有珍寶置四城門外及著市中以用布施在所求索不逆其意王語太子恣汝所欲太子即輦珍寶著四城門外及著市中恣人所索八方上下莫不聞知千里萬里來者恣意與之時有敵國怨家聞太子好喜布施即會諸臣及衆道士共集議言葉波國王有行蓮華上白象名須檀延者多力健鬥每與諸國共相攻伐此象常勝誰能往乞者有婆羅門道士八人白言我能往乞當給我糧王即給之八人即詣葉波國至太子宮門悉皆柱杖俱翹一腳住自言遠來欲有所乞太子聞之甚大歡喜便出迎之前為作禮因相慰勞問何所求道士答言我聞太子布施名流八方上徹蒼天下入黃泉布施之功德不可量欲從太子乞行蓮華上白象太子即將至廄中令取一象道士等八人言我正欲得行蓮華上白象名須檀延者太子言此大象是我父王之所愛重若與卿者我即失父王意或逐我出國太子即自思惟我前有要在所布施不逆人意今不與者違我本心若不以此象施者何從得成無上平等即敕左右被象金鞍疾牽出來太子左手持水澡道士手右手牽象以授與之歡喜而去太子語道士言卿速疾去王若知者便追奪卿道士八人即便疾去國中諸臣聞以象施怨家皆大驚怖王聞愕然今得天下有此象故此象勝於六十象力而太子用與怨家恐將失國當如之何太子如是布施中藏日空恐舉及其妻子皆以與人王共諸臣議之將欲種種刑罰太子有大臣白王不可但逐出國置野田山中十二年許當使慚愧王即徙太子著檀特山十二年太子白王復願布施七日展我微心乃出國去王言汝正坐布施太劇空我國藏失我敵寶故逐汝耳促疾出去不聽汝也太子白言不敢違戾大王教令我自有財願得布施盡之乃去二萬夫人共詣王所請留太子布施七日乃令出國王即聽之四遠來者恣意與之七日財盡貧者得富萬民歡喜太子辭妻妃聞愕然太子何故乃當是乎太子具答因緣是故逐我曼坻言使國豐溢富樂無極但當努力其於山中求索道耳太子言人在山中恐怖之處汝快憍樂何能忍是妃答太子我終不能相離也王者以幡為幟火者以煙為幟婦者以夫為幟我但依怙太子若有來乞丐者我當應之乃至有人索求是物之者隨太子所施太子言汝能爾大善太子與妃及其二子共至母所辭別欲去母聞感激悲哀語傍人言我身如石心如剛鐵奉事大王未曾有過今有一子而捨我去我心何能不破而死太子與妃及二子俱為父母作禮而去二萬夫人以真珠各一顆以奉太子四千大臣以七寶奉上太子太子從宮出城悉施四遠即時皆盡國中大小數千萬人共送太子觀者皆悉垂淚而別太子與妃俱載自御而去前去已遠止息樹下有婆羅門來乞馬太子即卸車以馬與之以二子著於車上妃於後推太子步挽而去適前行復逢婆羅門來乞車太子即以車與之適前行復有婆羅門來乞太子言我不於卿有所愛惜我財物皆盡婆羅門言無財物者與我身上衣太子即解與之更著一故衣適前行復逢婆羅門來乞太子以妃衣服與之轉前行復逢婆羅門來乞太子以兩兒衣服與之太子布施車馬錢財衣服了盡初無悔心太子自負其兒妃抱其女步行而去去葉波國六千餘里行在澤中大苦饑渴忉利帝釋即於曠澤化作城郭伎樂衣食彌滿城中有人出迎太子便可於此留止妃語太子可止此不太子言父王徙我著檀特山中於此留者違父王命即便出城顧視不復見城到檀特山山下有水深不可度妃語太子且當住此須水減乃度太子言父王徙我著山於此住者違父王教太子慈心水中有山以堰斷水褰衣而度前到山中見山嶔岑樹木繁茂百鳥悲鳴流泉清池美水甘果太子語妃觀是山中亦有學道者太子入山果有一道人名阿周陀年五百歲太子作禮卻住白言今在山中何許有好果泉可止處耶阿周陀言是山中者並是福地所在可止但此山中清淨之處卿云何將妻子來而欲學道乎太子未答曼坻即問道人言在此學道為幾何歲道人言四五百歲曼坻言計有吾我何時得道道人言我實不及此事太子即問道人言頗聞葉波國王太子須大拏不道人言我數聞之但未見耳太子言我正是須大拏也道人問太子所求何等太子答言欲求摩訶衍道人言功德乃爾今得摩訶衍不久也太子得無上道時我當作第一神足弟子道人即指語太子所止處太子即以法道結頭編髮以水果為飲食即作草屋男女別處男名耶利年七歲著草衣隨父出入女名罽拏延年六歲著鹿皮衣隨母出入山中禽獸皆悉歡喜來依附太子空池皆生泉水枯木皆生華葉諸毒皆消果樹並茂太子男女在於水邊與禽獸共戲太子言願令衆生皆得度脫無復生老病死之苦帝釋言大哉所願無上所願特尊非我所及王即遣使促迎太子以王命告太子太子答言王徙我山中一十二年為期今猶一年在年滿當歸使還白王王更作手書以與太子汝是智人去時當忍來時亦忍云何恚我不還太子得書頂戴作禮卻繞七匝便發視之山中禽獸聞太子還跳踉宛轉自撲號呼泉為空竭禽獸為不乳百鳥皆悲鳴太子與妃俱還本國敵國怨家聞太子當還即遣使者裝被白象金銀鞍勒以金鉢盛銀粟銀鉢盛金粟送於道中以還太子辭謝悔過言前乞白象愚癡故耳坐我之故逐徙太子今聞來還內懷歡喜今以白象奉還太子願垂受納太子答言譬如有人設百味食持有所上其人嘔吐在地豈復香潔可更食不今我布施譬亦若嘔還終不受速乘象去謝汝國王苦屈使者遠相勞問於是使者即乘象還白王如是因此象故敵國之怨化為慈仁國王及衆臣等皆發無上平等道意父王乘象出迎太子太子便前頭面作禮從王而歸國中人民莫不歡喜散華燒香以待太子太子入宮即到母前頭面作禮而問起居王以寶藏付太子恣意布施轉勝於前布施不休自致得佛法施智度論云佛說施中法施第一蓋財施有量法施無量財施欲界報法施出三界報財施不能斷漏法施清升彼岸財施但感人天報法施通感三乘果財施唯能施者得福法施通益能所財施但益色身法施能利心神又月燈三昧經云佛言若有菩薩行於法施有十種利益一棄捨惡事二能作善事三住善人法四淨佛國土五趣詣道場六捨所愛事七降伏煩惱八於諸衆生施福得分九於諸衆生修習慈心十見法得於喜樂財施增一阿含經云爾時世尊告諸比丘應時之施有五事益一者施遠來人二者施遠去人三者施病人四者儉時施五者初得新果蓏若穀食等先與持戒精進人然後自食是故欲行此五施當念隨時施若應時淨施者還得應時果報勸持戒感應緣一驗隋江州廬山化城寺釋法充俗姓畢九江人也常誦法華大品末住廬山半頂化城寺修定自非僧事未嘗安履每勸僧衆無以女人入寺上損佛化下墜俗謠然以寺基事重有不從者充歎曰生不值佛已是罪緣正教不行義須早死何慮方土不奉戒乎遂於此山香爐峰自投而下誓粉身骨用生淨土便於中虛頭忽倒垂冉冉而下處於深谷不損一毛寺衆不知後有人上峰頂路望下千有餘仞聞人語聲就而尋之乃是充也身命猶存口誦如故迎還至寺乃斷女人出入忍辱部勸忍又攝論經云由觀五義以除瞋恚一觀一切衆生無始已來於我有恩二觀一切衆生恆念念滅何人能損何人被損三觀唯法無衆生有何能損及所損四觀一切衆生皆是受苦云何復欲加之以苦五觀一切衆生皆是我子云何於中欲生損害由此五觀故能滅瞋又遺教經云能行忍者乃可名為有力大人又云見人之過口不得言己身有惡則應發露書云聞人之過如聞父母之名又云施人慎勿念受施慎勿忘精進部策修又六度集經云佛告弟子當勤精進聽聞諷誦莫得懈怠陰蓋所覆吾念過去無數劫時有佛名一切度王是時衆中有兩比丘一名精進辦一名德樂止共聽法精進辦者聞經歡喜應時即得阿惟越致神通具足德樂止者睡眠不覺獨無所得時精進辦謂德樂止言佛者難值億百千世時乃一出當勤精進為衆善本如何睡眠時德樂止聞其教詔即便經行於祗樹間甫始經行復住眠睡時精進辦便以善權往而度之化作蜂王飛趣其眼如欲蜇之時德樂止驚覺而坐畏此蜂王須臾復睡時蜜蜂王飛入腋下螫其胸腹德樂止驚心中懅悸不敢復睡時泉水中有雜色華種種鮮潔時蜜蜂王飛住華上食甘露味德樂止端坐視之畏復飛來不敢睡眠即得不起法忍解諸法本又法句喻經云昔有比丘日至城外曠野冢間路由他田達過其主見已便興瞋恚此何道人日此往來在吾田中縱橫往來乃成人蹤道人報言吾有鬥訟來求證人故行田中田主宿緣鉤連應蒙得度便逐道人私匿從行見曠冢間尸骸狼藉胮脹臭爛鳥獸食啖散落異處或有食啖盡不盡者似灰鴿色者疽蟲𧉃嗽臭穢難近比丘舉手語彼人曰此諸鳥獸是我證人其人問曰此諸鳥獸何為證人汝今比丘與誰共諍比丘報曰心之為病多諸漏患我觀此骸分別惡露自觀身從頭至足與彼無異然此心意流馳萬端追逐幻為聲色香味細滑之法我今欲誡心之源本汝心當知興起是念無令將吾入地獄餓鬼之中我今凡夫未脫諸縛然此心賊不見從命以是之故日往曠野為說惡露不淨之想復與心說心為卒暴亂錯不定心今當改無造惡緣時彼田主聞道人教以手揮淚哽咽難言然彼田主於迦葉佛十千歲中修不淨想尋時分別三十六物惡露不淨爾時比丘及彼田主即彼曠野大畏冢間得須陀洹道又法句喻經說云昔有清信士供養三寶初無厭極因得疾病醫藥加治不能得差時婦在邊悲哀痛苦共為夫婦獨受斯痛卿設無常我何所依兒女孤單何所恃怙夫聞悲戀應時即死魂神還在婦鼻中化作一蟲婦甚啼哭不能自止時道人往與婦相見知壻命過鼻中作蟲故欲諫喻令損愁憂婦見道人來增益悲哀時婦洟鼻蟲便墮地婦即慚愧欲以腳踏道人告曰止止莫殺是卿夫壻化作此蟲婦白道人我夫奉經持戒精進何緣壽終墮此蟲中道人答曰用卿恩愛悲哀呼嗟起恩愛心戀慕愁憂用是壽終即墮蟲中道人為蟲說經卿精進奉經持法福應生天在諸佛前但坐恩愛戀慕之想墮此蟲中亦可慚愧蟲聞其言心開意解即得上生感應緣二驗晉始豐赤城山有法猷燉煌人少居苦行習禪定後遊江左止剡之石城山乞食坐禪嘗到一蠱家乞食猷咒願竟忽見蜈蚣從食中跳出猷快食無他後移始豐赤城山石室坐禪有狼虎數十蹲在猷前猷誦經如故一虎獨睡猷以如意扣虎頭訶何不聽經俄而群虎皆去有頃壯蛇競出大者十餘圍循環往復舉頭向猷經半日復去後一日神現形語猷曰法師威德既重來止此山弟子輒推室以相奉猷曰貧道尋山願得相值何不共住神曰弟子無為不爾但部屬未狎法化率難制御遠人來往或相侵觸人神道異是以去耳猷曰本是何神居之久近欲移何處去耶神曰弟子夏帝之子居於此山二千餘年韓石山是家舅所治當往彼住尋還山陰廟臨別執手贈猷香三奩於是鳴鞞吹角陵雲而去赤城山有孤巖獨立秀出千雲猷搏石作梯升巖宴坐接竹傳水以供常用禪學造者十有餘人王羲之聞而故往仰峰高挹致敬而返赤城巖與天台瀑布靈溪四明並相連屬而天台懸崖峻峙峰嶺切天古老相傳云上有往時精舍得道者居之雖有石橋跨澗而橫石斷入且莓苔青滑自終古以來無有得至者猷行至橋所聞空中聲曰知君誠篤今未得度卻後十年自當來也猷心悵然夕留中宿聞行道唱布薩聲且復欲前見一人鬚眉皓白問猷所止猷具答意公曰君生死身何可得去吾是山神故相告耳猷乃退還宋沙門僧規者武當寺僧也時京兆張瑜常請規在家供養永初元年十二月五日規無痾忽暴死二日而蘇說云五更中聞門巷間嘵嘵有聲須臾見有五人炳炬火執信幡徑來入屋便以赤繩將去行至一山都無草木山側左右白骨填積俄至一城有屋數十屋前有立木長十餘丈上有鐵梁形如桔槔左右有匱貯土土有品數有一人衣幘並赤語規曰汝生世時有何罪福依實說之赤衣人如局吏云可開簿檢其罪福也有頃吏至長木下提一匱土懸鐵梁上稱之如覺低昂吏謂規曰此稱量罪福之稱也汝福少罪多應先受罪俄有一人衣冠長者謂規曰汝沙門也何不念佛我聞悔過可度八難規於是一心稱佛衣冠人謂吏曰可更為此人稱之既是佛弟子幸可度脫吏乃復上匱稱之稱乃正平又有一人朱衣玄冠佩印綬執玉板來曰算簿上未有此人名也監官愕然命左右收録云須臾見反縛向五人來監官曰殺鬼何以濫將人來乃鞭之少頃有使者稱天帝喚道人來既至帝宮經見踐歷略皆金寶精光晃昱不得凝視帝左右朱衣寶冠飾以華珍帝曰汝是沙門何不勤業而為小鬼橫收捕也規稽首諸佛祈恩請福帝曰汝命未盡今當還生宜勤精進勿屢遊白衣家殺鬼取人亦多枉濫規曰橫濫之厄當以何方而濟免之帝曰廣設福業最為善也若不辦爾可作八關齊生免橫禍死離地獄語畢遣規去因還瑜家而蘇禪定部述意夫神通勝業非定不生無漏慧根非靜不發故經曰深修禪定得五神通心在一緣是三昧相書亦有言當使形如枯木心若死灰攝心一處便是功德叢林散意片時即名煩惱羅剎引證如法句經心意品說云昔佛在世時有一道人在河邊樹下學道十二年中貪想不除走心散意但念六欲目色耳聲鼻香口味身受心法身靜意遊曾無寧息佛知可度化作沙門往至樹下共宿須臾月明有龜從河中來至樹下復有水狗饑行求食與龜相逢便欲啖龜龜縮其頭尾及其四腳不能得啖水狗小遠復出頭足行步如故於是道人問化沙門此龜有護命之鎧水狗不能得其便化沙門答言吾念世人不如此龜不知無常放恣六情外魔得便形壞神去生死無端轉輪五道苦惱百千皆意所造宜自勉勵求滅度安頭陀夫五欲蓋纏並是禪障既能除棄其心寂靜堪能修道故明十二頭陀少欲知足無過此等西云頭陀此云抖擻能行此法即能抖擻煩惱去離貪著一盡行乞食二受阿練若三著糞掃衣四一坐食五常坐六食後不受非時飲七但有三衣八毳衣九隨敷坐十樹下住十一空地住十二死人間住感應緣二驗隋蓋州響應山寺釋法進為輝禪師弟子於竹林坐禪有四老虎繞於左右師後教為水觀家人取柴見繩床上有好清水拾兩白石安著水中進暮還寺彌覺背痛具問家人云安石子語令明往所除此石及旦進禪家人還見如初清水即除石子所苦便愈唐長安普光寺僧慧融字圓照俗姓張氏南陽人也幼而精進不犯微惡少年落髮即樂禪伍常隱居泰山後奉敕入京住普光寺時遊終南山逢雪深厚不能得進忽有一虎近前弭耳俯伏慧融知其意乃乘之虎遂負融而上常有雙鳥於山林中前行引路至永徽初寺僧於慧融房舍上見五色光起及於山中焚身肌骨總銷惟心不爛智慧部感應緣三驗唐襄州紫金寺釋慧稜姓申屠凡有法論皆令覆述吐言質朴談理入微時人同號得意稜也至貞觀十四年正月半襄州有感通寺昶法師曰夢見閻羅王請稜公欲講三論昶公講法華如何稜曰善哉慧稜發願常處地獄教化衆生講大乘經既有此徵斯願畢矣至十月半黃昏時遂覺不愈告弟子曰吾五臟已崩無有痛所四更起坐告寺主寶度曰憶年八歲往龍泉寺借觀音未至耆闍已講三遍皎如目前說言未訖外有大聲告曰法師早起燒香使人即到度曰何人答曰閻羅王使迎稜法師來即起燒香洗浴懺悔禮佛訖還房中與度別食粥未了便取一生私記焚之至小食時異香忽來稜斂容便卒唐京師會昌寺釋空藏姓王氏先祖晉陽今在雍州之新豐縣母初孕之日自然不食酒肉葷辛不嘗既誕之後靈鑒日陳情用高遠讀誦經論恩存拔濟聰勤無比日誦萬言至年長大總誦經論三百餘卷抄摘衆經大乘要句十有餘卷流行於世賢劫千佛日禮一遍春夏方等常坐不臥寸陰不虧唐蕭氏是司元大夫崔義起妻蕭鏗女也蕭氏為人妒忌多瞋好打僕婢不信業報至麟德元年從駕洛陽到二年正月身亡死在地獄蕭氏手下常所愛婢名閏玉年可十八容貌端正性識聰敏信樂佛法至二月家內為夫人設三七日齊僧正食時夫人自來看枷項鎖腰獄卒衛從餘人不知唯此婢見夫人靈著此婢言音共夫人生平語音無異使傳語向家內大小云吾適崔家已來為性多瞋橫生嫉妒好打僕婢兼不信因果今至地獄受罪極重備經諸苦聞家內今三七日為吾設齊請求獄官放一日假暫來看齊語汝男女合家大小吾自共汝同住已來身三口四意怒三毒好瞋打汝兼嫉妒大夫所看婢妾種種不善發起惡業今受報苦願汝男女合家大小內外眷屬從汝懺悔願施歡喜然汝男女憶吾乳餔之恩將吾平生受用資具速捨修福望拔冥苦至七七日為我設齊令此功德早得成就吾至齊日更請官人望得復來語大夫及兒女等大夫生平急性多瞋不得過分瞋打侍婢勸信三寶恭敬上下修持齊戒臨去之時語男女云吾且將閏玉去使在地獄看吾受罪苦痛如何經五六日放回來令汝男女知吾受罪苦痛虛實作此語已閏玉即死唯心上暖身臥在地此婢即至地獄見一大殿院門嚴兵守衛云是王殿行至東院別見一廳上有大官人云是斷罪官復過廳院東有地獄夫人語婢云汝看吾受罪之苦即有種種獄卒羅剎撲擲夫人屠割身肉鑊湯煎煮煮已還活活已復歷諸獄鐵鉺抽舌鐵鳥啄之復臥鐵床飛鳥猛火一時著身死已還活活已復受諸苦夫人蘇已即見其父蕭鏗乘紫金蓮華座騰空而來鏗生平已來及歷任諸官皆不食酒肉葷辛常誦法華經日別一遍恭敬三寶晝夜六時禮誦無闕今生善處見女受苦故來語云吾生平之日每勸汝生信止怒汝不用吾語今致其殃汝復何因將此婢來女報父言為兒生平不信今受罪苦故將此婢看兒受罪輕重令傳向家內男女使其生信父聞即語女言吾雖生善處未能全救汝苦汝努力自勵發心兼籍家內福善共相助佐決望得出上升人天忽有一婆羅門師年少端正亦乘空而來語夫人曰由汝不信因果今受罪苦未知此婢性識何如吾欲教誦經使傳家內令世人生信夫人報云請師但教此婢師即先教金剛般若初受二三行漸得一紙半紙復教誦藥師法華一受不忘此之三部皆作梵音文詞典正音韻清亮文句皆熟即已放歸語云汝至家內逢人為誦令覓婆羅門善梵語者試看誦之見女獠婢尚能誦得三本梵經豈可不生信心倘得一人回邪入正非但夫人得福亦令汝後報不入三塗受語至家醒了如舊即集家內尊卑具說夫人地獄罪苦即臥地作夫人在地獄受苦之事或云看夫人吞熱鐵丸開口咽之口赤腹熱如火或云看夫人受鐵犁耕舌出舌二三尺餘或云看夫人受鐵床苦身體紅赤熱氣如火如是變現種種痛苦相已然後蘇醒復說見夫人父誡敕之事復說見婆羅門教誦經意夫人得出地獄上升天報此婢即為家內正坐而誦文文句皆作梵音聲氣清亮令人樂聞室家大小見此善惡靈驗罕所未聞男女大小五體自撲號哭哀慟逾痛初亡道俗郡官聞者皆勸易心歸信齊戒不絶懺悔篇引證如最妙初教經云佛告舍利弗我憶往昔有一比丘名曰欣慶犯四重禁來至僧中九十九夜懺悔自責罪業即滅戒根即生會意部問經說懺悔能滅罪業云何唯說觀理智心能滅諸業釋言懺悔有二一是迷心依事懺悔謂佛像行道禮敬發願要期斷除事惡二是智心依禮懺悔謂觀身心斷除結使但所造業有輕有重若論輕業事懺亦滅若論重業有轉者亦能轉重令輕又大寶積經云百千萬劫久習結業以一實觀即皆消滅又諸法無行經云若菩薩能見一切衆生性即涅槃性則能畢竟滅障罪故又普賢菩薩經云觀心無心從顛倒想起如此想心從妄想起如空中風無依止處故知善惡取性作相由未悟理非無妄業後若悟理前業即滅如正觀理時當思諸障本唯空寂恆與諸佛同一真性但無明障厚不能睹見以不見故恆於佛前破戒違道十惡五逆無過不為猶如一堂延及凡聖在堂供養有多盲人以無目故遂於衆前具造諸惡時有智人愍之不已語盲人曰此堂具有凡聖僧衆汝云何對之公然造惡盲人聞已慚愧怖畏謝過無地遂即伸意敬白合堂師衆少來失明雖與師等同在一堂不能睹見今因善友開導始知有師今從合堂師等求哀懺悔此盲人雖自無眼不見僧衆然知僧衆先皆見已受其懺悔我等亦然昔造罪時恆在佛前今欲悔過了知諸佛悉皆已見但一切諸佛三達靈智五眼明照知無不盡莫問遠近內外明暗如掌觀珠隨機赴感不差時也又知罪緣無有自性但以妄想因緣虛受是苦故維摩經云心垢故衆生垢心淨故衆生淨妄想是垢無妄想是淨罪性不在內不在外不在中間如其心然無始以來所造諸惡猶如暗室懺悔正解狀若明燈一照昏暗皆除儀式部懺悔總有四種一更相易脫懺是凡夫下等懺法二永斷相續懺是上品凡夫懺法三燋業懺是賢人懺法四滅業懺是聖人懺法前二是事中懺敵對而除然此業性常在以熏成種故如人斫樹但去枝條其根仍在後二懺悔要須緣空悟理心境虛融常須作意見諦漸修然後得滅常依善友發大誓願臨命終時亦得隨願往生十方淨土永離三惡歸命十方一切佛頂禮無邊淨覺海亦禮妙法不思議真如自性清淨藏住於極愛一子地得道得果諸聖人我以身口清淨意咸各歸命稽首禮洗懺部如舍利弗悔過經云佛言若有善男子善女人欲求阿羅漢道欲求辟支佛道欲求佛道者欲知去來之事者常以平旦日中日入人定夜半雞鳴時澡漱正衣服叉手禮拜十方自在所向當悔過言某等宿命從無數劫以來所犯過惡至今世所犯淫泆所犯瞋恚所犯愚癡不知佛時不知法時不知比丘僧時不知善惡時若身有犯過若口犯過若心犯過若意欲害佛嫉惡經道若鬥比丘僧若殺阿羅漢若自殺父母若犯身三口四意三自殺生教人殺生自行盜教人行盜自欺人教人欺人代其喜等諸所作過惡願從十方諸佛求哀悔過今世不犯此過殃後世亦不被此過殃佛語舍利弗若善男子善女人意不欲入三塗者諸所作皆當悔過不當覆藏不欲生邊地無三寶處乃至欲得三乘道果者皆當悔過不當覆藏若有人供養天下阿羅漢辟支佛滿千不如持悔過經於晝夜各三過讀一日其得福勝百倍千倍萬倍億倍感應緣二驗晉沙門慧達姓劉名薩荷西河離石人也未出家時長於軍旅好畋獵年三十一暴病而死體尚溫未殮至七日而蘇說云將盡之時見有兩人執縛將去向西北行行路轉高稍得平衢兩邊列樹見有一人執弓帶劍當衢而立指語兩人將荷西行見屋舍甚多白壁赤柱荷入一家有女子美容服荷就乞食空中聲言勿與之也有一人從地踊出執鐵杵將欲擊之荷遽走歷入十許家見一嫗乘車與荷一卷書西至一家館宇華整有嫗坐於戶外屋內床帳光麗竹席清几復有女子處之問荷得書來不荷以書卷與之女取餘書比之俄見兩沙門謂荷汝識我不荷答不識沙門曰今宜歸命釋迦文佛荷如言發願因隨沙門俱行遙見一城色甚黑蓋鐵城也見人身甚長大膚黑如漆頭髮曳地沙門曰此獄中鬼也其處甚寒有冰如席飛散著人頭頭斷著腳腳斷二沙門云此寒冰獄也荷便識宿命知兩沙門往維衛佛時並其師也作沙彌時以犯俗罪不得受戒世雖有佛竟不得見從再得人身一生羌中今生晉中又見從伯在此獄裡謂荷曰昔在鄴時不知事佛見人灌像聊試學之而不肯還直今故受罪猶有灌福幸得生天次見刀山地獄次第經歷觀見甚多俄見金色暉明皎然見人長二丈許相好嚴華體黃金色左右並曰觀世音大士也皆起迎禮荷作禮畢菩薩具為說法可千餘言荷作禮而別出南大道廣百餘步道邊有高坐高數十丈有沙門坐之左右僧衆列倚甚多有人執筆北面而立謂荷曰在襄陽時何故殺鹿跪答曰他人射鹿我加劍耳又不噉肉何緣受報時即見襄陽殺鹿之地草樹山澗忽然滿目所乘黑馬並皆能言悉證荷殺鹿年月日時荷懼無對須臾有人以叉叉之投鑊湯中自視四體潰然爛碎有風吹身聚小岸邊還復全形執筆者復問汝又射雉亦常殺雁言已又投鑊湯如前爛法受此報已乃遣人送荷遙見故身意不欲還送人推引久久乃附形蘇活奉法精勤遂即出家梁楊都宣武寺沙門法寵姓馮南陽冠軍人也年三十八正勝寺法願道人善通樊許之術謂寵曰君年滿當死無可避處唯祈誠諸佛懺悔先愆排脫或可異耳寵因引鏡驗之見面有黑氣於是貨賣衣鉢資餘併市香供飛舟東逝直至海鹽居在光興間房禮懺杜絶人物晝忘食息夜不解衣迄至四十歲暮之夕忽覺兩耳腫痛彌生怖懼其夜懺達四更聞戶外有人言曰君死業已盡遽即開戶都無所見明晨僉言黑氣都除兩耳乃是生骨斯實由懺蕩之殷故使延壽也受戒篇又舊雜譬喻經云昔釋迦佛往到第二忉利天上為母說經時有一天壽命垂盡即自思惟壽終之後當棄天樂下生拘夷那竭國受疥癩母豬腹中作子甚預憂愁不知何計得免此罪有天語言今佛在此為母說經佛為三世一切之救唯佛能脫重罪即到佛所稽首作禮未及發問佛告天子一切萬物皆歸無常汝素所知何為憂愁天白佛言雖知天福不可得久恨離此座當為母豬以是為毒佛言欲脫豬身當三自歸如是日三天從佛教晨夜自歸於後七日天命壽盡至維那離國作長者子在母腹胎日三自歸如生墮地亦跪自歸其母免身又無惡露母傍侍婢怖而棄走母亦深怪兒墮地語謂之熒惑意欲殺之具白長者所由父言止止此兒非凡人生百歲尚不曉歸況兒墮地能自稱佛好養視之無令輕慢兒遂長大七歲與其輩類於道邊戲時佛弟子舍利弗目乾連適過兒傍兒言我和尚舍利弗等驚怪小兒能禮比丘兒言道人不識我耶佛於天上為母說經我時為天當下作豬從佛受教自歸得人比丘即為咒願因請佛及僧供養畢訖佛為說法父母及兒內外眷屬應時皆得阿唯越致神衛歸佛有三神一名陀摩斯那二名陀摩婆羅那三名陀摩流支歸法有三神一名法寶二名呵責三名辦意歸僧有三神一名僧寶二名護衆三名安隱殺戒有五神一名波吒羅二名摩那斯三名婆睺那四名呵那吒五名頗羅吒盜戒有五神一名法善二名佛那三名僧喜四名廣額五名慈善淫戒有五神一名貞潔二名無欲三名淨潔四名無染五名蕩滌妄戒有五神一名美旨二名實語三名質直四名直答五名和合語飲酒戒有五神一名清素二名不醉三名不亂四名無失五名護戒八戒會名諸經論中何名八關齊亦名關戒耶答曰前八是關閉八惡不起諸過不非時食者是齊齊者齊也謂禁止六情不染六塵齊斷諸惡具修衆善也功能如齊法經云譬如天下十六大國滿中衆寶不如一日受佛齊法比其福者則十六國為一豆耳又中阿含經云多聞聖弟子持八支齊時憶念如來十號名字若有惡思不善皆滅又優婆塞戒經云若有人以四大寶藏滿中七寶持布施人所得功德不如有人一日一夜受持八戒除五逆罪餘一切罪皆悉消滅又智度論問曰白衣居家唯有此五戒更有餘法耶答曰有一日戒六齊日持無量功德若十二月十五日受持此戒福最多何也是日鬼神逐人欲奪人命劫初聖人教人持齊修善治福以避凶哀是時直以一日不食為齊後佛出世始教一日一夜如諸佛受持八戒過中不食是功德三聚部戒相大聖度人功唯在戒凡論戒樞要有三一在家戒謂五戒八戒是二出家戒謂十戒二百五十戒是三道俗通行戒謂三聚戒是然此三聚復有三種一者戒種種性是二者戒心菩提心四無量是三者戒行六度四攝是然此度攝若隨威像則名三聚若依行位乃稱為七若就德位遂號七地及十三住優劣居家持戒凡有四種若為現樂怖畏惡名或避苦役求離諸難是為下人持戒若為世間福樂堅持禁戒是為中人持戒若為諸法無常欲求離苦無為常樂涅槃是為上人持戒若為憐愍衆生專求佛道了知諸法深觀實相是為上上人持戒感應緣三驗晉盧山釋慧永姓潘河內人也貞素自然清心克己言常含笑語不傷物耽好經典善於講說樂住盧山與遠同止又別立一茅室於嶺上每欲禪思輒往居焉時有至房者並聞殊香之氣永屋中常有一虎人或畏者輒驅令上山人去後還復循伏至晉義熙十年遇疾危篤而專謹戒律執志愈勤雖枕痾苦而顏色怡悅少時忽斂衣合掌求屣欲起如有所見衆咸驚問答云佛來言終而卒道俗在山咸聞異香七日乃歇隋終南山悟真道場釋淨業漢東隋人也精研律部博綜異聞仁壽二年被舉送舍利於安州景藏寺初欲行於十力寺置之行至景藏寺忽感異香滿院衆共嗟怪因而樹立將下舍利赤光挺出照於人物寺重閣上聞衆人行聲及往掩捕扃閉如初塔北有池沙門淨範為諸道俗受菩薩戒乃有群魚遊躍首皆南向似受歸相範即乘船入水為魚授戒魚皆回頭繞船如有聽受都無有懼業慶其遇乃以舍利置於佛堂先有塑菩薩一軀不可移動至明乃見回首面向舍利狀類天然唐華州鄭縣人張法義年少貧野不修禮度於貞觀十一年入華山伐樹遇見一僧坐巖穴中法義便就與語會天晦冥僧設松柏末以供食之謂法義曰貧道久不欲外人知檀越出慎勿言相見因為說俗人多罪纍死皆惡道至心懺悔可以滅之乃令淨浴清淨披僧衣為懺悔旦而別去至十九年法義病死埋於野外貧無棺槨以雜木瘞之而蘇自推木出歸家家人驚愕審問知活乃喜法義自說初有兩人來取乘空行至官府入大門又巡巷南行十許里巷左右皆有官曹門閭相對法義至一曹官曰將法義過録事録事署發文書令送付判官判官召主典取法義案案簿甚多盈一床主典對法義前披檢云案簿多先朱勾畢有未朱勾者則録之曰貞觀十一年法義父使刈禾義反顧張目私罵不孝合杖八十始録一條即見昔巖穴中僧來判官起迎問何事僧曰張法義貧道弟子其罪並懺悔訖天曹案中已勾畢今枉追來不合死主典云經懺悔者已勾了至如張目罵父雖懺未勾僧曰若不如此當取案勘之應有福利仰判官令主典將法義過王宮僧亦隨至王所王起迎僧曰有弟子張法義被録來此人宿罪並貧道勾訖未合死主典又以張目視父事過王王曰張目懺悔此不合免然師來請可特放七日法義白僧曰七日既不多後來恐不見師請即住隨師師曰七日七年也可早去法義固請隨僧僧因請王筆書法義掌中作一字又請王印印曰可急去還家憑福報後來以掌印呈王王自當放汝也法義乃辭去僧令送出至其家內正黑義不敢入使者推之遂活因入山就山僧修福義掌中所印之處文不可識然皆為瘡破戒篇引證又百喻經云昔有國王有一好樹高廣極大當生勝果香而甜美時有一人來至王所王語之言此之樹上將生美果汝能食不即答王言此樹高廣雖欲食之何由能得即便斷樹望得其果既無所獲徒自勞苦後還欲豎樹已枯死世間之人亦復如是如來法王有持戒樹修諸功德不解方便反毀其禁感應緣二驗宋沙門智達者益州索寺僧也行頗流俗而善經唄年二十三宋元徽三年六月病死身暖不殮遂經三日能言始困之時見兩人皆著黃布褲褶一人立於戶外一人徑造床前曰上人應去可下地也達曰貧道體嬴不堪涉道此人復曰可乘輿也言卒而輿至達既升之意識恍然四望極目但睹荒野途徑艱危至於朱門墻闥甚華達入至堂下堂上有一貴人朱衣冠幘據床坐甚有威容左右兵衛百許人貴人見達乃斂顏正色謂曰出家之人何宜多過達曰有識已來不憶作罪問曰誦戒廢不達曰初受具足之時實常習誦比逐齊講恆事轉經故於誦戒時有虧廢復曰沙門時不誦戒此非罪何可且誦經達即誦法華經三契而止貴人敕所録達使人曰可送至惡地勿令太苦二人引達將去行數十里稍聞轟磕鬧聲沸火而前路轉暗次至一門高數十丈色甚堅黑達自念經說地獄此其是矣乃大恐怖悔在世時不修業行及大門鬧聲愈壯門裡轉暗無所復見時火光乍滅乍揚見有數人反縛前行後有數人執杈杈之血流如泉其一人乃達從伯母彼此相見意欲共語有人曳之殊疾不得款言入門二百步許見有一物形如米囤可高丈餘二人執達擲置囤上囤裡有火焰燒達身半體皆爛痛不可忍自囤墜地悶絶良久二人復將達去見有鐵鑊十餘皆煮罪人人在鑊中隨沸出沒鑊側有人以杈刺之諸鑊皆滿唯有一鑊尚空二人謂達曰上人即時應入此中達聞其言肝膽塗地乃請之曰君聽貧道一得禮佛便至心稽首願免此苦祈悔特至既而四望無所復見唯睹平原茂樹風景清明忽不覺還就身時在索寺也齊戒逾堅禪誦彌固宋沙門釋曇典白衣時年三十忽暴疾而亡經七日方活說初亡時見兩人驅將去使輦米伴輦可有數千人晝夜無休息見二道人云我是汝五戒本師來慰問之師詣官主云是貧道弟子且無大罪曆算未窮即見放遣二道人送典至家住其屋上具約示典可作沙門勤修道業言訖下屋道人推典著尸蘇後出家受齊篇感應緣二驗宋京師道林寺有沙門僧迦達多博通經論以禪思為業元嘉初來遊宋境常在山中坐禪有群鳥銜果飛來授之達多思惟昔獼猴奉蜜佛亦受而食之今飛鳥授食便食之高齊初沙門實公者嵩山高栖士也旦從林向白鹿山因迷失道日將中忽聞鐘聲尋響而進巖岫重阻登陟而趣乃見一寺獨據深林三門正南赫奕輝煥前至門所看額云靈芝寺門外五六犬其犬如牛白毛黑喙或踊或臥以眼盻實實怖將返須臾番僧外來實喚不應亦不回顧直入門內犬亦隨入良久實見無人漸入次門屋宇四周房門並閉進講堂唯見床榻高座儼然實入西南隅床上坐久之忽聞棟間有聲仰視見開孔如井大比丘前後從孔飛下遂至五六十人依位坐訖自相借問今日齊時何處食來或言豫章成都長安隴右薊北嶺南五天竺等無處不至動即千萬餘里末後一僧從空而下諸人兢問來何太遲答曰今日相州城東彼岸寺鑒禪師講會各各豎義殊為可觀不覺遂晚實本事鑒為和上既聞此語望得參話希展上流整衣將起咨諸僧曰鑒是實和上諸僧直視忽隱寺所獨坐磐石柞木之下向之寺宇一無所見唯睹岩谷禽鳥翔集喧亂切心出以問尚統法師尚曰此寺名趙時佛圖澄法師所造年歲久遠賢聖居之非凡所住或泛或隱遷徙無定今山行者猶聞鐘聲破齊篇感應緣一驗唐隴西李思一今居相州之滏陽縣貞觀二十年正月已死經日而蘇至永徽三年五月又死經一宿而蘇說云年命未盡蒙王放歸於王前見相州滏陽縣法觀寺僧辦圭又見會福寺僧弘亮及慧寶三人並在王前辨答見冥官云慧寶死期未至宜修功德辦圭弘亮今歲必死辦圭等是年果相繼卒後寺僧令一巫者就弘亮舊房召二僧問之辦圭曰我為破齊今受大苦兼語諸弟子等曰為我作齊救拔苦難弟子輩即為營齊巫者又云辦圭已得免罪弘亮云我為破齊兼妄持人長短令被拔舌痛苦不能多言賞罰篇引證如百喻經云昔有二人共種甘蔗而作誓言種好者賞其不好者當重罰之時二人中一者念言甘蔗極甜若壓取汁還灌甘蔗樹必得勝既取汁溉冀望滋味反敗種子所有甘蔗一切都失世人亦爾欲求善福恃己豪貴倚形挾勢逼脅下民陵奪財物用作福善反獲其殃感應緣一驗晉富陽縣令王範有妾桃英殊有姿色遂與閣下丁豐史華期二人奸通範常出行不還帳內都督孫元弼聞丁豐戶中環珮聲覘視見桃英與同被而臥元弼叩戶叱之桃英即起攬裙理鬢躡履還內元弼又見華期帶珮桃英麝香二人懼元弼告之乃共謗元弼與桃英有私範不辦察遂煞元弼有陳超者當時在座勸成元弼罪後範代還超亦出都看範行至赤亭山下值雷雨日暮忽然有人扶超腋徑曳將去入荒澤中電光照見一鬼面甚青黑眼無瞳子曰吾孫元弼也訴冤皇天早見申理乃今相遇超叩頭流血鬼曰王範為事主當先殺之賈景伯孫文度在太山玄堂下共定生死名録桃英魂魄亦收在第三地獄名女青亭此黃泉下專治女鬼者投至天明失鬼所在超至楊都詣範未敢說之便見鬼從外來徑入範帳至夜範始眠忽然大猒連呼不醒妾亦暴亡超走長干寺易姓名為何規後五年三月三日臨水酒酣超云今當不復畏此鬼也低頭便見鬼影已在水中以手搏超鼻血大出可一升許數日而殂利害篇引證又僧護經云爾時舍衛國中有五百商人欲入大海共議求覓法師衆中有一長者告諸商人我有門師名曰僧護可請為師爾時世尊知僧護比丘廣度衆生即便聽許時諸商人與僧護法師俱入大海未至寶所龍王捉住時諸商人甚大驚怖互跪合掌而仰問言是何神祗而捉船住若欲所須應現身形爾時龍王忽然現身曰以此僧護比丘與我商人答曰從佛世尊及舍利弗所而請將來云何得與龍王曰若不與我盡皆殺汝時諸商人即大驚怖俯仰不已僧護比丘捨與龍王龍王將詣宮中即以四龍作僧護弟子龍王白言尊者為我教此四龍第一龍者教增一阿含第二龍者教中阿含第三龍者教雜阿含第四龍者教長阿含僧護即教第一龍者默然聽受第二龍者眠目口誦第三龍者回顧聽受第四龍者遠住聽受此四龍子於六月中誦四阿含領在心懷盡無遺餘時大龍王詣僧護所僧護曰受持法者無軌則心不如佛法受持誦習龍王白言大德不言呵諸龍等所以者何以護師命故作此聽龍有四毒初默受者以聲毒故若出聲者必害師命第二閉目受者以見毒故若見師者必害師命第三回顧受者以氣毒故若氣噓師必害師命第四遠住者以觸毒故若身觸師必害師命時商人採寶回還至失師處共相謂言我等本時於此失師今若還到佛所問我僧護法師何在當以何答爾時龍王知商人還即持僧護來付商人時諸商人踊躍歡喜平安得出感應緣一驗後魏崇真寺僧慧嶷死經七日時與五比丘次第於閻羅王所閲過嶷以錯召放令還活具說王前事如生官無異五比丘者一云是寶明寺僧智聰自云生來坐禪苦行為業得升天堂一云是般若寺僧道品自云誦涅槃經四十卷亦升天堂有一比丘云是融覺寺僧曇謨最云講華嚴涅槃恆常領衆千人解釋義理王言講經衆僧我慢貢高心懷彼我憍己凌物付司即有青衣十人送最向於西北入門屋舍皆黑復一比丘云是禪林寺僧道弘自云教化四輩檀越造一切經人中金像十軀王言沙門之體必須攝心道場志念禪誦勤心念戒教化求財貪心即起三毒未除付司隨有青衣執送與最同入一處又有比丘云是靈覺寺僧寶真自云未出家之前曾作西隴太守自知苦空歸依三寶割捨家資造靈覺寺寺成捨官入道雖不禪誦禮拜不闕王曰卿作太守曲情枉法劫奪人財假作此寺非卿之力亦復付司送入黑門穢濁篇五辛部如楞伽經云佛言大慧如是一切蔥韭薤蒜臭穢不淨能障聖道亦障世間天人淨處酒亦如是又雜阿含經云不應食五辛何等為五一者木蔥二者革蔥三者蒜四者興渠五者蘭蔥感應緣一驗唐殿中侍御醫孫回璞濟陰人也至貞觀十三年從王車駕幸九成宮三善谷與魏太師鄰夜二更聞外有人喚孫侍醫聲璞起出看謂是太師之命既出見兩人謂璞曰官喚璞曰我不能步行即取馬乘之隨二人行如晝日光明二人引璞出谷歷朝堂東又東北行至省蓿谷遙見有兩人持韓鳳方行語所引璞二人曰汝等錯我所得者是汝宜放彼人即放璞璞循路而還即至家繫馬見婢當戶眠喚之不應入戶見其身與婦並眠欲就之不得但著南壁立大聲喚婦終不應屋內極明見壁角中有蜘蛛網中二蠅一大一小并見梁上所著藥物無不分明唯不得就床自知是死甚憂悶恨不得共妻別倚立南壁久之微睡忽驚覺覺身已臥床上而屋暗黑無所見喚婦令起然火璞方大汗起視蜘蛛網歷然不殊見馬亦大汗鳳方是夜暴死後至十七年璞奉敕馳驛往徐州療齊王祐疾還至洛州東孝義驛忽見一人來問曰君是孫回璞不璞曰是君何問焉答曰我是鬼耳魏太師有文書追君為記室因出文書示璞璞視之則鄭國公魏徵署璞驚曰鄭公不死何為遣君送書鬼曰已死矣今為太陽都録太監故令我召君璞引坐共食鬼甚喜謝璞又請曰我奉敕未還鄭公不宜追我還京奏事畢然後聽命可乎鬼許之於是晝則同行夜則同宿行至滋水與璞別曰待君奏事訖相見也君可勿食葷辛璞許諾既奏事畢訪鄭公已薨校其薨日則孝義驛之前日也璞自分必死與家人訣別而請僧行道造像寫經可六七日夜夢前鬼來召引璞上高山山巔有大宮殿既入見衆君子迎謂曰此人修福不得留之可放去即推璞墮山於是驚悟便利部感應緣二驗宋京師瓦官寺有釋慧果婺州人少蔬食苦行宋初遊京師止寺誦法華十地嘗於廁前見一鬼致敬於果云昔為衆生作維那小不如法墮在噉糞鬼中法師德素高明願助拔濟之方又云昔有錢三千文埋在柿樹根下願取以為福果即告衆掘取錢三千文為造法華一部并設齊後夢見此鬼云以得改生唐陳郡謝弘敬妻高陽許氏武德初年遇患死經四日而蘇說云被二三十人抱至地獄未見官府即聞喚雖不識面似是姑夫沈吉光語音許問云語聲似是沈丈何因無頭吉光即以手提其頭置於膊上而語許曰汝且在此間勿向西院待吾為汝造請即應得出遂與語處而住經再宿吉光始來語許云汝今此來王欲令汝作女伎倘引汝見須道不解絃管可引吾為證少間有吏抱案引入王果問解絃管不許云不解復云沈吉光具知王問吉光答云不解王曰宜早放還不須留也於時吉光欲發遣執案人云娘子功德力雖強然先有少罪隨便受卻身業俱淨豈不快哉更別引入一大院其門極小見有人受罪許甚驚懼乃求於主者曰生平修福何罪而至斯耶答曰娘子曾以不淨碗盛食與親須受此罪遂以銅汁灌口非常苦毒比蘇時口內皆爛光即云可於此人處受一本經記取將歸受持勿怠自今已去保年八十有餘許生曾未誦經蘇後遂誦得經一卷訪詢人間所未曾有吉光尚存後二年方遇害酒肉篇感應緣六驗晉有荊州長沙寺釋法遇弱年好學篤志墳典事道安為師解悟非常乃避地朿下講說衆經受業者四百餘人時有一僧飲酒遇但罰而不遣安公遙聞之以竹筒盛一荊子手自緘封題寄遇遇開封見杖即曰此由飲酒也我訓領不勤遠貽憂賜即命維那鳴椎集衆以杖置香橙上行香畢遇乃起出衆前向筒致敬於是伏地令維那行杖三下內杖筒中垂淚自責時境內道俗莫不嘆息因之學徒勵業甚衆宋蔣小德江陵人也為丘州刺史朱循聽事監少而信向勤謹過人得病而死夜三更將殮便蘇活言有使者稱王命召之隨去既至王曰君精勤小心虔奉大法宜速生善地而君算猶長且還家作功德七日復來受天中快樂小德受言而歸路由一處有小屋殊陋弊逢新寺難公於此屋前具相問訊難云貧道自出家來未常飲酒旦就蘭公蘭公苦見勸逼飲一升許被王召罰若不坐此當得生天今乃居此弊宇三年演方得上耳小德至家即遣人參訊難公果以此日於蘭公處睡臥至夕而亡小德既愈七日內大設福供至期奄然而卒周武帝好食雞卵一食數枚有監膳儀同常進御食有寵隋文帝即位猶復監膳進食開皇中暴死三日乃蘇語云始見人來喚隨至一處有大地穴才到穴口遙見西方有百騎來儀衛如王者俄至穴口乃周武帝也儀同拜之帝曰王喚汝證我事耳汝身無罪言訖即入穴中使者亦引儀同入庭前見武帝與王同坐王問儀同曰汝為帝作食前後進白團幾枚儀同答曰實不記數王謂帝曰此人不記當須出之帝慘然不樂而起忽見庭前有鐵床并獄卒數十人皆牛頭人身帝已臥床上獄卒用鐵梁壓之帝兩脅剖裂處雞子全出俄與床齊可十餘斛帝謂儀同云為我相聞大隋天子昔與我共食倉庫玉帛亦我儲之我今為滅佛法極大受苦可為吾作功德於是文帝敕天下人出一錢為追福焉後隋大業中雍州長安縣有一人姓趙名文若死經七日得活說云當死之時見人引向閻羅王所問文若生時作何福業文若答王受持金剛般若經王嘆曰善哉此福第一汝雖福善且將示汝受罪之處令一人引文若北行十步至一墻孔隔壁有人引手從孔中捉文若頭引出墻外見大地獄鑊湯苦具罪人受苦乃有衆多豬羊雞魚鵝鴨之屬兢來從文若索命文若云吾不食汝身何故見逼諸畜生等各報云汝某年某月某處食我頭腳四支節節分張何故諱之文若見畜引實不敢拒逆唯知一心念佛深悔諸罪但求諸畜得活之時具修福善報謝諸畜見許修福一時放卻其引使人將文若至王所說見受罪處訖王付一碗釘令文若食之并用五釘釘文若頭及手足然後放過文若得蘇極患頭痛及手足疼久後修福痛漸得差從爾已來精勤誦持金剛般若不敢遺漏寸陰併見道親疏並勸受持唐冀州頓丘縣有老母姓李無子孤老唯有小婢家鎮沽酒添灰少量分毫經紀貞觀年中因病氣斷死經兩日蘇活口云初有兩人並著赤衣門前召出之便即隨去行至一城有若州郭引到側院見一官人衣冠大袖憑案而坐左右甚多階下大有著枷鎖人遣問老母何因行濫沽酒多取他物擬作法華經已向十年何為不造老母具言酒使婢作量亦是婢經已付錢一千文與隱師即遣追婢須臾婢至勘當元由婢即笞四十放還遣問隱師報云是實乃語老母云放汝七日去經了當來得生善處唐右金吾兵曹京兆韋知十至永徽中煮一羊腳半日猶生知十怒家人曰用柴十倍於常不知何意如此更命重煮還復如故乃命割之其中遂得一銅像長徑寸焉光明照灼相好成就其家一生不敢食酒肉病苦篇斂念部夫三界非有五陰皆無四倒十纏共相和合漂沒苦海弱喪亡歸形軀七尺莫知其假生靈一謝再返無期往生論云若善男子善女人修五戒成就者畢竟得生安樂國土見彼阿彌陀佛何等為五一者禮拜二者讚嘆三者作願四者觀察五者回向又隨願往生經云佛告普廣菩薩若四輩男子女人臨終之日願生十方佛剎土者當先洗浴身體著鮮潔之衣燒衆名香懸繒幡蓋歌讚三寶讀誦尊經為病者說因緣喻善巧言詞微妙絶義故云色不久鮮當歸壞敗精誠行道可得度苦隨心所願無不獲果感應緣三驗宋羅璵妻費氏者寧蜀人父悅宋寧州刺史費少而敬信誦法華經數年勤至不倦忽病心痛屬纊俱備費氏心念我誦經勤苦宜有善祐寧遂至此既而睡臥食頃如夢如寤見佛於窗中投手以摩其心應時都念一堂男女婢僕悉睹金光亦聞香氣璵從妹琰乃尚書中兵郎費惜夫人也於時省疾亦具聞見大興信悟宋李清者於潛人也仕桓溫大司馬府參軍督護得病還家而死經久蘇活說云初見傳教持信幡喚之云公欲相見清謂是溫召即起束帶而去出門見一竹輿便令入中二人推之疾速如馳至一朱門見阮敬時敬死已三十年矣敬問清曰卿何時來知我家何似清云卿家異惡敬便兩淚言知吾子孫如何答云具可我今令卿得脫汝能料理吾家不清云若能如此不負大恩敬言僧達道人是官師甚被敬禮當苦告之還內良久遣人出云門前四層寺官所起也僧達常以平旦入寺禮拜宜就求哀清往其寺見一沙門語曰汝是我前七生時弟子已經七世受福迷著世樂忘失本業背正就邪當受大罪今可改悔和尚明出當相佐助清還中夜寒噤凍至曉門開僧達果出至寺清便隨稽首僧達云汝當革心為善歸命佛法僧受此三歸可得不橫死受持勤者亦不經苦難清便奉受又見昨所遇沙門長跪請曰此人僧之宿世弟子忘正失法方將受苦先緣所追今得歸命願垂慈愍答曰先是福人當易拔濟耳便還向朱門俄遣人出云李參軍可去敬時亦出與清一眚竹枝令閉眼騎之清如其語忽然至家家中啼哭及鄉親塞堂欲入不得會買材還家人及客赴監視之唯尸在地清入至尸前聞其尸臭自念悔還但外人逼突不覺入尸於是而活即營理敬家分宅以居於是歸心三寶勤信法教前齊永明中楊都高座寺釋慧進疏食布衣誓誦法華用心勞苦執卷便病乃發願造百部以悔先障始聚得一千六百文賊來索物進示經錢賊慚而退爾後遂成百部聞空中告曰汝願已足必得往生捨身篇感應緣三驗梁普通年小莊嚴寺有道度禪師戒行淳直善明摩訶衍每厭此身同於毒樹若身命無常棄尸陀林施以鳥獸乃積薪柴漸就減食至普通七年十一月三日鍾自虛鳴其月八日鍾復自鳴乃與大衆共結善緣爾後不復更食唯用澡瓶以汲清水日飲一升至二十五日寺衆同往見瓶發五色光耀雜彩氛氳至二十九日旦時寺主僧全等數人共登禪室遙見龕中紫光外照其日將暮忽有群鳥五六百同集一樹夜二更初寺有雜色光映燭房宇至五更中聞山頂上火聲振烈驚走往觀見禪師合掌火中刺史武陵王乃遣灑掃收斂其處而建塔焉後聞山頂時有石磬之聲聲甚清徹隋盧山甘露峰釋大志姓顧氏山陰人於蓮華山甘露峰南建靜觀道場頭陀為業介爾一身不避虓虎聞有惡獸輒往投之皆避不啖經於七載禪業無絶晚住此山福林寺會大業屏除流徙隱逸慨法陵遲乃變服毀形在佛堂內高聲慟哭三日三夕初不斷絶寺僧慰喻志曰余嘆惡業乃如此耶要盡此骸申明正教遂往東都上表曰願陛下興顯三寶當燃臂於嵩嶽用報國恩帝乃許之敕設大齊七衆通集志不食三日登大棚上燒鐵爐赤用烙其臂並令焦黑以刀截斷肉裂骨現又烙其骨令焦黑已布裹臘灌下火燃之光曜岩岫於時大衆見其苦行皆痛心髓而志雖加燒烙詞色不改或誦法句嘆佛為德或為衆說法言談苦切臂燒既盡如先下棚七日入定跏坐而卒唐終南山豹林谷釋會通雍州宿川人少欣儉素遊泊林泉苦節戒行誦法華經藥王品便欣厭捨私集柴木以貞觀末年靜夜林中積薪為窟誦至藥王便令下火風驚焰發煙火俱盛卓爾跏坐聲誦如故尋爾西南有大白光流入火聚至曉身火俱滅乃收其骨為起塔銘送終篇受生部夫生則八識扶持死則四大離散迅矣百齡終歸磨滅循環三界運轉靡停第一臨命終時檢身冷熱驗其善惡具知來報故瑜伽論云造善之人從下冷觸至臍以上暖氣後盡即生人中若至頭面熱氣後盡即生天道若造惡者與此相違然瑜伽論羯羅藍義最初託處即名肉心方識於此處最初託即從此處最後捨感應緣漢令支縣有孤竹城古孤竹之國也靈帝光和元年遼西人見遼水中有浮棺欲斫破之棺中人語曰我是伯夷之弟孤竹君也海水壞我棺槨是以漂流汝斫我何為人俱不敢斫因為立廟祀祠漢菩提寺西域人所立也在慕義里沙門達多發墓取磚得一生人以報時太后與漢明帝在華林都堂以為妖異謂侍郎徐紇曰上古以來頗有此事不紇曰昔魏時發冢得霍光女壻范明友家僕說漢朝廢立與史書相符不足為異也后令紇問其姓名死來幾年何所飲食死者答曰臣姓崔名涵字子洪博陵安平人父名暢母姓魏家在城西埠財里死時年十五今乃二十七在地下十二年常似醉臥無所食也時復遊行或遇飲食如似夢中不甚辨了后即遣門下録事張俊詣埠財里訪涵父母果有崔暢其妻姓魏俊問暢曰卿有死兒不暢曰有息子洪年十五而亡俊曰為人所發今日蘇活在華林園主上遣我來相問暢聞驚怖曰實無此兒向者謬言俊還具以實啓后后遣俊送涵向家暢聞涵至門前起火手持刀魏氏把桃杖拒之汝不須來吾非汝父汝非我子速去可得無殃涵遂捨去遊於京師巷內常宿寺門下汝南王賜黃衣一通性畏日不仰視天又畏水火及兵刃之屬常走於路疲則止不徐行也時人猶謂是鬼洛陽大市北有奉終里內人賣送死之具及諸棺槨涵謂曰柏棺勿以桑木為欀人問其故涵曰吾在地下見發鬼兵有一鬼稱是柏棺應免兵主吏曰你雖柏棺桑木為欀遂不免兵晉唐遵字保道上虞人也晉太元八年暴病而死經夕得蘇云有人呼將去至一城府未進頃見其從叔自城中出驚問遵汝何故來遵答正欲往候姑姊因見數人急呼來此即時可得歸去而不知還路從叔云汝姑喪已二年汝姊兒道文近被録來蒙恩放仍留看戲不即還去積日方歸家已殯殮乃入棺中搖動棺器冀望其家覺悟開棺棺遂至路落檀車下其家或欲開之乃問卜者云不吉遂不敢開不得復生今為把沙之役辛勤極苦汝宜速去勿復住此且汝小姊又已喪亡今與汝姑共在地獄日夕憂苦不知何時可得免脫汝今還去可語其兒勤修功德庶得免之於此示遵歸路將別又囑遵曰汝得還生良為殊慶在世無幾倏如風塵天堂地獄苦樂報應吾昔聞其語今睹其實汝宜深勤善業務為孝敬受法持戒慎不犯一去人身入此罪地幽窮苦酷自悔何及勤以在心不可忽也我家親屬生時不信罪福今並遭塗炭長受楚毒焦爛傷痛無時暫休欲求一日改惡為善當何得耶悉我所具故以囑汝勸化家內共加勉勵言已涕泣因此而別遵隨路而歸俄而至家家治棺將竟方營殯殮遵既附尸尸尋氣通移日稍差勸示親識並奉大法初遵姑適南郡徐漢長姊適江夏樂瑜于小姊適吳興嚴晚途路懸遠久斷音息遵既差遂至三郡尋訪姑及小姊姊子果並喪亡長姊亦說兒道文殮後棺動墮車皆如叔言既聞遵說道文橫死之意姊追加痛恨重為製服晉竹法慧關中人方直有戒行入嵩高山事佛圖蜜為師晉康帝建元年至襄陽止羊叔子寺不受別請每乞食輒齎繩床自隨於間曠設坐遇雨以油帔日覆每語弟子法昭曰汝過去時折一雞腳其殃尋至俄而昭為人所擲腳遂永疾後征西庾移恭鎮襄陽素不奉法聞慧有非常之跡甚嫉之慧預告弟子曰吾宿對尋至誡勸眷屬令勤修福善恭後二日果收而刑之臨死語衆人云猶枉刑吾吾死後三日天當暴雨至期果洪注城門外深一丈恭眷屬居民並皆沒死法滅篇五濁部如地持論云所謂五濁者一曰命濁二曰衆生濁三曰煩惱濁四曰見濁五曰劫濁謂今世短壽人極百歲是名命濁若諸衆生不識父母不識沙門婆羅門及宗族尊長不修禮義不畏惡業果報不修惠施不作功德不修齊法不持禁戒是名衆生濁若此衆生諂曲虛誑妄語攝受邪法及餘惡不善法生是名煩惱濁若於今世法壞法沒像法漸起邪法轉生是名見濁若饑饉劫起疾病劫起刀兵劫起是名劫濁雜要篇四依部夫根鈍時澆信堅難具行淺德劣智正易述要須機教相符文理洞備故經曰雖誦千章不行何益今立正義須憑宗意教有權實行有昏明如大集經云復次舍利弗菩薩摩訶薩有四依法何等為四依義不依語依智不依識依了義經不依不了義經依法不依人云何依義不依語語者若人世法而有可說義者解出世法無文字相語者若說布施戒忍進禪智慧調伏擁護義者知施戒忍進禪智慧入於平等語者稱說生死義者知生死性語者說涅槃味義者知涅槃無性語者若說諸乘隨所安止義者善知諸乘入一相智門語者說身口意受持淨戒功德威儀義者了身口意皆無所作而能護持一切淨戒語者若說忍辱斷除恚怒貢高憍慢義者了達諸法得無生忍語者悉能聞持一切文字智慧根本義者知是慧義不可宣說云何依智不依於識識者四識住處如色識住處受想行識住處智者解了四識性無所住識者若識地大水火風大智者識住四大法性無別識者行有為法智者知無所行無為法性無有識知識者生住滅相智者無生住滅相云何依了義經不依不了義經不了義經者所作何業信有果報了義經者盡諸煩惱不了義經者說生死苦惱了義經者生死涅槃一相無二不了經者讚說種種莊嚴文字了義經者說甚深經難持難了不了義經者多為衆生說罪福相今聞法者心生欣戚了義經者凡所演說必令聽者心得調伏不了義經者若說我人衆生等無有施受者而為說有施受了義經者說空無相無願無作無有我人衆生作者受者常說無量諸解脫門云何依法不依於人人者攝取人見作者受者法者解脫無人見作者受者人者凡夫善人信行人八人四果人辟支佛人菩薩人一人出世多所利益多人受樂憐愍世間生大悲心於人天中多所饒潤所謂諸佛等依世諦故為化衆生故作是說若有攝取如是見者是為依人如來為化攝人見者故說依法一切平等無別異性猶如虛空舍利弗是名菩薩摩訶薩四依無盡翻譯部附聖賢集傳四十九部後漢朝譯傳道俗十二人出經律三百三十四部前魏朝傳譯僧六人出經律一十三部南吳孫氏傳譯道俗四人出經傳一百四十八部西晉朝傳譯道俗十三人出經戒四百五十一部東晉朝傳譯道俗二十七人出經傳二百六十三部前秦符氏傳譯僧八人出經傳四十部西秦乞伏氏傳譯僧一人出經十四部後秦姚氏傳譯僧八人出經傳一百二十四部北涼沮渠氏傳譯道俗八人出經傳三十二部宋朝傳譯道俗二十三人出經傳二百十部前齊朝傳譯道俗十九人出經傳四十七部梁朝傳譯道俗二十一人出經律傳九十部後魏元氏傳譯道俗十三人出經論傳録八十七部後齊高氏傳譯道俗二人出經論七部後周宇文氏傳譯道俗十一人出經論天文三十部陳朝傳譯道俗三人出經論傳疏四十部隋朝傳譯道俗二十人出經論九十餘部唐朝傳譯僧十一人出經論二百餘部大乘經一譯二百四部重翻二百二部小乘經一譯一百八部重翻九十六部小乘律三十五部大乘論六十四部小乘論三十三部衆經律論傳八百部
