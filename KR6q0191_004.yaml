body:
  text: 武原居士徐昌治覲周編輯金粟寺住持行元百癡校閲獎導篇述意夫貴賤靡恆貧富無定故見有財富室溫衣豐食足復見有貧苦饑弊役力馳求所以勸獎令其惠施有人衣裘服玩鮮華香潔復見有尺布不完文帛殘敝所以獎勸令其修福有人食則甘味並薦珍羞備舉復有脫粟之飯不充藜藿之羹常乏所以勸獎令其修習有人榮位通顯乘肥衣輕復見有卑鄙猥賤人所不齒所以勸獎令其謙敬有人形貌端整言音風吐復有面狀矬醜出言險暴所以勸獎令其忍辱有人意力強幹常堪行道復有嬴瘵多患眠坐不安所以勸獎令其賑救凡如此事最應獎導引證涅槃經云居家如牢獄妻子如枷鎖財物如重擔親戚如冤家能一日一夜受持清禁六時行道兼年常六齊檢斂身口意不馳外專崇出俗高慕佛法深敬沙門悲心利俗雖居在家可得度苦時五通比丘名精進力在山中樹下間寂求道時有四禽獸依附左右常得安隱一者鴿二者烏三者毒蛇四者鹿是四禽獸自相問言世間之苦何者為重烏言饑渴最苦投身羅網不顧鋒刃我等喪身莫不由之鴿言淫欲最苦色欲熾盛無所顧忌失身喪命莫不由之毒蛇言瞋恚最苦毒意一起不避親疏亦能殺人復亦自殺鹿言驚怖最苦我在林野心恆怵惕畏懼獵師及諸豺狼倣佛有聲奔投坑岸母子相捐肝膽悼悸比丘聞之即答之曰汝等所論是其末耳天下之苦無過有身身為苦器憂畏無量吾以是故捨族學道滅意斷想志存泥洹說聽篇述意經曰法之供養勝諸供養是以一象既虧則六爻斯墜一言有失則纍劫受殃故知傳法不易受聽極難故地持論云隨文取義有五種過一無正信二退勇猛三誑衆生四輕法五謗法若淨心說法縱是生死變為涅槃若染心說法縱是涅槃變為生死又涅槃經云大乘為甘露亦名為毒藥能消即為甘不消即成毒如人置毒乳中則能殺人利益部阿育王經云昔阿恕伽王使道人說法時以步障遮諸婦女使其聽法爾時法師為諸婦女說法恆說施論戒論生天之論有一婦女分犯王法發幕向法師前問言如來大覺於菩提樹下說諸法時覺悟施戒耶更悟餘法耶法師答言佛覺一切有漏法皆苦猶若融鐵此苦因從集而生猶如毒樹修八正道以滅苦集是女人得聞此語獲須陀洹道以刀繫頸往到王所白王言我今日犯王重法願王以法治我王問言汝犯何事答言我破王禁制至道人所譬如渴牛不避於死我實渴於佛法是以默突聽法王問言汝聽法時頗有所得不答言得法見四真諦解陰入界及以諸大皆知無我遂得法眼王聞是語踊躍歡喜即為作禮便唱令言自今已後不作障隔樂聽法者直至法師所對面聽法嘆曰奇哉我宮內乃出人寶以是因緣當知聽法有大利益又雜寶藏經云爾時般遮羅國以五百白雁獻波斯匿王王令送著祗桓精舍雁見僧聚來在前立佛以一音說法衆生各得類解當時群雁亦解僧語聞法歡喜鳴聲相和後飛至餘處獵師以網都覆殺之一雁作聲諸雁皆和謂聽法時聲乘是善心生忉利天五百天子即時來下在如來邊佛為說法悉得須陀洹波斯匿王過到佛所便問此中諸雁向何處去佛言諸雁飛去為獵師所殺命終生天今日五百諸天子等著好天冠端正殊特者是今日聽法皆得須陀洹王問佛言此群雁以何業緣墮於畜生命終生天今日得道佛言昔迦葉佛時五百女人盡共受戒用心不堅毀所受戒墮畜生中作此雁身以受戒故得值如來聞法獲道感應緣三驗隋京師延興寺釋曇延姓王蒲州業泉人也世家豪族宦歷齊周而性協書籍探悟玄旨欲著涅槃大疏恐滯凡情每祈誠寤寐願得嘉徵乃於夜夢有人披白服乘白馬騣尾拂地而導授經旨延手執馬騣與之講論寤後惟曰此必馬鳴菩薩授我義端執騣知其宗旨抵事可觀耳更持經疏於陳州仁壽寺舍利塔前燒香誓曰延以凡度仰測聖心銓釋已了具如別卷若幽致微達願示明靈言訖涅槃卷軸並放光明通夜呈祥道俗稱慶塔中舍利又放光明三日三夜輝光不絶上屬天漢下照山河既感微祥衆仗傳受隋京師淨影寺釋慧遠姓李燉煌人三藏備通九流洞曉講導為業昔在清化曾養一鵝聽講開皇七年敕召入京鵝在本寺栖宿廊廡晝夜鳴呼衆共愍之附使達京至淨影寺大門放之鳴叫騰躍徑入遠房依前馴聽不避寒暑但聞法集鐘聲不問旦夕皆入講堂靜聲伏聽僧徒梵散出堂翔鳴若遠常途講解依法潛聽閒及餘語便鳴翔而去唐蒲州仁壽寺釋道遜俗姓張河東虞鄉人神識高邈器度虛簡善通群典尤以涅槃設論為栖神之宅貞觀二年冬月有請講涅槃預知將終苦不受請鄭重延之不免來意赴請登座發題告諸四衆悲嘆而言自唯去聖遙遠微言隱絶庸愚所傳不足師範但以信心歸向自當識悟今席講說不久當去日時既促願各用心遂無疾而終送往王城谷中南山之陰闔境悲號當夜降雪掃路通行陳尸山嶺經夕忽有異華繞尸涌出可五百枝長二尺許上發鮮榮形相全異七衆驚動見解篇引證如分別功德論云如來所以廣為四部各說第一者乃為將來道法之中四姓出家見解不同共相是非自稱為尊餘人為卑如是之輩不可稱計故預防於未然開其自足之路如光明之中日為其最星宿之中月為其最川流之中海為其最六天之中波旬為最色界十八天之中淨居為最九十六部之中釋僧為最九十六道之中佛道為最如五百聲聞弟子之中神解各別不可具列感應緣二驗晉長安鳩摩羅什天竺人也家世國相什祖父達多倜儻不群名重於國父鳩摩羅炎聰明有懿節將嗣相位乃辭避出家東度蔥嶺龜茲王聞其棄榮甚敬慕之自出郊迎請為國師王有妹年始二十才悟明敏過目成誦諸國聘之並皆不許及見炎心欲當之乃逼以妻焉既而生什樂欲出家夫未之許誓不落髮不咽飲食至六日夜氣力綿乏夫乃許焉即敕人除髮乃下飲食次旦受戒仍業禪法專精匪解學得初果什年七歲亦俱出家從師受經日誦千偈師授其義即自通達無幽不暢什年九歲隨母度辛頭河至罽賓國遇名德法師盤頭達多崇以師禮從受雜藏中長二含凡四百萬言達多每稱什神俊至年十二其母攜還龜茲復至月氐北山有一羅漢見而異之謂與優波掬多無異什進到沙勒國其冬誦阿毗曇於十門修智諸品無所咨受而備達其妙又於六足諸門無所滯礙沙勒國有三藏沙門名喜見謂其王曰此沙彌不可輕王宜請令初開法門王即設大會請什升座說轉法輪經頃之隨母進到溫宿國即龜茲之北界時溫宿有一道士神辨英秀振名諸國手擊王鼓而自誓言論勝我者斬首謝之什既至以二義相檢即迷悶自失稽首皈依於是聲滿蔥左譽宣河外龜茲王躬往溫宿迎什還國廣說諸經乃更設大集請問方等經奧什為折辨諸法皆空無我分別陰界假名非實時會聽者莫不悲感追悼皆恨悟之晚矣至年二十受戒於王宮從卑摩羅叉學十誦律有頃什母辭往天竺謂什曰方等深教應大闡真丹傳之東土唯爾之力但於自身無利其可如何什曰大士之道利彼亡軀若必使大化流傳能洗悟矇俗雖復身當爐鑊苦而無恨於是留住龜茲二年廣誦大乘經論洞其祕奧龜茲王為造金獅子座以大秦錦褥鋪之令什升而說法什曰家師猶未悟大乘欲躬往仰禮不得停此俄而大師盤頭達多不遠而至王曰大師何能遠顧達多曰一聞弟子所悟非常二聞大王弘贊佛道故窅涉艱危遠萃神國什得師至欣遂本懷師謂什曰汝於大乘見何異相而欲尚之什曰大乘深淨明有法皆空小乘偏局多滯名相師曰汝說一切皆空安捨有而愛空乎什乃連類而陳之往復苦至經一月餘日方乃信服師嘆曰我不能達反啓其志於是禮什言是我大乘師我是汝小乘師矣西域諸國咸伏什神俊每至講說諸王皆長跪座側令什踐而登焉其見重如此宋江陵幸寺釋法顯姓龔平陽武陽人志行明敏儀軌整肅常慨經律舛闕志勵尋求以晉隆安三年與同學慧景道整慧應慧嵬等發自長安西度流沙上無飛鳥下無走獸四顧茫茫莫測所之唯視日以準東西人骨以摽行路耳屢有熱風惡鬼遇之必死顯任緣委命直過險難至蔥嶺冬夏積雪有惡龍吐毒風雨砂礫山路艱危壁立千仞昔有鑿石通路傍施梯道凡度七百餘所又躡懸緪過河數十餘處皆漢時張騫甘父所不至也次度雪山山遇寒風暴起慧景噤顫不能前語顯曰吾其死矣卿可前去勿得俱殞言絶而卒顯撫之泣曰本圖不果命也奈何復自力孤行遂過山險凡所經歷四十餘國將至天竺去王舍城三十餘里有一寺逼瞑過之顯欲詣耆闍崛山寺僧諫曰路甚險阻且多黑獅子屢經噉人何由可至顯曰遠涉數萬誓到靈鷲身命不期出息非保豈可使積年之誠既至而廢耶雖有險難吾不懼也衆莫能止乃遣兩僧送之顯既至山日將矄夕遂欲停宿兩僧危懼捨之而還顯獨留山中燒香禮拜果夜有三黑獅子來蹲顯前舐唇搖尾顯誦經不輟一心念佛獅子乃低頭下尾伏顯足前顯以手摩之咒曰若欲相害待我誦竟若見試者可使退矣獅子良久乃去明晨還返路窮幽梗止有一徑通行未至里餘忽逢一道人年可九十容服粗素而神氣俊遠顯雖覺其韻高而不悟是神人後又逢一少僧顯問曰向耆年是誰耶答云頭陀迦葉大弟子也顯追至山所有橫石塞山口遂不得入顯流涕而去進至迦施國後至中天竺於摩竭提邑波連弗阿育王塔南天王寺得摩阿僧祗律又得薩婆多律抄雜阿毗曇心線經方等泥洹經等顯留三年學佛語佛書躬自書寫於是持經像寄附商客到獅子國顯同旅十餘或留或亡顧影惟己常懷悲慨停二年復得彌沙塞律長雜二含及雜藏並漢土所無既而附商人大舶循海而還舶有二百餘人值黑風水入衆皆惶懼即取雜物棄之顯恐棄其經像唯一心念觀世音任風而去得無傷壞經十餘日達耶婆提國停五月復隨他商東適廣州舉帆二十餘日夜忽大風合舶震懼衆皆曰載此沙門使我等狼狽共欲推之法顯檀越勵聲呵商人曰漢地帝王奉佛敬僧我自至彼告王必當罪汝商人相視失色俯仰而止既水盡糧竭惟任風隨流忽至岸見藜藿菜依然知是漢地但未測何方即乘船入浦尋村見獵者二人顯問何地獵人曰此是青州長廣郡牢山南岸獵人還以告太守李嶷嶷素敬信聞沙門遠至躬自迎慰顯持經像隨還頃之欲南歸青州刺史請留過冬顯曰貧道投身於不返之地志在弘通何得久停遂南造京師就外國禪師佛馱跋陀於道揚寺翻譯經律論等百餘萬言流布教化宿命篇引證古時畜生所以能語今時畜生所以不能語謂劫初時先有人天未有三惡從人天中來以宿習近故是以能語今時畜生從三惡道中來是以不能語又婆沙論說謂於生處自性能知過去宿命乃知他心於其生處不假修因自性而知此智遍通五趣若諸有情住在母胎及出胎時不受衆病迫窄苦者皆應能憶過去生事但由母病及迫窄苦皆悉忘之如鬼趣中亦有生處得智知他心等昔有女人為鬼所魅嬴瘦將死咒師問鬼汝今何為惱此女人鬼便報言此女過去五百生中嘗害我命我亦過去五百生中常害彼命怨怨相報於今未息彼若能捨我亦捨之咒師因報彼女人曰汝若惜命當捨怨心女人報言我亦捨矣鬼觀女意都不捨怨恐命不全妄言已捨遂斷其命畜生趣中亦有宿命智如婆沙論中昔有一女置兒在地緣行他處時有一狼將其兒去其母趁言汝狼何以將我兒去狼即報言汝是我怨曾於五百生中嘗食我兒我今還欲於五百生殺害汝子此乃怨仇相報何以生瞋作是報已復更語言若汝能捨怨害者我則放汝之子兒母報言我捨怨心時狼即便起坐思惟觀彼女人之心仍知不捨還復語言汝雖口言心猶不捨作是語已即便斷其兒命而去此乃自識宿命知彼之心最為良驗宿習部如佛說師子月佛本生經云佛在王舍城迦蘭陀竹園與大比丘衆千二百五十比丘百菩薩俱爾時衆中有一菩薩比丘名婆須蜜多遊行竹園間緣樹上下聲如獼猴或旋三鈴作那羅戲時諸長者及行路人兢集看之時耆闍崛山八萬四千金色獼猴集菩薩所菩薩復作種種變現令其歡喜有一梵志上啓頻婆沙羅王即敕長者迦蘭陀曰此諸釋子多聚獼猴在園如來知不長者啓王婆須蜜多作變化事令諸獼猴一時歡喜諸天雨華持用供養爾時大王前後導從往詣佛所遙見世尊身放光明如紫金山普令大衆同於金色尊者蜜多及八萬四千獼猴亦作金色時諸獼猴見大王來作種種變中有採華奉上大王者大王見已與諸大衆俱至佛所作禮右繞三匝卻坐一面白佛言此諸獼猴宿有何福身作金色復有何罪生畜生中尊者蜜多復宿植何福生長者家出家學道復有何罪雖生人中諸根具足不持戒行與諸獼猴共為伴侶歌語之聲悉如獼猴惟願世尊為我分別佛告大王乃往過去無量億劫前有佛出世名曰燃燈彼佛滅後有諸比丘於山澤中修行佛道堅持禁戒得阿羅漢時空澤中有一獼猴至羅漢所見羅漢坐禪入定即取羅漢坐具披作袈裟偏袒右肩手擎香爐繞比丘行時彼比丘從定覺已見此獼猴有好善心即為彈指告獼猴言法子汝今應發無上道心獼猴聞說歡喜踴躍五體投地敬禮比丘爾時比丘即為獼猴說三皈依懺無量罪獼猴依教發願已竟踴躍歡喜走上高山懸樹墮死由受五戒破畜生業即生兜率天上值一生補處菩薩為說道心即持天華下空澤中供養羅漢羅漢見已即便微笑告言往返去此閻浮提有佛出世名曰寶慧如來至涅槃後於像法中有一比丘名蓮花藏多與國王長者居士而為親友邪命諂曲不持戒行身壞命終落阿鼻獄具受諸苦壽命一劫劫盡更生如是經歷諸大地獄滿八萬四千劫從地獄出墮餓鬼中吞飲鎔銅經八萬四千歲從餓鬼出復墮牛豬狗猴中各五百身緣前供養持戒今得生天彼獼猴者雖是畜生一見羅漢受持三皈及以五戒緣前功德超越千劫從是以後值佛無數淨修梵行具六波羅蜜住不退地於最后身次彌勒後當成阿耨菩提佛告大王欲知彼國師子月佛者今此會中婆須蜜多比丘是也王聞此語即起合掌向婆須蜜多頭面著地接足為禮懺悔前罪佛告大王欲知此等八萬四千金色獼猴者乃是過去拘樓秦佛時波羅奈國拘睒彌國二國之中共有八萬四千比丘尼行諸非法犯諸重禁狂愚無智如癡獼猴時有羅漢比丘尼名善安隱具為說法見諸惡人不生善心即起慈悲身升虛空作十八變時諸惡人見變化已各脫金環散阿羅漢尼上願我生生身作金色時諸惡人身壞命終墮阿鼻地獄次第經歷至九十二劫從地獄出五百身中恆為餓鬼從餓鬼出一千身中常為獼猴身作金色佛告大王身口意業不可不慎爾時王聞佛說對佛懺悔豁然意解成阿那含王所將八千人求佛出家並成羅漢餘一萬六千人皆發菩提心八萬諸天亦俱發心八萬四千金色獼猴聞昔因緣慚愧自責繞佛千匝向佛懺悔各發無上菩提心次第出世同共一劫劫名大光同名並金光明如來感應緣二驗晉羊大傅祜字叔子泰山人也西晉名臣聲冠區夏年五歲時嘗令乳母取先所弄指環乳母曰汝本無此於何取耶祜曰昔於東垣邊弄之落桑樹中乳母曰汝可自覓祜曰此非先宅兒不知處後因出門遊望徑而東行乳母隨之至李氏家乃入至東垣樹下探得小環李氏驚悵曰吾子昔有此環常愛弄之七歲暴亡亡後不知環處此亡兒之物也云何持去祜持環走李氏遂問之乳母既說祜言李氏悲喜遂欲求祜還為其兒堅中解喻然後得止祜後為荊州都督鎮襄陽經給武當寺殊餘精舍後因懺悔敘說因果乃曰前世承有諸罪賴造此寺故獲申濟也隋開皇中魏州刺史博陵崔彥武因行部至一邑愕然驚喜謂從者曰吾昔常在此邑中為人婦今知家處因乘馬入修巷屈曲至一家命叩門主人公年老走出拜謁彥武入家先升其堂視東壁上去地六七尺謂主人曰吾昔所讀法華經并金叉五隻藏此壁中其經第七卷尾後紙火燒失文字吾今每誦此經至第七卷尾恆忘失不能記得因令左右鑿壁果得經函開第七卷尾及金叉並如其言主人涕泣曰亡妻存日常誦此經叉亦是其處彥武曰庭前槐樹吾欲産時自解頭髮置此樹穴中試令人探樹中泉得髮於是主人悲喜彥武留衣物厚給主人而去至誠篇求寶部大志經云昔有國名歡樂有居士名摩訶檀生一子姿容端正墮地便語發願誓言我當布施利濟貧窮父母因名大意至年十七為衆生故發意入海取明月寶珠以濟衆生初入海中至白銀城復至金城又前行至水晶城各龍王與明月珠自二十四十至六十里寶復前行至琉璃城龍王與明月珠有八十里寶龍王遂發願言後得道時願我為弟子淨意供養過於今日令長得智慧大意受珠而去欲還本國經歷海中諸海神王因化作人與大意相見問言聞卿得奇異之物幸借視之大意舒手示其四珠海神便搖其手使珠墮水大意即語海神言我自勤苦經涉險阻得此珠來汝反奪我今不相還我當抒盡海水海神知之問言卿志奇高海深三百三十六萬由旬其廣無涯奈何竭之如日終不墮地如大風不可攬束日尚可墮風尚可攬大海水不可抒令竭也大意笑言我自念前後受身生死壞敗積骨過於須彌山其血流過五河尚欲斷生死之根本但此小海何不可抒我昔供養諸佛誓願勇決所向無難當移須彌山竭大海水終不退意便一心以器抒海水精誠之意四天王來助大意抒水三分已二於是海中諸神皆大振怖共言今不還珠非小故也水盡泥出壞我宮室海神於是便出衆寶以與大意大意不取但願得我珠海神便出珠還之大意得珠還其本國恣意大施自後境界無復饑寒窮乏求忍部智度論云有大力毒龍以眼視人弱者即死以氣噓人強者亦死時龍受一日戒出家入林樹間思惟坐久疲懈而睡龍法眠時形狀如蛇七寶雜色獵者見之驚喜言曰以此希有難得之皮獻上國王以為船飾不亦宜乎便以杖案其頭刀剝其皮龍自念言我力能傾國土此一小物豈能困我我今以持戒故不計此身當從佛語自忍閉目不視閉氣不喘憐愍此人為持戒故一心受剝不生悔意既以失皮赤肉在地時日大熱宛轉土中欲趣大水見諸小蟲來食其身為持戒故不復敢動自思惟言我身以施諸蟲為佛道故今已肉施以克其身後以法施以益其心身乾命終即生忉利天上畜生尚能堅持禁戒至死不犯況復於人寧容故犯濟難部感應緣三驗唐貞觀年中有河東董雄為大理寺丞少來信敬蔬食十年至十四年中為坐李仙童事侍御韋琮鞫問甚急因禁數十人大理丞李敬玄司直王欣雄與同屋囚鎖專念普門品日得三千遍夜坐誦經鎖忽自解落地雄告守者監察御史張守一以火燭之見鎖不開而相離甚怪又重鎖紙封書上而去雄如常誦經五更中鎖又解落有聲雄又告李敬玄視之封題如故而鎖自相離敬玄素不信佛法其妻誦經常謂曰何為胡人所媚而讀此書耶及見雄此事乃深悟不信之咎方知佛為大聖也王欣亦誦八菩薩名滿三萬遍晝鎖解落視之如雄臺中內外皆異其事不久俱免唐終南山悟真寺釋法誠俗姓樊雍州萬年縣人幼小出家止藍田王效寺常誦法華用為恆式法華三昧翹心奉行澡浴中表溫恭朝夕夢感普賢勸書大教誠曰大乘也即重嚫匠工令書八部般若香臺寶軸莊嚴成就又於寺南橫嶺造華嚴堂煙山闡谷列棟開甍前對重巒右臨斜谷吐納雲霧下瞰雷霆實奇觀也誠每燒香供養在其案前點墨之間剋心鑽注時感異鳥形色希世飛入堂中徘徊鼓舞下至經案復上香爐攝靜住看自然馴擾貞觀初年復畫千佛鳥又飛來登上匠背營齊供慶又自寫法華經正當露地因事他行忘收舉忽屬洪雨滂注溝澗走往看之案獨乾燥餘並波流又青泥坊側有古佛龕周氏瘞藏誠夜夢其處大有尊形既寤往開恰獲龕像至貞觀十四年夏末忽感餘疾顧侍人曰吾聞諸行無常生滅不住九品往生此言驗矣今有童子相迎久在門外吾今去世爾等好住佛有正戒無得有虧言已光明照於楹內又聞異香苾芬但端坐儼思不覺其神已逝唐武德時河東有練行尼法信常誦法華經訪工書者一人數倍酬直特為淨室令寫此經一起一落然香燻衣仍於寫經之室鑿壁通外加一竹筒令寫經人每欲出息輕含竹筒吐氣壁外寫經七卷八年乃畢供養殷重盡其恭敬龍門僧法端常集大衆講法華經以此尼經本精定遣人請之尼固辭不與端責讓之尼不得已付端及開讀惟見黃紙了無文字更開餘卷悉皆如此端等慚懼即送還尼尼悲泣受以香水洗函沐浴頂戴繞佛行道於七日七夜不暫休息既而開視文字如故神異篇斤通部如大方等大集念佛三昧經云大目連答阿難言憶念我昔取此三千大千世界悉內口中其時衆生無一念驚覺往來想復念我昔在世尊前作師子吼能以須彌內於口中能過一劫若減一劫如是為常復念往昔至於東方住彼等三千世界有一大城名曰寶門於彼有六萬億千家我於彼中一一皆現己身而為說法安住正法爾時阿難念言我昔取一袈裟投置地上時大目連第一上座威神如是既不能取乃至不能舉令離地云何手擎阿難又念我昔居世尊前作師子吼時諸外道欲共我較隱身說法惟除世尊一切知見大力菩薩自外所有聲聞弟子乃至外道而問我隱沒身時住在何處終不能知我身所在爾時大迦葉答阿難言我念一時在世尊前作師子吼於此三千大千世界須彌諸山之屬以口一吹能令破散乃至無有如微塵許其有衆生住彼山者不令損害亦無覺知如是諸山皆滅我又一時於大千世界一切大海河池諸水乃至無量那由他百千水聚以口一吹皆令乾渴而彼衆生不知不覺我又一時在大衆前作師子吼於三千大千世界之內以口一吹即令大火熾然遍滿猶如劫燒終不使損一衆生爾時彌勒文殊諸大菩薩等聞大迦葉作師子吼便化華聚若須彌山乃至再三散迦葉上復化作大七寶蓋住虛空中覆大迦葉頂并覆一切聲聞大衆爾時富樓那答阿難言我念昔時有諸衆生應以通化者便為彼取三千大千世界以手摩之開示彼等當爾之時無一衆生有驚怖想唯彼衆生有應與化者乃見我手摩此世界又我能取三千世界以手回轉不以為難又我能於世尊前以一指節取此三千世界一切水聚皆令入我手指節間無一衆生有損減想我又一時於初夜中以淨天眼觀此大千世界所有無量衆生疑惑不出是定皆為除疑令彼衆生各作斯念我蒙尊者獨住我前為我宣說隨機獲益無有滯礙爾時羅睺羅答阿難曰我念往昔以此三千大千世界諸山之類皆納一毛孔中我身如本衆生不異我又一時取此大千世界所有大海河池水類悉入毛孔我身無損衆生無礙一切水聚各皆如本我又一時此處入禪即於東北至一佛界佛號難勝現身禮敬已即還此界求栴檀香還持供佛香氣遍滿皆作無量種種變化爾時須菩提答阿難言我念一時入於三昧此大千世界弘廣若斯置一毛端往來旋轉如陶家輪當爾之時無一衆生有驚懼心亦不覺知已之何處我又往昔於如來前作師子吼白言世尊如此大千世界我能以口微氣一吹皆令散滅其中衆生不驚不迫無往來想復於佛前能以大千世界所有衆生皆悉安置一指節端上至有頂還來本處令彼衆生無往返想又念一時宴坐三昧見十方諸佛無量無邊百千世界各有六萬諸佛昔所未見今皆見知以是定心復發神力至須彌頂天帝釋邊撮取一掬栴檀木香往彼無量諸世界中供養向時爾許如來彼界衆生皆悉明了見我住是閻浮供養承事降邪部如阿育王經云昔阿恕伽王深信三寶供養佛法衆僧諸婆羅門外道等皆生嫉妒共相集聚揀選宿舊取五百人皆誦四韋陀典天文地理無不博達共集議言阿恕伽王一切盡供養剃髮頭禿人我等宿舊未曾被問當設何方便使彼意回有一善祝婆羅門語諸婆羅門言諸賢但從我後卻後七日我當以祝力作魔醯首羅身飛行到王宮門汝等皆當步從我後能使其大作供養到七日時善祝飛到王宮諸婆羅門亦皆侍從遣人白王言虛空中有魔醯首羅將四百九十九婆羅門從空來下今在門外欲得見王阿恕伽王喚使來前坐於西廂床上王言欲何所須答言須飲食即敕廚中擎五百案飲食著前魔醯首羅等皆手推言我從生已來未曾食如此食阿恕伽王答曰先不約敕不知當食何食魔醯首羅等皆同聲言我之所食食剃頭禿人阿恕伽王即敕一臣汝往到雞頭末寺語尊者耶奢王宮內有五百婆羅門一自稱言魔醯首羅不知為是人為是惡羅剎請問所以願阿闍黎來為我驅遣使去所使之人是邪見婆羅門弟子作是言正欲得汝沙門作食上座耶奢即語維那鳴椎集僧起辭衆僧言我年已老衆僧安隱護持佛法聽我使去第二上座言上座不應去我身無所堪惟我應去第三者言第二上座不應去還應我去如是展轉乃至沙彌十六萬八千僧中其最下頭七歲沙彌起至衆僧中長跪合掌而作是言一切大僧不足擾動我既幼小不能堪任護持佛法惟願一去上座耶奢極大歡喜手摩沙彌頭言汝合去使人先往阿恕伽言頗有來者不使人答言更相推致令最下沙彌來王即出門迎坐此沙彌著御座上諸婆羅門皆大瞋恚阿恕伽王大不識別我等宿德尚不起迎為此小兒而自出迎沙彌問言何以見喚王時答言此魔醯首羅欲得阿闍梨作食沙彌言我年幼小朝來未食王先施我食然後我當與彼令食王即敕廚宰擎食來與食一案都盡如是擎五百案食皆未足王復敕廚家言所有餘食盡持擎來與沙彌得食忽爾都盡問言足不答言猶未足王言一切飲食悉盡更無有食沙彌言撮下頭婆羅門將來我欲食之即時噉盡如是悉食四百九十九婆羅門皆盡惟有魔醯首羅極大驚怖飛向空中欲去沙彌即時座上舉手從虛空中撮頭來噉王即時驚怕沙彌知王心念即與王言王是佛法檀越終無損減慎莫驚怕王能共至雞頭末寺不王言阿闍梨將我上天入地皆當隨從沙彌即時共王到寺王見沙彌朝所食之食諸衆僧等皆分共食所食五百婆羅門皆剃除髮鬚被著法衣在諸衆僧下行末坐最初食者最在上座魔醯首羅最在行末五百人見王沙彌極生慚愧我等猶如鶴尾俟於爐炭猶如蚊子與金翅鳥角飛猶如小兔與獅子王爭威如此不自度量生慚愧已得須陀洹道胎孕部分別功德經云昔有長者名曰善施家有未出嫁女在家向火暖氣入身遂便有軀父母驚怪請其由狀其女實對不知所以父母重問加諸杖楚其辭不改遂上聞王王復詰責辭亦不異許之以死女即稱怨曰天下乃有如是無道之王枉殺無辜王即檢保語其父母我欲取之母曰隨意王即內之宮中隨時瞻養日月遂滿産得一男端正殊妙年遂長大出家得道聰明博達精進不久得阿羅漢道還度父母又譬喻經云昔有夫妻二人無子祠祀天神以求係胤神即許之遂便懷妊生四種物一者栴檀斗盛米二者甘露瓶三者寶囊四者七節神杖其人歎曰吾求兒子更生餘物便到神所重求所願神即語言汝欲得子何物稱益答曰子當使令給養吾等神云食此米升用之無盡甘露蜜瓶食之無減而消百病珍寶之囊用之無損七節神杖以備凶暴兒子豈能辦此其人大喜還家試驗如言不虛遂成大富國王聞之即遣衆兵欲往攻奪其人擎杖飛遊擊敵衆悉退散雜異部譬喻經云王舍城東南嵎有一汪水城內溝瀆汙穢屎尿盡趣其中臭不可近有一大蟲在江水內身長數丈無有手足而宛轉低昂戲江水中觀者數千阿難往觀蟲即跳踉波浪動涌具以啓佛佛與諸比丘共詣池所佛言昔維衛佛泥洹塔寺有五百比丘經過寺中寺主見大歡喜請留供養三月後五百商人入海採寶還過塔寺見五百比丘精勤行道並各發心當設薄供各捨一珠得五百摩尼珠以寄寺主供僧比丘後生不善心圖欲獨取不為供衆衆僧問言前賈客施珠應當設供寺主言是施我耳若欲奪我糞可施汝若不時去劓汝手足投於糞坑衆愍其癡默然各去又智度論云佛在世時有人遠行獨宿空舍夜中有鬼擔一死人來著其前復有一鬼逐來瞋罵云死人我物汝忽擔來先鬼言是我物我自持來後鬼言是死人實我擔來二鬼各捉一手一足爭之前鬼言此間有人可問後鬼即問是死人誰擔來是人思惟此二鬼力大若實不實俱不免死便語言前鬼擔來者是後鬼大瞋捉其人手捩出著地前鬼愍之急取死人一臂附之如是兩臂兩腳頭脅舉身皆易於是二鬼共食所易人身拭口而去其人思惟我父母生身眼見二鬼食盡今我此身悉是他空我今定有身耶為無身耶行到佛塔問諸比丘廣說上事諸比丘言從本已來恆自無我但以四大和合故計為我身如汝本身與本無異諸比丘度之為道得阿羅漢果又華嚴經云大海中有四寶珠一切衆寶皆從之生若無此四珠一切寶漸就滅盡諸小龍神不能得見惟婆伽羅龍王密置深寶藏中此深寶藏有四種名一名衆寶積聚二名無盡寶藏三名遠熾然四名一切莊嚴聚又大海之中有四熾然光明大寶一名日藏光明大寶二名離潤光明大寶三名火珠光明大寶四名究竟無餘光明大寶若大海中無此四寶四天下金剛圍山乃至非想非非想處皆悉漂沒日藏光明能變海水為酪離潤光明能變海酪為酥火珠光明能然海酥究竟無餘光明能然海酥永盡無餘感應緣五驗晉沙門耆域者天竺人也自西域浮海而來將遊關洛達舊襄陽欲寄載船北渡船人見梵沙門衣服敝陋輕而不載比船達北岸耆域亦上舉船皆驚域前行有兩虎迎之弭耳掉尾域手摩其頂虎便入草於是南北岸奔往請問域無所應答及去有數百人追之見域徐行而衆走猶不及惠帝末域至洛陽洛陽道士往禮域不為起譯語譏其服章曰汝曹分流佛法不以真誠但為浮華求供養耳見洛陽宮曰忉利天宮倣佛似此當以道力成就而生死力為之不亦勤苦乎尚方中有一人廢病數年垂死域往視之謂曰何以墮落生此憂苦下病人於地臥單席上以應器置腹上紵布覆之梵唄三偈梵咒數千語尋有臭氣滿屋域令人舉布見應器中如汙泥者病人遂瘥長沙太守滕永文先頗精進時在洛陽兩腳風攣經年域為咒應時得申滿水寺中有思惟樹先枯死域向之咒旬日樹還生茂時寺中有竺法行善談論時以比樂令見域稽首曰已見得道證願當稟法域曰守口攝意身莫犯如是行者度世去法行曰得道者當授所未聞斯言八歲沙彌亦以之誦非所望於得道者域笑曰如子之言八歲而致誦百歲不能行人皆知敬得道者不知行之即是得京師貴賤贈遺衣物以數千億萬悉受之臨去封而留之惟作幡八百枚以駱駝負之先遣隨佑客西歸天竺域發送者數千人於洛陽寺中中食訖取道有人於是日發長安來見域在長安寺中又域所遣佑客及駱駝達燉煌河上逢佑客弟於天竺來云近燉煌寺中見域弟子漯登者云於流沙北逢域言語款曲計其旬又域發洛陽時也而其所行蓋已萬里隋終南山梗梓谷釋普安姓郭氏雍州北涇陽人也儀軌行法獨處林野專崇禪思常讀華嚴手不釋卷遵修苦行亡身為物常遊山野用施禽獸虎豹雖來臭而不食值周廢教恆共碩德三十餘僧避地終南行乞資給皆獲免難時於子午虎林雨谷合澗之側鑿龕結庵初住龕時上有大石正當其上恐落掘出逐峻崩下安默念曰願移餘處莫碎龕窟石遂送避餘所大衆共怪安曰是華嚴經力也後於龕東石壁澗左有索陀者川鄉巨害縱橫非一陰疾安德恆思誅殄與伴三人持弓挾刃攘臂放箭箭不離弦手張不息怒眼舌噤立住經宿聲相通振遠近雲會鄉人稽首歸誠請救安曰素了不知豈非華嚴力也若欲除免但令懺悔如語教之方蒙解難又龕西魏村張暉者以盜為業夜往安所私取佛油瓮受五斗背負而去既至院門迷昏失性若有所縛不能得動眷屬鄉村同來為謝安曰余不知也蓋華嚴力也語令懺悔得脫有龕南張鄉者來盜安錢袖中持去既達家內寫而不出口噤無言即尋歸懺服過而去又有程郭村程暉和者頗懷信向恆來安所聽受法要因患身死已經兩宿纏尸於地伺欲棺斂安時先往鄠縣返還在道行達西南之德行寺東去暉村五里遙喚程暉和田人告曰和久死矣安尋至村厲聲大喚和遂動身傍親乃割所纏繩令斷安入其庭又大喚之和即忽起匍匐就安安令屏除棺器覆一筥笭以當佛坐令和繞旋尋服如故安愈風聲搖逸道俗崇向隋東都寶揚場釋法安姓彭鴉孤人少出家太白山九隴精舍慕禪為業粗食敝衣到開皇中來至江都王聞召入相見如素王所遊履必齎隨從及駕幸泰山時遇渴乏四顧惟岩無由致水安以刀刺石引水崩注用給王大嗟之問何力致答王力使爾及從王入磧達於泥海中應遭變怪皆預避之無得損敗與王入谷見一僧著敝衣乘白驢而來王問何人安曰斯朗公來迎引也及至寺中又見一神狀甚偉大王又問之答曰此太白山神從王者也春秋八十有八將終告帝曰安亡後百日火起宮內須慎之及至寒食油沸上焚夜中門閉三院宮人一時焚死每呈所表各獲靈徵唐兗州鄒縣人姓張曾任縣尉貞觀十六年欲詣京赴選途經太山因而謁廟廟中府君及夫人并諸子等皆現形像張時遍禮拜訖至於第四子傍見其儀容秀美張咒曰但得四郎交遊詩賦舉措一生分畢何用仕宦及行數里忽有數十馬揮鞭而至從者云是四郎四郎曰向見兄垂殷故來仰謁因而言曰兄欲選今歲不能得官復恐前途將有災難不復須去也張不從執別而去行經一百里張及同伴夜行被賊劫掠裝具並盡張遂咒曰四郎豈不相助有頃四郎車騎畢至即令左右追補其賊顛仆迷惑卻來本所四郎命人決杖數十其賊髀膊皆爛已而別去四郎指一大樹兄還之日於此相呼是年張果不得官歸至本期處大呼四郎俄而即至乃引張云相隨過宅即有飛樓綺觀架迥陵虛雉堞參差非常壯麗侍衛嚴峻有同王者所居張既入中四郎云須參府君始可安坐乃引入十餘重門至大堂下謁拜見府君非常偉絶府君命侍宜曰汝乃能與我兒交遊深為善道宜停一二日宴聚隨便好去即令引出別館盛設珍羞海陸畢備絲竹奏樂歌吹盈耳經一宿張至明旦遊戲庭序窺一院正見其妻於衆官前著枷而立張還堂中意甚不悅四郎問其故張具言之四郎大驚云不知嫂來此也即日往造諸司法所其類乃有數十人見四郎來咸走下階並足而立以手招一司法近前具言此事司法曰須白録事知遂召録事録事回司法斷云此婦女堪別案內常有寫經持齊功德不合即死遂放令歸張與四郎涕泣而別四郎囑云惟作功德可以益壽張乘本馬其妻從四郎借馬與之同歸妻雖精魄事同平素行欲至家去舍可百步許忽不見張大怖懼走至家中即逢兒女號哭又知已殯張即呼兒女急往發之開棺見妻忽起即坐辴然笑曰為憶兒女勿怪先行於是即穌述異記曰南康雩都縣沿江三里名夢口有穴狀如石室常有神雞色如好金出此穴中奮翼回翔長鳴響徹見之輒飛入穴中因號此石為金雞石昔有人乘舟至此崖數里有一人通身黃衣擔兩籠黃瓜求寄載之黃衣人乞食船主與之食訖船至崖下船主乞瓜此人不與仍唾盤上徑上崖直入石中船主初甚忿之見其入石始知神異取向食器視之見盤上悉是黃金吳録曰日南北景縣有火鼠取毛為布燒之而精名火浣布搜神記曰崑崙之墟有災火之山山上有鳥獸草木皆生於災火之中故有火浣布非此山草木之皮則獸之毛也魏文帝時西域使人獻火浣布袈裟即是明驗感通篇述意大唐沙門玄奘法師以貞觀三年季春弔影單身西尋聖跡歷雪山諸蕃梵國具觀佛法又過雪山達印度經十年後返從蔥嶺南雪山北東歸於闐婁蘭等凡經一百五十餘國至貞觀十九年冬初方達京師奉詔譯經兼敕令撰出西域行傳一十二卷聖跡部西域傳云奘師發跡長安漸至高昌從高昌給乘傳送至瞿薩旦那國東境即漢史所謂於闐國也東二百餘里有婫摩城中有栴檀立像高二丈餘極多靈異光明其像本在憍賞彌國是塢陀衍那王所造陵空至此時王都域西百六十里路中大磧有鼠形大如蝟毛金銀色昔北兵來寇王祈鼠靈乃夜齧人馬兵箭斷壞自然走退都城西五百許寺有浮圖高百餘丈多現光相王感舍利數百粒都城西南十餘里有瞿室稜伽山有寺像現光明佛曾遊此為天人說法山岩石室有一羅漢入滅心定待彌勒佛其國南界接東女國又從國城西越山谷行八百餘里至斫句迦國國南有山立多羅漢塔松林茂盛石室深淨有三羅漢現入滅定鬚髮恆長僧常剃之其五印度僧有證果者多止此室又從國西北上大沙嶺度徙多河行五百里至佉沙國從此南行五百里至烏鎩國都城西二百餘里至大山嶺上有塔相傳崖崩中有比丘冥目而坐形甚偉大鬚髮下垂覆於肩面國王以酥灌之擊楗椎此比丘高視曰我師迦葉波佛在耶答曰無已入涅槃又問釋迦佛出世耶告曰已滅度矣即升空化火焚身又西南逾大蔥嶺八百餘里至朅盤陀國其國東南有大石室二口各一羅漢入滅定又越三國行四千餘里至達摩鐵悉帝國都城寺內有石像上懸金銅圓蓋衆寶飾之人有旋繞蓋亦隨轉人止便止四周石壁莫測其然自高昌至於鐵門凡經一十六國其鐵門者即是漢之西屏鐵門之關南出斯門千餘里東據蔥嶺西接波斯南大雪山北據鐵門縛芻大河中境西流博叉河其境自分為二十國又願北下從呾蜜國越十三國至縛喝國土地華博時俗號為小王舍城國近葉護南衙也王都城外西南寺中有佛澡罐可容升許雜色炫曜金石難名又有佛牙長寸餘廣八九分色黃白而光淨王城西北五十里有提謂城王城正北四十餘里有波利城各有浮圖高三丈許各表靈跡又度兩國東南入大雪山至梵衍那國度大雪山東寺有佛齒又有金輪王齒又有商諾迦縛婆即商那和修大阿羅漢鐵鉢可受九升并九條僧伽胝絳赤色草皮之所績成阿難當度時變為法服受具已後又變為九條其齒鉢等並用金緘之又東入雪山逾黑嶺至伽畢試國東三里山下有大寺佛院東門南大神王像右足下有大寶藏寺北嶺上有數石室亦多藏寶寶西三里大嶺上有觀自在像城東南四十餘里曷邏怙羅寺浮圖高百餘丈王都城西北二百餘里大雪山頂有龍池山下為龍立寺塔中有佛骨肉舍利升餘有時煙起如火猛焰漸滅之時方見舍利狀如白珠繞柱入雲還下塔中又此東南往古王寺有佛頂骨一片廣二寸餘色黃白髮孔分明至大唐龍翔元年春初使人王玄策從西國將來宮內供養又此寺有神髮青色螺旋右縈引長丈餘又西南古王妃寺金銅浮圖高百餘尺舍利升餘每十五夜旋光繞盤曉入塔中城西南北羅婆路山頂盤石上有塔高百餘丈舍利升餘山北岩泉是佛受山神飯已漱口嚼楊枝因成茂林寺號楊枝又從龍池東六百餘里越雪山度黑嶺至北印度界已前並是北地名為邊國又東行至濫波國即是印度之北境三垂大海地形南狹如月上弦川平廣衍周萬九千里七十餘國依一王命又東行百餘里逾大嶺大河至那伽羅曷國屬北印度名花氏城城東二里有石塔高三百丈編石峙起雕鏤非常此即昔時值燃燈佛授記獻鹿皮衣髮布掩泥之地此無憂王建此石塔每於齊日天輒雨華又城內大塔高三丈餘云從空而來既非人工實多靈異城西南十餘里有塔是佛自中印度凌空來降跡處次東有塔是昔值燃燈佛買華處又城東二十餘里小石嶺上有塔高二百餘尺東岸石壁大洞穴是龍王所居塔外方石有佛足跡輪相發光窟西北隅塔者佛經行處又側有髮爪塔窟西石上有濯袈裟文又東三十餘里有醯羅城中有重閣上安佛頂骨又有佛髑髏狀如荷葉有佛眼睛大如李許清白映徹以寶函盛緘封有佛大衣細㲲黃色有佛錫杖白鐵作環栴檀為笴斯五聖跡又東南山谷行五百里至健陀邏國屬北印度有大脅尊者造毗婆沙處又有菩薩捨千眼處又有佛化鬼子母處又有商莫迦菩薩即睒子被王射處又有彈多落迦即檀特山山嶺上是蘇達拏棲隱之所又此城北越山行六百餘里至烏仗那國此北印度之正國也王都城東五里有大塔佛昔作忍仙為羯利王支解之處又有佛昔聞法析骨寫經處又有昔尸毗迦王割身代鴿處又有佛昔為慈力王刺血飲五藥叉處又大寺中有刻木梅呾麗耶舊云彌勒菩薩像金色晃朗高百餘尺是末田底迦阿羅漢所造羅漢以神通力引匠升睹史多天三返觀相乃成又隔一國渡河至呾叉始羅國屬北印度王都城西北七十里有兩山間塔高百餘尺佛昔說慈氏興世四大藏者此地出一又有衣羅鉢龍王聽經之池月光抉日之地又有薩埵王子捨身飼虎處以竹自刺血啖獸地及草木今猶絳色又有佛化藥叉不食肉處又隔二國東南登山乘鐵橋千餘里至迦濕彌羅國屬北印度國內有四浮圖各有舍利佛滅度後四百年有脅尊者年八十方出家證無學果將五百羅漢來此造塢波弟鑠釋素呾纜藏舊云優婆提捨論次造毗奈耶毗婆沙論次造阿毗達摩論此三論各有十萬頌凡有六百六十萬言備釋三藏兼有佛牙又有觀自在菩薩立像又隔三國東行至那僕底國屬北印度都城東南五百餘里至暗林寺周二十餘里佛舍利塔數百千區并石室等有賢劫千佛立此說法釋迦滅後三百年迦多衍那舊名迦栴延於此造大智論寺塔高二十餘丈有四佛行坐跡處又隔四國東行至秣兔羅國屬中印度王都城內有三塔四佛遺跡甚多及舍利子沒特伽羅子即目連滿慈子即富婆那優婆釐即優婆離阿難陀羅怙羅曼殊室利等諸塔又隔一國東北四百餘里至窣祿勒那國屬中印度東境臨殑伽河即恆河北接大山城東南閻牟那河河西大寺東門外塔佛曾於此說法度人其側有佛髮爪塔閻牟河東八百餘里至殑伽源廣三四里東南入海廣十餘里水色滄浪味甘砂細隨水而流俗謂福水又隔六國於此東南行至劫比他國屬中印度中有天祠十所皆作天像謂諸衆生從天根生也王都城東二十餘里大寺側大垣內有天帝釋為佛造三道寶階中皆附黃金左以水晶右用白銀佛從逝多林即祗陀林升天至善法堂為母三月說法下降處又有佛澡浴處又其側佛經行石基長五十步高七尺足可覆處皆是蓮花文又基左右小塔梵王所造次前是蓮花尼化為輪王先見佛處有蘇部底即須菩提宴坐石室知諸法空此先見吾法身也又從此北行二百餘里至羯若鞠闍國是中印度曲女城也都城西近殑伽河長二十餘里廣四五里即統五印度之都王也又城東南百餘里有塔佛曾七日說法處中有舍利時放光明其側有佛行坐跡寺北四里臨殑伽河有塔佛曾說法五百餓鬼解悟生天又至阿輸陀國屬中印度都城北五里殑伽河岸大寺中塔佛為天人三月於此說法次西五里有佛髮爪塔城西南五里大庵是阿僧伽菩薩夜升天宮於彌勒所受瑜伽莊嚴大乘經論及中邊論等為衆說之林又隔二國東南行至鉢羅伽耶國屬中印度又有提婆菩薩作廣百論處城中有天祠堂前大樹枝葉蒙密有食人鬼依之左右遺骸為𧂐城東十餘里王豪諸貴諸有捨施號為大施場場東合流口日數人自溺而死彼族名天生所也又從此西南大林野行五百餘里至憍償彌國屬中印度王城內故宮大精舍高六十尺刻檀佛像上懸石蓋即塢陀衍那王所造又從此北行一百八十里至鞞索伽國屬中印度王城南有寺塔高二十餘丈佛曾於此六年說法其側有奇樹高七十丈春冬不改是佛淨齒木葉側有四佛行坐跡又從此東北五百里至寶羅伐悉底國屬中印度即舍衛國城南六里許有逝多林是給孤園太子所造寺也又南有大坑是瞿伽離比丘毀佛生身陷處又南八百步大深坑是戰遮婆羅門女毀謗佛生身陷處又東百餘步大深坑是調達欲毒佛生身陷處寺東七十步有精舍名曰影覆高六十尺中有東面坐像與外道論處次東天祠量同精舍初日影西不蔽佛舍曉日蔭東遂覆天祠又東四里火涸池是毗盧釋迦王即琉璃王陷入地處又東南行五百里至劫比羅伐窣堵國屬中印度即迦毗羅國城南有塔是太子捔力擲象越城墮地為大坑處其側有精舍作太子像及受業處其傍有精舍是妃寢處作耶輸陀羅并羅怙羅像又城東南隅精舍中作太子乘白馬凌空踰城處四城門各有精舍作老病死沙門像城南五十里故城中塔是人壽六萬歲時迦羅迦村馱佛本生城又東北三十餘里故城中塔是人壽四萬歲時迦諾迦牟尼佛本生城無憂王為建立石柱銘記之城東北四十里有太子生樹下塔城南尼拘律樹塔是佛初來見父王處城南門外塔是太子兄弟捔射處東南三十餘里是太子射矢沒地因涌泉流又從此東行二百餘里荒村中至藍摩國屬中印度城東南有佛塔是太子至此解寶衣中末尼珠付闡鐸迦還父王處其側塔者剃髮處又西南塔高百餘丈佛成道已初轉法輪處其側三塔即昔三佛行坐處傍有諸佛塔是五百獨覺入滅度處又側一塔是慈氏菩薩受記處又西一塔是佛過去為護明菩薩迦葉波佛授今佛成道處寺西有清池周三百步佛昔盥浴次西小池佛嘗滌器處次北小池佛嘗浣衣處又東北度殑伽河行一百五十餘里至吠舍釐國屬中印度都城西北六里有寺塔是說維摩經處又東是舍利子證果塔寺東北四里許有塔是維摩故宅基尚多靈神於大唐顯慶年中敕賜衛長史王玄策因向印度過淨明宅以笏量基止有十笏故號方丈之室也次後一塔是佛最後觀城邑處次是菴羅女以園施佛處其側一塔是佛三告阿難涅槃處又側一塔是千子見父母處即賢劫千佛也城東南十五里大塔是七百賢聖重結集處殑伽河南北岸各有一塔是阿難陀分身與二國處又隔一國西北行一千五百里入山谷至尼波羅國屬北印度都城東南不遠有水火村東一里許有阿耆波沴水周二十步旱潦湛然不流常沸家火投之遍池火起煙焰數尺以水灑火火更增熾碎土以投亦即然盡無間投者並成灰燼架釜水上煮食立熟此是火龍所護城南十餘里孤山特秀寺居重疊狀若雲霞又從南行百五十里度殑伽河至摩揭陀國屬中印度王舍城山北東二百四十里臨殑伽河故宮北石柱高數丈昔無憂王作地獄處石柱南有大塔即八萬四千之一塔也安佛舍利一升時有光瑞其側精舍中有大石是佛欲涅槃北趣拘尸南顧摩揭故蹈石上之雙足跡長尺八寸廣六寸輪相華文十指各異貞觀二十三年有使圖寫跡來佛自東北岡上頂欲入金剛定振地搖山神懼告佛又至西南半崖中面間坐石地山又震淨居天告曰此西南十五里近苦行處畢鉢羅樹下金剛座處是菩提座三世諸佛咸此成正覺佛方就之仍為石室龍留影也世稱名地其菩提樹周垣磚壘以崇固之奇樹名花連陰列植正門東開對尼連河南門接大花池西厄險固北門通大寺其院內聖跡諸塔列多樹垣正中金剛座上者賢劫初成與大地俱大千界中下極金輪上至地際金剛所成周百餘步千佛同座入金剛定證道之處又依王玄策行傳云西國瑞象無窮且録摩訶菩提樹像云昔師子國王名尸迷佉拔摩遣二比丘來詣此寺禮菩提樹金剛座訖此等不安置其二比丘乃還本國王問比丘往彼禮拜聖所靈瑞云何比丘報云閻浮大地無安身處王聞此語遂多與珠寶使送與此國又金剛座上尊像元造之時有一外客來告大衆云我聞募好工匠造像我巧能作此像大衆語云所須何物其人云惟須香及水及料燈油芠料既足語寺僧云吾須閉門營造限至六月慎莫開門亦不勞飲食其人一入即不重出唯少四日不滿六月大衆評議見疑遂開塔門乃不見匠人其像已成惟右妳上有少許未竟一切道族規模圖寫聖變難定王使至彼請諸僧衆及此諸使人至誠殷請纍日行道懺悔方得圖畫倣佛周盡直為此像出其經本向有十卷將傳此地其匠宋法智等巧窮聖容圖寫聖顏來到京都道族兢模又依王玄策傳云此漢使奉敕往摩伽陀國摩訶菩提寺立碑至貞觀十九年二月十一日於菩提樹下塔西建立住持篇說聽部為利養五欲名聞而說經者事同貿易速滅正法故云栴檀貿易凡木如我弟子為供養故向諸白衣演說經法白衣情逸不喜聽聞白衣處高比丘在下徒以種種飲食而供給之又云以金貿易鋀石鋀石譬色聲香味觸金譬於戒我諸弟子以色因緣破所受戒又云以銀貿易白鑞銀喻十善鑞喻十惡我諸弟子放捨十善行十惡法又云以絹貿易氀褐氀褐喻無慚愧絹喻慚愧我諸弟子放捨慚愧習無慚愧又云以甘露貿易毒藥毒藥喻種種供養甘露喻諸無漏法我諸弟子為利養故向諸白衣自譽讚言那得無漏醒世卷五目録闡發敬信使人知虔奉在內不在外潛遁篇感應緣八驗妖怪篇引證變化篇厭欲部感應緣二驗眠夢篇三性部不善部感應緣二驗興福篇興福部生信部校量部修造部雜福部洗僧部感應緣四驗攝念篇引證法服篇感應緣一驗然燈篇感應緣一驗懸幡篇引證香華篇感應緣六驗唄讚篇述意引證音樂部感應緣四驗
