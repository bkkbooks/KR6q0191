body:
  text: 武原居士徐昌治覲周編輯金粟寺住持行元百癡校閲敬塔篇引證觀佛三昧經云佛留影石室在那乾呵羅國毒龍池側佛坐龍石室窟中為龍作十八變踊身入石猶如明鏡在於石內映現於外諸天百千供養佛佛影亦說法又集經云忉利天城東照明園中有佛髮塔城西歡喜園中有佛鉢塔城北駕御園中有佛牙塔又育王傳云王得信心問道人曰我從來殺害不必以理今修何善得免斯殃答曰唯有起塔供養衆僧救諸徒囚賑濟貧乏王曰何處可起塔道人即以神力左手掩日光作八萬四千道散照閻浮提所照之處皆可起塔時王欲建舍利將四部兵衆至王舍城取阿闍世王佛塔中舍利還復修治此塔便取七佛塔中舍利時王取八萬四千金銀琉璃玻璃筐盛佛舍利又作八萬四千寶瓶以盛此筐又作無量百千幡幢傘蓋使諸鬼神各持舍利供養之具敕諸鬼神於閻浮提至於海際城邑聚落滿一億家者為世尊立塔感福部又涅槃經云若於佛法僧供養一香燈乃至獻一華則生不動國善守佛僧物塗掃佛僧地造像塔如母指常生歡喜心亦生不動國此即淨土嘗嚴不為三災所動也佛告阿難昔迦葉佛入涅槃後有迦翅王收其舍利造四寶塔時有長者見豎塔棖心生隨喜持一金錢安著塔下發願而去緣是功德不墮惡道天上人中常有金錢受福快樂旋繞部賢者五戒經云旋塔三匝者表敬三尊一佛二法三僧亦念滅三毒一貪二瞋三癡又三千威儀云繞塔有五事一低頭視地二不得踏蟲三不得左右顧視四不得唾塔前地五不得中住與人語故塔部又云掃塔上有五事一不得著履上二不得背佛掃塔三不得取上善土持下棄四不當下佛像上故華五當旦過澡手自持淨巾還拭佛像又正法念經云若有衆生淨心供養衆僧掃如來塔命終生意躁天其身淨潔猶如明鏡若有衆生見有佛塔風雨所壞若僧房舍以福德心塗飾治補復教他人令治故塔命終生白身天其身鮮白入珊瑚林諸天娛樂又雜寶藏經云若掃僧房一閻浮提不如掃佛塔一手掌又百緣經云昔佛在世時與諸比丘到恆河邊見一故塔毀落崩壞比丘問佛此是何塔朽故乃爾佛告比丘此賢劫中波羅奈國梵摩達王正法治化唯無子息禱祀諸神時王國中有一池水生一蓮華其華臺中有一童子結跏趺坐有三十二相八十種好口出優鉢羅華香身諸毛孔出栴檀香王及妃后見甚歡喜即抱還宮養育漸大隨其行處蓮華承足因名栴檀香後悟非常成辟支佛身升虛空作十八變尋入涅槃王收舍利起塔供養是彼塔耳比丘問佛宿植何福受斯果報佛告比丘乃往過去拘樓孫佛時有長者子甚好淫色見一淫女心生耽著無財可與遂至塔中盜華與之乃共夜宿曉即身體生其惡瘡痛不可言喚醫療治醫占云須牛頭栴檀用塗瘡上可得除愈時長者子即賣家宅得於金錢滿六十萬尋用買香止得六兩擬用塗瘡心自思惟即語醫言我今所患乃是心痛即持所買牛頭栴檀搗以為末入其塔中發誓願言如來往昔修諸苦行誓度衆生隨其厄難我今此身隨一生數唯願世尊慈悲憐愍除我此患作是誓已用香塗塔以償華價至心供養求哀懺悔瘡尋得差身諸毛孔有栴檀香緣是功德不墮惡道天上人中嘗受快樂隨其行處蓮華承足又雜寶藏經云昔舍衛國中有一長者造立塔寺後時命終生忉利天其婦晝夜追憶夫故愁憂苦惱常掃治夫所造塔寺夫下觀見即來婦所問訊安慰而語之言汝憶我故大憂愁耶婦問是誰夫尋答言我是汝夫以作塔寺功德因緣得生天上見汝憶我修治塔寺故來汝所婦言近我夫即答言人身臭穢不復可近汝復欲得為我妻者勤供佛僧修掃塔寺願生我天若得生天我還當以汝為妻婦用夫語作諸功德發願生天其後命終得生天上復為夫婦夫婦相將來至佛所佛為說法夫婦並得須陀洹果既得果已還歸天上又分別功德云昔舍衛城中有夫婦二人而無子息夫婦精進信敬三寶時婦早亡由信敬故生忉利天以為天女面首端正天中少比天女自念我極端正誰任我夫便以天眼觀見本夫今已出家勤掃塔廟見其掃塔必應生天天女尋下光明照耀住其夫前比丘見已問其因緣天女答曰我是君婦今為天女我觀天上無任我夫見君精進嘗勤掃塔必應生天若得生天願同一處還為我夫白意訖還歸天上時夫比丘見此事已從是以後倍加精進修補塔廟積功轉勝應生第四兜率天上天女憶夫復來語言君福轉勝應生兜率天我今不復得君為夫語訖還去比丘聞已倍更精進遂獲得阿羅漢果三明六通具八解脫感應緣九驗晉太康二年有并州離石人劉薩訶忽於中夜聞土下鐘聲即遷記其處刺木為剎三日間忽有寶塔及舍利從地涌出靈塔相狀青色似石非石高一尺四寸方七寸五層露槃似西域于闐所造面開窗子四周天全中懸銅磬繞塔身上並是諸佛菩薩金剛聖僧雜類等像狀極微細瞬目注睛乃有百千像現面目手足咸具備焉武德七年日嚴寺廢僧徒散配其舍利塔無人守護時有道宣律師門徒十人配住西市南長壽坊崇義寺乃發掘塔下得舍利三枚白色光明大如黍米并瓜一枚少有黃色并白髮數十餘有雜寶琉璃古器等總以大銅函盛之將至崇義寺佛堂西南塔下周西京扶風縣岐山南古塔鄉曰鳳泉周魏以前寺名阿育王至顯慶四年九月內有山僧智琮慧辨能解咒術見追入內語及育王塔事年歲久遠須假弘護帝曰豈非童子施土之育王耶若近有之則八萬四千之一塔矣能得舍利深是善因可前至塔所七日行道祈請有瑞乃可開發即給錢五千貫絹五千匹以充供養琮與給使王長信等於十月五日從京旦發六日逼夜方到琮即入塔內專精苦到行道久之未驗至十日三更乃臂上安炭火燒香懍厲專注忽聞塔內像下振裂之聲尋聲往觀乃見瑞光流溢霏霏上涌塔內三像足下各放光明赤白緑色旋繞而上至於衒角合成帳蓋琮大喜踊躍乃睹塔內側塞僧徒合掌而立王長信等同睹瑞相及旦看之獲舍利一枚殊大於粒光明鮮潔更細尋視又獲七粒總置盤水一枚獨轉繞餘七粒各放光明炫耀人目隋益州郭下福感寺塔本名大石於貞觀年初大地震動此塔搖揚將欲摧倒於時郭下無數人來忽見四神形如塔量各以背抵塔之四面乍倚乍傾率以免壞觀瑞道俗歎未曾有塔上露盤由來小短不稱塔形有一人極豪侈多産業見前露瑞乃捨金三百兩共諸信者更造露盤既成香氣蓬勃如雲騰涌流芳城邑七日乃歇幽州僧道嚴者姓李氏形極奇偉年一百五歲獨住深山每年七日來此塔上盡力供養嚴怪其泉流涌注無聲乃遣善水崑崙入泉尋討但見石柱羅列不測其際中有寶塔可高三尺獨立空中四面水圍凝然而住竟不至塔所隋懷州妙藥寺塔在武陟縣西七里見有五級白浮圖塔方可十五步並是側石遍砌齊州臨濟縣東有磚塔云是志公所營四面石獸擁從驚人西域志云罽賓國廣崇佛教其都城內有寺名漢寺昔日漢使向彼因立浮圖以石搆成高百尺道俗虔恭異於殊常寺中有佛頂骨亦有佛髮色青螺文以七寶裝之盛以金匣王都城西北有王寺寺內有釋迦菩薩幼年齔齒長一寸其西南有王梵寺寺有金銅浮圖高百尺其浮圖中有舍利骨每以六齊日夜放光明照燭繞承露盤至達曙西域乾陀羅城東南七里有雀離浮圖乃是如來在世之時與諸弟子遊化此土指城東曰我入涅槃後二百年有國王名迦尼色迦在此處起浮圖雀離浮圖南五十步有一石塔其形正直高二丈甚有神變禮佛部感應緣九驗晉建元寺建康太清里寺基本宋元徽二年宮人陳太妃造寺塔舍利靈應相仍每夕放光宋靈味寺建康鍾山蔣林里宋永初三年沙門法意起造一夜忽聞怪石崩墜聲振林薄明旦履行唯見清泉湛然因聚徒結宇號曰靈味漢平等寺廣平武穆王懷捨宅所立寺門外有金像一軀高二丈八尺相好端嚴嘗有神異晉白塔寺在秣陵二井里晉升平中有鳳凰集此地因名其處為鳳凰臺宋時朱齡石使往遼東還返失道隨風泛海一月餘達於一島糧水俱竭入島求泉漸深登山乃見一寺堂宇莊嚴非所曾睹僧告曰此間去都二十餘萬里石等聞之驚怖曰若爾何緣得達僧曰自當相送不勞致憂又問曰識杯度道人不曰識之便指壁上鉢袋曰此是彼物有小過罰在人中便取鉢袋與石并書一封上為書字然不可識曰可以書鉢與之令沙彌送勿從來道此有直路疾至船所須吏至海沙彌以一竹杖著船頭語曰但閉舫聽往不勞目柁也於是依言但聞颼颼風中聲有竊視者見船在空雲飛奔於山林海上數息間遂達楊都大桁正見杯度書自飛上度手度驚曰汝那得蓬萊道人書喚我歸耶乃說由緣又將鉢與之手捧鉢曰吾不見此鉢四千餘年擲上入雲下還接取鼓山東面上東度小谷又東北上從石窟寺往便是竹林崇峰造日修竹干雲重門洞開復殿基列門外東西槽櫪飾以金鋪似有馬蹤而無繫者代州東南五臺山古稱神仙之宅也山方百里極巉巖崇峻不生草木唯松柏茂林經中文殊將五百仙人往清涼之山即斯地也地極巖寒多雪號曰清涼中臺最高去頂七百里望如指掌上有小石浮圖石上人馬跡宛然如新有大泉名曰太華清澄如鏡有二浮圖夾中有文殊像鐘聲香氣無日不有終南山大奏嶺竹林寺者至貞觀初採蜜人山行聞有鐘聲尋而往至寺舍二間有人住處傍大竹林可有二頃其人斷二節竹以盛蜜可得五升許西域志云烏萇國西南有檀特山山中有寺大有衆僧日日有驢運食無控御者自來留食還去莫知所在舍利篇引證舍利者西域梵語此云骨身舍利有三種一是骨舍利其色白也二是髮舍利其色黑也三是肉舍利其色赤也分法部如菩薩處胎經云時八國王共諍舍利有一大臣名優波吉諫八國王何為興兵共相征伐爾時帝釋即現為人語王言我等諸天亦當有分若共諍力則有勝負時阿耨達龍王文鄰龍王伊那鉢龍王語八王言我等亦應有分若不見與力足相伏時臣優波吉告言諸君並止舍利宜分共之何須見諍即分為三分一分與諸天一分與龍王一分與八王諸天得舍利還於天上起七寶塔龍得舍利還於宮中起七寶塔優波吉著甕舍利并甕亦起寶塔灰及土量得四十九斛亦起四十九寶塔闍維處亦起寶塔高三十九仞閻浮提中八舍利塔第九瓶塔第十炭塔感福部如大悲經云爾時世尊告阿難我滅度後若有人供養我之舍利如芥子等恭敬尊重是人以此善根一切皆得涅槃界盡涅槃際若有造立形像塔廟信心念佛功德乃至一華散於空中是人以此善根一切皆當得涅槃界盡涅槃際佛告阿難若有衆生以念佛故乃至一華散於空中如是福德所得果報不可窮盡感應緣六驗吳孫權赤烏四年有外國沙門康僧會創達江表設像行道吳人以為妖異以狀問之權召會問佛有何靈瑞曰佛晦靈跡遺骨舍利應現無方權曰何在曰佛神跡感通祈求可獲權曰若得舍利當為興寺經三七日至誠求請遂獲瓶中旦呈於權光照宮殿權執瓶寫於銅盤舍利下衝盤即破碎權大驚異會進曰佛之靈骨金剛不朽劫火不焦椎砧不碎權使力者盡力擊之椎砧俱陷舍利不損光明四射耀晃人目又以火燒騰光上踊作大蓮華權大發信乃為立寺名為建初改所住地名佛陀里孫皓虐政將欲除屏佛法燔經夷塔有臣諫曰且少寬假如無神驗誅除不晚皓從之召會曰若能驗現於目前助君興之如其不能將廢加戮會曰佛以緣應感而必通既給假請效不難皓與期三日於時僧衆百餘同集會寺皓陳兵圍寺刀鋸齊至剋期就戮僧恐無靈先自縊者會謂衆曰佛留舍利止在今時前已有驗今豈罔哉恰期便獲乃進於皓此是如來金剛之骨志誠賁獲設以百釣之杵終無微毀皓曰金石可磨枯骨豈堅沙門面欺祗速死耳乃更置之鐵砧以金椎擊之金鐵並凹而舍利如故又以清水行之舍利揚光散彩洞燭一殿皓乃欣欣伏信革誠膺化晉義熙元年有林邑人嘗有一舍利每齊日有光沙門慧邃隨廣州刺史刁逵敬其光相欲請之未及發言而舍利自分為二逵聞心悅又請留敬而又分為三逵欲模長干像寺主固執不許夜夢人長數丈告曰像貴宣導何苟吝耶明報聽模既成逵以舍利著像髻中宋元嘉九年潯陽張須元家設八關齊道俗數十人見像前華上似冰雪視得舍利數十便以水行之光焰相屬後數日開廚更視獲牙奩中有白㲲褁舍利十枚光焰屬諸處蒲州栖嚴寺塔地震山吼鐘鼓大聲又放光五道至二百里皆見蘇州虎丘山寺立塔井吼三日掘基得一舍利空中天樂人皆聞之供養篇引證如地持論云菩薩供養如來略說十種一身供養二支提供養三現前供養四不現前供養五自作供養六他作供養七財物供養八勝供養九不染汙供養十至處道供養若菩薩於佛色身而設供養是名身供養若菩薩為如來故若供養偷婆若窟若舍若故若新是名支提供養若菩薩面見佛身及支提而設供養是名現前供養若菩薩於如來及支提悕望心俱歡喜心俱現前供養如一如來三世亦然及現前供養如來支提三世十方無量一界若新若故是名菩薩共現前供養若菩薩於不現前如來及支提及涅槃後以佛舍利起偷婆若一若二乃至憶百千萬隨力所能是名廣不現前供養若菩薩於如來及支提手自供養不依懈惰令他施住是名菩薩自作供養若菩薩於如來及支提不獨供養普令親屬在家出家悉共供養是名自他共供養若菩薩有少許物以慈悲心施彼貧苦薄福衆生令供養如來及支提令得安樂而不自為是名他作供養若菩薩於如來及支提以衣食雜寶種種供養者是名財物供養若菩薩久來以財物供養若多若少現前不現前自作他作淳淨信心而作供養以是善根回向無上菩提是名勝供養若菩薩自手供養如來及支提不輕他人亦不放逸不懈怠至心恭敬不染汙心不於信心勝人所諂曲求財亦不以諸不淨物等供養是名無染供養若菩薩殊勝不染財物供養如來及支提若自得力若從他求若如意得財若化作身若二若三乃至百千萬億身悉禮如來彼一一身化作百千手彼一一手以種種華香供養如來及支提彼一切身悉讚歎如來真實功德饒益衆生是名至處道供養如來第一最上比前財物供養百倍千倍乃至等數譬喻不得為比如是十事名菩薩一切種供養如來法僧亦爾受請篇施食部又食施獲五福報經云佛告諸比丘當知食以節度受而不損佛言人持飯食施人有五功德令人得道智者消息意度弘廓則獲五福何等為五一曰施命二曰施色三曰施力四曰施安五曰施辨何謂施命人不得食時奄忽壽終何謂施色人不得食時顏色憔悴何謂施力人不得食時身羸意弱所作不能何謂施安人不得食時心愁身危坐起不定何謂施辨人不得食時身力疲倦口不能言又增一阿含經云施有五事名為應時一遠來二遠去三病時四冷熱時五初得果蓏若得新穀先與持戒精進人然後自食又施有三法一送食至寺名上就舍供養名中造舍乞施發心供養名下食時部世尊為惠法菩薩說云食有四種旦天食時午法食時暮畜生食時夜鬼神食時施福部如百緣經云佛在世時王舍城中有一長者財寶無量其婦生女尋即能語家中自然百味飲食皆悉備有時父見其如是謂非人是毗舍闍鬼畏不敢近時彼女子見其怖畏合掌向母而說偈言願母聽我語實非諸鬼等善業因緣故今獲如是報爾時父母聞女說偈喜不自勝尋前抱取乳餔養育因名善愛時女子見母歡喜合掌白母言為我請佛及比丘僧尋即與請百味飲食皆悉充足即於佛前渴仰聞法佛即為說得須陀洹後求出家佛告善來比丘尼頭髮自落法服著身成比丘尼精勤修習得阿羅漢果諸天世人所見敬仰爾時世尊將千二百五十比丘詣於他邦到曠野中食時已至告善愛尼言汝今可設飲食供養佛僧尋取佛鉢擲虛空中百味飲食自然盈滿如是次第取千二百五十比丘鉢飯亦皆滿都令豐足阿難見已歎未曾有請佛說本因緣佛告阿難此賢劫中有佛出世號曰迦葉著衣持鉢將諸比丘入城乞食次到大長者家設諸肴饌欲請賓客客未至頃有一婢使見佛及僧在於門外乞食立住不白大家取其飲食盡持施與佛及衆僧後客來坐敕彼婢言辦設食來婢答大家今有佛僧在其門外乞食立住我持此食用布施盡大家聞已尋用歡喜我等今日值是福田我今放汝隨意所求婢答大家若見放者聽在道次尋即聽許作比丘尼一萬歲中精勤無替便取命終不墮惡趣天上人中百味飲食應念即至又百緣經云佛在舍衛國祗樹給孤獨園時夏安居竟將諸比丘欲遊行他國時頻婆娑羅王將諸群臣出城遙望如來來受我供爾時世尊遙知王意深生渴仰及比丘僧漸欲遊行詣摩竭提國值諸群鳥中有鸚武王遙見佛來飛騰虛空逆道奉迎唯願世尊及比丘僧慈哀憐愍詣我林中受一宿請佛即然可爾時世尊將諸比丘詣鸚鵡林各敷座具在於樹下坐禪思惟時鸚武王通夜翔繞佛比丘僧四面顧視至明清旦世尊起行鸚鵡歡喜在前引導向王舍城白頻婆娑羅王言世尊今者將諸比丘遂來在近王聞語已敕設肴膳執持幢幡香華伎樂將諸群臣逆道奉迎時鸚武王於其夜中即便命終生忉利天今當還報世尊恩頂戴天冠著諸纓珞莊嚴其身齎持香華而供養佛卻坐一面佛即為其說四諦法心開意解得須陀洹果繞佛三匝還歸天上時諸比丘白佛言今此天子宿造何業生鸚鵡中復修何福得生天上來供養佛聞法獲果爾時世尊告諸比丘此賢劫中波羅奈國有佛出世號曰迦葉於彼法中有一長者受持五戒便於一時毀犯一戒故生鸚武中餘四完具今得出家得道又付法藏經云昔過去九十一劫毗婆尸佛入涅槃後有一比丘甚患頭痛薄拘羅爾時作一貧人見病比丘即便持一呵梨勒果施病比丘比丘服訖病即除愈緣施藥故九十一劫天上人中受福快樂感應緣三驗晉司空廬江何充字次道弱而信法心業甚精嘗於齊堂置空座筵帳精華絡以珠寶設之積年冀降神異後大會道俗甚盛坐次一僧容服粗垢神情低陋出自衆中徑升其座拱默無言一堂怪駭謂其謬僻充亦不平嫌於顏色及行中食此僧飯畢提鉢出堂顧謂充曰何侯徒勞精進因擲鉢空中陵空而去充及道俗馳遽觀之光儀偉麗極目乃沒追共惋恨稽懺纍日晉南陽滕普纍世敬信妻吳郡全氏尤能精苦每設齊會不逆招請隨有來者因留供之後會僧數闕少使人衢路要尋見一沙門蔭柳而坐因請與歸淨人行食翻飯於地傾簞都盡罔然無計此沙門云貧道鉢中有飯足供一衆使普分行既而道俗內外皆得充飽清淨既畢擲鉢空中翻然上升極目乃滅梁富陽齊堅寺有釋道琳山陰人少出家有戒行善涅槃法華誦維摩經吳國張緒禮事之後居富陽泉林寺寺嘗有鬼怪自琳居之則消琳弟子惠韶為屋所壓頭陷入胸琳為韶祈請韶夜見兩胡道人拔出其頭旦起遂平復琳於是設聖僧齊鋪新帛於床上齊竟見帛上有人跡皆長三尺餘衆咸服其徵感輪王篇育王部如雜阿含經云爾時世尊晨朝著衣持鉢共諸比丘入王舍城乞食時世尊光相普照如千日之焰順邑而行時彼有兩童子共在沙中嬉戲一名闍耶二名毗闍耶遙見世尊來時闍耶童子心念我當以麥手捧細沙著世尊鉢中合掌隨喜而發願言以惠施善功德令得一天下繖蓋王即於此生得供養佛乃至得成無上正覺世尊發微笑相爾時阿難見世尊微笑即合掌向佛白言以何因緣而發微笑爾時世尊告阿難曰我今笑者當知我滅度百年之後此童子於巴連邑統領一方為轉輪王姓孔雀名阿育正法治化又復廣布我舍利當造八萬四千法王之塔安樂無量衆生佛告阿難取此鉢中所施之沙捨著如來經行處令當生彼處阿難受教即取鉢沙捨經行處阿難當知於巴連弗邑有王名日月護彼王當生子頻頭娑羅當治彼國彼復有子名曰修師摩時彼瞻婆國有一婆羅門女極為端正相師記彼當為王妃生二子一當領一天下一當出家學道當得聖跡時婆羅門聞彼相師所說歡喜無量即莊嚴女嫁與此王王見其女端正有德即為夫人仍便懷體月滿生子生時安隱母無憂惱過七日後立字無憂又復生子名曰離憂無憂者身體粗澀以其施沙得相父王情所不念又王欲試二子呼婆羅門觀占二子於我滅後誰當作王婆羅門言將此諸子出城金殿園館中於彼當觀其相乃至出往彼園時阿育王母言王出園館中觀諸王子誰當作王汝今云何不去阿育啓言王既不念我亦復不樂見我母復語言但往彼所阿育啓母往去時父王問師言此中誰有王相當紹我位時彼相師視諸王子見阿育具見王相當得紹位時邊國德又尸羅反王語阿育汝將四兵衆伐彼國王子去時都不與兵甲時諸從者白王子言今往伐彼國無有軍仗云何得平阿育言我若為王善根果報者兵甲自然來應發是語時尋聲地開兵甲從地而出即將四兵往伐彼國彼諸國人民聞阿育來即平治道路莊飾城郭執持吉瓶之水及種種供養奉迎王子而作是言我等不反請入城邑平此國已又使伐佉沙國彼國王即便降伏如是乃至平此天下至於海際時父王得重病王語諸臣吾今欲立修師摩為王令阿育往至彼國時諸臣欲令阿育作王王不喜默然不對時阿育心念口言我應正得王位諸天自然來以水灌我頂素繒繫首時王見此相貌極生愁惱即便命終阿育王如禮法殯父王已即立阿菟樓陀為大臣時修師摩王子聞父崩立阿育為王心生不忍即集諸兵而來攻伐阿育王四門中二門安二力士第三門安大臣自守東門時阿菟樓陀作無煙火坑以物覆之修師摩既來到即趣東門墮火坑便死亡有一大力士名曰跋陀申陀聞修師摩終亡猒世出家學道得阿羅漢時諸臣輩輕慢阿育不行君臣之禮王亦自知語諸臣曰汝等可伐華果之樹殖於刺棘諸臣答曰未嘗見聞卻除華果而殖刺樹乃至二三敕令不從時國王忿諸大臣即持利劍殺五百大臣又時王將婇女眷屬出外園中遊戲見一無憂樹華極敷盛王見此華樹與我同名心懷歡喜王形體醜陋皮膚粗澀諸婇女輩心不愛王憎惡王故以手毀折無憂華樹王從眠覺見無憂華樹狼藉在地心生忿怒繫諸婇女以火燒殺王行暴惡故曰暴惡阿育王時阿菟樓陀大臣白言王不應為是法云何以手自殺人王今當立屠殺之人應有可殺以付彼人王即宣教立屠殺者彼有一山名曰耆梨中有一織師家織師有一子亦名耆梨凶德撾打繫縛小兒小女及捕水陸之生乃至拒逆父母王即敕彼我所有罪人事應至死汝當治之彼啓王言為我作舍王為作舍極為端嚴惟開一門於其中間作治罪之法狀如地獄來入此中者不復得出一商主入海十年採諸重寶還到本鄉道中值賊殺商商主之子見父死及失寶物猒世出家遊行諸國次至巴連弗邑過此夜已晨朝著衣持鉢入城乞食誤入屠殺舍中時比丘遙見舍裏火車爐炭等治諸衆生如地獄中尋生恐怖衣毛皆豎便欲出門時凶惡主即往執彼比丘言入此中者無有得出汝今此死比丘聞說心生悲毒復哀言乞我少時生命可至一月彼凶不聽如是日數減至七日彼即聽許時此比丘知將死不久猛勇精進坐禪息心終不能得道至於七日時王宮內人有事至死送付凶惡之人令治其罪凶惡將是女人著臼中以杵搗之令成硃粖比丘見是事極厭惡時彼凶惡人語此比丘期限已盡執彼比丘著鐵鑊油中足與薪火火終不然假使然者或復不熱凶主見火不然打拍使者而自然火火即猛盛久久方開鐵鑊蓋見彼比丘鐵鑊中蓮華上座生希有心即啓國王王即便嚴駕將無量衆來看比丘時彼比丘身升虛空猶如雁王示種種變化王見是比丘心懷大歡喜時彼比丘而作是念我當廣布如來舍利安樂無量衆生於此閻浮提盡令信三寶以是因緣故自顯其德時阿育王生大敬信白比丘言佛未滅度時何所記說比丘答言佛記大王於我滅後過百歲之時於巴連弗邑有三億家彼國有王名曰阿育當王此閻浮提為轉輪王宣布舍利立八萬四千塔佛如是記大王乃大王今造此大地獄殺害無量民人王應慈念一切衆生施其無畏令得安隱彼時阿育王合掌向比丘作禮我得大罪今向比丘懺悔願受我懺今復歸命時彼比丘度阿育王已乘空而化又雜阿含經云阿育王言吾今先當供養所覺菩提之樹然後香美飲食施設於僧敕捨十萬兩金布施衆僧時彼上座耶舍語王言大王今有大比丘僧集當發淳信心供養時王從上至下自手供養復以三衣并四億萬兩珍寶嚫五部衆嚫願已復以四十億萬兩珍寶贖取閻浮提宮人婇女及太子群臣時王起八萬四千佛塔於彼一一塔中復施百千金作五歲大會君臣篇王過部百喻經云昔有一人說王罪過而作是言王甚暴虐治政無理王聞是語既大瞋恚信傍佞人捉此賢臣仰使剝脊取百兩肉有人證明無如是法王心便悔索千兩肉用為補眷夜中呻喚甚大苦惱王聞其聲問言何以苦惱取汝百兩十倍與汝意不足耶傍人答言大王如截子頭雖得千頭不免于死雖十倍得肉不免痛苦愚人亦爾不畏後世貪濁現樂多得財物望得滅罪而得福報無有是處又雜譬喻經云昔有國王喜食人肉敕廚士曰汝等夜行密採人來以供廚食以此為常臣下咸知即共斥逐捐於界外更取賢良以為國王於是噉人王經十三年後身生兩翅飛行噉人無復遠近向山樹神請求祈福當取各國王五百人身祠山樹神使我復還王位便飛行取之已得四百九十九人將之山谷以石塞口時有國王將諸后宮詣池浴戲始出宮門逢一道人說偈求食王即許之還宮當賜金銀其噉人王空中飛來抱王而去還於山中國王見噉人王不恐不怖顏色如故噉人王曰吾捕人祠天已得四百九十九人今得卿一人其數已滿殺以祠天汝何不懼國王對曰人生有死物成有敗合會有離對來分之何須愁耶旦出宮時路逢道人為吾說偈即許施物今未得與以是為恨今王弘慈寬恕假日施乞還來不敢違要也即聽令去而告之曰與汝七日期若不還者吾往取汝亦無難也王即還宮都中內外莫不歡喜即開庫藏布施遠近拜太子為王殷勤百姓辭決而去噉人王逢見其來念曰此得無異人乎從死得生而故來還即問曰身命世人所重愛者也而卿捨命世之難有不審何所志趣願說其意國王答曰即日吾施至誠願當得阿惟越三佛願度十方彼又問曰求佛之義其事云何國王便為廣說五戒十善四等六度噉人王心開豁然從受五戒為清信士因放四百九十九人各令還國諸王共至其國感其信誓蒙得濟命各不肯還於本國遂便住止此國此國王各為立第一舍雕文刻鏤光飾嚴整諸國王飲食服御與王無異四方人來問言何以有此如王舍宅遍一國中衆人答曰皆是諸王舍也名遂遠布從此已來故號為王舍城王業部諫王經云佛在世時有國王名不離先尼出行國界道過佛所為佛作禮就座而坐佛告王曰王治當以正法無失節度常以慈心養育人民所以為國王者皆由宿命行善所致若統理民事偏枉諸官公卿群僚下吏凡民皆有怨辭治行不平海內皆忿身死神入大山地獄後雖悔之無所復及為王之法當宣聖道教民為善唯守一心心存三尊王者如斯諸聖咨嗟天龍鬼神擁護其國生有榮譽死得上天世間榮位如幻如夢不可久保人欲死時諸家內外聚會無邊椎胸呼天皆云奈何淚下交橫嗚呼痛哉神靈獨逝捨吾何之聞之莫不傷心睹之莫不助哀載之出城捐於曠野飛鳥走獸攫掣食之身中有蟲還食其肉日炙風飄骨皆為乾往昔尊榮豪貴隱隱闐闐霍然不復見之此是無常之明證也王熟思之無念淫佚無受妄言諸物皆貪生於人豈容輕殺佛說經竟王意即解願為弟子即受五戒頭面著地為佛作禮又摩達王經云佛在世時有國王名摩達時當出軍征討有比丘已得羅漢道到國分衛並見録將詣王宮門令養視官馬勤苦七日適王身自臨視軍陳比丘見王即於其前輕舉飛翔上住空中現其威神王便恐怖叩頭悔過誰令神人養馬今當治殺比丘告王言非王及國人過也自我宿命應受宿殃養馬七日夫善惡殃福如形隨影王聞罪福乞歸命三寶受五戒作憂婆塞佛便為王及人民說法得須陀洹道又法句喻經云昔有國王治行正法民慕其化無有太子以為憂愁佛來入國遵受五戒奉敬不懈有一給使其年十二常為王使忠信奉法不以為勞卒得重病遂致無常其神來還為王作子至年十五立為太子父王命終傳位為王憍慢自恣不理國事臣寮廢調民被其患佛知其行不會本識將諸弟子往到其國佛告王曰今王自知本所從來不王曰愚暗不達不知先世佛告大王本以五事得為國王何等為五一者布施得為國王萬民奉獻宮觀資財無極二者興立寺廟供養三尊床榻幃帳以是為王在於正殿御座理國三者親身禮敬三尊及諸長億以是為王一切萬民莫不為之作禮四者忍辱身三口四及意無惡以是為王一切見者莫不歡喜五者學問嘗求智慧以是為王決斷國事莫不奉行此之五事世世為王王前世時為大王給使奉佛以信奉法以愛奉僧以敬奉親以孝奉君以忠常行一心精進布施勞身苦體初不懈倦是福追身得為王子今者富貴而反懈怠是時王大歡喜五體懺悔謝佛聞法得須陀洹道又昔輔相子賓頭盧阿羅漢為憂陀延王說偈云生老病死患於中未解脫如象處林中四邊大火起大王應當知榮位須臾間智者深觀察不生希有想尊者言大王我今為王略說譬喻王至心聽昔日有人行在曠路逢大惡象為象所逐狂懼走突無所依怙見一丘井即尋樹根入井中藏上有黑白二鼠牙齧樹根此井四邊有四毒蛇欲螫其人而此井下有三大毒龍傍畏四蛇下畏毒龍所攀之樹其根動搖樹上有蜜五滴墮其口中於時動樹敲壞蜂窠衆蜂散飛唼螫其人有野火起復來燒樹大王當知彼人苦惱不可稱計而彼人得味甚少苦患甚多其所味者如牛跡水其所苦患猶如大海味如芥子苦若須彌如藕根孔比於太虛亦如蚊子比金翅鳥其味苦惱多少如是王都部如十二遊經云波斯匿王者晉言和悅迦維羅越國者晉言妙德舍衛國者晉言無物不有維那離國者晉言廣大一名度生死羅閲祗城者晉言王舍城鳩留國者晉言智七波羅奈國者晉言鹿野一名諸佛國閻浮提中有十六大國八萬四千城有八國王四天子東有晉天子人民熾盛南有天竺國天子土地多饒象西有大秦國天子土地饒金玉西北有月支天子土地多好馬八萬四千城中有六千四百種人萬物音響各別有五十六萬億丘聚魚有六千四百種鳥有四千五百種獸有二千四百種樹有萬種草有八千種雜藥有七百四十種雜香有四十三種寶有百二十一種正寶有七種海中有二千五百國有百八十國人噉五穀有三百三千國人噉魚鱉黿鼉五大國王一王主五百城第一王名斯黎土地盡事佛不事衆邪第二王名迦羅土地出七寶第三王名不羅土地出四十種香及白琉璃第四王名闍耶土地出蓽鉢胡椒第五王名那額土地出白珠及七色琉璃五大國城人多黑色短小相去六十五萬里從是以去但有海水無有人民去鐵圍山百四十萬里又智度論問曰如舍婆提諸大城皆有諸王舍的何故獨名此城為王舍城答曰往古世時此國有王名娑藪心猒世法出家作仙人是時居家婆羅門與出家諸仙人共論議婆羅門言經書云天祠中應殺生噉肉仙人言不應婆羅門言此有大王出家作仙人以此人為證後日當問諸居家婆羅門即以其夜先到婆藪仙人所種種付囑明旦論時諸出家仙人問婆藪仙人天祠中應殺生噉肉不婆藪仙人言婆羅門法天祠中應殺生噉肉諸出家仙人言汝大不是汝大妄語時婆藪仙人尋陷入地沒踝自思惟言我貴人不應兩種語婆藪之子名曰廣車嗣位為王後亦猒世法而思父王出家生入地中若治天下復作大罪我今當何以自處如是思惟時聞空中聲言汝若行見難值希有處汝應是中作舍住時出田獵見有鹿走疾如風王逐之而不可及遂逐不止百官侍從無能及者轉前見有五山周匝峻固其地平整生草細軟好華遍地種種樹林花果茂盛溫泉浴地皆悉清淨其地莊嚴處處有散天華天香聞天伎樂王告諸臣我前所聞空中聲言汝行若見希有難值之處汝於是中作舍住今此希有應中作舍即捨本城於此山中造立官舍故名舍城又耆闍崛山頂似鷲王舍城人共傳言鷲頭山是山於五山中最高大多好林泉聖人住處又大哀經云佛在王舍城靈鷲山古昔諸佛之所遊居如來威神之所建立其地道場諸菩薩衆所共咨嗟無極法座天龍鬼神等咸俱歸命又智度論問曰佛普慈一切何獨住王舍城不住余城答曰住王舍城亦住舍婆提城以佛知恩故多住此二城問曰何故知恩多住二城答曰憍婆羅國是佛生身地舍婆提大城佛為法主故亦在此城納諫篇引證中阿含經云禪以聲為刺世尊亦說以聲為刺所以者何我實如是說禪有刺持戒者以犯戒為刺護諸根者以嚴飾身為刺修習惡露者以淨相為刺修習慈心者以恚為刺離酒者以飲食為刺梵行者以見女色為刺入初禪者以聲為刺入第二禪者以覺觀為刺入第三禪者以喜為刺入第四禪者以入出息為刺入空處者以色相為刺入識處者以空處想為刺入無所有處者以識處想為刺入無處想者以無所有處想為刺入想知滅定者以想知為刺復有三刺欲刺恚刺愚癡刺此三刺者漏盡阿羅訶已斷拔絶根本滅不復生是為阿羅訶無刺除此刺者是名納諫審察篇感應緣一驗抱朴子曰山中大樹能語者非樹語也其精名曰雲陽以其名呼之則吉山中夜見西人者銅鐵精也見秦人者百歲木也在水之間見吏者名曰四激以其名呼之則吉山中寅日有稱虞吏者虎也稱當路居者狼也稱令長者老狸也卯日稱丈夫者兔也稱東父者麋也稱西王母者鹿也辰日稱雨師者龍也稱河伯者魚也稱無腸公子者蟹也巳日稱寡人者社中蛇也稱時君者龜也午日稱三公者馬也稱三人者老樹也未日稱主者羊也稱吏者獐也申日稱人君者猴也稱九卿者猿也酉日稱將軍者老雞也稱賊捕者雉也戌日稱人姓字者犬也稱城陽公仲者狐也亥日稱人君者豬也稱婦人者金玉也子日稱社君者鼠也稱神人者伏翼也丑日稱書生者牛也知其物則不能為害又熒惑火精生朱雀辰星水精生玄武歲星木精生青龍太白金星生白虎鎮星土精生乘黃思慎篇慎過部如雜阿含經云爾時世尊告諸比丘譬如鐵丸投著火中與火同色盛著劫貝錦中云何比丘當連然不比丘白言如是佛告比丘愚癡之人依聚落位晨朝著衣持鉢入村乞食不善護身不守根門心不繫念若見年少女人不正思惟取其色想起貪欲心欲燒其心又燒其身身心燒已捨戒退減是愚癡人長夜當得非義饒益爾時世尊告諸比丘過去世時有一貓狸饑渴嬴瘦於孔穴中伺求鼠子取食有時鼠子出穴遊戲時彼貓狸疾取吞之鼠子身小生入腹中入腹中已食其內藏貓狸迷悶東西狂走空宅冢間不知何止遂至於死如是比丘當如是學善護其身又世尊告諸比丘譬如木杵嘗用不止日夜消減如是比丘從本已來不閉根門食不知量初夜後夜不勤覺悟當知是輩終日損減不增善法又十住毗婆沙論云在家菩薩若見破戒之人不應生瞋輕慢之心應生憐愍利益之心方便勸止令生善心苦諫不改而生誹謗亦不得瞋妄見他過故此賢劫中聞有菩薩誹謗拘樓孫佛言何有禿人而當得道如是衆生難可得知自作自受何預於我若欲知彼或自傷害籌量衆生佛所不許感應緣三驗晉淮南胡茂回行至楊州還歷陽城東有神祠中正值民將巫祝祀之至須臾頃有群鬼相叱曰上官來各迸走出祠去回顧見二沙門來入祠中諸鬼兩兩三三相抱持在池邊草中伺望沙門皆有怖懼須臾沙門去後諸鬼皆還祠中回於是精誠奉佛齊京師靈相寺有釋惠豫黃龍人來遊京師止寺中少而務學遍訪衆師善談論美風則每聞臧否人物輒塞耳不聽先誦大涅槃法華十地又習禪業精於五門嘗寢見有三人來扣戶並衣冠鮮潔執持華蓋豫問覓誰答云法師應死故來奉迎豫曰小事未了可申一年不答云可爾至明年滿一周而卒唐雍州長安縣高法眼是隋代僕射高穎之玄孫至龍朔三年正月二十五日向中臺參選日午還家舍在義寧坊東南隅向街開門化度寺東即是高家欲出于城西順義門城內逢兩騎馬逐後既出城已漸近逼之出城門外道北是普光寺一人語騎馬人云汝走捉普光寺門弗令此人入寺恐難捉得此人依語馳走守門法眼怕不得入寺便向西走復至西街金城坊南門道西有會昌寺復加四馬騎更語前二乘馬人云急守會昌寺門此人依語走捉寺門法眼怕急便語乘馬人云汝是何人敢逼於我乘馬人云王遣我來取法眼語云何王遣來乘馬人云閻羅王遣來法眼既聞閻羅王使來審知是鬼即共相拒鬼便大怒云急截頭髮卻一鬼捉刀即截法眼兩髻附肉落地便至西街悶絶落馬暴死不覺既至大街要路踟蹰之間看人逾千有巡街果毅瞋守街人何因聚衆守街人具述逗遛次西街首即是高宅便喚家人輿向舍至明始蘇語云吾入地獄見閻羅王升大高座瞋責吾云汝何因向化度寺明藏師房內食嘗住果子宜吞四百顆熱鐵丸令四年吞了人中一日當地獄一年四日便了復有諸鬼來取法眼復共鬼鬥相趁力屈復悶暴死至地獄令吞鐵丸當吞之時咽喉閉縮身體焦捲變為紅色吞盡乃蘇蘇已王又語言汝何因不敬三寶說僧過惡汝吞鐵丸盡已宜受鐵犁耕舌一年自見其舌長數里傍人看見吐出一尺餘王復語獄卒此人以說三寶長短以大鐵斧截卻舌根獄卒斫之不斷王復語云以斧細銼其舌將入鑊湯煮之煮復不爛王怪問所由法眼啓王云臣曾讀法華經王令檢功德部見案內有讀法華經一部王檢知實始放出來觀者如市咸發心敬信儉約篇感應緣二驗晉羅浮山有單道開姓孟燉煌人少懷栖隱誦經四十餘萬言絶穀餌柏實復服松脂後服細石子一吞數枚數日一服或少噉薑椒如此七年後不畏寒暑冬袒夏溫晝夜不臥同學十人共契服食十年之外或死或退唯開全志追陵太守遣馬迎開開辭能步行三百里一日山樹諸神現異形試之初無懼色以石虎建武十二年從西平來一日行七百里至南安度一童子為沙彌年十四稟受教法行能及開時太史奏虎云有仙人星現當有高士入境虎敕州郡有異人令啓聞其年冬十一月秦州刺史上表送開初止鄴城西法綝祠中後徙臨漳昭德寺於房內造重閣坐禪虎資給甚厚開皆以惠施至晉升平三年來之建鄴俄至南海後入羅浮山獨處茅茨蕭然物外春秋百餘歲唐曹州離狐人杜智楷少好釋典不仕不娶被僧衣隱居泰山以讀誦為事貞觀二十一年於山中遇患垂死以袈裟覆體昏然如夢見老母及美女數十人屢來相擾智楷端然不動群女漸相逼並云輦將擲置北澗裏遂總近前同時執捉有攬著袈裟者遂齊聲念佛卻後懺悔請為造阿彌陀佛并誦觀世音菩薩三十餘遍少間遂覺體上大汗便即瘳愈懲過篇引證又涅槃經云夫死者於嶮難處無有資糧去處懸遠而無伴侶晝夜嘗行不知邊際深邃幽暗無有燈明入無門戶而有處所雖無痛處不可療治往無遮止到不得脫又無量壽經云獨生獨死獨來獨去苦樂之地身自當之無有代者生則親族歡聚盡慈愛之和死則朝亡暮殯有分離之狀故出曜經佛重說死苦偈云命如果待熟常恐會零落已生皆有苦孰能致不死昔有梵志兄弟四人皆得五通自知命促七日必死兄弟議曰我等兄弟神通自在能以神力翻覆天地現極大手捫摸日月移山注流無所不辦寧當不能避此難也第一兄曰吾入大海上下平等正處中間無常殺鬼安知我處第二弟言吾入須彌山腹中其表無際無常殺鬼焉知我處第三弟言吾處虛空隱形無跡無常殺鬼安知我處第四弟言我當隱在大市之中衆人猥鬧各不相識無常殺鬼趣得一人何必取吾於是別去各適所至七日期滿各從其處而皆命終佛以天眼見四梵志避於無常皆已命終而說偈言非空非海中非入山石間無有地方所脫之不受死感應緣一驗齊梁州薛河寺釋僧遠為性疏誕不修細行好流宕歡宴以齊武平三年夢見大人切齒責之曰汝是出家人面目如此放縱造惡何不取鏡自照遠忽覺驚悸流汗至曉以盆水自照乃見眼邊烏點謂是垢汙便洗拭之眉毛隨手一時落盡因自咎責遂改常習反形易性弊衣破履一食長齊遵奉律儀昏曉行悔悲淚交注經一月日又夢前人含笈謂曰知過能改是謂智人赦汝前愆勿復相續忽驚喜覺流汗遍身面目津潤眉毛漸出遠於一身頻感兩報信知三世苦樂不虛和順篇和國部如雜實藏經云佛言過去久遠有二國王一是迦尸國王二是比提醯國王比提醯王有大香象以香象力摧伏迦尸王軍迦尸王作是念言我今云何當得香象摧伏時有人言我見山中有一白香象王聞此已即便募言誰能得香象者我當重賞有人報言多集軍衆往取彼象象思惟言若我遠去父母盲老不如調順往至王所爾時衆人便自將香象向王邊王大歡喜為作好屋具被踏蹬敷著其下與諸妓女彈琴鼓瑟以娛樂之與象飲食不肯食之時守象人來白王言象不肯食王自向象所上古畜生皆能人語王問象言汝何故不食象答王言我有父母年老眼盲無有水草父母不食我云何食王今見聽我去供養父母終其年壽自當還來王聞此語極大歡喜我等便為人頭之象此象乃是象頭之人因此象故王宣令一切國內若不孝養父母者當與大罪尋即放象還供養父母象語王言莫與鬥諍多所傷害王言彼欺陵我象言我往令彼不敢欺侮王言汝若去者或能不還答言無能遮我使不還者象即於是往彼國中比提醯王聞象來至極大歡喜自出往迎既見象已而語之言即住我國象白王言不得即住我立身已來不違言誓先許彼王當還其國汝二國王應除怨惡自安其國即說偈曰得勝增長怨負則益憂苦不諍勝負者其樂最第一爾時象說斯偈二國和好誡勗篇誡馬部如中阿含經云時有調馬師名曰只尸來詣佛所稽首佛足退坐一面白佛言世尊世間唯我堪能調馬狂逸惡馬我作方便須臾令彼態病悉現隨其態病方便調伏佛言汝以幾種方便調伏於馬馬師白佛言有三種法調伏惡馬一者柔軟二者粗澀三者柔軟粗澀佛言汝以三種方便調馬猶不調者當如之何馬師白佛遂不調者便當殺之所以者何莫令辱我調馬師白佛言世尊是無上調御丈夫為以幾種方便佛言我亦以三種方便調御丈夫一者一向柔軟二者一向粗澀三者柔軟粗澀所謂一向柔軟者如汝所說此是身善行此是身善行報此是口意善行此是口意善行報是名天是名人是名善趣化生是名涅槃是為柔軟第二一向粗澀者如汝所說是身惡行是身惡行報是口意惡行是口意惡行報是名地獄是名畜生是名餓鬼是名惡趣是名墮惡趣是如來粗澀教也第三彼柔軟粗澀俱者謂如來有時說善行善報有時說惡行惡報如是善趣如是惡趣是名如來柔軟粗澀教調馬師白佛言世尊若以三種方便調伏衆生有不調者當如之何佛言亦當殺之所以者何莫令辱我調馬師白佛言若殺生者於世尊法為不清淨世尊法中示不殺生而今言殺其義云何佛言如來法中以三種教授不調伏者不復與語不教不誡豈非死耶聞佛所說歡喜而去又法句喻經云佛問象師調象之法有幾答曰有三一者剛鉤鉤口著其羈靽二者減食常令饑瘦三者挫杖加其楚痛由鐵鉤鉤口故以制強口由不與飲食故以制身癢由加挫杖故以伏其心佛告居士吾亦有三用調一切亦以自調得至無為一者以至誠故制御口患二者以慈貞故伏身剛強三者以智慧故滅意癡蓋持是三事度脫一切離三惡道雜誡部感應緣一驗周渭濱沙門法師自誡云夫以回天倒日之力一旦草雕岱山磐石之固忽焉燼滅定知世相無常浮生虛僞譬如朝露其停幾何大丈夫生當降魔死當飼虎如其不爾徒生何益不如修禪定足以養志讀誦經足以自娛富貴名譽徒勞人耳乃棄其簪辨剃其鬚髮衣納杖錫聽講談玄自厭形骸甚於桎梏思絶苦本莫知其津大乘經曰如說行者乃名是聖不但口之所言小乘經曰能行說為正不行何所說若說不能行不名為智者忠孝篇引證又雜寶藏經云昔過去久遠雪山之中有一鸚鵡父母都盲嘗取好果先奉父母當於爾時有一田主初種穀時而作願言所種之穀要與衆生而共噉食時鸚鵡子以彼田主先有施心嘗取其穀以供父母田主行穀見有蟲鳥揃穀穗處瞋恚懊惱便設羅網捕得鸚鵡鸚鵡爾時語田主言田主先有好心布施故敢來取如何今者而見網捕田主問言取穀為誰鸚鵡答言有盲父母願以奉之田主語言自今以後常於此取勿生疑難畜生尚爾孝養父母何況於人睒子部如睒子經云過去世時迦夷國中有一長者無有兒子夫妻喪目心願入山求無上道修清淨志信樂空間時有菩薩名一切妙見心作念言此人發意微妙眼無所見若入山者必遇枉害菩薩壽終願生長者家名之為睒至孝仁慈奉行十善晝夜精進奉事父母年過十歲睒子長跪白父母言本發大意欲入深山求志空寂無上正真豈以子故而絶本願父母取語便即入山睒以家中財物皆施貧者便至山中以蒲為屋施作床縟不寒不熱恆得其宜入山一年衆果豐美食之皆甘泉水涌出清而且涼池華五色鳥獸音樂慈心相向無復害意睒子孝慈蹈地恐痛天神山神嘗作人形晝夜慰勞睒著鹿皮衣提瓶取水麋鹿衆鳥亦復往飲不相畏難時有迦夷國王入山射獵王見木邊群鹿引弓射之箭誤中睒胸睒被毒箭舉聲大呼言誰持一箭射殺三道人王聞人聲即便下馬往到睒前睒謂王曰象坐牙死犀坐角亡翠為毛終麋鹿為皮害我今無事坐何等死耶王問睒言卿是何等人被鹿皮衣與禽獸無異睒言我是王國人與盲父母俱來學道二十餘年未曾為虎狼毒蟲所見枉害我今為王所射殺登爾之時山中暴風忽起吹折樹木百鳥悲鳴師子熊羆走獸之輩皆大號呼日無精光流泉為竭衆華萎死雷電動地時盲父母驚起相畏曰睒行取水經久不還將毋為毒蟲所害禽獸號呼不如常時風起樹折必有災異王時怖懼大自悔責我作無狀本欲射鹿箭誤相中射殺道人其罪甚重坐貪小肉而受重殃我今一國珍寶之物宮殿伎女丘郭城邑以救子命時王便以手挽拔睒胸箭深不得出睒語言非王之過自我宿罪所致我不惜身命但憐盲父母年既衰老兩目復盲一旦無我亦當終沒無瞻視者以是懊惱非為毒痛王重言我寧入泥犁百劫受罪使睒得活若子命終我不還國便住山中供養卿父母如卿在時勿以為念諸天龍神皆當證知不負此誓睒聞王誓心喜悅豫雖死不恨以我父母仰纍大王供養道人現世罪滅得福無量王言卿語我父母處及卿未死使我知之睒即指示從此步徑去此不遠自當見一草屋我父母在中王徐徐行勿令我父母怖懼以善權方便解悟其意王領此語便將數人徑詣父母所王去之後睒便奄絶鳥獸號呼繞睒尸上口舐胸血盲父母聞聲以益憎怖王行既疾觸動草木肅有人聲父母驚言此是何人非我子行王言我是迦夷國王聞道人在山學道故來供養父母言大王善來勞屈威尊遠臨草野我有孝子名睒常與我取果蓏泉水恆自豐饒山中風雨和調無有乏短我有草席可坐果蓏可食睒行取水且欲來還王聞傷心淚出且言我罪惡無狀入山射獵見水邊群鹿引弓射之箭誤中睒故來相語父母聞之舉身自朴地乃為動王便自前扶牽父母號哭仰天自說我子孝慈蹈地恐痛有何等罪而射殺之向者風起折木百鳥一時悲鳴疑我子死大聲啼呼父言且止人生必死不可得卻今且問王射睒何許今為死活王即牽盲父母往到尸上父抱其腳母抱其頭仰天大呼母便以舌舐睒胸瘡願毒入我口我年已老目無所見以身代子睒活我死死不恨也睒若至孝天地所知箭當拔出毒藥當除睒當更生於是第二忉利天王坐即為動以天眼見二道人抱子呼哭乃聞第四兜率天宮皆動釋梵四天王即從第四天王如人屈伸臂頃來下睒前以神藥灌睒口中藥入睒口箭自拔出更活如故父母驚喜見睒已死更活兩目皆開飛鳥走獸皆大歡喜風息雲消日高重光泉水涌出衆華五色樹木華榮倍於常時王大歡喜不能自勝禮天帝釋還禮父母及與睒子願以國財以上道人睒曰王且還國安隱人民皆令奉戒王自悔責從今已後奉持五戒業因部感應緣七驗郭巨河內溫人甚富父沒分財二千萬為兩分弟己獨取母供養住自比鄰有凶宅無人居者其推與居無患妻生男慮養之則妨供養乃令妻抱兒己掘地欲埋之於土中得一釜黃金金上有鐵券曰賜孝子郭巨丁蘭河內野王人也年十五喪母刻木作母事之供養如生蘭妻夜火灼母面母面發瘡經二日妻頭髮自落如刀鋸截然後謝過董永者少偏孤與父居乃肆力田畝鹿車載父自隨父終自賣與富公以供喪事道逢一女呼與語云願為君妻遂俱至富公富公曰女為誰答曰永妻欲助償債公曰汝織三百匹遣汝一旬乃畢女出門謂永曰我天女也天令我助子償人債耳語畢忽然不知所在姜詩字士遊廣漢雒人母好飲江水兒嘗取水溺死婦痛惜恐母知誑云行學歲歲作衣投於江中俄而泉涌出於舍側味如江水甘美旦出鯉魚一雙韓伯瑜有過其母笞之泣母曰他日未嘗泣今何泣也對曰他日瑜得笞嘗痛今母力衰不能使痛是以泣犍為符先泥和其女者名雄泥和至永建元年為縣公曹縣長趙祉遣泥和拜檄謁郡太守以十月乘船於城湍墮水死尸喪不得雄哀慟號咷命不圖存至十二月十五日父喪未得雄乘小船於父墮處哭數聲自投水中旋流沒底與父相持並浮出江縣長表言郡太守肅登承上尚書遣戶曹椽為雄立碑圖像形令知志孝唐慈州刺史太原王千石性自仁孝以沉謹稱猶精內典信心練行貞觀六年丁父憂居喪過禮一食長齊柴形毀骨立廬於墓左負土成墳夜中常誦佛經宵分不寢每聞擊磬之聲非嘗清徹兼有異香延及數里不孝篇感應緣一驗隋大業中河南人婦女養姑不孝姑兩目盲婦以丘蚓為羹以食之姑怪其味竊藏一臠留以示兒兒還見之欲送婦向縣未及而雨雷震失其婦俄而婦從空落身衣如故而易其頭為白犬頭言語不異問其故答云以不孝姑為天神所罰報恩篇引證如正法念經云有四種恩甚為難報一者母二者父三者如來四者說法法師若有供養此四種人得無量福現在為人之所讚嘆於未來世能得菩提又難報經云左肩持父右肩持母經歷千年便利背上猶不能報父母之恩又增一阿含經云孝順供養父母功德果報與一生補處菩薩功德一等又佛說古來世時經云我昔在波羅奈國穀米涌貴人民饑饉我負擔草賣以自活彼有緣覺名曰和理來遊其國我早出城欲擔負草爾時緣覺著衣持鉢入城分衛至於中道吾負草還於城門中復與相遇空鉢而出和理緣覺遙見吾來即自念言吾早入城此人出城今負草還想朝未食吾當隨後往詣其家乞以遏饑我時擔草自還其舍下草著地顧見緣覺追吾之後如影隨形我時心念朝出城時見此緣覺入城分衛如空鉢還想未獲食吾當斷食以奉施之即持食出長跪授之時彼緣覺悉受飯食吾因是德七反生天為諸天王七反在世人中之尊感應緣二驗宋有一國與羅剎相近羅剎數入境食人無度王與羅剎約言自今以後國中各專一日當分送往勿復枉殺有奉佛家唯有一子年十歲次當充行父母哀號至心念佛便送此兒辭別捨之以佛威神力大鬼不得近明日見子尚在歡喜同歸於茲遂絶國人慶慕唐并州石壁寺有一老僧禪誦為業精進練行貞觀末有鴿巢其房楹上哺養二雛法師每有餘食恆就巢哺之鴿雛後雖漸長羽翼未成乃並學飛俱墮地而死僧並收瘞之經旬後僧夜夢二小兒白之曰兒等為先有少罪遂受鴿身比來聞法師讀法華經及金剛般若經既聞妙法得受人身兒等今於此寺側十餘里某村某姓名家託生為男十月之外當即誕育僧乃依期往視見此家一婦人同時誕育二子因為作滿月齊僧呼為鴿兒善友篇引證如涅槃經云阿難比丘說半梵行名善知識佛言不爾具足梵行乃名善知識又云善知識者如法而說如說而行如自不殺生教人不殺生乃至自行正見教人行正見自修菩提亦能教人修行菩提自能修行信戒布施多聞知慧亦能教人修行信戒布施多聞智慧以是義故名善知識善知識者有善法故何等善法所作之事不求自樂嘗為衆生而求於樂見他有過不訟其短口當宣說純善之事以是義故名善知識又云善友當觀是人貪欲瞋恚愚癡思覺何者偏多若知是人貪欲多者則應為說不淨瞋恚多者當為分柝十八界等聞已修行次第獲得四驗處觀身受心法得是觀已次第復觀十二因緣如是觀已次得暖法從得暖法乃至漸得羅漢辟支佛果菩薩大乘佛果等依此而生更無疑滯自利利他不加水乳是名真善知識又佛本行經云爾時世尊共長老難陀至一賣香邸見彼邸上有諸香囊即告長老難陀汝來取此邸上諸香囊物難陀爾時即依佛教於彼邸上取諸香囊佛告難陀汝於漏刻一移之頃捉持香裹然後放地爾時難陀手執此香即放地上爾時佛告難陀汝今當自嗅於手看難陀即嗅自手香氣微妙無量佛告難陀如是如是若人親近諸善知識恆常自居隨順染習相親近故必定當得廣大名聞擇交篇引證如僧祗律云佛告諸比丘過去世時雪山根底曲山壅中有向陽處衆鳥雲集便共議言我等今日當推舉一鳥為王令衆畏難不作非法衆鳥言善誰應為王有一鳥言推鵝為王其色絶白衆鳥所敬衆鳥不可顏貌雖白項長且曲自項不直安能正他又復衆言孔雀衣毛綵飾觀者悅目可應為王復言不可衣毛雖好而無慚愧每至舞時醜形出現有一鳥言土梟為王晝則安靜夜則伺守衆咸曰可有一鸚鵡在一處住而多智慧作是念言衆鳥之法夜應眠息晝則求食是土梟法夜寤晝睡欲諸衆鳥圍侍左右晝夜驚宿甚為苦事便到衆鳥前舉翅恭敬白衆鳥言爾時衆鳥咸言實如所說即共集議此鸚鵡鳥聰明黠慧堪應為王感應緣一驗魏涼州釋僧朗魏寇攻涼州城民少逼僧上城舉城同陷收登城僧三千人至軍將至魏主所謂曰道人當坐禪行道乃復作賊登城罪極刑戮明日當殺至期食時赤氣數丈貫日直度天師寇謙之為帝所信奏曰上天降異正為道人實非本心官抑令上願不須殺帝遂放之猶散配役徒唯朗等數僧別付帳下從駕東歸及魏軍東還朗與同學思慕本鄉中路共叛然嚴防守更無走處東西絶壁莫測淺深上有大樹傍垂岸側遂以鼓旗竿繩繫樹懸下時夜大暗崖底純棘無安足處欲上崖頭復恐軍覺投計慞惶捉繩懸住勢非及久共相謂曰今厄頓至唯念觀音以頭扣石一心專注須臾光明從日出處通照天地乃見棘中有得下處因光至地還忽冥暗良久天曉始聞軍衆警角蔣發而山谷重疊徘徊萬里不知出路候月而行路值大虎出在其前相顧而言雖免寇難虎口難脫朗語僧曰不然我等有感所以有光今遇此虎將非聖人示我路耶於是二人徑詣虎所虎即前行若朗小遲虎亦暫住至曉得出而失虎蹤便隨道自進至於七日達於仇池又至涼漢出於荊州魏氏王天下每疑沙門收數百僧並繫縛之有僧明為首以繩急繫從頭至足剋期斬決僧明大怖一心念觀世音至於半夜覺繩小寬私心欣幸精誠彌切及曉索繩都斷因得脫逃奔山明旦獄監來覓不見唯有斷繩在地知為神力所加即以奏聞帝信道人遂總釋放醒世卷七目録閲至佛難人可不思自作自受殃咎歷歷莫逃眷屬篇哀戀部改易部離著部感應緣三驗機辦篇感應緣二驗造樓賣香畏婦惰慢篇感應緣一驗破邪篇捨邪歸正四驗富貴篇感應緣一驗須達部債負篇謀謗篇宿障部孫陀利謗佛緣佛被木搶刺腳緣佛被舞杆謗緣咒術篇感應緣四驗祭詞獻佛感應緣三驗占相部感應緣三驗慈悲篇菩薩部觀苦感應緣三驗放生部感應緣四驗怨苦篇傷悼部八苦部感應緣一驗業因篇引證因果感應緣受報篇現報住處福行感應緣一驗欲障訶欲四生篇感應緣二驗十使篇述意會名迷理十惡篇殺生感應緣三驗遺物感應緣二驗邪淫感應緣一驗惡口部慳貪部兩舌感應緣一驗邪見
