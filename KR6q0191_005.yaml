body:
  text: 武原居士徐昌治覲周編輯金粟寺住持行元百癡校閲潛遁篇感應緣八驗西晉慈州郭下安仁寺西劉薩何師廟者即晉文公避地之所也其廟莊麗備盡諸飾初何在俗全不奉法因患死蘇曰在冥道中見觀世音曰汝罪重應受苦念汝無知且放今洛下齊城丹陽會稽並有育王塔可往禮拜得免先罪何得活已改革前習遂出家法名慧達百姓仰之屢表異迹晝在高塔為衆説法夜入繭中以自沉隱初不寧舍故俗名為蘇何聖蘇何者番名繭也有一經卷俗中行之純是梵語黃河左右八州之地無不奉敬今諸原皆立土塔上施相剎繫以蠶繭擬達之栖止也西晉末竺佛圖澄西域人形貌似百歲人左脅孔圉可四五寸以帛塞之齋日就水邊抽腸胃出洗己內孔夜則除帛光照一室以讀書雖未通群籍與諸學士輒辨析無滯莫不伏者至永嘉中遊洛下時石勒屯兵河北以殺戮為威道俗遇害不少澄往造軍門豫定吉凶勒見每拜澄化令奉佛減虐省刑故中州免者十人而八九勒與劉曜相拒搆隙以問澄澄曰可生擒耳何憂乎麻油塗掌令視見之曜被執朱繩縛肘後果獲之如掌所見至建平四年四月八日勒至寺灌佛微風吹鈴有聲顧謂衆曰解此鈴音者不鈴言國有大喪不出今年至七月而勒死石虎即位師奉過勒賜以輿輦入出乘焉所有祥感極多虎末澄告弟子曰禍將作矣及期未至吾且過世至戊申年遂有冉閔之亂葬於鄴西澄死之日商者見在流沙虎開棺唯見衣鉢西晉鄴中有佛圖澄弟子名通進學通內外為石虎所重嘗言及隱士事虎謂進曰有楊軻者朕之民也徵之十餘年不恭王命故往省視傲然而臥朕雖不德君臨萬邦乘輿所向天沸地涌雖不能令木石屈膝何匹夫而長傲耶昔太公之齊先誅華士太公賢哲豈其謬乎進對曰昔舜優蒲衣禹造伯成魏軾干木漢美周黨管寧不應曹氏皇甫不屈晉世二聖四君共嘉其節將欲激勵貪競以峻清風願陛下遵舜禹之德勿效太公用刑君舉必書豈可令史遂無隱遁之傳乎虎悅其言即遣軻還其所止差十家供給之進還具以白澄澄睆然笑曰汝言善也但軻命有懸矣後秦州兵亂軻弟子以牛負軻西奔遂被擒遇害虎嘗晝寢夢見群羊負魚從東北來寤以訪澄澄曰不祥也鮮卑其有中原乎慕容氏後果都之宋偽魏長安有釋曇始關中人自出家以後多有異迹晉孝武太元之末齎經數十部往遼東宣化顯授三乘及以歸戒蓋高句驪聞道之始也義熙初復還關中開導三輔始足白於面雖跣涉泥水未嘗沾泥天下咸稱白足時長安人王烏其叔死數年忽見形還將烏遍遊地獄示諸果報烏辭還叔謂烏曰既已知因果但當奉事白足阿練烏遍訪衆僧唯見始足白於面因茲事之晉末朔方北敵赫連勃勃嗟之並放沙門悉皆不殺始於是潛遁山澤修頭陀之行後託跋燾復剋長安擅威關洛時有博陵崔皓少習左道猜嫉釋教既位居偽輔燾所仗信乃與天師寇謙説燾以佛化無益有損民利勸令廢之燾惑其言以偽太平七年遂毀滅佛法分遣軍兵燒毀寺舍統內僧尼悉令罷道其有竄逸者皆遣人追捕得必梟斬一境之內無復沙門始間絶幽深軍兵所不能至至太平之末始知燾化時將及以元會之日忽杖錫到宮門有司奏云有一道人足白於面從門而入燾令依軍法屢斬不傷遽以白燾燾大怒自以所佩劍斫之體無餘異唯劍所著處有痕如布線時北園養虎於檻燾令以始餧之虎皆潛伏終不敢近試以天師近檻虎輒鳴吼燾始知佛化尊高黃老所不能及即延始上殿頂禮足下悔其信失始為説法明辨因果燾大生愧懼遂疾崔寇二人次發惡病燾以過由於彼於是誅剪二家門族都盡宣下國中興復正教俄而燾卒孫濬襲位方大弘佛法盛訖於今始後不知所終也宋岷山通雲寺有沙門邵碩始康人形貌似狂而深敬佛法至四月八日成都行像碩於衆中匍匐作師子形爾日郡縣亦見碩作師子形乃悟分身也刺史蕭慧開及劉孟明等並挹事之後一朝忽著布帽詣孟明少時明卒先是孟明長史沈仲玉改鞭杖之格嚴重常科碩謂玉曰天地嗷嗷從此起若除鞭格得刺史玉信而除之及孟明卒仲玉果行州事以宋元嘉元年九月一日卒岷山通靈寺臨亡語道人法進云可露吾骸急繫履著腳既而依之出尸置寺後經二日不見所在俄而有人從郫縣來遇進云昨見碩公在寺中一腳著履漫語云小子失我履一隻進驚而檢問沙彌沙彌答云近送尸時怖懼右腳一履不得好繫遂失之梁京師有釋寶志本姓朱金城人少出家止京師道林師事沙門僧儉修習禪業至宋太始初忽如僻異居止無定飲食無時髮長數寸常跣行街巷執一錫杖齊建元中稍見異迹數日不食亦無飢容與人言語始若難曉後皆效驗時或賦詩言如讖記京土士庶皆共事之齊武帝謂其惑衆收住建康既旦人見共入市廛還檢獄中志猶在焉志語獄吏門外有兩輿食來金鉢盛飯汝可取之既而齊文惠太子竟陵王子良並送食餉志果如其言建康令呂文顯以事聞武帝帝即迎入居之後堂志後假武帝神力見高帝於地下常受錐刀之苦帝是時永廢錐刀齊太尉司馬殷齊之隨陳顯達鎮江州辭志志畫絹作一樹樹上有烏語云急時可登此後顯達逆節留齊之鎮州及敗齊之入廬山追騎將及齊之見林中有一樹樹上有烏乃志所畫悟而登之烏竟不飛追者見烏謂無人而返卒以見免先是齊時多禁志出入今下詔曰志公迹居塵垢神遊冥寂水火不能焦濡蛇虎不能侵懼語其佛理則聲聞以上談其隱淪則遁仙高者自今以來隨意出入勿得復禁志自是多出入禁內天監五年冬旱志忽上啓云願於華光殿講勝鬘請雨又云須一盆水加刀其上俄而雨大降高下皆足上嘗問志云弟子煩惑未除何以治之答云十二識者以為十二因緣治惑藥也又問弟子何時得靜心修習答云安樂禁後法雲於華林講法華至假使黑風志忽問風之有無答云世諦故有第一義則無也志往復三四番便笈云若體是假有此亦不可解難可解其意旨隱沒類皆如此周時老子者姓李名聃字伯陽楚國苦縣瀨鄉曲仁里人其母感大流星而有娠雖受氣於天然見生於李猶以李為姓或云老子先天地生或云其母懷之七十歲乃生生時剖其母左腋出出而白首故謂之老子殷時彭祖諱鏗帝顓頊之玄孫至殷之末世年已七百六十七歲而不衰老少好恬靖不恤世務不管名譽不飾車服惟以養生治身為事王聞其壽以為大夫常稱病間居不與政事善於補導之術并服水桂雲母糧粉麋角常有少容閉氣內息從平旦至日中乃免坐拭目摩搦身體舐唇咽唾服氣數十乃以起行言笈其體中或有疲倦不安便導引閉氣頭面九竅五臟四肢至毛髮皆令氣行體中起於鼻口下達十指又有婇女者以少得道知養形神方年二百七歲視之如十五六王奉事之於腋庭為立華屋紫閣飾以金玉乃令婇女乘輜軿往問道於彭祖婇女具受諸要法以教王王試為之有驗欲殺之彭祖知之乃去不知所如其後七十餘年門人於流沙之西見之妖怪篇引證如佛本行經云爾時佛告諸比丘言我念往昔有一鳥王名雞尸形貌端正身體白淨猶如珂雪又若白銀如淨滿月如居陀華其頭紺色走疾如風聲如妙鼓於彼時間閻浮提有五百商人時諸商人欲入大海辦具資糧行到大海即祠海神備諸船舶雇得五船師求覓珍寶時諸人輩至其海內忽值惡風吹其船舫至羅剎國其國多有羅剎之女欲到彼國大風飄搏船悉破壞時諸商人各運手足截流浮去欲詣彼岸時羅剎女聞彼大海有船破壞羅剎女等即往救接將彼商人置一鐵城既安置已變化本形令使端正可喜過人用天香湯澡浴以香塗身著種種衣纓絡莊嚴妙華天冠懸以寶鈴捷疾走行詣商人所將諸商人向彼城已教脫舊衣以諸香湯沐浴身體令坐種種妙勝之座以五欲具而娛樂之後時諸羅剎女等告諸商人是城南面不得從彼出向某處有一商人智慧深細聰明利見即生疑念作是思惟以何等故不聽南過我應伺諸女睡臥之時尋往所禁之處次第觀看善惡之事爾時商主作是念已即伺彼諸羅剎女等臥睡眠已遂安詳而起不令有聲即執刀從家而出漸漸前進見一微徑無有草木乃聞有人大叫喚聲聞此聲已身毛皆豎默然詣彼見一鐵城其城高峻詣城巡行聲出之處而不見門到於北面見有一樹近城而生其高大出於城上時彼商主即上其樹觀看城內見彼城中百有餘人或有死者已被食半或命未斷半身支解或有飢渴逼惱而坐或復消瘦唯有筋骨眼目坎陷迷悶在地頭髮蓬亂塵土坌身甚大嬴瘦各相割肉而噉食之是大商主見是事已即以手捉合歡樹枝而搖動之一枝動已舉樹枝葉互相撑觸而有聲出爾時受苦諸人仰觀城上見彼主在樹悲呼是誰為天為龍為夜叉為帝釋為大梵王等合十指掌頭頂遙禮哀泣發聲仰面上觀善哉仁者濟拔於我爾時商主報彼言我等從閻浮提興生至此為求財故入於大海我等將欲至於陸地忽遇大風船舶破散值諸婦女濟拔我等從爾已來常共如是諸女歡娛受樂我今云何能濟汝苦是時商主復問彼言汝諸人等云何在此受如斯事彼苦人答言我等行人同伴亦五百人船破至岸亦遭羅剎女共受五欲將我等輩置鐵城中入此城來已被他食二百五十今唯二百五十人在我等亦共彼輩和合生於男女彼羅剎女語言微妙其聲婉媚但彼女等貪食肉故共生男女悉還食盡汝諸人輩慎莫共彼受樂是時商主復問彼言諸人輩頗有方便得脫難不彼即報言有一方便商主復問方便如何彼等報言十五日滿四月節會大喜樂日月與卯宿合會之時有一馬王名曰雞尸彼所停處粳米鮮白香美具足彼馬所食食是米已來詣海岸露現半身口出人聲而作是言誰欲度彼大鹹苦水如是三説我今當令安隱得度彼岸若值如是馬者即得免難商主復問汝等頗曾見馬王不汝若見者何不親近何不度汝初從誰聞如是之事彼等報言我從虛空聞如是聲而有信者尋虛空聲詣於北道馬王之所雖往其所不受彼言而復還歸我等皆由愛羅剎女是故如此受厄商主復問彼言汝等可共詣彼馬王之所彼等報言我欲上城城即增長掘地欲出其孔還合我等是處無解脫期我輩必為羅剎女食爾時商主依著本道還向本處見彼等輩諸羅剎女猶故睡眠商主爾時還即眠臥至於天曉便作是念云何令彼諸商人輩得知此事若輒出言是即漏泄隱然而住乃至四月歡樂會時方始告彼諸商人知汝等今者慎莫放逸戀著愛心或貪婦女或貪飯食及餘資財我於汝等極生憐愍我今密語時諸商人聞説猶如師子在於山林忽大哮吼遂至夜內見彼羅剎一切諸女睡眠安隱而臥私從臥起咸共詣彼期處白商主言善哉所見願為我説商主即告彼等説前見事諸人聞已憂愁不樂白言今當速至彼馬王所願我等輩安置得達閻浮提內本生之處時諸商人皆詣馬王所爾時馬王至於海岸露現半身以人音聲而三唱告誰欲樂度鹹水彼岸我當安隱負而度之時諸商人聞馬王如是語已歡喜踴躍身毛皆豎合十指掌頂禮馬王我等欲度願濟我等達到彼岸時馬王告諸商人汝等當知彼羅剎女不久應來或將男女顯示於汝慈悲哀哭受於苦惱汝等於時莫生染著愛戀之心汝等若起此意假使乘我背上必當墮落為彼羅剎之所噉食若能堅持意念以手執我一毛而懸之者我於是時安隱相送速到彼岸作是語已時諸商人依語乘之爾時馬王負彼商人出哀愍聲飛騰空裏行疾如風爾時彼諸羅剎女輩聞彼馬王哀愍之聲復聞走聲狀如猛風忽從睡覺處處觀看乃遙見商人乘馬王上乘空而去速將男女馳走奔赴至於海岸發慈愍聲哀號啼哭作大苦惱各作是言汝諸聖子今者舍我欲何所去今我無主汝是我主汝等於先墮在海難大恐怖中我等度汝汝今捨背於我欲詣何所無恩無義何故相棄若有違犯今乞懺悔從今已後不作諸惡如其不用我者今此男女可收將去時羅剎女雖作如是慈流言語雞尸馬王仍將彼輩五百商人安隱登彼岸到閻浮提得脫度生死海感應緣四驗賈誼為長沙王太傅四月庚子日有鵩鳥飛入其舍止於坐隅良久乃去誼發書占之曰野鳥入處主人將去誼忌之故作鵩鳥賦齊死生而等禍福安陽城南有一亭廟不可宿也若宿殺人有一書生乃過宿之亭民曰此不可宿前後宿此未有活者書生曰無苦也吾自能諧遂住廟舍乃端坐讀書良久乃休夜半後有一人著皂單衣來往戶外呼亭主亭主應曰諾亭中有人耶答曰向者有一書生在此讀書久適休似未寐乃喑嗟而去須臾復有一人冠幘赤衣呼亭主亭主應諾亦復問亭中有人耶亭主答如前復喑嗟而去於是書生起詣向者呼處微呼亭主亭主亦應諾復問亭中有人耶亭主答如前乃問向者黑衣來者誰曰北舍母豬也又曰赤冠幘來者誰曰西舍老雄雞父也曰汝復誰耶曰我是老蠍也於是書生密便誦書至明不敢寐天明亭民來視驚曰君何以得活耶書生曰汝捉索函來吾與卿取魅乃掘昨夜應處果得老蠍大如鞞婆毒長數尺於西家得老雄雞父北舍得母豬凡殺三物亭毒遂靜永無災橫東越閩中有庸嶺高數十里其下北隙中有大蛇長七八丈土俗嘗懼治都尉及屬城長吏多有死者或與人夢或喻巫祝欲得啖童女年十二三者都尉令長並共患之然氣厲不息共請求人家生婢子兼有罪家女養之至八月朝祭送蛇穴口蛇輒夜出吞嚙之纍年如此前後已用九女爾時豫復募索未得其女將樂縣李誕家有六女無男其小女名寄應募欲行父母不聽寄曰父母無相唯生六女無有一男雖有如無女無緹縈濟父母之功既不能供徒費衣食生無所益不如早死賣寄之身可得少錢以供父母豈不善耶寄乃行密請好劍及咋蛇犬至八月朝便詣廟中坐懷劍將犬先作數石米餈蜜灌之以置穴口蛇夜便出頭大如囷目如二尺鏡聞餈香氣先啖食之寄便放犬犬就嚙咋寄從後斫得瘡痛急蛇因踊出至庭而死寄入視穴得其九女髑髏悉舉出叱言曰汝曹怯弱為蛇作食甚可哀愍於是寄女緩步而歸越王聞之聘寄女為后拜其父為將樂令母及姊皆有賜賞自是東治無復妖邪之物晉咸安二年簡文皇帝起造聖嬤新林寺時歷陽郡烏江寺尼道容苦行通靈豫知禍福世傳為聖嬤咸安初有烏巢殿屋帝使嘗筮人占之曰西南有女人師當能伏此怪即遣使至烏江迎聖嬤問此吉凶焉在嬤曰修德可以禳災齋戒亦能轉障帝乃建齋七日禮懺精勤法席未終忽有群烏運巢而去一時淨盡帝深加敬信因起此寺變化篇厭欲部大莊嚴法門經云爾時王舍城中有淫女女名金色彼女宿世善根因緣形貌端正衆相具足身真金色光明照耀容儀媚麗世所希有神慧聰敏辨才無礙音辭清妙深邃柔軟言嘗含笈隨所行處皆金光照所著衣服亦皆金色一切人衆見者繫心愛著無捨隨所遊處皆悉隨從有長者子名上威德為欲樂故多與財寶共相要契車乘莊嚴往詣園林爾時金色女宿緣冥感為文殊師利化令入道神變自在故以頭枕彼威德膝上而睡即以神力於其臥處現為死相膖脹臭爛難可附近須臾腹破肝腸剖裂五臟露現臭穢可惡大小便道流溢不淨諸根支節蠅蛆唼食時長者子見此死尸生大恐怖身毛皆豎而作是念我今無救遍觀四方無歸依處從昔以來未見如是惡事又大衆知我與彼同來在此而今忽死謂我故殺彼長者子過去善根雖熟以不聞見文殊共金色女所説法故文殊師利即以神力令諸樹林悉説偈言長者子聞心大歡喜深自慶幸捨棄死尸從林而出即往佛所具説怖緣爾時佛告長者子汝莫憂怖我當施汝一切無畏長者子白佛一切怖畏從何而生佛言從貪瞋癡因緣故畏當知一切諸怖無主無作無有執者汝先欲覺今何所在長者子言此中所見好色凡夫貪著於聖法中無如是事於是佛為種種方便説法時長者子得順法忍時金色女知長者子受教化已莊嚴五百馬車前後圍繞來詣佛所卻住一面爾時文殊問長者子言汝識此妹不長者子言我今實識文殊師利言汝云何識時長者子即向文殊而説偈言見色如水沫諸受悉如泡觀想同陽焰如是我識彼文殊當善聽彼恩難可報我本多貪欲見不淨解脫爾時佛告阿難此金色女上威德男已於過去教化令發菩提今更聞法得順法忍此金色女於當來世過九十百千劫當得作佛威德長者得菩薩身又觀佛三昧云佛告阿難我昔夏安居時波羅奈國有一淫女在高樓上名妙意昔日於佛有緣爾時世尊化三童子年皆十五面貌端正勝諸世間一切人類此女見已身心歡喜白言丈夫我今以身及與奴婢奉上丈夫可備灑掃若能顧納一切供給無所愛惜作是語已化人就床女前親近一日一夜心不疲厭至二日時愛心漸息至三日時纏綿不已女生厭悔身體痛苦女作念言我聞人説迦毗羅城淨飯王子身紫金色三十二相愍諸盲冥救濟苦人恆在此城嘗行福度放金色光濟一切人今日何故不來救我我從今日乃至壽終終不貪色化人亦瞋婦女廢我事業我今共汝合體一處不如早死是時化人取刀剃頸血流滂沱塗於女身萎陀在地二三日後膖脹爛潰肉落唯有臭骨如膠如漆黏著女身女極惡厭而不得離女發誓願若諸天神及與仙人淨飯王子能免我苦我持此舍一切珍寶以用給施作是念時佛將阿難難陀帝釋在前梵王在後佛放嘗光照耀天地一切大衆皆見如來詣此女樓時女見佛心懷慚愧藏骸無處取諸白㲲纏裹臭尸臭氣如故不可覆藏女見世尊作禮以慚愧故身映骨上臭骨忽然在女背上女極慚愧流淚而言如來功德慈悲無量若能令我離此苦者願為弟子心終不退佛神力故臭骨不現女大歡喜為佛作禮白佛言世尊我今所珍一切施佛佛為咒願梵音流暢女聞咒願心大歡喜應時即得須陀洹道五百侍女聞佛音聲皆發無上菩提道心無量梵衆見佛神變得無生忍感應緣二驗左慈字元放廬江人也有神通嘗在曹公座公曰今日高會恨不得吳松江鱸魚為膾放云可得也求銅盤貯水放以竹竿餌釣盤中須臾引一鱸出公大撫掌會者皆驚公曰一魚不周座席得兩為佳放乃復餌釣之須臾引出皆三尺餘生鮮可愛公便目前膾之周賜座席公曰今既得鱸恨不得蜀生薑耳放曰可得也公恐其近道買因曰吾昔使人至蜀買錦可敕人告吾使使增市二端人去須臾還得生薑又云於錦肆下見公使已敕增市二端後經歲餘公使還果增市二端錦問之云昔某月某日見人於肆下以公敕增市二端錦後公近郊士人從者百許人放乃齎酒一罌脯一片手自傾罌行酒百官百官皆醉飽公還驗之酤賣家昨悉亡其酒脯矣公惡之陰欲殺元放元放在公座將收之放卻入壁中霍然不見募取之或見於市乃捕之而市人皆放同形後或見放於陽城山頭行人逐之放入於群羊行人知放在羊中告之曰曹公不復相殺本成君術但欲與相見羊中忽有一大老羝屈前兩膝人立而言曰遽如許人即云此羊是競往欲取而群羊數百皆為羝羊並屈前膝人立云遽如許於是莫知所取焉老子曰吾之所以為大患者以吾有身也及吾無身吾有何患於孔子厄於陳絃歌於館中夜有一人長九尺餘著皂衣高冠大吒聲動左右子貢進問何人耶便提子貢而挾之子路引出與戰於庭有頃未勝孔子察之見其甲車間時時開如掌孔子曰何不探其甲車引而奮之子路如之沒手仆於地乃是大鯨魚也長九尺餘孔子嘆曰吾聞物老則群精依之因衰而至此其來也豈以吾遇厄絶糧從者病乎夫六畜之物及龜蛇魚鱉草木久者神皆依憑能為妖怪故謂之五酉五酉者五行之方皆有其物酉者老也故物老則為怪眠夢篇三牲部雜寶藏經云昔有惡生王為行殘暴如來遣迦栴延化其本國惡生王及夫人皆得生信夫人號為尸婆具沙後生太子字喬波羅時王於寢夢見八事以為不祥愁憂慘悴尋問外道婆羅門外道正嫉尊者迦栴延因王此夢言大不吉不禳壓之禍及王身王益增憂惱即問禳壓當須何物婆羅門言所須用者王所珍愛我若説者王必不能王言此夢甚惡但恐大禍殃及我身除我以往餘無所惜諸婆羅門寺即語王言此夢有八須八種可以禳災一殺王所敬夫人尸婆具沙二殺王所愛太子喬婆羅三殺輔相大臣四殺王所有烏臣五殺王一日能行三千里象六殺王一日能行三千里駝七殺王良馬八殺王所敬禿頭迦栴延殺聚其血入中而行可得消災王聞其言以己命重即便許可還至宮中愁憂懊惱夫人問王何故如是王具陳説上不祥之夢并道婆羅門禳夢所須夫人聞已而作是言但使王身平安無患妾之賤身復白王言卻後七日我歸當死聽我往彼尊者迦栴延所六日之中受齋聽法王言不得汝若至彼或語其實彼若知者捨我飛去夫人殷勤王不能免即便聽往夫人到彼尊者所禮拜問訊遂經三日尊者怪問王之夫人未曾全此經宿何故今者不同於常夫人具説王之惡夢卻災七日當殺我等用禳災患餘命未幾故來聽法尊者迦栴延言此夢甚吉當有歡喜不足為憂一頭上然者寶主之國當有天冠直十萬兩金來貢於王日晡時必當來至二兩蛇絞腰月支國王當獻雙劍價值千萬兩金今日當至三細鐵網纏身者大秦國王當獻珠纓價值十萬兩金後日凌晨當至四赤魚吞足者師子國王當獻毗琉璃寶跂價值萬兩金後日食時當至五四白鶴來者跋耆國王當獻金寶後日日中當至六血泥中行者安息國王當獻鹿毛欽婆羅衣價值十萬兩金後日日昧當至七登太白山者曠野國王當獻大象後日晡時當至八鸛雀咽頭者王與夫人當有私密之事事至後日自當知之夫人白王良久果如尊者所言期限既至諸國所獻一切皆到王大歡喜尸婆具沙夫人先著寶主國所獻天冠王因挍戲脫夫人所著一重天冠著金鬘夫人頭上時夫人瞋恚而言若有惡事我先當之今得天冠與彼而著尋以酪器擲王頭上王頭盡污王大瞋忿拔劍欲斫夫人夫人走入房中即閉房戶王不得前王尋自悟尊者占夢云有私密事正此事耳王及夫人尋至尊者迦栴延所具論上來信於非法惡邪之言幾於尊者妻子大臣所愛之物行大惡事今蒙尊者離於惡事即詣尊者敬奉供養驅諸外道婆羅門等遠其國界於三寶所深生敬信不善部如發覺淨心經云佛告彌勒菩薩言菩薩當觀二十種睡眠諸患時有國王名不黎先泥夜夢十事即寤大怖意中不樂誰能解夢有一婆羅門言我為解之恐王聞者憂愁不樂王言如卿所睹説之勿有所諱婆羅門言王夢皆惡當取所重愛夫人太子及親近侍人奴婢皆殺以祠天王可得無他王聞此語轉加愁憂即入齋房思念是事王正夫人名摩泥到王所問王言何為入齋房愁憂不樂設有善惡王應語我王便為夫人具説夜夢十事夫人言王莫愁憂如人買金磨石好醜善惡其色自見於石上今佛近在精舍去國不遠何不往問如佛所解王當隨之王即敕群臣嚴駕而出到佛所頭面禮佛足卻坐白佛言我昨夜夢見十事寤即怖恐恐亡我國及身妻子唯佛為解佛言第一夢見三瓶併兩邊瓶滿氣出相交往來不入中夬空瓶中者此後世人豪貴者自相追隨不親貧者第二夢見馬口食尻亦食者此後世人作帝王及大臣廩食縣官俸祿復採萬民不知厭足第三夢見小樹生華者此後世人年未滿三十而頭生白髮貪淫多欲第四夢見小樹生果者此後世人年未滿十五行嫁抱兒而歸第五夢見一人索繩人後有羊羊主食繩者此後世人夫壻出行賈作其婦與他家男子交通貪其財物第六夢見狐坐金床上於金器中食此後世人下賤便尊貴有財産衆人敬畏公侯子孫更經貧賤處於下坐第七夢見大牛還從小犢子乳者此後世人無有禮義母反為女作媒誘恤他家男子與女交通第八夢見凹牛從四面鳴來相趨欲鬥當合未合不知牛處者此後世帝王長吏及人民皆無至誠之心更欺詐愚癡瞋恚不敬天地是故雨澤不時第九夢見大陂水中央濁四邊清者此後世中國當擾亂治行不平人民不孝父母不敬長老邊國面當平清人民和穆第十夢見大溪水流正赤者此後世諸國忿爭興軍聚衆更相攻伐當作車兵步兵騎兵共鬥相殺復不可數死者於路血流正赤王夢正是王莫恐怖於國太子於夫人皆亦無他王聞長跪心即歡喜今受佛恩令得安隱從今已後不信諸異外道及婆羅門感應緣二驗宋陳秀遠者潁川人也嘗為湘州西曹客居臨湘縣少信奉三寶年過耳順篤業不衰宋元徽二年七月中於昏夕間間臥未寢歎念萬品死生流轉無定自惟己身將從何來一心祈念冀通感夢時夕結陰室無燈燭有頃見枕邊如螢火者冏然明照俄而一室盡明爰至空中有如朝晝秀遠遽起坐見中寧四五丈上有一橋閣欄檻朱彩立於空中自見平坐橋側見橋上士女往還填衢衣服粧朿不異世人末有一嫗年可三十許上著青襖下服白布裳行至秀遠左邊而立頃復有一婦人通體衣白布為遍環髻手持華香當前而立語秀遠曰汝欲睹前身即我是也以此華供養佛故故得轉身作汝回指白嫗曰此即復是我先身也言畢而去唐京師大莊嚴寺釋智興俗宋氏洛州人也謙約成務勵行堅明依首律師誦經持律心口相弔不輟昏曉至大業五年仲冬次當維那鳴鍾依時僧徒無擾同寺僧名三果者有兄從煬帝南幸江都中路身亡初無凶告通夢其妻曰吾行達彭城不幸病死由齋戒不持今墮地獄備經五苦辛酸賴以今月初日蒙禪定寺僧智興鳴鍾發響聲振地獄同受苦者一時解脫今生樂處思報其恩汝可具絹十匹早奉與之并陳吾意從眠驚寤怪夢所由與人共説初無信者尋入重夢及諸巫覡咸陳前説後經十日凶告奄至恰與夢同果乃奉絹與之而興自陳無德並施大衆寺主恭禪師等合寺大德咸問興曰何緣鳴鍾乃感斯應興曰余無他術見付法藏傳云罽膩吒王受苦由鳴鍾得停及增一阿含經鳴鍾偈福敬遵此事輒力行之嚴冬登樓風切皮肉僧給羔袖用執鍾椎興自勵意露手鳴椎掌中傷破不以為苦兼鳴鍾之始先發善願願諸賢聖同入道場同受法食然後三下將欲長打如先致敬願諸惡趣聞此鍾聲俱得離苦速得解脫如斯願行遂能遠感衆服其言興福篇興福部爾時座中有一比丘名曰聽聰聞法欣悅即白佛言我自性念先世之時生波羅奈國為長者子於大道邊起立精舍床臥漿糧供給衆僧行路頓乏亦得止息緣此功德命終生天為天帝釋下生世間為轉輪王各三十六返復有一比丘名波拘盧即白佛言憶念我昔生拘那竭國為長者子時世無佛衆僧教化大會説法我往聽法聞法歡喜將一藥果名訶黎勒奉上衆僧緣此果報命終生天下生世間恆處尊貴與衆超絶九十一劫未曾疾病餘福值佛逮得應真復有一比丘名曰須陀耶即白世尊曰我念宿命生維耶離國為小民家子時世無佛衆僧教化我時持酪入市欲賣值衆僧大會講法過而立聽聞法歡喜即舉瓶酪布施衆僧得咒願福益懷欣躍緣此福德命終生天下生世間恆處尊貴九十一劫復有一比丘名曰阿難即白世尊曰憶念我昔生羅閲祗國為庶民子身生惡瘡治之不瘥有親友道人來語我言當浴衆僧取其浴汁以用洗瘡可得愈又可得福我即歡喜往到寺中加敬至心更作新井香油浴具洗浴衆僧取其浴汁以用洗瘡尋蒙除愈緣是功德所生端正金色晃昱不受塵垢九十一劫嘗得淨福僧德廣遠今復值佛心垢消除逮得應真爾時座中有一比丘尼名曰奈女即白佛言我念宿命生波羅奈國為貧女人時世有佛名曰迦葉時與大衆圍繞説法我時在座聞經歡喜意欲布施願無所有自惟貧賤心用悲感詣他園囿乞求果蓏當以施佛乞得一奈大而香好擎一盂水并奈一枚奉迦葉佛及諸衆僧佛知至意咒願受之分布水奈一切周普緣此福作命終生天得為天后下生世間不由胞胎九十一劫生奈花中端正鮮潔今值世尊開示道眼爾時天帝即從座起為佛作禮長跪叉手白佛言世尊我自念先世之時生拘留大國為長者子青衣抱行入城遊觀偶值衆僧街巷分衛時見人民施者甚多即自念言願得財寶布施即解珠纓施與衆僧同心咒願歡喜而去從是因緣壽終生天得為天帝九十一劫永離八難佛告天帝及諸大衆聽我自説宿命所行昔我前世於波羅奈國近大道邊安設圊廁國中人衆得輕安者莫不感美緣此功德世世清潔纍劫行道穢染不汙金色晃昱塵垢不著食自消化無便利之患佛告天帝九十六種道中佛道最尊九十六種法中佛法最真九十六種僧中佛僧最政所以者何由如來從阿僧祗劫發願成諦殞命積德誓為衆生六度四等衆善普備得慧成滿三界天尊無能及者其有衆生發一敬心向如來者勝獲大千世界珍寶施矣三十七品十二部經分別罪福言皆至誠開三乘教皆得奉行聞者歡喜樂作沙門信佛行法志尚清高捨世貪諍導世間福天人路通衆僧之由是為最尊無上之道生信部如舊雜譬喻經云昔舍衛城外有婦人清信戒行純具佛自至門乞食婦以飯著佛鉢中卻行作禮佛言種一生十種十生百種百生千種千生萬種萬生億得見諦道其夫不信默於後聽佛咒願夫曰瞿曇沙門言何過甚施一鉢飯乃得爾福復見諦道佛言卿從何來答曰從城中來佛言汝見尼拘陀樹高幾許耶答曰高四五里歲下數萬斛實又問其核大小答曰如芥子佛言汝語過甚何有種一芥子乃高四五里歲下數十萬子答曰世人共見其實如是佛言地是無知其報力尚爾何況人是有情歡喜持一鉢飯上佛其福甚大不可稱量夫婦二人心開意解應時即得須陀洹道又智度論云昔佛在世時佛與阿難從舍婆提城向婆羅門城時婆羅門城王屬外道聞佛欲來即立制限若與佛食共佛語者當罰金錢五百文後佛來到入城乞食人皆閉門佛與阿難空鉢而出見一老婢持破瓦器盛臭潘淀出門棄之見佛相好空鉢而來心念欲施佛知其意申鉢從乞所棄潘淀婢即淨心持來施佛佛受施已語阿難言此婢因施十五劫中天上人間受福快樂不墮惡道後得男身出家學道成辟支佛當時有一婆羅門聞佛此語心開意解向佛懺悔佛為説法得須陀洹即時舉手大唱聲言一切衆人甘露門開如何不出諸人聞已皆送五百金錢與王請佛供養即破制限王與群臣亦歸依佛佛為説法悉獲道果以是因緣如來所説無有虛妄善惡果報必受不差校量部如須達經云昔過去世有鞞藍大婆羅門大富多財彼作大施以八十四千金鉢碎銀滿中彼行大施八十四千銀鉢滿中碎金八十四千金鉢滿中碎金八十四千銀鉢滿中碎銀八十四千象象白如雪八十四千馬金飾交露八十四千牛𤛗乳滿器八十四千玉女端正殊妙諸纓嚴飾如是行施與閻浮提凡夫人寧施與彼一仙人得福多雖與仙人不如施一須陀洹此得福多雖與須陀洹不如施與一斯陀含雖與斯陀含不如施一阿那含雖與阿那含不如施與阿羅漢雖與百須陀洹不如施與一斯陀含雖與百斯陀含不如施與一阿那含雖與百阿那含不如施與一阿羅漢雖與百阿羅漢不如施與一辟支佛雖與百辟支佛不如施與如來無所著等正覺此得福多彼居士作如是施與閻浮提凡夫人至百辟支佛作房舍以施招提僧得福增多雖與招提僧不如以清淨意作三自歸佛法僧受其戒此得福多雖受三歸受戒不如與一衆生行於慈悲至𤛓牛頃此得福多雖於一切衆生分別行慈下至𤛓牛頃謂不如一切行無常苦空無我思惟念者下至彈指頃此得福多又增一阿含經云爾時世尊告諸比丘有四梵福云何為四若有信人未曾起偷婆處塔也於中能起偷婆者是初受梵天之福若有信人能補治故寺者是謂第二受梵天之福若有信人能和合聖衆者是謂第三受梵天之福若佛初轉法輪時諸天世人勸請轉法輪是謂第四受梵天之福修造部又觀佛三昧經云時優闐王戀慕世尊鑄金為像聞佛當下寶階象載金像來迎世尊爾時金像從象上下猶如生佛足步虛空足下雨華亦放光明來迎世尊合掌叉手為佛作禮爾時世尊亦復長跪合掌向像空中百千化佛亦皆合掌長跪向像爾時世尊而語像言汝於來世大作佛事我滅度後我諸弟子以付囑汝空中化佛異口同音咸作是言若有衆生於佛滅後造立形像持用供養是人來世必得念佛清淨三昧雜福部又正法念經云若有衆生施人美水或覆井泉恐諸毒蛇墮於井中行人飲之而致苦惱命終生三管箜篌天受五欲樂若見病困咽喉出聲餘命未盡施其漿飲或施其財以續彼命命終生深水天從天命終隨業流轉不墮三途得受人身從生至生不遭病苦若有衆生持戒見比丘僧以扇布施令得清涼讀誦經法命終生風行天悅樂無比若有衆生於河津濟造立橋船以善心渡人命終生持鬘天受五欲樂命盡人中為王典藏又譬喻經云昔有母子三人嘗作三事一作大船置於河中以渡百姓二於都市造立好井以供萬民三於四門各作圊廁給人便利緣是功德命終之後皆生天上受福自然下生人中富貴長壽所生之處不經三塗又華手經云佛告舍利弗菩薩有四法終不退轉無上菩提何等為四一者若見塔廟毀壞當加修造若塊若泥乃至一磚二者若於四衢道中多人觀處起塔造像為作念佛善福之緣塔中畫作若轉法輪及出家相乃至雙樹入涅槃相三者若見有比丘僧二部諍訟勤求方便令其和合四者若見佛法欲壞能誦讀説乃至一偈令法不絶為護法故敬養法師專心護法不惜身命菩薩若成是四法者世世當作轉輪聖王得大身力如那羅延捨四天下而行出家能得隨意修四梵行命終生天作大梵王乃至究竟成無上道洗僧部佛言所以用四月八日者為春夏之際殃罪悉畢萬物普生毒氣未行不寒不熱時氣和適今是佛生日故諸天下人民共念佛功德浴佛形像如佛在時佛言我為菩薩時三十六返作飛行皇帝今日有好心念釋迦佛恩德者以香花浴佛形像當取三種香一都梁香二藿香三艾納香又用鬱金香手按漬之於水中按之以作赤水則灌像訖以白練拭之名曰清淨其福第一時有一客作人園中汲水灌樹見舍利弗發小信心喚舍利弗脫衣樹下以水澆洗身得輕涼作人後命終即生忉利天上有大威力為功雖少以遇良田獲報甚多即下詣舍利弗所散華供養舍利弗因其信心為説法要得須陀洹果又賢愚經云爾時首陀會天下閻浮提至世尊所請佛及僧浴洗供養即設飲食并辦洗具溫室暖水調適酥油浣草皆悉備有於是世尊及諸比丘共洗浴已并厚飲食其食甘美世所希有是時阿難白佛此天往昔作何功德形體殊妙威相奇特光明顯赫如大寶山佛告阿難乃往過去毗婆尸佛時此天彼世為貧家子恆行傭作以供身口聞説洗僧之德情中欣然便勤作務得少錢穀用設洗具并及飲食請佛衆僧由此福行壽終之後生首陀會天有此光相七佛已來乃至千佛出世亦皆如是感應緣四驗唐楊州長樂寺釋住力姓褚氏河南陽翟縣人器宇凝峻虛懷接悟聲第之高有聞緇俗於本寺四部王公共造高閣并二挾樓妙盡奇工即年成立寺衆三百同皆歡喜至大業十年自竭身資以栴檀香木模寫瑞像并二菩薩不久尋成同安閣內至十四年隋室喪亂道俗流亡骸骨萎朽充諸衢市誓以身命守護殿閣寺居狐兔顧影為儔啜菽飲水再離寒暑雖耆年暮齒而心力逾壯泥塗褫落周匝火燒口誦不輟手行治葺賊徒雪泣見者哀歎往往革心相佐修補皇唐受命弘宣大法舊僧餘衆並造相投邑屋雖焚此寺猶在武德六年江表賊師輔公祐負阻繕兵潛圖反叛凡百寺觀撤送江南力乃致書再請願在閣前燒身以留寺宇祐偽號稱尊志在傾殄得書不顧力謂弟子曰吾無量劫來積習貪愛不能捐捨形命以報法恩今欲自於佛前取盡決不忍見像濟江可積乾薪自燒供養便以香湯沐浴跏趺面西引火自燒命終火滅合掌凝然群鵲哀鳴其聲甚切右繞七匝方始飛去唐京師弘福寺釋慧雲姓王太原人也弱冠樂道投匡山大林寺因寺毀壞力為營造至隋季末年中表咸亂胡秀才親領士衆臨據九江因感發心欲寫廬山東林寺文殊瑞像以雲有出衆之奇令鑑爐錘光儀乃具唯頸及脅兩處有孔其年秀才偽敕所追有像色金百二十兩盛以竹筒雲以賊徒蜂起無方守護並用付才又以念誦銅珠一貫遺才為信才得便風舉帆前引於江中路遭浪船沒財物蕩盡唯人達岸但恨失像色金煩冤江畔呼嗟未絶須臾金筒隨浪逆流并遺銅珠前後相繼泛泛隱隱向岸就才既獲像金舉衆大叫欣慶無量唐蒲州普濟寺釋道英姓陳氏蒲州猗氏人也年十八叔休律師化令出家父母戀逼取妻英割愛辭親示同脫蓰在俗不染色聲出家經論洞明乃曰法相可知心惑須曉開皇十九年遂入解縣太行山柏梯寺修學止觀忽然發解人法二空深悟心首坐處樹枝下映四表兼理僧役以事考心後在京師住勝光寺從曇遷禪師聽攝大乘論學徒五百英解獨俊嘗曰惟識之旨洞曉心腑外事之質豈得礙乎晚還蒲州住普濟寺置莊夏縣東山深隱之處不與俗事交爭八方四部其湊若昏晝則營理僧務夜則為説禪觀至於一日説起信論到心真如門奄然不語衆怪觀之氣絶身冷經於纍宿方從定起身色怡泰如證初禪河東沙門道遜高德名僧素與同學及遜捨命去英百五十里未及相報終夕便知告其衆曰遜公已逝相與送乎及行中路便逢告使自及終集衆告曰今日早須收積恐明日人畜衆聚損食穀草英亦自運催促極急衆但知助不測其意至夜都了索水洗浴還本坐處被以大衣語門人志裒法要又曰無常常耶不可自欺不可空死令誦華嚴經賢首偈奄然神逝唐坊州人上柱國王懷智至顯慶初亡歿其母孫氏及弟懷善懷表並存至四年六月雍州高陵有一人死經七日背上已爛而蘇此人於地下見懷智云見任泰山録事遣此人執筆口授為書謂之曰汝雖合死今方便放汝歸家宜為我持此書至坊州訪我家兼白我娘懷智今為泰山録事參軍幸蒙安泰但家中曾貸寺家木作門此功德物請早酬償之懷善即死速作經像救助不然恐無濟理此人既蘇之後即齎書送其舍所論家事無不暗合至經三日懷善遂暴死合州道俗聞者莫不增修功德攝念篇引證爾時世尊告諸比丘譬如士夫遊空宅中得六種衆生一者得狗即執其狗繫著一處次得其鳥次得毒蛇次得野干次得失收摩羅次得獼猴得斯衆生悉縛一處各各嗜欲到所安處各不樂於他處所繫縛如是六根種種境界各自求所樂不樂餘境眼嘗求可愛之色不可意色則生其猒耳鼻舌身意亦復如是此六種根種種行處其有力者堪能自在是故當勤修習爾時世尊告諸比丘譬如有蚖蛇凶惡毒熾盛一筐中時有士夫聰明求樂猒苦求生猒死時有一士夫語言汝今取此篋蛇摩拭洗浴恩親養食出內以時若四毒蛇脫有惱者或能殺汝或令近死汝當防護爾時士夫畏四毒蛇及五旃陀羅拔刀隨後又內六大賊來恐怖馳走還入空村見彼空舍危朽腐毀有諸惡物但皆危脆無有堅固人復語言是空聚落當有賊來奄汝爾時士夫畏此四毒蛇五拔刀賊內六惡賊空村群賊而復馳走忽爾道路臨一大河其水復急但見此岸有諸怖畏而見彼岸安隱快樂清淨無畏而無橋船可度得至彼岸作是思維即拾草木成筏截流橫度如是士夫免四毒蛇五拔刀怨六內惡賊復得脫於空村群賊度於彼流離此岸種種怖畏得至彼岸安隱快樂法服篇感應緣一驗唐貞觀五年梁州安養寺慧光法師弟子母氏家貧內無小衣入來子房取故袈裟作之而著與諸鄰母同聚言笈忽覺腳熱漸上至腰須臾雷震霹靂擲鄰母百步之外土泥雨耳悶絶經日方得醒悟所用衣母遂被震死火燒燋踡題其背曰由用法衣不如法也其子收殯又再震出乃露骸林下是知受持法服福利三歸之龍信不虛矣燃燈篇感應緣二驗後周時有張元字孝始河北萬城人也年甫十六其祖喪明三年元恆憂泣晝夜經行以祈福祐復讀藥師經云盲者得視之言遂請七僧燃七燈七日七夜轉讀藥師經每日行道作天人師乃云元為孫不孝使祖喪明今以燈光普施法界祖目見明元求代暗如此殷勤經於七日其夜夢見一老翁以一金錍療其祖目謂元曰勿憂悲也三日已後祖目必差元於夢中喜躍無申遂即驚覺乃更遍告家人大小三日之後祖目果差唐蜀川漢州三學山寺至唐開皇十二年寺東璧有佛迹現長尺八寸闊七寸兼有神燈自空而現每夕常爾齋日則多有州宰意欲尋之乘馬來寺十里以外空燈列見漸近漸昧返還十里如前還現每於月六齋日常出懸幡篇引證迦葉詰阿難經云昔阿育王自於境內立千二百塔王後病困有一沙門省王病王言前為千二百塔各織作金縷幡欲手自懸幡散華始得成辦而得重病恐不遂願道人語王云王好叉手一心道人即現神足應時千二百寺皆在王前王見歡喜便使取金幡金華懸諸剎上塔寺低仰即皆就王手王得本願身復病愈即發大意延壽二十五年故名續命神幡香華篇感應緣六驗齊栖霞寺在南徐州琅琊郡攝山之中嘗聞法鐘自響山舍去村五六里宋升明中村民平旦並見半山有幡蓋羅列煙光五色映照虛空時有法度法師於山舍講無量壽經中夜忽有金光照寺於其光中如有臺館形像弘宣寺中僧衆及淨人等小不如法及白衣賓客有穢濁入寺者虎即出現吼叫巡房響振山谷唐雍州渭南縣南山倒豹谷崖有懸石文狀倒豹谷有巖像於佛面亦號像谷此谷有七佛龕昔佛曾來此谷説法澗內有薝蔔華嘗所供養近至永徽年中南山龍池寺沙門智積聞之往尋至谷聞香莫知何所深訝香氣從澗內沙出即撥沙看形似茅根裏甲沙土然極芬馥就水抖擻洗之一澗皆香將還龍池佛堂中合堂皆香極深美氣異苑曰司州衛士度母嘗誦經長齋非道不行曾出自齋堂衆僧未食俱望見雲中有一物下即落其前乃是大鉢滿中香飯舉坐肅然一時敬禮母自分賦齋人皆七日不飢博物志曰西域使獻香漢制獻香不滿斤不得受西使臨去乃發香器如大豆者試著宮門香氣聞長安四面數十里中經日乃歇栴檀香竺法真登羅山疏曰栴檀出外國元嘉末僧成藤於山見一大樹圓蔭數畝三丈餘圍辛芳酷烈其間枯條數尺援而刃之白栴檀也俞益期箋曰衆香共是一木木根為栴檀驚精香十州記曰聚曰洲在西海中上多真仙靈館宮第北門有大樹與楓木相似而芳香聞數百里名為反魂樹扣樹能有聲如牛詬聞者駭振伐其根心於玉谷中煮取汁更微煎令可丸名曰驚精香或名震靈又名反生香或名人烏精或名卻死香香聞數百里死尸在地聞氣仍活唄讚篇述意尋西方之有唄猶東國之有讚讚者從文以結章唄者短偈以流頌比其事義名異實同是故經言以微妙音聲歌讚於佛德引證長阿含經云其有音聲五種清淨乃名梵聲一者其音正直二者其音和雅三者其音清徹四者其音深滿五者周遍遠聞音樂部感應緣一驗北齊時有仕人姓梁甚豪富將死謂其妻子曰吾平生所愛奴馬使用日久稱意吾死以為殉不然無所乘也及死家人以囊盛土壓奴殺之馬猶未殺奴死四日而蘇説云至官府門門人因留止在門所經一宿明旦見其亡主被鎖兵守衛入官所見奴謂曰我謂死人得使奴婢故遺言喚汝今各自受其苦全不相關今當白官放汝言畢而入奴從屏外窺之見官守衛人曰昨日壓脂多少乎對曰得八斗官曰更將去壓取一斛六斗主則被壓牽出竟不得言明旦又來有善色謂奴曰今當為汝白也又入官問得脂乎對曰不得官問何以主司曰此人死三日家人為請僧設會每聞經唄聲鐵梁輒折故不得也官曰且將去主司白官請官放奴即喚放俱出門主遣傳語其妻子曰賴汝等追福獲免大苦然由未脫更能造經像以相救濟冀因得免自今無設祭既不得食而益吾罪言畢而別奴遂重生而具言之家中果以其日設會於是傾家造福合門練行五卷末醒世卷六目録遷流世諦使人知懺罪由己不由人敬塔篇引證感福旋繞故塔感應緣九驗禮佛部感應緣九驗舍利篇引證分法感福感應緣六驗供養篇引證受請篇施食食時施福感應緣三驗輪王篇育王君臣篇王過王業王都納諫篇引證審察篇感應緣一驗思慎篇慎過感應緣三驗儉約篇感應緣二驗懲過篇引證感應緣一驗和順篇和國誡勗篇誡馬雜誡部感應緣一驗忠孝篇引證睒子業因感應緣七驗不孝感應緣一驗報恩篇引證感應緣二驗善友篇引證擇交引證感應緣一驗
